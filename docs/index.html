─────────────┘\r\n```\r\n\r\n`undecorated = true` + `Surface(border)` — same pattern as `UnsavedChangesDialog`, so the glass theme tone matches.\r\n\r\n---\r\n\r\n## Match highlight\r\n\r\n```kotlin\r\nprivate fun highlightedName(\r\n    text: String,\r\n    indices: IntArray,\r\n    base: Color,\r\n    highlight: Color,\r\n): AnnotatedString\r\n```\r\n\r\nOnly glyphs at `QuickOpenResult.nameIndices` are painted in `primary` + `Bold`. The parent path (`parent = relative.dropLast(name.length).trimEnd('/')`) is rendered in dim `onSurfaceVariant` with no highlight — name-match alone is plenty for now.\r\n\r\n---\r\n\r\n## Empty result\r\n\r\nIf `rank` returns an empty list the dialog shows \"결과 없음\" centered. `Enter` is a no-op (`getOrNull(0)` is null).\r\n\r\n---\r\n\r\n## Used by\r\n\r\n| Location | Trigger |\r\n|---|---|\r\n| `page.app.Main` `openQuickOpen` | `Ctrl+P` (only when `rootDir != null`) |\r\n\r\nIf no folder is open (`rootDir == null`), the dialog doesn't appear — there's nothing to index.\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/app/search_bar.md":"# SearchBar\r\n\r\n> `page/app/src/main/kotlin/page/app/SearchBar.kt` — 에디터 상단 검색/치환 바\r\n\r\n`SearchState` 를 받아 검색어 입력, 매치 카운트, 케이스 토글, 이전/다음, 치환 입력 / 한 개 / 전부 치환을 한 줄(또는 두 줄) 로 그린다\r\n\r\n> English: [search_bar_en.md](https://monkshark.github.io/page-ide/#modules/app/search_bar_en.md)\r\n\r\n---\r\n\r\n## 시그니처\r\n\r\n```kotlin\r\n@Composable\r\nfun SearchBar(\r\n    state: SearchState,\r\n    onQueryChange: (String) -> Unit,\r\n    onReplaceChange: (String) -> Unit,\r\n    onToggleCase: () -> Unit,\r\n    onNext: () -> Unit,\r\n    onPrev: () -> Unit,\r\n    onReplace: () -> Unit,\r\n    onReplaceAll: () -> Unit,\r\n    onClose: () -> Unit,\r\n    onWindowShortcut: (KeyEvent) -> Boolean,\r\n    modifier: Modifier = Modifier,\r\n)\r\n```\r\n\r\n| 파라미터 | 의미 |\r\n|---|---|\r\n| `state` | 현재 검색 상태 — query / replace / matches / activeMatchIndex / replaceVisible |\r\n| `onWindowShortcut` | 검색 바가 처리하지 않은 키를 위 윈도우로 위임 — `Ctrl+S` 같은 글로벌 단축키 보존 |\r\n\r\n---\r\n\r\n## 레이아웃\r\n\r\n| 줄 | 구성 |\r\n|---|---|\r\n| 1줄 | 검색 입력 · `n / total` 카운터 · `Aa` 케이스 토글 · `<` 이전 · `>` 다음 · `×` 닫기 |\r\n| 2줄 (옵션) | 치환 입력 · `바꾸기` · `전부 바꾸기` |\r\n\r\n`state.replaceVisible` 가 `true` 일 때만 2줄 표시 — `Ctrl+R` 로 토글\r\n\r\n---\r\n\r\n## 포커스 자동 이동\r\n\r\n```kotlin\r\nLaunchedEffect(state.replaceVisible) {\r\n    if (state.replaceVisible) replaceFocus.requestFocus() else queryFocus.requestFocus()\r\n}\r\n```\r\n\r\n치환 줄을 켜면 자동으로 치환 입력에 포커스, 끄면 검색 입력으로 돌아감\r\n\r\n---\r\n\r\n## 키 처리\r\n\r\n| 입력 위젯 | 키 | 동작 |\r\n|---|---|---|\r\n| 검색 | `Enter` | `onNext` |\r\n| 검색 | `Shift+Enter` | `onPrev` |\r\n| 검색 | `Esc` | `onClose` |\r\n| 치환 | `Enter` | `onReplace` |\r\n| 치환 | `Esc` | `onClose` |\r\n| 둘 다 | 그 외 | `onWindowShortcut(e)` 로 윈도우 키핸들러에 위임 |\r\n\r\n`Ctrl+S` 같이 검색 바와 무관한 단축키는 위로 흘려보내야 하므로 `onWindowShortcut` 위임이 필수\r\n\r\n---\r\n\r\n## 보조 컴포넌트\r\n\r\n| 이름 | 역할 |\r\n|---|---|\r\n| `InputBox` | 입력 필드의 박스/보더 (`220 × 24 dp`) |\r\n| `CounterLabel` | `state.query.isEmpty()` 이면 빈 문자열, 매치 0이면 `0 matches`, 그 외 `n / total` |\r\n| `ToggleChip` | `Aa` 케이스 토글 (`active` 면 primary 톤) |\r\n| `IconChip` | `<` `>` `×` (단문자 + hover bg) |\r\n| `TextChip` | `바꾸기` / `전부 바꾸기` (텍스트 라벨 + hover bg, `enabled = matches.isNotEmpty()`) |\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.Main` `search != null` 일 때 에디터 상단에 표시 | 검색/치환 입력 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/app/search_bar_en.md":"# SearchBar\r\n\r\n> 한국어: [search_bar.md](https://monkshark.github.io/page-ide/#modules/app/search_bar.md)\r\n\r\n> `page/app/src/main/kotlin/page/app/SearchBar.kt` — Editor's find/replace strip\r\n\r\nTakes a `SearchState` and renders the query input, match counter, case toggle, prev/next, and (when expanded) the replace input + `Replace` / `Replace All`.\r\n\r\n---\r\n\r\n## Signature\r\n\r\n```kotlin\r\n@Composable\r\nfun SearchBar(\r\n    state: SearchState,\r\n    onQueryChange: (String) -> Unit,\r\n    onReplaceChange: (String) -> Unit,\r\n    onToggleCase: () -> Unit,\r\n    onNext: () -> Unit,\r\n    onPrev: () -> Unit,\r\n    onReplace: () -> Unit,\r\n    onReplaceAll: () -> Unit,\r\n    onClose: () -> Unit,\r\n    onWindowShortcut: (KeyEvent) -> Boolean,\r\n    modifier: Modifier = Modifier,\r\n)\r\n```\r\n\r\n| Parameter | Meaning |\r\n|---|---|\r\n| `state` | Current search state — query / replace / matches / activeMatchIndex / replaceVisible |\r\n| `onWindowShortcut` | Forwards keys the search bar doesn't handle to the parent window — keeps global shortcuts like `Ctrl+S` working |\r\n\r\n---\r\n\r\n## Layout\r\n\r\n| Row | Contents |\r\n|---|---|\r\n| 1st | Query input · `n / total` counter · `Aa` case toggle · `<` prev · `>` next · `×` close |\r\n| 2nd (optional) | Replace input · `바꾸기` (Replace) · `전부 바꾸기` (Replace All) |\r\n\r\nThe 2nd row only renders when `state.replaceVisible` is `true` — toggled by `Ctrl+R`.\r\n\r\n---\r\n\r\n## Auto focus\r\n\r\n```kotlin\r\nLaunchedEffect(state.replaceVisible) {\r\n    if (state.replaceVisible) replaceFocus.requestFocus() else queryFocus.requestFocus()\r\n}\r\n```\r\n\r\nOpening the replace row puts focus in the replace input; closing it returns focus to the query input.\r\n\r\n---\r\n\r\n## Key handling\r\n\r\n| Field | Key | Action |\r\n|---|---|---|\r\n| Query | `Enter` | `onNext` |\r\n| Query | `Shift+Enter` | `onPrev` |\r\n| Query | `Esc` | `onClose` |\r\n| Replace | `Enter` | `onReplace` |\r\n| Replace | `Esc` | `onClose` |\r\n| Both | other | Delegated via `onWindowShortcut(e)` |\r\n\r\nThe delegation is essential: shortcuts unrelated to search (e.g., `Ctrl+S`) must reach the window key handler unblocked.\r\n\r\n---\r\n\r\n## Helpers\r\n\r\n| Name | Role |\r\n|---|---|\r\n| `InputBox` | Box + border for an input field (`220 × 24 dp`) |\r\n| `CounterLabel` | Empty when query is empty, `0 matches` for none, else `n / total` |\r\n| `ToggleChip` | `Aa` case toggle (primary tone when active) |\r\n| `IconChip` | `<` `>` `×` (single glyph + hover bg) |\r\n| `TextChip` | Replace / Replace All (text label + hover bg, `enabled = matches.isNotEmpty()`) |\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.Main` shows it above the editor when `search != null` | Find/replace input |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/app/tab_bar.md":"# TabBar\r\n\r\n> `page/app/src/main/kotlin/page/app/TabBar.kt` — 상단 탭 줄 + 드래그 재배치\r\n\r\n`TabBook.tabs` 를 가로 스크롤 row 로 그리고, 활성 칩에 배경 톤을 입힌다. 드래그로 순서를 바꾸고, 휠로 좌우 스크롤\r\n\r\n> English: [tab_bar_en.md](https://monkshark.github.io/page-ide/#modules/app/tab_bar_en.md)\r\n\r\n---\r\n\r\n## 시그니처\r\n\r\n```kotlin\r\n@Composable\r\nfun TabBar(\r\n    book: TabBook,\r\n    onActivate: (Int) -> Unit,\r\n    onClose: (Int) -> Unit,\r\n    onMove: (Int, Int) -> Unit,\r\n    modifier: Modifier = Modifier,\r\n)\r\n```\r\n\r\n| 파라미터 | 의미 |\r\n|---|---|\r\n| `book` | 탭 묶음 — `tabs` / `activeIndex` 를 직접 읽는다 |\r\n| `onActivate(i)` | 탭 클릭 시 활성 인덱스 전환 |\r\n| `onClose(i)` | 칩의 `×` 클릭 시 — dirty 면 호출부가 다이얼로그 띄움 |\r\n| `onMove(from, to)` | 드래그 결과 — `TabBook.move` 호출 |\r\n\r\n높이는 `TabBarHeight = 32.dp` 고정\r\n\r\n---\r\n\r\n## 드래그 재배치\r\n\r\n`pointerInput(book.tabs.size)` 안에서 `awaitFirstDown` → `drag`. `touchSlop` 를 넘긴 뒤부터 `dragOffsetPx` 를 누적\r\n\r\n옆 칩의 폭의 절반을 넘기면 그 자리로 swap — `tabBounds` 맵을 함께 swap 해 다음 임계값을 자연스럽게 갱신. 한 번의 드래그에서 여러 칩을 쉽게 통과 가능\r\n\r\n```kotlin\r\nprivate fun swapBounds(bounds: MutableMap<Int, IntRange>, a: Int, b: Int)\r\n```\r\n\r\n---\r\n\r\n## 휠 스크롤\r\n\r\n탭이 화면 폭을 넘기면 `horizontalScroll(scrollState)`. `PointerEventType.Scroll` 을 가로채 `scrollState.scrollBy(deltaY * 60f)` 로 가로 스크롤로 변환 — 트랙패드/마우스 휠 모두 좌우 이동에 매핑\r\n\r\n---\r\n\r\n## `TabChip`\r\n\r\n```kotlin\r\n@Composable\r\nprivate fun TabChip(\r\n    tab: OpenTab,\r\n    isActive: Boolean,\r\n    offsetPx: Int,\r\n    onClose: () -> Unit,\r\n    onBoundsChanged: (Int, Int) -> Unit,\r\n)\r\n```\r\n\r\n`onBoundsChanged` 는 `onGloballyPositioned` 에서 호출 — 드래그 로직이 칩 폭을 알아야 swap 임계값을 잡는다\r\n\r\n활성 칩 배경: `colorScheme.background` (에디터 본문 톤과 같음 → \"이 칩 = 지금 보고 있는 본문\" 시각적 연결)\r\n\r\n---\r\n\r\n## `CloseButton`\r\n\r\n```kotlin\r\n@Composable\r\nprivate fun CloseButton(dirty: Boolean, onClick: () -> Unit)\r\n```\r\n\r\n평소엔 `×`. dirty 인데 마우스가 칩 위에 없으면 `●` (저장 표시). 호버 시 `×` 로 전환 — 저장 표시와 닫기 버튼이 같은 자리를 공유해 칩 폭이 일정\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.Main` 상단 | 탭 칩 렌더 + 드래그/닫기/활성 콜백 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/app/tab_bar_en.md":"# TabBar\r\n\r\n> 한국어: [tab_bar.md](https://monkshark.github.io/page-ide/#modules/app/tab_bar.md)\r\n\r\n> `page/app/src/main/kotlin/page/app/TabBar.kt` — Top tab strip with drag-reorder\r\n\r\nRenders `TabBook.tabs` as a horizontally scrollable row, tints the active chip, drags reorder, wheel scrolls.\r\n\r\n---\r\n\r\n## Signature\r\n\r\n```kotlin\r\n@Composable\r\nfun TabBar(\r\n    book: TabBook,\r\n    onActivate: (Int) -> Unit,\r\n    onClose: (Int) -> Unit,\r\n    onMove: (Int, Int) -> Unit,\r\n    modifier: Modifier = Modifier,\r\n)\r\n```\r\n\r\n| Parameter | Meaning |\r\n|---|---|\r\n| `book` | The tab bundle — reads `tabs` / `activeIndex` directly |\r\n| `onActivate(i)` | Tab tap activates that index |\r\n| `onClose(i)` | `×` click — caller pops the dialog if the tab is dirty |\r\n| `onMove(from, to)` | Drag result — calls `TabBook.move` |\r\n\r\nFixed height: `TabBarHeight = 32.dp`.\r\n\r\n---\r\n\r\n## Drag-reorder\r\n\r\nInside `pointerInput(book.tabs.size)`, `awaitFirstDown` → `drag`. `dragOffsetPx` accumulates after `touchSlop` is crossed.\r\n\r\nWhen the offset exceeds half of the neighbor chip's width, the two swap. `tabBounds` swaps with them so the next threshold updates naturally — a single drag can pass through several chips smoothly.\r\n\r\n```kotlin\r\nprivate fun swapBounds(bounds: MutableMap<Int, IntRange>, a: Int, b: Int)\r\n```\r\n\r\n---\r\n\r\n## Wheel scrolling\r\n\r\nWhen tabs exceed the viewport, `horizontalScroll(scrollState)` kicks in. `PointerEventType.Scroll` is intercepted and translated to `scrollState.scrollBy(deltaY * 60f)` — trackpad and mouse wheel both map to horizontal motion.\r\n\r\n---\r\n\r\n## `TabChip`\r\n\r\n```kotlin\r\n@Composable\r\nprivate fun TabChip(\r\n    tab: OpenTab,\r\n    isActive: Boolean,\r\n    offsetPx: Int,\r\n    onClose: () -> Unit,\r\n    onBoundsChanged: (Int, Int) -> Unit,\r\n)\r\n```\r\n\r\n`onBoundsChanged` fires from `onGloballyPositioned` — the drag logic needs each chip's width to compute swap thresholds.\r\n\r\nActive background: `colorScheme.background` (same tone as the editor body → visual link \"this chip = the body I'm looking at\").\r\n\r\n---\r\n\r\n## `CloseButton`\r\n\r\n```kotlin\r\n@Composable\r\nprivate fun CloseButton(dirty: Boolean, onClick: () -> Unit)\r\n```\r\n\r\nNormally `×`. When the tab is dirty and the cursor is not over the chip, shows `●` (unsaved indicator). On hover it flips back to `×` — the indicator and the button share the same slot, so chip width never shifts.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| Top of `page.app.Main` | Renders chips, hands drag/close/activate back as callbacks |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/app/unsaved_changes_dialog.md":"# UnsavedChangesDialog\r\n\r\n> `page/app/src/main/kotlin/page/app/UnsavedChangesDialog.kt` — 저장 확인 다이얼로그\r\n\r\ndirty 한 탭을 닫거나 앱을 종료할 때, 저장/버림/취소를 묻는 모달. 탭 단위와 앱 종료 단위가 같은 다이얼로그를 공유한다\r\n\r\n> English: [unsaved_changes_dialog_en.md](https://monkshark.github.io/page-ide/#modules/app/unsaved_changes_dialog_en.md)\r\n\r\n---\r\n\r\n## 시그니처\r\n\r\n```kotlin\r\n@Composable\r\ninternal fun UnsavedChangesDialog(\r\n    fileNames: List<String>,\r\n    isAppExit: Boolean,\r\n    onSave: () -> Unit,\r\n    onDiscard: () -> Unit,\r\n    onCancel: () -> Unit,\r\n)\r\n```\r\n\r\n| 파라미터 | 의미 |\r\n|---|---|\r\n| `fileNames` | 저장 안 된 파일 이름 리스트 — 본문에 불릿으로 나열 |\r\n| `isAppExit` | `true` 면 \"저장하지 않고 종료하시겠습니까?\", `false` 면 \"저장하시겠습니까?\" |\r\n| `onSave` / `onDiscard` / `onCancel` | 세 버튼 콜백 — 호출자 (`Main`) 가 실제 닫기/종료를 처리 |\r\n\r\n---\r\n\r\n## 키보드\r\n\r\n| 키 | 동작 |\r\n|---|---|\r\n| `Esc` | `onCancel` |\r\n| `Y` | `onSave` |\r\n| `N` | `onDiscard` |\r\n\r\n`onPreviewKeyEvent` 에서 가로채므로 다이얼로그 내부 입력 위젯이 없어도 동작\r\n\r\n---\r\n\r\n## 모양\r\n\r\n```kotlin\r\nDialogWindow(undecorated = true, resizable = false, ...)\r\n```\r\n\r\n- `460 × 220 dp` 고정 크기, 타이틀바 없음\r\n- 상단 20dp 영역만 `WindowDraggableArea` 로 처리해 드래그 이동 가능\r\n- `GlassTheme` 안에서 그려져 메인 윈도우와 톤 일치\r\n\r\n`FileList` 는 surface 톤 박스에 `• 파일명` 들을 줄지어 보여줌 — 여러 파일이 한 번에 dirty 일 때 (앱 종료 케이스) 가독성 확보\r\n\r\n---\r\n\r\n## 버튼\r\n\r\n순서는 `[취소] [저장 안 함] [저장]` — `저장` 만 primary\r\n\r\n`Enter` 가 기본 액션이 아닌 이유: 본문 입력 위젯이 없으므로 `Enter` 가 어디로 갈지 모호. 명시 키 (`Y/N/Esc`) 만 받음\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.Main` `pendingClose != null` 일 때 표시 | dirty 탭/앱 종료 확인 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/app/unsaved_changes_dialog_en.md":"# UnsavedChangesDialog\r\n\r\n> 한국어: [unsaved_changes_dialog.md](https://monkshark.github.io/page-ide/#modules/app/unsaved_changes_dialog.md)\r\n\r\n> `page/app/src/main/kotlin/page/app/UnsavedChangesDialog.kt` — Save-confirmation modal\r\n\r\nAsks Save / Discard / Cancel when a dirty tab is being closed or the app is exiting. Tab-close and app-exit share the same dialog.\r\n\r\n---\r\n\r\n## Signature\r\n\r\n```kotlin\r\n@Composable\r\ninternal fun UnsavedChangesDialog(\r\n    fileNames: List<String>,\r\n    isAppExit: Boolean,\r\n    onSave: () -> Unit,\r\n    onDiscard: () -> Unit,\r\n    onCancel: () -> Unit,\r\n)\r\n```\r\n\r\n| Parameter | Meaning |\r\n|---|---|\r\n| `fileNames` | Names of unsaved files — listed as bullets in the body |\r\n| `isAppExit` | `true` ⇒ \"Quit without saving?\"; `false` ⇒ \"Save?\" |\r\n| `onSave` / `onDiscard` / `onCancel` | Three button callbacks — `Main` performs the actual close/exit |\r\n\r\n---\r\n\r\n## Keyboard\r\n\r\n| Key | Action |\r\n|---|---|\r\n| `Esc` | `onCancel` |\r\n| `Y` | `onSave` |\r\n| `N` | `onDiscard` |\r\n\r\nCaptured in `onPreviewKeyEvent`, so they work without any input widget on screen.\r\n\r\n---\r\n\r\n## Appearance\r\n\r\n```kotlin\r\nDialogWindow(undecorated = true, resizable = false, ...)\r\n```\r\n\r\n- Fixed `460 × 220 dp`, no title bar.\r\n- Top 20dp is `WindowDraggableArea` so the dialog can still be moved.\r\n- Wrapped in `GlassTheme` so it matches the main window's tone.\r\n\r\n`FileList` paints `• filename` rows on a surface-tinted block — keeps it readable when multiple files are dirty at once (the app-exit case).\r\n\r\n---\r\n\r\n## Buttons\r\n\r\nOrder is `[Cancel] [Don't Save] [Save]` — only `Save` is primary.\r\n\r\n`Enter` is intentionally not bound: with no input widget in the body, where it would go is ambiguous. Only the explicit keys (`Y/N/Esc`) are accepted.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.Main` shows it while `pendingClose != null` | Confirms dirty tab/app close |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/atlas/main.md":"# Atlas\r\n\r\n> `page:atlas` — 코드 그래프. import · 호출 · 모듈 의존을 노드와 엣지로 시각화\r\n\r\n파일 트리는 디렉터리 구조만 보여준다. 무엇이 무엇을 부르고, 어떤 모듈이 어디에 의존하는지는 트리에 드러나지 않는다. Atlas는 소스에서 관계를 뽑아 그래프로 그려, 낯선 코드베이스에 들어온 개발자가 \"이 파일이 프로젝트 어디에 붙어 있나\"를 눈으로 확인하게 한다.\r\n\r\n> English: [main_en.md](https://monkshark.github.io/page-ide/#modules/atlas/main_en.md)\r\n\r\n---\r\n\r\n## 구성\r\n\r\n모듈은 네 층으로 나뉜다.\r\n\r\n```mermaid\r\nflowchart LR\r\n    src[\"소스 파일\"] --> az[\"analyzer<br/>import 추출·해석\"]\r\n    az --> gr[\"graph<br/>그래프 모델·쿼리\"]\r\n    gr --> rd[\"render<br/>패널·캔버스\"]\r\n    gr --> ex[\"export<br/>스냅샷\"]\r\n```\r\n\r\n| 층 | 역할 |\r\n|---|---|\r\n| `analyzer` | tree-sitter로 소스에서 import를 추출하고, 실제 파일 경로로 해석 |\r\n| `graph` | 추출한 관계를 노드·엣지 모델로 쌓고 질의 (사이클, 의존 수 등) |\r\n| `render` | Compose 캔버스·패널로 그래프를 그리고 상호작용 |\r\n| `export` | 그래프 스냅샷을 JSON으로 내보냄 (문서 뷰어 위젯이 소비) |\r\n\r\n---\r\n\r\n## analyzer — import 추출과 해석\r\n\r\n`ImportExtractor`는 tree-sitter 파서로 소스에서 import 구문을 뽑는다. 확장자로 언어를 판정하며, 다음을 지원한다.\r\n\r\nJava · Kotlin · Python · JavaScript · TypeScript · Go · Rust · Dart · C · C++ · Scala · Ruby · PHP\r\n\r\n추출한 import는 문자열일 뿐이라, 실제 파일로 이어 줘야 엣지가 된다. `ImportResolver`가 공통 해석을 맡고, 패키지 매니페스트가 있는 언어는 전용 resolver가 처리한다.\r\n\r\n| resolver | 근거 |\r\n|---|---|\r\n| `GoModResolver` | `go.mod`의 module 경로 |\r\n| `PubspecResolver` | Dart `pubspec.yaml`의 package name |\r\n| `TsConfigResolver` | `tsconfig.json`의 path 매핑 |\r\n\r\n`DeclarationIndex`는 심볼 선언 위치를, `StaticCallHierarchySource`는 정적 호출 관계를 모아 호출 그래프의 바탕이 된다.\r\n\r\n---\r\n\r\n## graph — 모델과 질의\r\n\r\n`CodeGraphProvider`는 그래프 데이터의 인터페이스다. `ImportGraphProvider`가 이를 구현해 파일별·프로젝트별 슬라이스를 만든다.\r\n\r\n```kotlin\r\ninterface CodeGraphProvider {\r\n    fun nodesForFile(path: Path, text: String): GraphSlice\r\n    fun nodesForProject(activePath: Path?, activeText: String?): GraphSlice\r\n}\r\n```\r\n\r\n프로젝트 전체 그래프에서는 순환 의존(`projectCycles`), 파일별 피의존 수(`dependentCountOf`), 의존 다이제스트(`dependencyDigest`)를 뽑는다. `ModuleGraph` · `ModuleLayers` · `ModulePath`는 파일 그래프를 모듈 단위로 접어 계층을 만들고, `SymbolGraph`는 심볼 단위 관계를 다룬다.\r\n\r\n---\r\n\r\n## render — 두 가지 뷰\r\n\r\n엔트리 컴포저블은 `AtlasContent`다. 상단 칩으로 두 탭을 오간다.\r\n\r\n| 탭 (`AtlasViewTab`) | 내용 |\r\n|---|---|\r\n| `RELATIONS` | `OverviewCanvas` — 노드·엣지 그래프. 줌·팬, 선택, 파일 열기 |\r\n| `ANALYSIS` | `DependencyInsightPanel` — 의존/피의존, 순환 등 텍스트 인사이트 |\r\n\r\n호출 그래프는 `CallGraphPanel` · `CallsView`가 별도 뷰로 그린다. `AtlasSearch` · `AtlasSearchBar`로 노드를 찾고, `VcsOverlay`가 변경 상태를 그래프 위에 겹친다. 뷰 상태는 `AtlasViewState`가 보관한다.\r\n\r\n---\r\n\r\n## IDE 통합\r\n\r\nAtlas는 확장 패널(`ExpandedPanel.ATLAS`)로 열린다.\r\n\r\n- 에디터 컨텍스트 메뉴 Show in Atlas — 현재 파일을 그래프에서 선택\r\n- 단축키 `FOCUS_IN_ATLAS` → `focusInAtlas(path)` — 활성 파일을 Relations 탭에 포커스\r\n- 탭 전환·패널 크기는 MVI 이벤트(`AtlasViewTabChanged` · `ResizeAtlas` · `FocusInAtlas`)로 흐른다\r\n\r\n---\r\n\r\n## export — 스냅샷\r\n\r\n`SnapshotExporter`는 그래프를 JSON 스냅샷으로 내보낸다. 문서 뷰어의 Atlas 위젯이 이 스냅샷을 읽어 라이브 IDE 없이도 그래프를 보여 준다.\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/atlas/main_en.md":"# Atlas\r\n\r\n> `page:atlas` — code graph. Visualizes import · call · module dependencies as nodes and edges\r\n\r\nA file tree shows only directory structure. What calls what, and which module depends on where, never surfaces in the tree. Atlas extracts those relations from source and draws them as a graph, so a developer new to a codebase can see where a file sits in the project at a glance.\r\n\r\n> 한국어: [main.md](https://monkshark.github.io/page-ide/#modules/atlas/main.md)\r\n\r\n---\r\n\r\n## Structure\r\n\r\nThe module splits into four layers.\r\n\r\n```mermaid\r\nflowchart LR\r\n    src[\"source files\"] --> az[\"analyzer<br/>extract·resolve imports\"]\r\n    az --> gr[\"graph<br/>graph model·queries\"]\r\n    gr --> rd[\"render<br/>panels·canvas\"]\r\n    gr --> ex[\"export<br/>snapshot\"]\r\n```\r\n\r\n| Layer | Role |\r\n|---|---|\r\n| `analyzer` | Extracts imports from source with tree-sitter, resolves them to real file paths |\r\n| `graph` | Builds relations into a node/edge model and queries it (cycles, dependent counts, etc.) |\r\n| `render` | Draws and interacts with the graph via Compose canvas and panels |\r\n| `export` | Exports a graph snapshot to JSON (consumed by the docs viewer widget) |\r\n\r\n---\r\n\r\n## analyzer — extracting and resolving imports\r\n\r\n`ImportExtractor` pulls import statements from source using tree-sitter parsers. It detects the language by file extension and supports:\r\n\r\nJava · Kotlin · Python · JavaScript · TypeScript · Go · Rust · Dart · C · C++ · Scala · Ruby · PHP\r\n\r\nAn extracted import is just a string; it has to be linked to a real file before it becomes an edge. `ImportResolver` handles the common cases, and languages with a package manifest get a dedicated resolver.\r\n\r\n| Resolver | Basis |\r\n|---|---|\r\n| `GoModResolver` | `go.mod` module path |\r\n| `PubspecResolver` | Dart `pubspec.yaml` package name |\r\n| `TsConfigResolver` | `tsconfig.json` path mappings |\r\n\r\n`DeclarationIndex` collects symbol declaration sites, and `StaticCallHierarchySource` gathers static call relations that back the call graph.\r\n\r\n---\r\n\r\n## graph — model and queries\r\n\r\n`CodeGraphProvider` is the interface for graph data. `ImportGraphProvider` implements it, producing per-file and per-project slices.\r\n\r\n```kotlin\r\ninterface CodeGraphProvider {\r\n    fun nodesForFile(path: Path, text: String): GraphSlice\r\n    fun nodesForProject(activePath: Path?, activeText: String?): GraphSlice\r\n}\r\n```\r\n\r\nFrom the whole-project graph it derives dependency cycles (`projectCycles`), per-file dependent counts (`dependentCountOf`), and a dependency digest (`dependencyDigest`). `ModuleGraph` · `ModuleLayers` · `ModulePath` fold the file graph into modules to form layers, and `SymbolGraph` handles symbol-level relations.\r\n\r\n---\r\n\r\n## render — two views\r\n\r\nThe entry composable is `AtlasContent`. A chip at the top switches between two tabs.\r\n\r\n| Tab (`AtlasViewTab`) | Content |\r\n|---|---|\r\n| `RELATIONS` | `OverviewCanvas` — the node/edge graph. Zoom, pan, select, open file |\r\n| `ANALYSIS` | `DependencyInsightPanel` — dependencies, dependents, cycles as text insights |\r\n\r\nThe call graph is drawn by `CallGraphPanel` · `CallsView` as a separate view. `AtlasSearch` · `AtlasSearchBar` find nodes, and `VcsOverlay` overlays change status on the graph. View state lives in `AtlasViewState`.\r\n\r\n---\r\n\r\n## IDE integration\r\n\r\nAtlas opens as an expanded panel (`ExpandedPanel.ATLAS`).\r\n\r\n- Editor context menu Show in Atlas — select the current file in the graph\r\n- Shortcut `FOCUS_IN_ATLAS` → `focusInAtlas(path)` — focus the active file in the Relations tab\r\n- Tab switching and panel sizing flow through MVI events (`AtlasViewTabChanged` · `ResizeAtlas` · `FocusInAtlas`)\r\n\r\n---\r\n\r\n## export — snapshot\r\n\r\n`SnapshotExporter` writes the graph to a JSON snapshot. The Atlas widget in the docs viewer reads this snapshot to show the graph without a live IDE.\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/atlas-view/main.md":"# Atlas View\n\n> `page:atlas-view` — Atlas overview 그래프의 모델과 렌더. 데스크톱 IDE와 문서 뷰어가 공유\n\n[Atlas](https://monkshark.github.io/page-ide/#modules/atlas/main.md) 의 overview 화면 — 모듈을 카드로 놓고 더블클릭으로 안으로 파고드는 그래프 — 는 데스크톱 IDE와 브라우저 문서 뷰어 양쪽에서 똑같이 보여야 한다. 그 렌더와 모델만 `page:atlas` 에서 뽑아 멀티플랫폼(`jvm`+`wasmJs`) 모듈로 만든 것이 `atlas-view` 다. 분석기·IDE 패널·스냅샷 export 는 데스크톱 `page:atlas` 에 그대로 남고, 여기엔 뷰에 필요한 부분만 온다. `java.nio.Path` 대신 shared-core의 [FilePath](https://monkshark.github.io/page-ide/#modules/shared-core/main.md) 를 쓴다.\n\n> English: [main_en.md](https://monkshark.github.io/page-ide/#modules/atlas-view/main_en.md)\n\n---\n\n## 구성\n\n| 패키지 | 역할 |\n|---|---|\n| `graph` | 파일 그래프를 모듈로 접고 계층을 분류 |\n| `interaction` | 선택·드릴 상태 |\n| `render` | Compose 캔버스·레이아웃·색 |\n\n---\n\n## graph — 파일에서 모듈로\n\noverview 는 계층 데이터를 따로 두지 않는다. 하나의 평면 파일-level `GraphSlice` 를 `aggregateModules(slice, scopeRoot)` 로 접을 뿐이다. `scopeRoot` 를 바꿔 다시 접으면 그게 곧 드릴인이다.\n\n```kotlin\nfun aggregateModules(\n    slice: GraphSlice,\n    activePath: FilePath? = null,\n    scopeRoot: FilePath? = null,\n): ModuleGraph\n```\n\n- `ModuleNode` 는 디렉터리 하나를 접은 카드다 — 파일 수, 언어, 하위 파일 목록, 그리고 더 들어갈 데가 있는지(`splittable`).\n- `classifyModuleLayers` 는 모듈을 의존 깊이로 다섯 층(`ENTRY` · `FEATURES` · `CORE` · `PLATFORM` · `EXTERNAL`)에 배정한다.\n- `AtlasSnapshot.parse(json)` 는 내보낸 평면 스냅샷(노드 `id` == 레포 상대 경로)을 읽어 `FilePath` 를 복원한다.\n\n---\n\n## interaction — 드릴 상태\n\n`OverviewSelection` 이 선택과 드릴 경로를 함께 들고 있다.\n\n- `drillInto(id)` — splittable 모듈로 한 겹 들어감\n- `drillUpTo(depth)` — 브레드크럼으로 특정 깊이까지 나옴\n- `selectModule` · `tracePath` — 카드 선택과 경로 하이라이트\n\n`drillPath` 의 마지막 원소가 곧 `aggregateModules` 의 `scopeRoot` 가 된다.\n\n---\n\n## render — 캔버스\n\n`OverviewCanvas` 가 모듈 그래프를 그린다. 카드는 층 컬럼에 놓이고(`layeredModuleLayout`), 휠 확대·드래그 이동은 `MapViewState` 가, 순환 엣지 표시는 `MapCycles` 가 맡는다. splittable 모듈을 더블클릭하면 애니메이션 줌으로 그 안으로 들어가고, 단일 파일이면 `onOpenFile` 로 연다.\n\n색은 `AtlasRoleColors` 로 주입받는다. 데스크톱은 Glass 토큰을, 문서 뷰어는 자기 테마를 넣어, 같은 렌더가 양쪽 테마에 맞춰 돈다.\n\n---\n\n## 두 호스트\n\n```mermaid\nflowchart TB\n    av[\"page:atlas-view<br/>모델 · 렌더\"]\n    d[\"page:atlas (desktop)<br/>분석기 · IDE 패널 · export\"] --> av\n    dv[\"docs-viewer (wasm)<br/>AtlasOverview 위젯\"] --> av\n```\n\n데스크톱은 라이브 분석 결과를, 문서 뷰어는 내보낸 스냅샷을 같은 `OverviewCanvas` 에 흘려보낸다.\n\n---\n\n- [Atlas 모듈 보기](https://monkshark.github.io/page-ide/#modules/atlas/main.md)\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/atlas-view/main_en.md":"# Atlas View\n\n> `page:atlas-view` — the Atlas overview graph's model and render, shared by the desktop IDE and the docs viewer\n\nThe [Atlas](https://monkshark.github.io/page-ide/#modules/atlas/main_en.md) overview — modules laid out as cards you double-click to drill into — must look identical in the desktop IDE and in the browser docs viewer. `atlas-view` is that render and model pulled out of `page:atlas` into a multiplatform (`jvm`+`wasmJs`) module. The analyzer, IDE panels, and snapshot export stay in desktop `page:atlas`; only the view-facing parts come here. It uses shared-core's [FilePath](https://monkshark.github.io/page-ide/#modules/shared-core/main_en.md) instead of `java.nio.Path`.\n\n> 한국어: [main.md](https://monkshark.github.io/page-ide/#modules/atlas-view/main.md)\n\n---\n\n## Structure\n\n| Package | Role |\n|---|---|\n| `graph` | Folds the file graph into modules and classifies layers |\n| `interaction` | Selection / drill state |\n| `render` | Compose canvas / layout / colors |\n\n---\n\n## graph — from files to modules\n\nThe overview keeps no separate hierarchy data. It just folds one flat, file-level `GraphSlice` with `aggregateModules(slice, scopeRoot)`. Re-folding with a different `scopeRoot` is the drill-in.\n\n```kotlin\nfun aggregateModules(\n    slice: GraphSlice,\n    activePath: FilePath? = null,\n    scopeRoot: FilePath? = null,\n): ModuleGraph\n```\n\n- A `ModuleNode` is one folded directory — its file count, language, sub-file list, and whether there is more to drill into (`splittable`).\n- `classifyModuleLayers` assigns each module to one of five dependency-depth layers (`ENTRY`, `FEATURES`, `CORE`, `PLATFORM`, `EXTERNAL`).\n- `AtlasSnapshot.parse(json)` reads the exported flat snapshot (node `id` == repo-relative path) and restores a `FilePath`.\n\n---\n\n## interaction — drill state\n\n`OverviewSelection` carries both the selection and the drill path.\n\n- `drillInto(id)` — descend one level into a splittable module\n- `drillUpTo(depth)` — climb back to a given depth via the breadcrumb\n- `selectModule` · `tracePath` — card selection and path highlighting\n\nThe last element of `drillPath` becomes the `scopeRoot` for `aggregateModules`.\n\n---\n\n## render — canvas\n\n`OverviewCanvas` draws the module graph. Cards are placed into layer columns (`layeredModuleLayout`); `MapViewState` handles scroll-zoom and drag-pan, and `MapCycles` marks cycle edges. Double-clicking a splittable module zooms in with animation; a single file opens via `onOpenFile`.\n\nColors are injected through `AtlasRoleColors`. Desktop passes Glass tokens, the docs viewer passes its own theme, so the same render adapts to either.\n\n---\n\n## Two hosts\n\n```mermaid\nflowchart TB\n    av[\"page:atlas-view<br/>model · render\"]\n    d[\"page:atlas (desktop)<br/>analyzer · IDE panels · export\"] --> av\n    dv[\"docs-viewer (wasm)<br/>AtlasOverview widget\"] --> av\n```\n\nDesktop feeds live analysis results; the docs viewer feeds an exported snapshot — both into the same `OverviewCanvas`.\n\n---\n\n- [See the Atlas module](https://monkshark.github.io/page-ide/#modules/atlas/main_en.md)\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\n","modules/core/page_identity.md":"# PageIdentity\r\n\r\n> `page/core/src/main/kotlin/page/core/Identity.kt` — 앱 식별자 상수\r\n\r\n`page:core` 의 유일한 파일. 모든 모듈이 의존하는 루트라 도메인 로직은 들어오지 않는다\r\n\r\n> English: [page_identity_en.md](https://monkshark.github.io/page-ide/#modules/core/page_identity_en.md)\r\n\r\n---\r\n\r\n## 정의\r\n\r\n```kotlin\r\nobject PageIdentity {\r\n    const val NAME = \"PAGE\"\r\n    const val ACRONYM = \"Pair · Atlas · Glass · Echo\"\r\n    const val VERSION = \"0.1.0\"\r\n}\r\n```\r\n\r\n`object` + `const val`. JVM 상수로 인라인되어 런타임 비용 없음\r\n\r\n---\r\n\r\n## 필드\r\n\r\n| 필드 | 값 | 용도 |\r\n|---|---|---|\r\n| `NAME` | `\"PAGE\"` | 윈도우 타이틀, 다이얼로그, About |\r\n| `ACRONYM` | `\"Pair · Atlas · Glass · Echo\"` | 타이틀바 보조 라벨 |\r\n| `VERSION` | `\"0.1.0\"` | 타이틀바 버전, 업데이트 체크 |\r\n\r\n`VERSION` 은 시맨틱 버저닝 (`MAJOR.MINOR.PATCH`). 단계 (Pair / Atlas / Glass / Echo) 가 한 번씩 끝날 때 `MINOR` 가 올라간다\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.Main.TitleBar` | `\"${NAME} · v${VERSION}\"` 형식으로 윈도우 타이틀 출력 |\r\n| `Window(title = ...)` | OS 윈도우 매니저에 보이는 타이틀 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/core/page_identity_en.md":"# PageIdentity\r\n\r\n> 한국어: [page_identity.md](https://monkshark.github.io/page-ide/#modules/core/page_identity.md)\r\n\r\n> `page/core/src/main/kotlin/page/core/Identity.kt` — App identity constants\r\n\r\nThe only file in `page:core`. Sits at the root of the dependency graph, so no domain logic lives here.\r\n\r\n---\r\n\r\n## Definition\r\n\r\n```kotlin\r\nobject PageIdentity {\r\n    const val NAME = \"PAGE\"\r\n    const val ACRONYM = \"Pair · Atlas · Glass · Echo\"\r\n    const val VERSION = \"0.1.0\"\r\n}\r\n```\r\n\r\n`object` + `const val`. Inlined as a JVM constant — zero runtime cost.\r\n\r\n---\r\n\r\n## Fields\r\n\r\n| Field | Value | Purpose |\r\n|---|---|---|\r\n| `NAME` | `\"PAGE\"` | Window title, dialogs, About |\r\n| `ACRONYM` | `\"Pair · Atlas · Glass · Echo\"` | Title-bar subtitle |\r\n| `VERSION` | `\"0.1.0\"` | Title-bar version, update check |\r\n\r\n`VERSION` follows SemVer (`MAJOR.MINOR.PATCH`). `MINOR` bumps each milestone (Pair / Atlas / Glass / Echo) close.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.Main.TitleBar` | Renders `\"${NAME} · v${VERSION}\"` |\r\n| `Window(title = ...)` | Title shown to the OS window manager |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/docs-viewer/main.md":"# Docs Viewer\n\n> `docs-viewer` — 이 문서 사이트를 그리는 Compose wasmJs 앱과, 산문 안에 얹는 위젯 섬\n\n지금 보고 있는 문서 사이트는 두 갈래로 그려진다. 기본 `index.html` 은 마크다운을 HTML로 옮겨 그리는 가벼운 산문 뷰어다(`build_viewer.js` 산출물). 그 위에, 정적 텍스트로는 부족한 자리 — 이를테면 드릴다운되는 Atlas overview — 를 위해 Compose를 wasm으로 컴파일한 위젯 섬을 얹는다. `docs-viewer` 는 그 Compose/wasm 쪽이다.\n\n`java.*` 없이 [shared-core](https://monkshark.github.io/page-ide/#modules/shared-core/main.md) 의 파서·라우팅과 [atlas-view](https://monkshark.github.io/page-ide/#modules/atlas-view/main.md) 의 그래프를 그대로 조립한다.\n\n> English: [main_en.md](https://monkshark.github.io/page-ide/#modules/docs-viewer/main_en.md)\n\n---\n\n## 두 진입점\n\n`Main.kt` 에 두 갈래가 있다.\n\n```kotlin\nfun main() { … DocsApp() … }\n\n@JsExport\nfun mountPageWidget(containerId: String, name: String)\n```\n\n- `main()` 은 `DocsApp` 으로 문서 사이트 전체를 Compose로 그린다.\n- `mountPageWidget` 은 등록된 위젯 하나를 특정 컨테이너에 마운트한다. UMD 글로벌(`window[\"docs-viewer\"].mountPageWidget`)로 노출돼, 플레인 `<script>` 만으로 산문 페이지 안에 섬을 꽂을 수 있다.\n\n---\n\n## DocsApp — 전부 Compose로\n\n`DocsApp` 은 `docs-index.json` 과 `docs/<path>.md` 를 런타임에 가져와(`fetchText`) 그린다.\n\n| 조각 | 역할 |\n|---|---|\n| `DocTreeSidebar` | `buildDocTree` 로 접은 좌측 문서 트리 |\n| `Article` | `MdParser` 트리를 Compose로 렌더 |\n| `HeadingRail` | 헤딩 3개 이상이면 우측 목차 + 스크롤스파이 |\n| `DocsTheme` | 다크·라이트 토큰, 토글 |\n| `HashRouter` | `#path#heading` URL 해시 ↔ 화면 상태 |\n\n한국어·영어 전환은 shared-core의 `_en` 변형 규칙(`variantFor`)을 그대로 쓴다.\n\n---\n\n## 위젯 섬\n\n`PageWidgets` 는 이름 → 컴포저블 레지스트리다. `registerPageWidgets()` 가 두 개를 등록한다.\n\n| 위젯 | 내용 |\n|---|---|\n| `AtlasDemo` | shared-core `GraphCanvas` 로 그린 정적 파일 그래프 |\n| `AtlasOverview` | atlas-view `OverviewCanvas` — 층 컬럼 + 더블클릭 드릴다운 |\n\n`AtlasOverview` 는 `atlas-snapshot.json`(평면 파일-level)을 가져와 `AtlasSnapshot.parse` 로 읽고, `aggregateModules(scopeRoot = 드릴 경로)` 로 접어 그린다. 색은 `DocsTheme` 를 `AtlasRoleColors` 로 넣어 문서 테마에 맞춘다. `mountPageWidget(\"box\", \"AtlasOverview\")` 한 줄이면 산문 어디에나 이 그래프가 뜬다.\n\n---\n\n## 조립층\n\n`docs-viewer` 자체 로직은 얇다. 마크다운 파싱·문서 라우팅은 shared-core, overview 그래프는 atlas-view가 이미 갖고 있고, 이 모듈은 그것들을 wasm 화면으로 엮는다.\n\n```mermaid\nflowchart LR\n    sc[\"shared-core<br/>파서 · 라우팅\"] --> dv[\"docs-viewer\"]\n    av[\"atlas-view<br/>overview 그래프\"] --> dv\n    dv --> html[\"브라우저 (wasm)\"]\n```\n\n---\n\n- [shared-core 보기](https://monkshark.github.io/page-ide/#modules/shared-core/main.md)\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/docs-viewer/main_en.md":"# Docs Viewer\n\n> `docs-viewer` — the Compose wasmJs app that renders this docs site, plus the widget islands laid over the prose\n\nThe docs site you are reading is drawn two ways. The default `index.html` is a light prose viewer that turns markdown into HTML (the output of `build_viewer.js`). On top of it, where static text is not enough — a drill-down Atlas overview, say — it lays widget islands compiled from Compose to wasm. `docs-viewer` is that Compose/wasm side.\n\nWith no `java.*`, it assembles [shared-core](https://monkshark.github.io/page-ide/#modules/shared-core/main_en.md)'s parser and routing together with [atlas-view](https://monkshark.github.io/page-ide/#modules/atlas-view/main_en.md)'s graph.\n\n> 한국어: [main.md](https://monkshark.github.io/page-ide/#modules/docs-viewer/main.md)\n\n---\n\n## Two entry points\n\n`Main.kt` has two paths.\n\n```kotlin\nfun main() { … DocsApp() … }\n\n@JsExport\nfun mountPageWidget(containerId: String, name: String)\n```\n\n- `main()` renders the entire docs site in Compose via `DocsApp`.\n- `mountPageWidget` mounts a single registered widget into a given container. Exposed as a UMD global (`window[\"docs-viewer\"].mountPageWidget`), it lets a plain `<script>` drop an island into a prose page.\n\n---\n\n## DocsApp — all in Compose\n\n`DocsApp` fetches `docs-index.json` and `docs/<path>.md` at runtime (`fetchText`) and renders them.\n\n| Piece | Role |\n|---|---|\n| `DocTreeSidebar` | Left doc tree folded by `buildDocTree` |\n| `Article` | Renders the `MdParser` tree in Compose |\n| `HeadingRail` | Right-side table of contents + scrollspy when there are 3+ headings |\n| `DocsTheme` | Dark / light tokens and the toggle |\n| `HashRouter` | `#path#heading` URL hash ↔ view state |\n\nKorean / English switching reuses shared-core's `_en` variant rule (`variantFor`).\n\n---\n\n## Widget islands\n\n`PageWidgets` is a name → composable registry. `registerPageWidgets()` registers two.\n\n| Widget | Content |\n|---|---|\n| `AtlasDemo` | A static file graph drawn with shared-core `GraphCanvas` |\n| `AtlasOverview` | atlas-view `OverviewCanvas` — layer columns + double-click drill-down |\n\n`AtlasOverview` fetches `atlas-snapshot.json` (flat, file-level), reads it with `AtlasSnapshot.parse`, and folds it with `aggregateModules(scopeRoot = drill path)`. Colors come from `DocsTheme` passed as `AtlasRoleColors`, matching the doc theme. A single `mountPageWidget(\"box\", \"AtlasOverview\")` puts this graph anywhere in the prose.\n\n---\n\n## An assembly layer\n\n`docs-viewer`'s own logic is thin. Markdown parsing and doc routing already live in shared-core, the overview graph in atlas-view; this module wires them into a wasm screen.\n\n```mermaid\nflowchart LR\n    sc[\"shared-core<br/>parser · routing\"] --> dv[\"docs-viewer\"]\n    av[\"atlas-view<br/>overview graph\"] --> dv\n    dv --> html[\"browser (wasm)\"]\n```\n\n---\n\n- [See shared-core](https://monkshark.github.io/page-ide/#modules/shared-core/main_en.md)\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\n","modules/editor/auto_close.md":"# AutoClose / TextEdit\r\n\r\n> `page/editor/src/main/kotlin/page/editor/AutoClose.kt` — 괄호·따옴표 자동 닫기 + 편집 단위\r\n\r\n`onValueChange` 단계에서 호출되는 순수 함수. 직전 상태 (`old`) 와 직후 상태 (`new`) 를 받아 변환된 새 상태를 돌려준다\r\n\r\n> English: [auto_close_en.md](https://monkshark.github.io/page-ide/#modules/editor/auto_close_en.md)\r\n\r\n---\r\n\r\n## `TextEdit`\r\n\r\n```kotlin\r\ndata class TextEdit(\r\n    val text: String,\r\n    val selectionStart: Int,\r\n    val selectionEnd: Int = selectionStart,\r\n) {\r\n    constructor(text: String, caret: Int) : this(text, caret, caret)\r\n    val caret: Int get() = selectionStart\r\n}\r\n```\r\n\r\n편집 한 단위. `selectionStart == selectionEnd` 면 캐럿만 있고 선택 범위는 없는 상태. `caret` 은 `selectionStart` 의 별칭\r\n\r\n---\r\n\r\n## `AutoClose.apply`\r\n\r\n```kotlin\r\nfun apply(old: TextEdit, new: TextEdit): TextEdit\r\n```\r\n\r\n세 가지 변환을 순서대로 시도한다. 모두 해당 안 되면 `new` 를 그대로 반환\r\n\r\n| 분기 | 조건 | 동작 |\r\n|---|---|---|\r\n| 선택 감싸기 | `old` 가 선택 범위, `new` 는 그 자리에 한 글자 삽입 | 선택을 닫는 짝과 함께 감싸기 (`(text)`, `\"text\"` 등) |\r\n| 짝 동시 삭제 | 캐럿 앞뒤가 `(`/`)` 같은 짝, 백스페이스로 여는 글자만 지움 | 닫는 짝까지 같이 제거해 빈 짝이 남지 않게 |\r\n| 닫는 짝 자동 삽입 | 한 글자 삽입, 그 글자가 여는 짝 | 다음 위치에 닫는 짝 자동 추가 후 캐럿은 사이에 |\r\n\r\n---\r\n\r\n## 짝 정의\r\n\r\n```kotlin\r\nprivate val pairs = mapOf(\r\n    '(' to ')',\r\n    '[' to ']',\r\n    '{' to '}',\r\n    '\"' to '\"',\r\n    '\\'' to '\\'',\r\n)\r\n```\r\n\r\n추가 짝 (예: 마크다운 ``` 펜스, 한국어 따옴표) 이 필요해지면 이 맵에 추가하고 가드만 더 보강\r\n\r\n---\r\n\r\n## 가드\r\n\r\n| 가드 | 동작 |\r\n|---|---|\r\n| 캐럿 다음이 영숫자/`_` | 자동 닫기 안 함 (식별자 한가운데 따옴표를 칠 때 `myVar\"foo\"` 가 깨지지 않게) |\r\n| 따옴표 직전이 영숫자/`_` | 자동 닫기 안 함 (`don't`, `it's` 같은 평문 처리) |\r\n| 닫는 짝을 입력했는데 캐럿 위치가 같은 닫는 짝 | 새로 삽입하지 않고 캐럿만 한 칸 이동 (오버타이핑) |\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.EditorPanel` | `BasicTextField.onValueChange` 의 첫 번째 변환 단계 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/auto_close_en.md":"# AutoClose / TextEdit\r\n\r\n> 한국어: [auto_close.md](https://monkshark.github.io/page-ide/#modules/editor/auto_close.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/AutoClose.kt` — Bracket / quote auto-close + edit unit\r\n\r\nA pure function called from `onValueChange`. Takes the previous state (`old`) and the new state (`new`) and returns the transformed result.\r\n\r\n---\r\n\r\n## `TextEdit`\r\n\r\n```kotlin\r\ndata class TextEdit(\r\n    val text: String,\r\n    val selectionStart: Int,\r\n    val selectionEnd: Int = selectionStart,\r\n) {\r\n    constructor(text: String, caret: Int) : this(text, caret, caret)\r\n    val caret: Int get() = selectionStart\r\n}\r\n```\r\n\r\nSingle edit unit. `selectionStart == selectionEnd` means caret only, no selection. `caret` aliases `selectionStart`.\r\n\r\n---\r\n\r\n## `AutoClose.apply`\r\n\r\n```kotlin\r\nfun apply(old: TextEdit, new: TextEdit): TextEdit\r\n```\r\n\r\nTries three transformations in order. Falls through to `new` unchanged if none matches.\r\n\r\n| Branch | Condition | Action |\r\n|---|---|---|\r\n| Wrap selection | `old` has a range, `new` inserts one char in its place | Wrap the selection with the matching closer (`(text)`, `\"text\"`) |\r\n| Pair delete | Caret had matched pair `()` etc, backspace removed only the opener | Remove the closer too so no orphan remains |\r\n| Auto-close | One char inserted, the char is an opener | Insert the closer next, place caret in between |\r\n\r\n---\r\n\r\n## Pair definitions\r\n\r\n```kotlin\r\nprivate val pairs = mapOf(\r\n    '(' to ')',\r\n    '[' to ']',\r\n    '{' to '}',\r\n    '\"' to '\"',\r\n    '\\'' to '\\'',\r\n)\r\n```\r\n\r\nTo add new pairs (markdown ``` fences, Korean quotes), extend the map and tighten the guards.\r\n\r\n---\r\n\r\n## Guards\r\n\r\n| Guard | Behavior |\r\n|---|---|\r\n| Next char is alnum/`_` | Skip auto-close (so typing `\"` mid-identifier doesn't break `myVar\"foo\"`) |\r\n| Char before quote is alnum/`_` | Skip auto-close (handles `don't`, `it's` in prose) |\r\n| Typing a closer when caret is on the same closer | Don't insert; advance caret by one (overtype) |\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.EditorPanel` | First transform stage in `BasicTextField.onValueChange` |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/bracket_match.md":"# BracketMatch\r\n\r\n> `page/editor/src/main/kotlin/page/editor/BracketMatch.kt` — 캐럿 위치의 짝 괄호 찾기\r\n\r\n여는 괄호면 오른쪽으로, 닫는 괄호면 왼쪽으로 깊이 카운트하며 짝을 찾는다. 본문 하이라이트 (괄호 매칭 배경) 의 데이터 소스\r\n\r\n> English: [bracket_match_en.md](https://monkshark.github.io/page-ide/#modules/editor/bracket_match_en.md)\r\n\r\n---\r\n\r\n## `find`\r\n\r\n```kotlin\r\nfun find(text: String, caret: Int): Pair<Int, Int>?\r\n```\r\n\r\n캐럿 직전 글자를 먼저 검사, 매칭 실패 시 캐럿 직후 글자를 검사. 둘 다 짝이 아니면 `null`. 반환 페어는 `(여는 위치, 닫는 위치)` 순서로 정규화\r\n\r\n| 캐럿 위치 글자 | 동작 |\r\n|---|---|\r\n| 여는 괄호 (`(` `[` `{`) | 오른쪽으로 같은 종류 깊이 +1, 짝 종류 깊이 −1 → 0 도달 시점 |\r\n| 닫는 괄호 (`)` `]` `}`) | 왼쪽으로 동일 로직 |\r\n| 그 외 | 다음 후보 (캐럿 직후) 시도 |\r\n\r\n---\r\n\r\n## 깊이 스캔\r\n\r\n```kotlin\r\nprivate fun scan(text: String, from: Int, same: Char, target: Char, dir: Int): Int?\r\n```\r\n\r\n`depth = 1` 으로 시작해 같은 글자에서 +1, 짝 글자에서 −1. 0 이 되면 그 인덱스 반환. 텍스트 끝까지 못 찾으면 `null`\r\n\r\n문자열 / 주석 안의 괄호도 카운트한다 — 토큰 인지 없이 단순 문자 매칭. 작은 비용으로 충분히 정확한 결과를 내는 트레이드오프\r\n\r\n---\r\n\r\n## 짝 정의\r\n\r\n```kotlin\r\nprivate val openers = mapOf('(' to ')', '[' to ']', '{' to '}')\r\nprivate val closers = openers.entries.associate { (k, v) -> v to k }\r\n```\r\n\r\n따옴표 (`\"`, `'`) 는 깊이 개념이 모호해서 (한 글자가 여닫이 둘 다) 일부러 빠짐\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.EditorPanel` 의 `CombinedHighlightTransformation` | 캐럿 양옆 짝 괄호에 배경 색 입혀 시각적 매칭 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/bracket_match_en.md":"# BracketMatch\r\n\r\n> 한국어: [bracket_match.md](https://monkshark.github.io/page-ide/#modules/editor/bracket_match.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/BracketMatch.kt` — Find the matching bracket near the caret\r\n\r\nFor an opener, scan right with a depth counter; for a closer, scan left. The data source for the bracket-match highlight.\r\n\r\n---\r\n\r\n## `find`\r\n\r\n```kotlin\r\nfun find(text: String, caret: Int): Pair<Int, Int>?\r\n```\r\n\r\nChecks the char immediately before the caret first, then the char immediately after. Returns `null` if neither is a bracket. The pair is normalized as `(opener position, closer position)`.\r\n\r\n| Char at caret | Action |\r\n|---|---|\r\n| Opener (`(` `[` `{`) | Scan right, depth +1 on same kind, −1 on matching kind, return at 0 |\r\n| Closer (`)` `]` `}`) | Same logic, scan left |\r\n| Other | Try the next candidate (char after caret) |\r\n\r\n---\r\n\r\n## Depth scan\r\n\r\n```kotlin\r\nprivate fun scan(text: String, from: Int, same: Char, target: Char, dir: Int): Int?\r\n```\r\n\r\nStarts at `depth = 1`. +1 on same char, −1 on the matching kind. Returns the index when depth hits 0. Returns `null` if the end is reached without a match.\r\n\r\nBrackets inside strings/comments are counted — character match only, no token awareness. A trade-off: cheap and accurate enough.\r\n\r\n---\r\n\r\n## Pair definitions\r\n\r\n```kotlin\r\nprivate val openers = mapOf('(' to ')', '[' to ']', '{' to '}')\r\nprivate val closers = openers.entries.associate { (k, v) -> v to k }\r\n```\r\n\r\nQuotes (`\"`, `'`) are intentionally excluded — depth is ambiguous when the same char is both opener and closer.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `CombinedHighlightTransformation` in `page.app.EditorPanel` | Adds a background color to the matched pair around the caret |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/edit_history.md":"# EditHistory / EditSnapshot\r\n\r\n> `page/editor/src/main/kotlin/page/editor/EditHistory.kt` — undo/redo 스택 (탭별 보유)\r\n\r\n이뮤터블 자료구조. 각 탭의 `OpenTab.history` 가 별도 인스턴스를 들고 있어 탭 간 undo 가 섞이지 않는다\r\n\r\n> English: [edit_history_en.md](https://monkshark.github.io/page-ide/#modules/editor/edit_history_en.md)\r\n\r\n---\r\n\r\n## `EditSnapshot`\r\n\r\n```kotlin\r\ndata class EditSnapshot(val text: String, val caret: Int)\r\n```\r\n\r\nundo/redo 단위. 텍스트 전체와 캐럿 위치를 한 묶음으로 저장. 큰 파일에서도 문자열 공유 (JVM `String` 의 불변성) 로 메모리 부담은 작음\r\n\r\n---\r\n\r\n## `EditHistory`\r\n\r\n```kotlin\r\ndata class EditHistory(\r\n    val past: List<EditSnapshot> = emptyList(),\r\n    val future: List<EditSnapshot> = emptyList(),\r\n)\r\n```\r\n\r\n`past` 는 undo 스택, `future` 는 redo 스택. 새 편집이 들어오면 `future` 는 비워진다\r\n\r\n| 상수 | 값 | 설명 |\r\n|---|---|---|\r\n| `MAX_SIZE` | `1000` | `past` 최대 길이. 넘치면 가장 오래된 스냅샷부터 제거 |\r\n\r\n---\r\n\r\n## `pushBeforeChange`\r\n\r\n```kotlin\r\nfun pushBeforeChange(prev: EditSnapshot, maxSize: Int = MAX_SIZE): EditHistory\r\n```\r\n\r\n새 편집이 발생하기 직전 의 상태를 `past` 에 쌓고 `future` 를 비운다. 같은 스냅샷 (`past.last() == prev`) 이 또 들어오면 무시 → 동일 상태가 두 번 쌓이지 않음\r\n\r\n---\r\n\r\n## `undo` / `redo`\r\n\r\n```kotlin\r\nfun undo(current: EditSnapshot): Pair<EditHistory, EditSnapshot>?\r\nfun redo(current: EditSnapshot): Pair<EditHistory, EditSnapshot>?\r\n```\r\n\r\n`current` 는 현재 보이는 상태. `undo` 는 `past` 의 마지막을 꺼내 보여주고 현재를 `future` 로 보낸다. `redo` 는 반대. 각자 스택이 비어 있으면 `null`\r\n\r\n반환은 `(새 EditHistory, 복원할 스냅샷)` — 호출자는 둘 다 받아서 탭 상태에 반영해야 한다.\r\n\r\n실제 사용처 `TabBook.undoOnActive` 는 이 Pair 를 이렇게 소비한다.\r\n\r\n```kotlin\r\nval (newHistory, restored) = tab.history.undo(current) ?: return null\r\n```\r\n\r\n`restored` 로 활성 탭의 텍스트·캐럿을 바꾸고, `newHistory` 를 그 탭의 `history` 에 다시 끼워 넣는다.\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `OpenTab.history` | 탭 단위로 보유 |\r\n| `TabBook.pushHistoryOnActive` | `onValueChange` 에서 직전 상태를 푸시 |\r\n| `TabBook.undoOnActive` / `redoOnActive` | Ctrl+Z / Ctrl+Shift+Z (Ctrl+Y) 핸들러 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/edit_history_en.md":"# EditHistory / EditSnapshot\r\n\r\n> 한국어: [edit_history.md](https://monkshark.github.io/page-ide/#modules/editor/edit_history.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/EditHistory.kt` — undo/redo stack (per tab)\r\n\r\nImmutable data structure. Each tab's `OpenTab.history` holds a separate instance so undo never bleeds between tabs.\r\n\r\n---\r\n\r\n## `EditSnapshot`\r\n\r\n```kotlin\r\ndata class EditSnapshot(val text: String, val caret: Int)\r\n```\r\n\r\nUndo/redo unit. Captures the full text + caret position together. Even for large files, JVM `String` immutability shares storage, so the memory cost stays low.\r\n\r\n---\r\n\r\n## `EditHistory`\r\n\r\n```kotlin\r\ndata class EditHistory(\r\n    val past: List<EditSnapshot> = emptyList(),\r\n    val future: List<EditSnapshot> = emptyList(),\r\n)\r\n```\r\n\r\n`past` is the undo stack, `future` is the redo stack. A new edit clears `future`.\r\n\r\n| Constant | Value | Description |\r\n|---|---|---|\r\n| `MAX_SIZE` | `1000` | Max length of `past`. Oldest snapshot drops first when exceeded |\r\n\r\n---\r\n\r\n## `pushBeforeChange`\r\n\r\n```kotlin\r\nfun pushBeforeChange(prev: EditSnapshot, maxSize: Int = MAX_SIZE): EditHistory\r\n```\r\n\r\nPushes the state just before a new edit onto `past` and clears `future`. If the incoming snapshot equals `past.last()`, it's ignored — duplicates don't stack.\r\n\r\n---\r\n\r\n## `undo` / `redo`\r\n\r\n```kotlin\r\nfun undo(current: EditSnapshot): Pair<EditHistory, EditSnapshot>?\r\nfun redo(current: EditSnapshot): Pair<EditHistory, EditSnapshot>?\r\n```\r\n\r\n`current` is the currently displayed state. `undo` pops `past.last()` and pushes `current` onto `future`. `redo` reverses it. Returns `null` when the relevant stack is empty.\r\n\r\nReturns `(new EditHistory, snapshot to restore)` — the caller must consume both and apply them to tab state.\r\n\r\nThe real caller `TabBook.undoOnActive` consumes the Pair like this:\r\n\r\n```kotlin\r\nval (newHistory, restored) = tab.history.undo(current) ?: return null\r\n```\r\n\r\n`restored` replaces the active tab's text and caret, and `newHistory` is stitched back into that tab's `history`.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `OpenTab.history` | Held per tab |\r\n| `TabBook.pushHistoryOnActive` | Pushes the previous state from `onValueChange` |\r\n| `TabBook.undoOnActive` / `redoOnActive` | Ctrl+Z / Ctrl+Shift+Z (Ctrl+Y) handlers |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/file_document.md":"# FileDocument\r\n\r\n> `page/editor/src/main/kotlin/page/editor/FileDocument.kt` — 파일 읽기 / 쓰기 (UTF-8)\r\n\r\n`Files.readString` / `writeString` 의 얇은 래퍼. 인코딩을 한 곳에 못 박아 두기 위한 단일 진입점\r\n\r\n> English: [file_document_en.md](https://monkshark.github.io/page-ide/#modules/editor/file_document_en.md)\r\n\r\n---\r\n\r\n## `load`\r\n\r\n```kotlin\r\nfun load(path: Path): String\r\n```\r\n\r\nUTF-8 로 파일 전체를 읽어 문자열로 반환. `IOException` 은 그대로 던진다 — 호출자가 처리\r\n\r\n---\r\n\r\n## `loadOrNull`\r\n\r\n```kotlin\r\nfun loadOrNull(path: Path): String?\r\n```\r\n\r\n`load` 의 try/catch 버전. 실패 시 `null`. 에러 종류를 구분할 필요 없는 곳 (예: 사이드바에서 파일을 미리 열어보기) 에서 사용\r\n\r\n---\r\n\r\n## `save`\r\n\r\n```kotlin\r\nfun save(path: Path, text: String)\r\n```\r\n\r\nUTF-8 로 텍스트 전체를 덮어쓴다. 파일이 없으면 새로 생성. 파일 잠금 / 부분 쓰기 / 임시 파일 후 rename 같은 안전 장치는 없음 — 단순 덮어쓰기\r\n\r\n---\r\n\r\n## 인코딩 정책\r\n\r\n| 항목 | 값 |\r\n|---|---|\r\n| `Charset` | `StandardCharsets.UTF_8` (BOM 미포함) |\r\n| 줄바꿈 | 변환 없음. 파일에 있는 그대로 (Windows CRLF 도 보존) |\r\n\r\n향후 사용자 설정에서 인코딩을 바꾸려면 `Charset` 인자를 추가하고 디폴트만 UTF-8 유지\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.Main` (Ctrl+O) | `loadOrNull` 로 파일 열어 탭 추가 |\r\n| `page.app.Main` (Ctrl+S) | `save` 후 `markActiveSaved` |\r\n| `page.app.FileTreePanel` | 파일 클릭 시 `loadOrNull` |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/file_document_en.md":"# FileDocument\r\n\r\n> 한국어: [file_document.md](https://monkshark.github.io/page-ide/#modules/editor/file_document.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/FileDocument.kt` — File read / write (UTF-8)\r\n\r\nA thin wrapper over `Files.readString` / `writeString`. Single entry point so the encoding is pinned in one place.\r\n\r\n---\r\n\r\n## `load`\r\n\r\n```kotlin\r\nfun load(path: Path): String\r\n```\r\n\r\nReads the entire file as UTF-8 and returns it as a string. `IOException` is rethrown — the caller handles it.\r\n\r\n---\r\n\r\n## `loadOrNull`\r\n\r\n```kotlin\r\nfun loadOrNull(path: Path): String?\r\n```\r\n\r\n`load` with try/catch. Returns `null` on failure. Used where the failure mode doesn't need to be distinguished (e.g. previewing a file from the sidebar).\r\n\r\n---\r\n\r\n## `save`\r\n\r\n```kotlin\r\nfun save(path: Path, text: String)\r\n```\r\n\r\nOverwrites the file with the text as UTF-8. Creates the file if missing. No file locking / partial-write protection / temp-file-then-rename safety — plain overwrite.\r\n\r\n---\r\n\r\n## Encoding policy\r\n\r\n| Item | Value |\r\n|---|---|\r\n| `Charset` | `StandardCharsets.UTF_8` (no BOM) |\r\n| Line endings | Preserved as-is (Windows CRLF stays CRLF) |\r\n\r\nTo make encoding user-configurable later, add a `Charset` parameter and keep UTF-8 as the default.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.Main` (Ctrl+O) | Opens via `loadOrNull` and adds a tab |\r\n| `page.app.Main` (Ctrl+S) | `save`, then `markActiveSaved` |\r\n| `page.app.FileTreePanel` | `loadOrNull` on file click |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/file_kind.md":"# FileKind / FileKinds\r\n\r\n> `page/editor/src/main/kotlin/page/editor/FileKind.kt` — 파일 종류 분류 (확장자 기반)\r\n\r\n확장자만 보고 텍스트 / 이미지 / SVG 로 분류. MIME 추론이나 파일 헤더 검사는 안 함\r\n\r\n> English: [file_kind_en.md](https://monkshark.github.io/page-ide/#modules/editor/file_kind_en.md)\r\n\r\n---\r\n\r\n## `FileKind`\r\n\r\n```kotlin\r\nenum class FileKind { TEXT, IMAGE, SVG }\r\n```\r\n\r\n`PreviewPanel` 에서 분기 키로 사용. 향후 `BINARY`, `PDF`, `MARKDOWN` 등이 늘어나면 `EditorPanel` / `PreviewPanel` 의 분기도 같이 넓혀야 함\r\n\r\n---\r\n\r\n## `FileKinds.classify`\r\n\r\n```kotlin\r\nfun classify(path: Path): FileKind\r\n```\r\n\r\n확장자를 소문자로 정규화한 뒤 분류\r\n\r\n| 확장자 | 결과 |\r\n|---|---|\r\n| `.svg` | `FileKind.SVG` |\r\n| `.png`, `.jpg`, `.jpeg`, `.gif`, `.bmp`, `.webp` | `FileKind.IMAGE` |\r\n| 그 외 / 확장자 없음 | `FileKind.TEXT` |\r\n\r\n확장자가 없는 파일 (`Makefile`, `Dockerfile`, `.gitignore`) 도 모두 `TEXT` 처리. 텍스트 파일이라고 단정해도 `BasicTextField` 가 깨지지 않으면 충분\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.Main` | 활성 탭의 파일 종류로 `EditorPanel` / `PreviewPanel` 분기 |\r\n| `page.app.PreviewPanel` | `IMAGE` / `SVG` 분기로 Skia 디코더 선택 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/file_kind_en.md":"# FileKind / FileKinds\r\n\r\n> 한국어: [file_kind.md](https://monkshark.github.io/page-ide/#modules/editor/file_kind.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/FileKind.kt` — File classification (extension-based)\r\n\r\nClassifies by extension only — text / image / SVG. No MIME inference or header sniffing.\r\n\r\n---\r\n\r\n## `FileKind`\r\n\r\n```kotlin\r\nenum class FileKind { TEXT, IMAGE, SVG }\r\n```\r\n\r\nUsed as a branch key in `PreviewPanel`. Adding `BINARY`, `PDF`, `MARKDOWN` later means widening the `EditorPanel` / `PreviewPanel` branches too.\r\n\r\n---\r\n\r\n## `FileKinds.classify`\r\n\r\n```kotlin\r\nfun classify(path: Path): FileKind\r\n```\r\n\r\nLowercases the extension before matching.\r\n\r\n| Extension | Result |\r\n|---|---|\r\n| `.svg` | `FileKind.SVG` |\r\n| `.png`, `.jpg`, `.jpeg`, `.gif`, `.bmp`, `.webp` | `FileKind.IMAGE` |\r\n| Anything else / no extension | `FileKind.TEXT` |\r\n\r\nFiles with no extension (`Makefile`, `Dockerfile`, `.gitignore`) all fall through to `TEXT`. Treating them as text is fine as long as `BasicTextField` doesn't choke.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.Main` | Branches between `EditorPanel` / `PreviewPanel` based on the active tab |\r\n| `page.app.PreviewPanel` | `IMAGE` / `SVG` branch picks the Skia decoder |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/file_tree.md":"# FileTree / TreeNode\r\n\r\n> `page/editor/src/main/kotlin/page/editor/FileTree.kt` — 사이드바 파일 트리 평탄화\r\n\r\n`expanded` 집합을 받아 트리를 깊이-우선으로 펼친 평탄한 노드 리스트를 만든다. `LazyColumn` 으로 그리기 위한 데이터 표현\r\n\r\n> English: [file_tree_en.md](https://monkshark.github.io/page-ide/#modules/editor/file_tree_en.md)\r\n\r\n---\r\n\r\n## `TreeNode`\r\n\r\n```kotlin\r\ndata class TreeNode(\r\n    val path: Path,\r\n    val depth: Int,\r\n    val isDirectory: Boolean,\r\n)\r\n```\r\n\r\n평탄한 리스트의 한 행. `depth` 는 들여쓰기 레벨 (`0` = root)\r\n\r\n---\r\n\r\n## `listTree`\r\n\r\n```kotlin\r\nfun listTree(root: Path, expanded: Set<Path>): List<TreeNode>\r\n```\r\n\r\n`root` 자체를 첫 번째 노드로 추가하고, 펼쳐져 있으면 자식들을 재귀적으로 평탄화. 펼치지 않은 디렉터리는 헤더만 나오고 자식은 빠진다\r\n\r\n| 정렬 | 우선순위 |\r\n|---|---|\r\n| 1차 | 디렉터리 우선 (`isDirectory` 가 true 인 것들이 먼저) |\r\n| 2차 | 파일명 사전순 (소문자 비교) |\r\n\r\n`Files.list` 가 `IOException` / 권한 오류로 실패하면 그 디렉터리만 빈 자식으로 처리 — 트리 전체가 죽지 않는다\r\n\r\n---\r\n\r\n## 안전 헬퍼\r\n\r\n| 함수 | 동작 |\r\n|---|---|\r\n| `isDirectorySafe(path)` | `Files.isDirectory` 의 try/catch 버전. 예외 시 `false` |\r\n| `listChildrenSorted(dir)` | `Files.list` + 정렬. 예외 시 `null` (자식 없음으로 처리) |\r\n\r\n심볼릭 링크 / 끊어진 링크 / 권한 거부 폴더가 섞여 있어도 사이드바가 멈추지 않게 하기 위한 가드\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.FileTreePanel` | `listTree(root, expanded)` 결과를 `LazyColumn` 으로 렌더 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/file_tree_en.md":"# FileTree / TreeNode\r\n\r\n> 한국어: [file_tree.md](https://monkshark.github.io/page-ide/#modules/editor/file_tree.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/FileTree.kt` — Sidebar file-tree flattening\r\n\r\nTakes an `expanded` set and produces a depth-first flattened list of nodes. The data shape consumed by `LazyColumn`.\r\n\r\n---\r\n\r\n## `TreeNode`\r\n\r\n```kotlin\r\ndata class TreeNode(\r\n    val path: Path,\r\n    val depth: Int,\r\n    val isDirectory: Boolean,\r\n)\r\n```\r\n\r\nOne row of the flattened list. `depth` is the indent level (`0` = root).\r\n\r\n---\r\n\r\n## `listTree`\r\n\r\n```kotlin\r\nfun listTree(root: Path, expanded: Set<Path>): List<TreeNode>\r\n```\r\n\r\n`root` is added as the first node; if expanded, children are recursively flattened. Unexpanded directories appear as headers only — their children are skipped.\r\n\r\n| Sort | Priority |\r\n|---|---|\r\n| Primary | Directories first (`isDirectory == true` ahead of files) |\r\n| Secondary | Filename, lowercased, lexicographic |\r\n\r\nIf `Files.list` fails (`IOException` / permission), that directory shows up empty — the whole tree doesn't die.\r\n\r\n---\r\n\r\n## Safety helpers\r\n\r\n| Function | Behavior |\r\n|---|---|\r\n| `isDirectorySafe(path)` | `Files.isDirectory` with try/catch. `false` on exception |\r\n| `listChildrenSorted(dir)` | `Files.list` + sort. `null` on exception (treated as no children) |\r\n\r\nGuards against broken symlinks, denied folders, and other half-readable mounts so the sidebar keeps working.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.FileTreePanel` | Renders the `listTree(root, expanded)` result in a `LazyColumn` |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/fold_regions.md":"# FoldRegions\r\n\r\n> `page/editor/src/main/kotlin/page/editor/FoldRegions.kt` — 코드 폴딩 영역 탐지 + 표시 변환 매핑\r\n\r\n`{`/`}` 페어로 폴딩 가능한 블록을 찾고, 접힌 영역을 ` ... }` 플레이스홀더로 압축하기 위한 세그먼트 / 오프셋 매핑 / 클릭 히트테스트를 제공함\r\n\r\n> English: [fold_regions_en.md](https://monkshark.github.io/page-ide/#modules/editor/fold_regions_en.md)\r\n\r\n---\r\n\r\n## 데이터\r\n\r\n```kotlin\r\ndata class Region(val startLine: Int, val endLine: Int)\r\ndata class Segment(val origStart: Int, val origEnd: Int, val replacement: String)\r\n```\r\n\r\n| 타입 | 의미 |\r\n|---|---|\r\n| `Region` | 폴딩 후보 — 시작 줄 `{` 와 끝 줄 `}` 의 0-인덱스 줄 번호 |\r\n| `Segment` | 표시 변환 단위 — 원본 텍스트의 `[origStart, origEnd)` 를 `replacement` 로 치환함 |\r\n\r\n---\r\n\r\n## `detect`\r\n\r\n```kotlin\r\nfun detect(text: String): List<Region>\r\n```\r\n\r\n설명: 본문에서 폴딩 가능한 모든 `{`/`}` 블록을 추출함\r\n\r\n흐름:\r\n\r\n1. `{` 만나면 현재 줄을 스택에 푸시:\r\n   ```kotlin\r\n   c == '{' -> { stack.addLast(line); i++ }\r\n   ```\r\n\r\n2. `}` 만나면 스택에서 매칭 줄을 꺼내고, 다른 줄에 있을 때만 `Region` 추가:\r\n   ```kotlin\r\n   val openLine = stack.removeLastOrNull()\r\n   if (openLine != null && openLine < line) {\r\n       regions.add(Region(openLine, line))\r\n   }\r\n   ```\r\n   같은 줄 (`{ ... }` 한 줄 블록) 은 무시 — 접을 의미 없음\r\n\r\n3. 스캔 중 다음 컨텍스트 안의 괄호는 무시:\r\n   - 문자열 리터럴 (`\"...\"`, `'...'`) — 백슬래시 이스케이프 처리\r\n   - 라인 코멘트 (`// ...`)\r\n   - 블록 코멘트 (`/* ... */`) — 줄바꿈 카운트 유지\r\n\r\n반환값: `startLine` 오름차순 정렬된 `List<Region>`. 매칭 안 된 괄호는 결과에서 빠짐\r\n\r\n---\r\n\r\n## `segmentsFor`\r\n\r\n```kotlin\r\nfun segmentsFor(text: String, foldedRegions: Collection<Region>): List<Segment>\r\n```\r\n\r\n설명: 접힌 region 들을 `VisualTransformation` 적용용 세그먼트로 변환함\r\n\r\n흐름:\r\n\r\n1. 줄 시작 오프셋 배열을 빌드:\r\n   ```kotlin\r\n   val lineStarts = mutableListOf(0)\r\n   for (i in text.indices) if (text[i] == '\\n') lineStarts.add(i + 1)\r\n   ```\r\n\r\n2. 각 region 별로 절단 범위 계산:\r\n   - `origStart` = 시작 줄 끝의 `\\n` 위치 (또는 `text.length`)\r\n   - `origEnd` = 끝 줄 다음의 `\\n` 직후 (또는 `text.length`) — 끝 줄 통째로 흡수\r\n\r\n3. 플레이스홀더 결정:\r\n   ```kotlin\r\n   val replacement = if (hasTrailingNewline) \" ... }\\n\" else \" ... }\"\r\n   ```\r\n   닫는 `}` 가 들어가서 시작 줄의 `{` 와 합쳐 `{ ... }` 모양으로 보임\r\n\r\n4. 중첩된 fold 는 가장 바깥만 살림 — 안쪽이 이미 바깥에 흡수되어 있으므로 자연스럽게 합쳐짐:\r\n   ```kotlin\r\n   if (origStart < lastConsumedEnd) continue\r\n   ```\r\n\r\n반환값: 겹치지 않고 `origStart` 오름차순 정렬된 `List<Segment>`\r\n\r\n---\r\n\r\n## `originalToTransformed` / `transformedToOriginal`\r\n\r\n```kotlin\r\nfun originalToTransformed(segments: List<Segment>, original: Int): Int\r\nfun transformedToOriginal(segments: List<Segment>, transformed: Int): Int\r\n```\r\n\r\n설명: `OffsetMapping` 양방향 변환 — Compose `VisualTransformation` 의 캐럿 매핑에 그대로 꽂힘\r\n\r\n| 위치 | 매핑 결과 |\r\n|---|---|\r\n| 폴드 전 | 누적 절약 (`savings`) 만큼 빼서 변환 |\r\n| 폴드 안 (원본) | 폴드 시작 (`origStart`) 으로 클램프 |\r\n| 플레이스홀더 왼쪽 절반 (변환) | `origStart` 으로 매핑 (`{` 직후, 폴드 시작 좌표) |\r\n| 플레이스홀더 오른쪽 절반 (변환) | `origEnd` 으로 매핑 (`}` 직후, 폴드 끝 좌표) |\r\n| 폴드 후 | 누적 `savings` 빼고 다음 검사 |\r\n\r\n플레이스홀더 안 좌표를 절반 기준으로 양 끝에 묶어 두면, 본문 `}` 클릭 시 캐럿이 폴드 다음 줄로 가서 의도치 않은 브래킷 매칭이 안 잡히고 드래그 선택도 자연스럽게 폴드 전체를 덮음\r\n\r\n`savings` = `(origEnd - origStart) - replacement.length` 의 누적 합\r\n\r\n---\r\n\r\n## `foldedRegionAt`\r\n\r\n```kotlin\r\nfun foldedRegionAt(\r\n    text: String,\r\n    foldedRegions: Collection<Region>,\r\n    transformedOffset: Int,\r\n): Region?\r\n```\r\n\r\n설명: 표시 좌표가 플레이스홀더의 `...` 위에 있을 때 그 region 을 돌려줌 — `...` 클릭으로만 펼치고, `{`/`}`/주변 공백은 미스 (드래그 선택용 여유)\r\n\r\n흐름:\r\n\r\n1. region 들을 segments 로 변환 후, transformed 좌표가 어떤 segment 의 `...` 구간 `[dotsStart, dotsStart+3)` 에 들어가는지 검사\r\n2. 매칭된 segment 의 `origStart` 가 `lineEnd(r.startLine)` 과 같은 region 을 sorted 순서로 첫 번째 발견 (= 가장 바깥)\r\n\r\n반환값: 클릭이 `...` 위면 해당 `Region`, 그 외 (`{`, 공백, `}`, 플레이스홀더 바깥) 는 `null`\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.EditorPanel` | `detect` → 거터 토글 표시 / `segmentsFor` + 매핑 함수 → `CombinedHighlightTransformation` 폴딩 적용 / `foldedRegionAt` → 본문 플레이스홀더 클릭 펼치기 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/fold_regions_en.md":"# FoldRegions\r\n\r\n> 한국어: [fold_regions.md](https://monkshark.github.io/page-ide/#modules/editor/fold_regions.md)\r\n>\r\n> `page/editor/src/main/kotlin/page/editor/FoldRegions.kt` — Code-fold region detection + display-mapping math\r\n\r\nFinds foldable `{`/`}` blocks and produces the segments / offset mappings / click hit-test used to collapse a folded body into a ` ... }` placeholder.\r\n\r\n---\r\n\r\n## Types\r\n\r\n```kotlin\r\ndata class Region(val startLine: Int, val endLine: Int)\r\ndata class Segment(val origStart: Int, val origEnd: Int, val replacement: String)\r\n```\r\n\r\n| Type | Meaning |\r\n|---|---|\r\n| `Region` | Folding candidate — 0-indexed line numbers of the opening `{` and closing `}` |\r\n| `Segment` | Display-substitution unit — replaces `text[origStart, origEnd)` with `replacement` |\r\n\r\n---\r\n\r\n## `detect`\r\n\r\n```kotlin\r\nfun detect(text: String): List<Region>\r\n```\r\n\r\nDescription: Pulls every foldable `{`/`}` block out of the body.\r\n\r\nFlow:\r\n\r\n1. On `{` push the current line onto a stack:\r\n   ```kotlin\r\n   c == '{' -> { stack.addLast(line); i++ }\r\n   ```\r\n\r\n2. On `}` pop the matching line; emit a `Region` only when it lives on a different line:\r\n   ```kotlin\r\n   val openLine = stack.removeLastOrNull()\r\n   if (openLine != null && openLine < line) {\r\n       regions.add(Region(openLine, line))\r\n   }\r\n   ```\r\n   Same-line `{ ... }` is dropped — folding it has no value.\r\n\r\n3. Braces inside the following contexts are ignored during the scan:\r\n   - String literals (`\"...\"`, `'...'`) — backslash escape honored\r\n   - Line comments (`// ...`)\r\n   - Block comments (`/* ... */`) — newline counter is kept in sync\r\n\r\nReturns: `List<Region>` sorted by `startLine`. Unmatched braces are dropped.\r\n\r\n---\r\n\r\n## `segmentsFor`\r\n\r\n```kotlin\r\nfun segmentsFor(text: String, foldedRegions: Collection<Region>): List<Segment>\r\n```\r\n\r\nDescription: Converts folded regions into segments ready for `VisualTransformation`.\r\n\r\nFlow:\r\n\r\n1. Build the line-start offsets:\r\n   ```kotlin\r\n   val lineStarts = mutableListOf(0)\r\n   for (i in text.indices) if (text[i] == '\\n') lineStarts.add(i + 1)\r\n   ```\r\n\r\n2. Compute the cut range per region:\r\n   - `origStart` = `\\n` index at end of the start line (or `text.length`)\r\n   - `origEnd` = one past the `\\n` after the end line (or `text.length`) — the entire end line is consumed.\r\n\r\n3. Pick the placeholder:\r\n   ```kotlin\r\n   val replacement = if (hasTrailingNewline) \" ... }\\n\" else \" ... }\"\r\n   ```\r\n   The closing `}` is included so the start line's `{` plus the placeholder visually reads as `{ ... }`.\r\n\r\n4. Nested folds collapse into the outermost — once an outer fold is in, the inner is already inside the cut range:\r\n   ```kotlin\r\n   if (origStart < lastConsumedEnd) continue\r\n   ```\r\n\r\nReturns: Non-overlapping `List<Segment>` sorted by `origStart`.\r\n\r\n---\r\n\r\n## `originalToTransformed` / `transformedToOriginal`\r\n\r\n```kotlin\r\nfun originalToTransformed(segments: List<Segment>, original: Int): Int\r\nfun transformedToOriginal(segments: List<Segment>, transformed: Int): Int\r\n```\r\n\r\nDescription: Bidirectional `OffsetMapping` — drops directly into a Compose `VisualTransformation`.\r\n\r\n| Position | Mapping |\r\n|---|---|\r\n| Before a fold | Subtract the cumulative `savings` so far |\r\n| Inside a fold (original) | Snap to the fold's start (`origStart`) |\r\n| Left half of the placeholder (transformed) | Maps to `origStart` (just after `{`) |\r\n| Right half of the placeholder (transformed) | Maps to `origEnd` (just after `}`) |\r\n| After a fold | Subtract `savings` and continue checking |\r\n\r\nSplitting the placeholder at its midpoint pins clicks on the `}` side to the row after the fold — that suppresses spurious bracket matching and lets a drag through the placeholder cleanly cover the whole folded block.\r\n\r\n`savings` = the running total of `(origEnd - origStart) - replacement.length`.\r\n\r\n---\r\n\r\n## `foldedRegionAt`\r\n\r\n```kotlin\r\nfun foldedRegionAt(\r\n    text: String,\r\n    foldedRegions: Collection<Region>,\r\n    transformedOffset: Int,\r\n): Region?\r\n```\r\n\r\nDescription: Returns the region whose placeholder `...` covers a given display offset — only the dots are click-active; `{`, surrounding spaces, and `}` miss so drag selection can start from them.\r\n\r\nFlow:\r\n\r\n1. Convert regions to segments and check which segment's `[dotsStart, dotsStart+3)` (the `...` substring) contains the click.\r\n2. Match that segment's `origStart` to the first sorted region with `lineEnd(r.startLine) == origStart` (= the outermost match).\r\n\r\nReturns: The matching `Region` when the click hits `...`; `null` for `{`, spaces, `}`, or anything outside the placeholder.\r\n\r\n---\r\n\r\n## Used by\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.EditorPanel` | `detect` → drives gutter toggles / `segmentsFor` + the mapping pair → folding inside `CombinedHighlightTransformation` / `foldedRegionAt` → unfold via body placeholder click |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/fuzzy_matcher.md":"# FuzzyMatcher\r\n\r\n> `page/editor/src/main/kotlin/page/editor/FuzzyMatcher.kt` — 서브시퀀스 퍼지 매칭 + 점수\r\n\r\n`Ctrl+P` 빠른 열기에서 파일명/경로 후보를 순위 매기는 데 쓰는 순수 함수. 쿼리의 모든 글자가 타겟에 같은 순서로 (연속일 필요는 없음) 등장하면 매치, 그렇지 않으면 `null`\r\n\r\n> English: [fuzzy_matcher_en.md](https://monkshark.github.io/page-ide/#modules/editor/fuzzy_matcher_en.md)\r\n\r\n---\r\n\r\n## `match`\r\n\r\n```kotlin\r\nfun match(query: String, target: String): Match?\r\n```\r\n\r\n| 입력 | 결과 |\r\n|---|---|\r\n| `query` 가 비어 있음 | `Match(0, [])` |\r\n| `target.length < query.length` | `null` |\r\n| 서브시퀀스 매치 안 됨 | `null` |\r\n| 매치 성공 | `Match(score, indices)` — `indices[i]` 는 `query[i]` 가 잡힌 `target` 위치 |\r\n\r\n대소문자 무시 — 비교는 `lowercase()` 로, 보너스만 원본 글자 그대로 본다\r\n\r\n---\r\n\r\n## 점수 보너스\r\n\r\n연속 매치 / 단어 경계 / 시작점 일치 → 합쳐져서 정렬 키가 된다\r\n\r\n| 보너스 | 조건 |\r\n|---|---|\r\n| `+15 + streak·5` | 직전 매치 바로 다음 글자 (연속 스트릭) |\r\n| `+30` | 단어 경계 시작 (`/`, `\\`, `.`, `_`, `-`, ` `, camelCase 의 대문자 직전이 소문자) |\r\n| `+20` | 타겟의 0 번째 인덱스 |\r\n| `+5` | 원본 글자 그대로 일치 (대소문자까지) |\r\n| `+1` | 매치마다 기본 |\r\n| `-(타겟길이 - 쿼리길이)` | 길이 패널티 (짧은 타겟이 살짝 우선) |\r\n\r\n이 조합은 IntelliJ / VS Code 의 \"search anything\" 류 휴리스틱 — 정확한 가중치가 중요한 게 아니라, 연속 매치가 흩어진 매치보다, 단어 경계 매치가 중간 매치보다 위로 올라오는 정성적 순위가 핵심\r\n\r\n---\r\n\r\n## `Match`\r\n\r\n```kotlin\r\ndata class Match(val score: Int, val indices: IntArray)\r\n```\r\n\r\n`indices` 는 하이라이트용으로 그대로 쓴다 — `QuickOpenDialog` 가 `query` 글자 위치를 강조 색으로 그릴 때 인덱스 셋만 던져주면 됨\r\n\r\n`equals`/`hashCode` 는 `IntArray` 의 `contentEquals` 로 직접 구현 — `data class` 기본은 참조 비교라 테스트가 깨짐\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 역할 |\r\n|---|---|\r\n| `page.editor.QuickOpen.rank` | 파일 인덱스를 쿼리로 정렬 + 결과 자르기 |\r\n| `page.app.QuickOpenDialog` | `Match.indices` 로 매치 글자 강조 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/fuzzy_matcher_en.md":"# FuzzyMatcher\r\n\r\n> 한국어: [fuzzy_matcher.md](https://monkshark.github.io/page-ide/#modules/editor/fuzzy_matcher.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/FuzzyMatcher.kt` — Subsequence fuzzy match + score\r\n\r\nPure helper used by `Ctrl+P` Quick Open to rank filename/path candidates. If every char of the query appears in the target in order (not necessarily consecutively) it matches; otherwise `null`.\r\n\r\n---\r\n\r\n## `match`\r\n\r\n```kotlin\r\nfun match(query: String, target: String): Match?\r\n```\r\n\r\n| Input | Result |\r\n|---|---|\r\n| `query` empty | `Match(0, [])` |\r\n| `target.length < query.length` | `null` |\r\n| Not a subsequence | `null` |\r\n| Match | `Match(score, indices)` — `indices[i]` is where `query[i]` landed in `target` |\r\n\r\nCase-insensitive — comparison is done in `lowercase()`, bonuses peek at the original char.\r\n\r\n---\r\n\r\n## Score bonuses\r\n\r\nConsecutive matches / word boundaries / start-of-string combine into the sort key.\r\n\r\n| Bonus | Condition |\r\n|---|---|\r\n| `+15 + streak·5` | Char immediately after the previous match (consecutive streak) |\r\n| `+30` | Word boundary start (`/`, `\\`, `.`, `_`, `-`, ` `, or lower→upper camelCase break) |\r\n| `+20` | Index 0 of target |\r\n| `+5` | Same case as the query char |\r\n| `+1` | Per match (baseline) |\r\n| `-(target.length - query.length)` | Length penalty (shorter targets edge ahead) |\r\n\r\nSame flavor as IntelliJ / VS Code \"search anything\" — the exact weights don't matter; what does is the qualitative ranking: consecutive beats scattered, word boundary beats mid-word.\r\n\r\n---\r\n\r\n## `Match`\r\n\r\n```kotlin\r\ndata class Match(val score: Int, val indices: IntArray)\r\n```\r\n\r\n`indices` are reused by the UI for highlighting — `QuickOpenDialog` just turns them into a set and paints those glyph positions in the accent color.\r\n\r\n`equals`/`hashCode` are overridden to use `IntArray.contentEquals` since the `data class` defaults compare by reference, which breaks tests.\r\n\r\n---\r\n\r\n## Used by\r\n\r\n| Location | Role |\r\n|---|---|\r\n| `page.editor.QuickOpen.rank` | Sort the file index by query and trim |\r\n| `page.app.QuickOpenDialog` | Use `Match.indices` to highlight matched glyphs |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/indent.md":"# Indent\r\n\r\n> `page/editor/src/main/kotlin/page/editor/Indent.kt` — 들여쓰기 / 내어쓰기 / Enter 자동 들여쓰기\r\n\r\nTab / Shift+Tab / Enter / Backspace 키 동작과 `}` / `]` / `)` 자동 정렬을 한 곳에 모은 순수 함수 묶음\r\n\r\n> English: [indent_en.md](https://monkshark.github.io/page-ide/#modules/editor/indent_en.md)\r\n\r\n---\r\n\r\n## 상수\r\n\r\n| 상수 | 값 | 설명 |\r\n|---|---|---|\r\n| `TAB_UNIT` | `4` | 한 단위 들여쓰기 = 4 칸 공백 |\r\n| `TAB_SPACES` | `\"    \"` | 4 칸 공백 리터럴 |\r\n| `indentTriggers` | `{`, `(`, `[`, `:` | Enter 직전 글자가 이 중 하나면 한 단계 더 들여씀 |\r\n| `matchingClosers` | `{→}`, `(→)`, `[→]` | Enter 시 짝이 캐럿 양쪽에 있으면 분할 들여쓰기 |\r\n| `unindentChars` | `}`, `]`, `)` | 입력 시 라인의 들여쓰기 한 단계 빼기 |\r\n\r\n---\r\n\r\n## `handleTab`\r\n\r\n```kotlin\r\nfun handleTab(edit: TextEdit): TextEdit\r\n```\r\n\r\n| 입력 상태 | 동작 |\r\n|---|---|\r\n| 캐럿만 있음 | 다음 4 칸 경계까지 공백 삽입 (`col % 4` 만큼) |\r\n| 한 줄 선택 | 줄 시작에 `TAB_SPACES` 한 단위 추가 (선택 그대로 유지) |\r\n| 여러 줄 선택 | 모든 줄 시작에 `TAB_SPACES` 추가 |\r\n\r\n---\r\n\r\n## `handleShiftTab`\r\n\r\n```kotlin\r\nfun handleShiftTab(edit: TextEdit): TextEdit\r\n```\r\n\r\n선택된 모든 줄의 들여쓰기를 한 단계 (최대 `TAB_UNIT` 칸) 줄임. 줄에 공백이 부족하면 가능한 만큼만 제거\r\n\r\n---\r\n\r\n## `handleLiteralTab`\r\n\r\n```kotlin\r\nfun handleLiteralTab(edit: TextEdit): TextEdit\r\n```\r\n\r\n`\\t` 문자 그대로 삽입. 사용자가 의도적으로 탭 문자를 원하는 경우 (Makefile, TSV)\r\n\r\n---\r\n\r\n## `handleBackspace`\r\n\r\n```kotlin\r\nfun handleBackspace(edit: TextEdit): TextEdit?\r\n```\r\n\r\n캐럿 앞이 공백뿐인 들여쓰기 일 때만 동작. 4 칸 경계까지 한 번에 지운다 (한 칸씩 지우는 대신). 그 외 (선택 있음 / 라인 첫 위치 / 들여쓰기에 비공백 글자) 는 `null` 반환 → 호출자가 기본 백스페이스로 폴백\r\n\r\n---\r\n\r\n## `maybeApplyEnter`\r\n\r\n```kotlin\r\nfun maybeApplyEnter(old: TextEdit, new: TextEdit): TextEdit\r\n```\r\n\r\n`onValueChange` 단계에서 호출. `new` 가 `old` 위치에 정확히 `\\n` 한 글자 삽입한 결과인지 확인하고, 맞으면 `handleEnter` 로 넘긴다 — IME / 한글 조합 / 붙여넣기 같은 케이스에서 오작동 안 하게 보호하는 가드\r\n\r\n---\r\n\r\n## `handleEnter`\r\n\r\n```kotlin\r\nfun handleEnter(edit: TextEdit): TextEdit\r\n```\r\n\r\nEnter 키의 핵심 로직\r\n\r\n| 케이스 | 동작 |\r\n|---|---|\r\n| 캐럿 양쪽이 짝 (`{|}`, `[|]`, `(|)`) | 두 줄 분할 들여쓰기 — 가운데 줄은 한 단계 더 들여쓰고 닫는 짝은 새 줄로 |\r\n| 직전 글자가 `indentTriggers` 중 하나 | 다음 줄을 한 단계 더 들여씀 |\r\n| 그 외 | 직전 줄의 선행 공백을 그대로 복사 |\r\n\r\n---\r\n\r\n## `maybeUnindentClosingBrace`\r\n\r\n```kotlin\r\nfun maybeUnindentClosingBrace(old: TextEdit, new: TextEdit): TextEdit\r\n```\r\n\r\n`}` `]` `)` 를 입력한 직후 라인 전체가 공백 + 입력 글자 한 개로만 구성돼 있으면, 들여쓰기를 한 단계 (`TAB_UNIT`) 줄여 닫는 짝을 여는 짝과 같은 들여쓰기로 정렬\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.EditorPanel` `onValueChange` | `maybeUnindentClosingBrace`, `maybeApplyEnter` 통과 |\r\n| `page.app.EditorPanel` `onPreviewKeyEvent` | Tab → `handleTab`, Shift+Tab → `handleShiftTab`, Backspace → `handleBackspace` |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/indent_en.md":"# Indent\r\n\r\n> 한국어: [indent.md](https://monkshark.github.io/page-ide/#modules/editor/indent.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/Indent.kt` — Indent / dedent / smart-Enter\r\n\r\nA bundle of pure functions for Tab / Shift+Tab / Enter / Backspace and auto-alignment of `}` / `]` / `)`.\r\n\r\n---\r\n\r\n## Constants\r\n\r\n| Constant | Value | Description |\r\n|---|---|---|\r\n| `TAB_UNIT` | `4` | One indent unit = 4 spaces |\r\n| `TAB_SPACES` | `\"    \"` | Four-space literal |\r\n| `indentTriggers` | `{`, `(`, `[`, `:` | If the char right before Enter is one of these, indent one level further |\r\n| `matchingClosers` | `{→}`, `(→)`, `[→]` | Enter inside an empty pair triggers split indent |\r\n| `unindentChars` | `}`, `]`, `)` | Typing one of these dedents the line by one step |\r\n\r\n---\r\n\r\n## `handleTab`\r\n\r\n```kotlin\r\nfun handleTab(edit: TextEdit): TextEdit\r\n```\r\n\r\n| State | Action |\r\n|---|---|\r\n| Caret only | Insert spaces up to the next 4-column boundary |\r\n| Single-line selection | Add one `TAB_SPACES` at the start of the line (selection preserved) |\r\n| Multi-line selection | Add `TAB_SPACES` at the start of every line |\r\n\r\n---\r\n\r\n## `handleShiftTab`\r\n\r\n```kotlin\r\nfun handleShiftTab(edit: TextEdit): TextEdit\r\n```\r\n\r\nDedents every selected line by one step (up to `TAB_UNIT` spaces). If the line has fewer leading spaces, removes only what's there.\r\n\r\n---\r\n\r\n## `handleLiteralTab`\r\n\r\n```kotlin\r\nfun handleLiteralTab(edit: TextEdit): TextEdit\r\n```\r\n\r\nInserts a literal `\\t`. For files where the user actually wants a tab character (Makefile, TSV).\r\n\r\n---\r\n\r\n## `handleBackspace`\r\n\r\n```kotlin\r\nfun handleBackspace(edit: TextEdit): TextEdit?\r\n```\r\n\r\nOnly acts when the chars before the caret are whitespace-only indent. Deletes back to the previous 4-column boundary in one step. Returns `null` (selection / start of line / non-space inside indent) so the caller falls back to the default backspace.\r\n\r\n---\r\n\r\n## `maybeApplyEnter`\r\n\r\n```kotlin\r\nfun maybeApplyEnter(old: TextEdit, new: TextEdit): TextEdit\r\n```\r\n\r\nCalled from `onValueChange`. Verifies `new` is exactly `old` with a single `\\n` inserted, then delegates to `handleEnter`. Acts as a guard so IME / Hangul composition / paste cases don't trigger accidentally.\r\n\r\n---\r\n\r\n## `handleEnter`\r\n\r\n```kotlin\r\nfun handleEnter(edit: TextEdit): TextEdit\r\n```\r\n\r\nEnter key core logic.\r\n\r\n| Case | Action |\r\n|---|---|\r\n| Caret between matched pair (`{|}`, `[|]`, `(|)`) | Split into two lines — middle line gets extra indent, closer goes to its own line |\r\n| Char before caret is in `indentTriggers` | Indent the next line one step further |\r\n| Otherwise | Copy the previous line's leading whitespace |\r\n\r\n---\r\n\r\n## `maybeUnindentClosingBrace`\r\n\r\n```kotlin\r\nfun maybeUnindentClosingBrace(old: TextEdit, new: TextEdit): TextEdit\r\n```\r\n\r\nAfter typing `}` `]` `)`, if the entire line is whitespace + that one char, dedent by one (`TAB_UNIT`) so the closer aligns with the opener.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.EditorPanel` `onValueChange` | Passes through `maybeUnindentClosingBrace`, `maybeApplyEnter` |\r\n| `page.app.EditorPanel` `onPreviewKeyEvent` | Tab → `handleTab`, Shift+Tab → `handleShiftTab`, Backspace → `handleBackspace` |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/java_lexer.md":"# JavaLexer\r\n\r\n> `page/editor/src/main/kotlin/page/editor/JavaLexer.kt` — Java 신택스 렉서 (위임)\r\n\r\n`JvmLexer` 에 Java 키워드 셋과 트리플 따옴표 (Text Block) 활성화 옵션만 넘기는 박막 위임. 토큰화 로직 본체는 `JvmLexer` 에 있음\r\n\r\n> English: [java_lexer_en.md](https://monkshark.github.io/page-ide/#modules/editor/java_lexer_en.md)\r\n\r\n---\r\n\r\n## 정의\r\n\r\n```kotlin\r\nobject JavaLexer : SyntaxLexer by JavaLexerImpl\r\n\r\nprivate object JavaLexerImpl : JvmLexer(\r\n    keywords = JAVA_KEYWORDS,\r\n    supportTripleQuoted = true,\r\n)\r\n```\r\n\r\n`SyntaxLexer by JavaLexerImpl` — Kotlin 의 인터페이스 위임. `JavaLexer.tokenize(...)` 호출은 그대로 `JavaLexerImpl.tokenize(...)` 로 전달\r\n\r\n`JvmLexerImpl` 을 `private` 으로 가린 이유는 외부에서 직접 인스턴스화할 일이 없기 때문 — 진입점은 `object JavaLexer` 하나\r\n\r\n---\r\n\r\n## `JAVA_KEYWORDS`\r\n\r\nJLS (Java Language Specification) 의 예약어 + 컨텍스트 키워드를 합한 60 여 개 셋\r\n\r\n```kotlin\r\n\"abstract\", \"assert\", \"boolean\", \"break\", \"byte\", \"case\", \"catch\", \"char\",\r\n\"class\", \"const\", \"continue\", \"default\", \"do\", \"double\", \"else\", \"enum\",\r\n\"extends\", \"false\", \"final\", \"finally\", \"float\", \"for\", \"goto\", \"if\",\r\n\"implements\", \"import\", \"instanceof\", \"int\", \"interface\", \"long\", \"native\",\r\n\"new\", \"non-sealed\", \"null\", \"package\", \"permits\", \"private\", \"protected\",\r\n\"public\", \"record\", \"return\", \"sealed\", \"short\", \"static\", \"strictfp\",\r\n\"super\", \"switch\", \"synchronized\", \"this\", \"throw\", \"throws\", \"transient\",\r\n\"true\", \"try\", \"var\", \"void\", \"volatile\", \"while\", \"yield\",\r\n```\r\n\r\n`record`, `sealed`, `non-sealed`, `permits`, `var`, `yield` 같은 비교적 새 키워드 포함 (Java 17 기준)\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `SyntaxLexers.forPath(path)` | `.java` 확장자 분기 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/
