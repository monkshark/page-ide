<style>
:root{--bg:#0d1117;--sidebar-bg:#161b22;--card-bg:#1c2128;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--accent-dim:#1f6feb33;--pre-bg:#1e2228;--inline-code:#e6d9a2;--code-text:#abb2bf;--badge-bg:#282c34;--copy-bg:#2d333b;--mermaid-bg:#ffffff;--shadow:rgba(0,0,0,.4);color-scheme:dark}
html[data-theme="light"]{--bg:#ffffff;--sidebar-bg:#f6f8fa;--card-bg:#eaeef2;--border:#d0d7de;--text:#1f2328;--muted:#59636e;--accent:#0969da;--accent-dim:#0969da1a;--pre-bg:#f6f8fa;--inline-code:#953800;--code-text:#1f2328;--badge-bg:#eaeef2;--copy-bg:#ffffff;--mermaid-bg:#fafbfc;--shadow:rgba(0,0,0,.15);color-scheme:light}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
.sidebar{width:280px;min-width:280px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sidebar-header h1{font-size:15px;font-weight:600}
.lang-toggle{display:inline-flex;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.lang-btn{background:transparent;border:none;color:var(--muted);font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer;transition:background .15s,color .15s}
.lang-btn.active{background:var(--accent-dim);color:var(--accent)}
.lang-btn:not(.active):hover{color:var(--text)}
.search-box{width:100%;padding:7px 10px;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--muted)}
.nav-list{flex:1;overflow-y:auto;padding:8px 0}
.nav-group{padding:0 8px;margin-bottom:4px}
.nav-group-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:8px 8px 4px}
.nav-item{display:block;padding:6px 12px;font-size:13px;color:var(--muted);text-decoration:none;border-radius:6px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .15s}
.nav-item:hover{background:var(--accent-dim);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:500}
.content{flex:1;overflow-y:auto;padding:40px;scroll-behavior:smooth}
.content-inner{max-width:860px;margin:0 auto;padding-bottom:40vh}
.welcome{text-align:center;padding:120px 20px;color:var(--muted)}
.welcome h2{font-size:20px;margin-bottom:8px;color:var(--text)}
.welcome p{font-size:14px}
.md h1{font-size:28px;font-weight:600;margin:0 0 16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.md h2{font-size:22px;font-weight:600;margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.md h3{font-size:17px;font-weight:600;margin:24px 0 8px}
.md h4{font-size:15px;font-weight:600;margin:20px 0 6px}
.md p{font-size:14px;line-height:1.7;margin:0 0 12px}
.md a{color:var(--accent);text-decoration:none}
.md a:hover{text-decoration:underline}
.md ul,.md ol{padding-left:24px;margin:0 0 12px}
.md li{font-size:14px;line-height:1.7;margin:2px 0}
.md code{background:var(--card-bg);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'JetBrains Mono','Fira Code',Consolas,monospace;color:var(--inline-code)}
.md pre{background:var(--pre-bg);border:1px solid var(--border);border-radius:8px;margin:0 0 16px;overflow:hidden;position:relative}
.md pre code{background:none;padding:16px;font-size:13px;line-height:1.55;display:block;overflow-x:auto;font-family:'JetBrains Mono','Fira Code',Consolas,monospace;color:var(--code-text)}
.md pre code.hljs{background:none;padding:16px}
.md pre .code-lang{position:absolute;top:0;right:44px;font-size:11px;color:var(--muted);background:var(--badge-bg);padding:2px 8px;border-radius:0 0 4px 4px;font-family:'JetBrains Mono',monospace;text-transform:lowercase;letter-spacing:.3px;user-select:none;pointer-events:none}
.md pre .copy-btn{position:absolute;top:6px;right:6px;background:var(--copy-bg);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;opacity:0;transition:opacity .15s,background .15s,color .15s;font-family:inherit}
.md pre:hover .copy-btn{opacity:1}
.md pre .copy-btn:hover{background:var(--accent-dim);color:var(--text);border-color:var(--accent)}
.md pre .copy-btn.ok{color:#2ea043;border-color:#2ea043}
.md pre.mermaid{background:var(--mermaid-bg);text-align:center;padding:16px;border-color:var(--border)}
.md pre.mermaid svg{max-width:100%;height:auto}
.md blockquote{border-left:3px solid var(--accent);padding:4px 16px;margin:0 0 12px;color:var(--muted)}
.md table{width:100%;border-collapse:collapse;margin:0 0 16px;font-size:13px}
.md th,.md td{padding:8px 12px;border:1px solid var(--border);text-align:left}
.md th{background:var(--card-bg);font-weight:600}
.md hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.md img{max-width:100%;border-radius:8px}
.md details{margin:0 0 12px}
.md summary{cursor:pointer;font-weight:600;font-size:14px;padding:6px 0}
.md details[open] summary{margin-bottom:8px}
.breadcrumb{font-size:12px;color:var(--muted);margin-bottom:20px}
.breadcrumb a{color:var(--accent);text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.nav-btns{display:inline-flex;gap:4px;margin-right:10px;vertical-align:middle}
.nav-btn{background:var(--card-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);width:28px;height:28px;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .15s}
.nav-btn:hover:not(:disabled){background:var(--accent-dim);border-color:var(--accent)}
.nav-btn:disabled{opacity:.3;cursor:default}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:98}
.overlay.show{display:block}
.menu-toggle{display:none;position:fixed;bottom:20px;right:20px;width:48px;height:48px;background:var(--accent);border:none;border-radius:50%;color:#fff;font-size:22px;cursor:pointer;z-index:100;box-shadow:0 4px 12px var(--shadow)}
.theme-toggle{background:var(--card-bg);border:1px solid var(--border);border-radius:6px;width:30px;height:26px;padding:0;cursor:pointer;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;margin-right:6px;transition:background .15s,color .15s,border-color .15s}
.theme-toggle:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
.theme-toggle svg{width:15px;height:15px;display:block}
.theme-toggle .icon-sun{display:none}
.theme-toggle .icon-moon{display:block}
html[data-theme="light"] .theme-toggle .icon-sun{display:block}
html[data-theme="light"] .theme-toggle .icon-moon{display:none}
@media(max-width:768px){.sidebar{position:fixed;left:-300px;top:0;bottom:0;z-index:99;transition:left .25s ease}.sidebar.open{left:0}.overlay.show{display:block}.menu-toggle{display:block}.content{padding:20px 14px}.md h1{font-size:22px}.md h2{font-size:18px}.md h3{font-size:15px}.md pre{padding:10px 12px;font-size:12px}.md table{font-size:12px;display:block;overflow-x:auto}.md th,.md td{padding:6px 8px;white-space:nowrap}}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--muted)}
</style>

  } catch(e){}
})();
</script>

<script>
const MD_DATA = {"guides/architecture.md":"# 아키텍처\r\n\r\n> English: [architecture_en.md](https://monkshark.github.io/PAGE_IDE/#guides/architecture_en.md)\r\n\r\n> 모듈 경계, 의존 방향, 기술 스택 결정.\r\n\r\n이 문서는 코드가 채워지면서 살이 붙는다. 현재는 결정된 골격만 정리한다.\r\n\r\n---\r\n\r\n## 기술 스택\r\n\r\n| 영역 | 선택 | 비고 |\r\n|---|---|---|\r\n| 언어 | Kotlin (JVM 21+) | 자바 생태계 라이브러리 그대로 활용 |\r\n| UI | Compose Multiplatform Desktop | JetBrains Fleet 동일 스택, Skia 기반 |\r\n| 빌드 | Gradle (Kotlin DSL) | 멀티모듈 |\r\n| LSP | LSP4J (Eclipse) | 다언어 지원 표준 |\r\n| 신택스 | Tree-sitter | JNI 바인딩 |\r\n| Git | JGit | 자체 구현 회피 |\r\n| 로컬 저장 | SQLite (xerial JDBC) | Echo 타임라인 |\r\n| AI HTTP | OkHttp | `LLMProvider` 인터페이스 + 어댑터 4종 |\r\n| PTY | JediTerm 또는 pty4j | 프로토타입 후 결정 |\r\n\r\n---\r\n\r\n## 모듈 구조 (계획)\r\n\r\n```\r\npage/\r\n├── core         (공통 유틸, 도메인 타입, 이벤트 버스)\r\n├── editor       (텍스트 버퍼, 신택스 하이라이팅, 키 입력)\r\n├── language     (LSP 클라이언트, 언어 정의 JSON 로더)\r\n├── workspace    (파일 트리, 다중 탭, 분할 화면, 프로젝트 모델)\r\n├── ui           (Compose 컴포넌트, Glass 디자인 토큰)\r\n├── atlas        (코드 그래프 분석 + 렌더)\r\n├── echo         (키스트로크 레코더 + 타임라인 UI)\r\n├── pair         (LLMProvider, 어댑터, 채팅/관찰자/에이전트/튜터)\r\n├── runtime      (PTY, 빌드/실행, 출력 패널)\r\n├── git          (JGit 래퍼, diff/스테이지/커밋 UI)\r\n└── app          (조립층, 메인 진입점)\r\n```\r\n\r\n> 각 모듈의 상세 책임은 코드가 들어오면서 별도 문서로 분리한다.\r\n\r\n---\r\n\r\n## 의존 방향 (계획)\r\n\r\n```mermaid\r\ngraph TD\r\n  app --> ui\r\n  app --> workspace\r\n  app --> editor\r\n  app --> language\r\n  app --> atlas\r\n  app --> echo\r\n  app --> pair\r\n  app --> runtime\r\n  app --> git\r\n  ui --> core\r\n  workspace --> core\r\n  editor --> core\r\n  language --> core\r\n  atlas --> language\r\n  atlas --> core\r\n  echo --> core\r\n  pair --> core\r\n  runtime --> core\r\n  git --> core\r\n```\r\n\r\n원칙은 단순하다.\r\n\r\n- 모든 모듈은 `core`만 의존한다 (또는 `core`도 의존하지 않는다).\r\n- 기능 모듈끼리(예: `editor` ↔ `pair`)는 직접 의존하지 않는다. 통신은 `core`의 이벤트 버스나 인터페이스로.\r\n- 조립과 와이어링은 `app`이 전담한다.\r\n\r\n---\r\n\r\n## AI 프로바이더 전략\r\n\r\n`LLMProvider` 인터페이스를 두고 어댑터 네 가지로 갈아끼운다.\r\n\r\n```kotlin\r\ninterface LLMProvider {\r\n    suspend fun complete(prompt: Prompt): Flow<TokenChunk>\r\n    fun supportsTools(): Boolean\r\n}\r\n```\r\n\r\n- **Ollama** — 로컬, 기본. 코드가 PC를 떠나지 않는다.\r\n- **Anthropic Claude** — 사용자 본인 API 키.\r\n- **OpenAI ChatGPT** — 사용자 본인 API 키.\r\n- **OpenAI 호환 endpoint** — Together AI / Groq / 자체 호스팅 등 endpoint URL 직접 입력.\r\n\r\nAPI 키는 OS 키체인에 저장한다 (Windows Credential Manager 등). 평문 저장 금지.\r\n\r\n---\r\n\r\n- [개요로 돌아가기](https://monkshark.github.io/PAGE_IDE/#guides/overview.md)\r\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\r\n","guides/architecture_en.md":"# Architecture\r\n\r\n> 한국어: [architecture.md](https://monkshark.github.io/PAGE_IDE/#guides/architecture.md)\r\n\r\n> Module boundaries, dependency direction, and stack choices.\r\n\r\nThis document grows as code lands. For now, only the decided skeleton is captured.\r\n\r\n---\r\n\r\n## Stack\r\n\r\n| Area | Choice | Note |\r\n|---|---|---|\r\n| Language | Kotlin (JVM 21+) | Reuse JVM libraries directly |\r\n| UI | Compose Multiplatform Desktop | Same stack as JetBrains Fleet, Skia-based |\r\n| Build | Gradle (Kotlin DSL) | Multi-module |\r\n| LSP | LSP4J (Eclipse) | Multi-language standard |\r\n| Syntax | Tree-sitter | JNI bindings |\r\n| Git | JGit | Avoid reimplementing |\r\n| Local store | SQLite (xerial JDBC) | Echo timeline |\r\n| AI HTTP | OkHttp | `LLMProvider` interface + 4 adapters |\r\n| PTY | JediTerm or pty4j | Decide after prototyping |\r\n\r\n---\r\n\r\n## Module structure (planned)\r\n\r\n```\r\npage/\r\n├── core         (shared utilities, domain types, event bus)\r\n├── editor       (text buffer, syntax highlighting, key input)\r\n├── language     (LSP client, language-definition JSON loader)\r\n├── workspace    (file tree, multi-tab, split panes, project model)\r\n├── ui           (Compose components, Glass design tokens)\r\n├── atlas        (code graph analysis + render)\r\n├── echo         (keystroke recorder + timeline UI)\r\n├── pair         (LLMProvider, adapters, chat/observer/agent/tutor)\r\n├── runtime      (PTY, build/run, output panel)\r\n├── git          (JGit wrapper, diff/stage/commit UI)\r\n└── app          (assembly layer, main entry point)\r\n```\r\n\r\n> Each module's detailed responsibilities will move to its own document as code lands.\r\n\r\n---\r\n\r\n## Dependency direction (planned)\r\n\r\n```mermaid\r\ngraph TD\r\n  app --> ui\r\n  app --> workspace\r\n  app --> editor\r\n  app --> language\r\n  app --> atlas\r\n  app --> echo\r\n  app --> pair\r\n  app --> runtime\r\n  app --> git\r\n  ui --> core\r\n  workspace --> core\r\n  editor --> core\r\n  language --> core\r\n  atlas --> language\r\n  atlas --> core\r\n  echo --> core\r\n  pair --> core\r\n  runtime --> core\r\n  git --> core\r\n```\r\n\r\nThe rules are simple.\r\n\r\n- Every module depends only on `core` (or on nothing).\r\n- Feature modules (e.g. `editor` ↔ `pair`) do not depend on each other directly. Communication goes through `core` event buses or interfaces.\r\n- Assembly and wiring live in `app`.\r\n\r\n---\r\n\r\n## AI provider strategy\r\n\r\nA single `LLMProvider` interface with four swappable adapters.\r\n\r\n```kotlin\r\ninterface LLMProvider {\r\n    suspend fun complete(prompt: Prompt): Flow<TokenChunk>\r\n    fun supportsTools(): Boolean\r\n}\r\n```\r\n\r\n- **Ollama** — local, default. Code never leaves the user's machine.\r\n- **Anthropic Claude** — user-supplied API key.\r\n- **OpenAI ChatGPT** — user-supplied API key.\r\n- **OpenAI-compatible endpoint** — Together AI / Groq / self-hosted; user supplies the endpoint URL.\r\n\r\nAPI keys are stored in the OS keychain (Windows Credential Manager, macOS Keychain, libsecret on Linux). No plaintext storage.\r\n\r\n---\r\n\r\n- [Back to overview](https://monkshark.github.io/PAGE_IDE/#guides/overview_en.md)\r\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\r\n","guides/overview.md":"# PAGE 개요\r\n\r\n> English: [overview_en.md](https://monkshark.github.io/PAGE_IDE/#guides/overview_en.md)\r\n\r\n> 다언어 데스크톱 IDE. 이름은 핵심 가치 네 개의 머리글자 — **P**air · **A**tlas · **G**lass · **E**cho.\r\n\r\nPAGE는 한 페이지 안에서 네 가지 차원을 동시에 본다. 코드(텍스트), 코드 그래프(공간), 작업 시간축(시간), AI 동반자(대화). 기존 IDE가 이 중 하나만 잘 푸는 동안, PAGE는 이 넷을 한 화면 안에 통합한다.\r\n\r\n---\r\n\r\n## 핵심 가치 네 가지\r\n\r\n### Pair — AI 동반자\r\n\r\n곁에서 코드를 함께 보는 모드. 명령을 받고 실행하는 외주형이 아니라, 사용자의 작업을 관찰하고 짧게 거드는 동행형을 지향한다.\r\n\r\n- **관찰자** — 사용자가 짜는 코드를 보고 자발적으로 짧게 코멘트.\r\n- **대화** — 채팅 기반 질문/답변, 코드 컨텍스트 자동 첨부.\r\n- **에이전트** — 도구 호출로 파일 수정, 명령 실행. 모든 변경은 사용자 승인 필요.\r\n- **튜터** — 학습자용. 코드의 의도를 묻고 대안을 제시한다.\r\n\r\n### Atlas — 코드 그래프 (공간)\r\n\r\n파일 트리는 디렉터리 구조일 뿐이다. Atlas는 모듈, 함수, 의존성을 노드와 엣지로 시각화한다.\r\n\r\n- 노드: 파일 / 주요 심볼\r\n- 엣지: import, 호출, 상속\r\n- 줌·팬, 노드 클릭으로 파일 오픈, 호버 미리보기\r\n- \"현재 파일에서 도달 가능한 노드만 보기\" 필터\r\n\r\n### Glass — UI 미감\r\n\r\n매일 8시간 보는 화면이라면 보고 싶은 화면이어야 한다. Glass는 글래스모피즘 기반 디자인 시스템이다.\r\n\r\n- 다크 모드 기본, 라이트 모드 전환\r\n- 반투명 패널, 부드러운 모션, 네온 액센트\r\n- 포커스 모드 (현재 파일 외 흐림)\r\n- Compose Multiplatform Material 3 위에 디자인 토큰 v1\r\n\r\n### Echo — 키스트로크 타임라인 (시간)\r\n\r\nGit 커밋은 결과 스냅샷이지, 작업 흐름이 아니다. Echo는 키 입력을 로컬 SQLite에 저장해서 작업 시간축을 그대로 되감을 수 있게 한다.\r\n\r\n- 디바운스된 키 입력 자동 레코딩 (오프라인, 로컬 DB)\r\n- 하단 타임라인 바, 스크럽으로 시점 이동 (read-only 뷰)\r\n- \"이 시점으로 복원\" 버튼\r\n- 보존 기간 기본 30일, 커스터마이즈 가능\r\n\r\n---\r\n\r\n## 만들지 *않을* 것\r\n\r\n스코프 보호는 컨셉의 일부다.\r\n\r\n- 모바일/웹 버전 — 데스크톱 우선\r\n- 자체 언어 서버 — LSP 클라이언트만\r\n- 자체 디버거 엔진 — 추후 DAP 사용\r\n- 협업 편집 (Live Share 류) — 후순위\r\n- 마켓플레이스/플러그인 SDK — v2.0 이후\r\n\r\n---\r\n\r\n## 단계 구성\r\n\r\n네 단계로 나누어 단계마다 배포 가능한 결과물을 남긴다.\r\n\r\n1. **기반** — 예쁜 다언어 에디터.\r\n2. **Atlas + Git** — 코드 그래프와 버전 관리 통합.\r\n3. **Echo** — 키스트로크 타임라인.\r\n4. **Pair** — AI 동반자 (멀티 프로바이더).\r\n\r\n---\r\n\r\n## 다음 문서\r\n\r\n- [아키텍처](https://monkshark.github.io/PAGE_IDE/#guides/architecture.md) — 모듈 구조와 의존 방향, 기술 스택 결정\r\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\r\n","guides/overview_en.md":"# PAGE Overview\r\n\r\n> 한국어: [overview.md](https://monkshark.github.io/PAGE_IDE/#guides/overview.md)\r\n\r\n> Multi-language desktop IDE. The name comes from the initials of four core values — **P**air · **A**tlas · **G**lass · **E**cho.\r\n\r\nPAGE puts four dimensions on a single page: code (text), code graph (space), work timeline (time), and an AI companion (conversation). Where existing IDEs solve one of these well, PAGE integrates all four into one screen.\r\n\r\n---\r\n\r\n## The four core values\r\n\r\n### Pair — AI companion\r\n\r\nA mode where the AI sits beside you and watches the code. Not the outsourcing model where you issue a command and receive a result, but a companion model that observes your work and chimes in briefly.\r\n\r\n- **Observer** — Watches the code you write and offers short, unsolicited comments.\r\n- **Chat** — Question/answer with automatic code-context attachment.\r\n- **Agent** — Tool-calling for file edits and command execution. Every change requires explicit user approval.\r\n- **Tutor** — For learners. Asks about the intent of your code and proposes alternatives.\r\n\r\n### Atlas — code graph (space)\r\n\r\nThe file tree is just directory structure. Atlas visualizes modules, functions, and dependencies as nodes and edges.\r\n\r\n- Nodes: files / major symbols\r\n- Edges: imports, calls, inheritance\r\n- Zoom/pan, click to open the file, hover to preview\r\n- \"Show only nodes reachable from the current file\" filter\r\n\r\n### Glass — UI aesthetic\r\n\r\nIf you stare at a screen eight hours a day, it should be a screen you want to look at. Glass is a glassmorphism-based design system.\r\n\r\n- Dark mode by default, light mode toggle\r\n- Translucent panels, smooth motion, neon accents\r\n- Focus mode (everything except the current file dims)\r\n- Design tokens v1 layered on top of Compose Multiplatform Material 3\r\n\r\n### Echo — keystroke timeline (time)\r\n\r\nA git commit is a result snapshot, not a record of work. Echo stores keystrokes in a local SQLite database so you can rewind the work timeline as it happened.\r\n\r\n- Debounced auto-recording of keystrokes (offline, local DB)\r\n- Bottom timeline bar, scrub to navigate (read-only view)\r\n- \"Restore to this point\" button\r\n- Default 30-day retention, configurable\r\n\r\n---\r\n\r\n## What we will *not* build\r\n\r\nScope protection is part of the concept.\r\n\r\n- Mobile/web versions — desktop first\r\n- Our own language server — LSP client only\r\n- Our own debugger engine — DAP later\r\n- Collaborative editing (Live Share style) — deferred\r\n- Marketplace / plugin SDK — post-v2.0\r\n\r\n---\r\n\r\n## Stages\r\n\r\nFour stages, each ending with something shippable.\r\n\r\n1. **Foundation** — a good-looking multi-language editor.\r\n2. **Atlas + Git** — code graph plus version control.\r\n3. **Echo** — keystroke timeline.\r\n4. **Pair** — AI companion (multi-provider).\r\n\r\n---\r\n\r\n## Next document\r\n\r\n- [Architecture](https://monkshark.github.io/PAGE_IDE/#guides/architecture_en.md) — Module structure, dependency direction, and stack choices\r\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\r\n","modules/app.md":"# app\n\n> `page/app/` — 조립 계층 / 진입점, Compose 패널, 단축키, 다이얼로그\n\n`page:editor` 의 순수 로직 동작과 `page:ui` 의 디자인 토큰을 실제 화면 / 키 입력 / 파일 다이얼로그에 묶는 곳. 다른 모든 모듈을 의존하지만 다른 모듈은 이 모듈을 의존하지 않는다 (의존 그래프의 leaf)\n\n> English: [app_en.md](https://monkshark.github.io/PAGE_IDE/#modules/app_en.md)\n\n---\n\n## 의존성\n\n| 종류 | 내용 |\n|---|---|\n| 외부 | Compose Multiplatform Desktop, Compose Material3, Skia (SVG/이미지 디코딩), Swing (`JFileChooser`) |\n| 내부 | `page:core`, `page:editor`, `page:ui` |\n\n조립 계층이라 의존이 가장 많다. 대신 *어떤 모듈도 `app` 을 의존하면 안 된다* — 거꾸로 의존하기 시작하면 진입점이 모호해진다\n\n---\n\n## 진입점\n\n### `Main.kt`\n\n```kotlin\nfun main() = application { ... }\n```\n\nCompose `application` 안에 단일 `Window`. 윈도우 상단에서 다음 상태를 들고 있다.\n\n| 상태 | 타입 | 역할 |\n|---|---|---|\n| `book` | `TabBook` | 열린 탭과 활성 인덱스 |\n| `editorValue` | `TextFieldValue` | 현재 에디터 텍스트 + 선택 범위 |\n| `rootDir` | `Path?` | 사이드바 루트 폴더 |\n| `expanded` | `Set<Path>` | 사이드바에서 펼쳐진 디렉터리 |\n| `sidebarWidth` | `Dp` | 좌측 사이드바 너비 (드래그로 조정) |\n| `search` | `SearchState?` | 검색·치환 상태 (`null` 이면 검색바 닫힘) |\n| `pendingClose` | `PendingClose?` | 저장 안 된 변경 사항 다이얼로그 트리거 |\n\n활성 탭이 바뀔 때 `LaunchedEffect(book.activeIndex, book.tabs.size)` 로 `editorValue` 를 새 탭의 `text` / `caret` 으로 동기화. `BasicTextField` 의 단일 인스턴스 위에서 *값* 만 갈아끼우는 구조라 활성 탭 전환이 가벼움\n\n### 단축키 매트릭스\n\n`onPreviewKeyEvent` + `onKeyEvent` 양쪽에서 `handleShortcut` 으로 가로채서 처리\n\n| 키 | 동작 |\n|---|---|\n| Ctrl+O | 파일 열기 (`FileDialogs.open`) |\n| Ctrl+Shift+O | 폴더 열기 (`FileDialogs.openDirectory`) |\n| Ctrl+S | 저장 (`FileDocument.save` → `markActiveSaved`) |\n| Ctrl+W | 활성 탭 닫기 (dirty 면 `UnsavedChangesDialog`) |\n| Ctrl+F | 검색바 열기 |\n| Ctrl+R | 검색·치환 바 열기 |\n| Ctrl+Z | undo (검색바 포커스 시 통과 → 검색 입력칸 자체 undo) |\n| Ctrl+Shift+Z / Ctrl+Y | redo |\n| Esc | 검색바 닫기 |\n\n검색바가 열려 있을 때 Ctrl+Z 등을 통과시키는 분기가 핵심 — 안 그러면 검색어 한 글자 지우다가 본문이 통째로 되감긴다 ([개발기 #4](https://monkshark.github.io/p/page-ide-undo-per-file/) 참고)\n\n---\n\n## 패널 / Composable\n\n### `EditorPanel`\n\n```kotlin\n@Composable\nfun EditorPanel(\n    value: TextFieldValue,\n    onValueChange: (TextFieldValue) -> Unit,\n    search: SearchState?,\n    lexer: SyntaxLexer?,\n    activePath: Path?,\n    ...\n)\n```\n\n본문 편집 영역. 안에 `BasicTextField` 를 두고, `onValueChange` 단계에서 `AutoClose`, `Indent.maybeUnindentClosingBrace`, `Indent.maybeApplyEnter` 를 순서대로 통과시킨다. `onPreviewKeyEvent` 에서는 Tab / Shift+Tab / Enter / Backspace / Alt+Up·Down 을 직접 가로채 `Indent` / `LineMove` 로 위임\n\n`TextBuffer` 를 `remember(value.text)` 로 보유 — 라인 인덱스 캐시를 한 번만 만들어 라인 번호 거터·상태바·현재 줄 하이라이트가 모두 같은 인덱스를 본다\n\n`CombinedHighlightTransformation` 가 토큰 색·검색 매치 배경·괄호 매칭 배경을 한 번에 입힌다 (`VisualTransformation` 한 단계로 처리해 `BasicTextField` 의 캐럿 매핑이 흐트러지지 않음)\n\n### `FileTreePanel`\n\n```kotlin\n@Composable\nfun FileTreePanel(\n    root: Path?,\n    expanded: Set<Path>,\n    selectedFile: Path?,\n    onToggle: (Path) -> Unit,\n    onOpenFile: (Path) -> Unit,\n    ...\n)\n```\n\n좌측 사이드바. `FileTree.listTree(root, expanded)` 결과를 `LazyColumn` 으로 그린다. 디렉터리 클릭은 `onToggle`, 파일 클릭은 `onOpenFile`. `root == null` 일 때는 \"Press Ctrl+Shift+O\" 안내\n\n### `TabBar`\n\n```kotlin\n@Composable\nfun TabBar(\n    book: TabBook,\n    onActivate: (Int) -> Unit,\n    onClose: (Int) -> Unit,\n    onMove: (Int, Int) -> Unit,\n)\n```\n\n상단 탭 바. dirty 인 탭은 `×` 대신 `●` 점, 호버 시 `×` 로 전환. 드래그 재배치는 `awaitEachGesture` + `touchSlop` 검사로 클릭과 드래그를 구분 — slop 을 넘어선 시점부터만 `onMove` 호출. 휠 스크롤은 가로 스크롤로 매핑\n\n### `LineNumberGutter`\n\n```kotlin\n@Composable\ninternal fun LineNumberGutter(\n    lineCount: Int,\n    currentLine: Int,\n    textStyle: TextStyle,\n)\n```\n\n좌측 라인 번호 거터. `IntrinsicSize.Max` 로 가장 긴 번호 너비 기준으로 폭이 결정 → 1000 줄을 넘어가도 거터가 흔들리지 않는다. 현재 줄만 `onBackground` 색, 나머지는 `onSurfaceVariant`\n\n### `SearchBar`\n\n```kotlin\n@Composable\nfun SearchBar(state: SearchState, ...)\n```\n\n상단 검색·치환 바. 두 줄 구조 — 첫 줄: 쿼리 입력 + 매치 카운터(`1 / 12`) + 대소문자 토글(`Aa`) + 이전/다음/닫기 칩. 둘째 줄(치환 모드만): 치환 텍스트 입력 + \"바꾸기\" / \"전부 바꾸기\" 버튼. Esc → 닫기, Enter → 다음 매치 / 치환\n\n`onWindowShortcut(e)` 위임 한 줄이 핵심. 검색바 입력칸이 처리하지 않은 키는 윈도우 단축키 핸들러로 흘려 — 검색바 안에서도 Ctrl+S 같은 글로벌 단축키가 살아남는다\n\n### `PreviewPanel`\n\n```kotlin\n@Composable\nfun PreviewPanel(path: Path, kind: FileKind, ...)\n```\n\n이미지 / SVG 미리보기. `FileKind.IMAGE` 는 Skia `Image.makeFromEncoded`, `FileKind.SVG` 는 `SVGDOM` 으로 로드. 휠 스크롤 줌, +/− 버튼 줌, 라벨 클릭 시 100% 리셋. 첫 진입 시 70% 핏(이미지가 패널보다 크면 비율 유지로 축소). PNG/JPG/SVG 모두 같은 `ImageViewer` 가 그려 줌 / 패닝 일관성 유지\n\n### `UnsavedChangesDialog`\n\n```kotlin\n@Composable\ninternal fun UnsavedChangesDialog(\n    fileNames: List<String>,\n    isAppExit: Boolean,\n    onSave / onDiscard / onCancel: () -> Unit,\n)\n```\n\n저장 안 된 변경 사항 확인 다이얼로그. `undecorated` `DialogWindow` 에 `WindowDraggableArea` 로 자체 드래그 영역. 키 매핑: `Y` = 저장, `N` = 저장 안 함, `Esc` = 취소. 메인 윈도우 `onCloseRequest` 가 트리거 — `book.tabs.any { dirty }` 이면 `pendingClose = PendingClose.App` 으로 두고 다이얼로그를 띄운다\n\n---\n\n## 헬퍼\n\n### `FileDialogs`\n\n```kotlin\nobject FileDialogs {\n    fun open(parent: Frame): Path?\n    fun saveAs(parent: Frame, suggested: String? = null): Path?\n    fun openDirectory(parent: Frame): Path?\n}\n```\n\nSwing `JFileChooser` 래퍼. Compose Desktop 에서 OS 네이티브 파일 다이얼로그를 빠르게 쓰는 가장 간단한 방법. 향후 OS 별 네이티브 다이얼로그(Windows COM, macOS NSOpenPanel) 가 필요해지면 같은 시그니처로 교체 예정\n\n### `PendingClose`\n\n```kotlin\ninternal sealed interface PendingClose {\n    data class Tab(val index: Int) : PendingClose\n    data object App : PendingClose\n}\n```\n\n`UnsavedChangesDialog` 트리거 종류. `Tab(idx)` 는 특정 탭 닫기, `App` 은 앱 종료 — 다이얼로그 텍스트 (\"저장하시겠습니까?\" / \"저장하지 않고 종료하시겠습니까?\") 와 onSave / onDiscard 후속 동작이 분기\n\n---\n\n## 화면 구조\n\n```\nWindow\n├── TitleBar (PAGE · v0.1.0 · 활성 파일 경로)\n└── Row\n    ├── FileTreePanel (사이드바)\n    ├── ResizeHandle (드래그로 폭 조정)\n    └── Column\n        ├── TabBar\n        ├── EditorPanel | PreviewPanel  ← 활성 탭 FileKind 로 분기\n        │   └── (EditorPanel 내부) SearchBar + LineNumberGutter + BasicTextField + StatusBar\n        └── (UnsavedChangesDialog 는 별도 DialogWindow)\n```\n\n---\n\n## 향후 추가 예정\n\n| 패널 | 모듈 |\n|---|---|\n| Pair 채팅 패널 | `page:pair` (LLMProvider 어댑터) |\n| Atlas 코드 그래프 | `page:atlas` |\n| Echo 타임라인 | `page:echo` |\n| Git diff / 스테이지 | `page:git` |\n| 터미널 / 빌드 출력 | `page:runtime` |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n- [아키텍처](https://monkshark.github.io/PAGE_IDE/#guides/architecture.md)\n","modules/app_en.md":"# app\n\n> `page/app/` — composition layer / entry point, Compose panels, shortcuts, dialogs\n\nThe place that wires `page:editor`'s pure logic and `page:ui`'s design tokens into actual screens, key events, and file dialogs. Depends on every other module, but no other module depends on `app` (it's the leaf of the dependency graph)\n\n> 한국어: [app.md](https://monkshark.github.io/PAGE_IDE/#modules/app.md)\n\n---\n\n## Dependencies\n\n| Kind | Content |\n|---|---|\n| External | Compose Multiplatform Desktop, Compose Material3, Skia (SVG / image decode), Swing (`JFileChooser`) |\n| Internal | `page:core`, `page:editor`, `page:ui` |\n\nThe most dependencies, since this is the composition layer. The hard rule is the inverse: *no module may depend on `app`* — once that flips, the entry point becomes ambiguous\n\n---\n\n## Entry point\n\n### `Main.kt`\n\n```kotlin\nfun main() = application { ... }\n```\n\nA single `Window` inside Compose's `application`. The window holds the following state at the top level.\n\n| State | Type | Role |\n|---|---|---|\n| `book` | `TabBook` | Open tabs and active index |\n| `editorValue` | `TextFieldValue` | Current editor text + selection |\n| `rootDir` | `Path?` | Sidebar root folder |\n| `expanded` | `Set<Path>` | Expanded directories in sidebar |\n| `sidebarWidth` | `Dp` | Sidebar width (drag to resize) |\n| `search` | `SearchState?` | Search / replace state (`null` = bar closed) |\n| `pendingClose` | `PendingClose?` | Trigger for the unsaved-changes dialog |\n\nWhen the active tab switches, `LaunchedEffect(book.activeIndex, book.tabs.size)` syncs `editorValue` to the new tab's `text` / `caret`. A single `BasicTextField` instance is reused across tabs, with its *value* swapped — tab switching stays cheap\n\n### Shortcut matrix\n\n`handleShortcut` is wired to both `onPreviewKeyEvent` and `onKeyEvent`\n\n| Key | Action |\n|---|---|\n| Ctrl+O | Open file (`FileDialogs.open`) |\n| Ctrl+Shift+O | Open folder (`FileDialogs.openDirectory`) |\n| Ctrl+S | Save (`FileDocument.save` → `markActiveSaved`) |\n| Ctrl+W | Close active tab (shows `UnsavedChangesDialog` if dirty) |\n| Ctrl+F | Open search bar |\n| Ctrl+R | Open search-replace bar |\n| Ctrl+Z | Undo (passes through when search bar is focused → input field's own undo wins) |\n| Ctrl+Shift+Z / Ctrl+Y | Redo |\n| Esc | Close search bar |\n\nThe pass-through branch when the search bar is open is load-bearing — without it, deleting one character of the search query would rewind the entire body ([devlog #4](https://monkshark.github.io/p/page-ide-undo-per-file/) for the full story)\n\n---\n\n## Panels / Composables\n\n### `EditorPanel`\n\n```kotlin\n@Composable\nfun EditorPanel(\n    value: TextFieldValue,\n    onValueChange: (TextFieldValue) -> Unit,\n    search: SearchState?,\n    lexer: SyntaxLexer?,\n    activePath: Path?,\n    ...\n)\n```\n\nThe body editor. Wraps a `BasicTextField` and routes every `onValueChange` through `AutoClose`, `Indent.maybeUnindentClosingBrace`, and `Indent.maybeApplyEnter` in order. `onPreviewKeyEvent` intercepts Tab / Shift+Tab / Enter / Backspace / Alt+Up·Down and delegates to `Indent` / `LineMove`\n\nA `TextBuffer` is kept via `remember(value.text)` — the line index is built once and shared by the line-number gutter, status bar, and current-line highlight\n\n`CombinedHighlightTransformation` paints token colors, search-match backgrounds, and bracket-match backgrounds in a single pass (one `VisualTransformation` step keeps `BasicTextField`'s caret mapping intact)\n\n### `FileTreePanel`\n\n```kotlin\n@Composable\nfun FileTreePanel(\n    root: Path?,\n    expanded: Set<Path>,\n    selectedFile: Path?,\n    onToggle: (Path) -> Unit,\n    onOpenFile: (Path) -> Unit,\n    ...\n)\n```\n\nThe left sidebar. Renders `FileTree.listTree(root, expanded)` into a `LazyColumn`. Directories trigger `onToggle`, files trigger `onOpenFile`. When `root == null`, shows a \"Press Ctrl+Shift+O\" hint\n\n### `TabBar`\n\n```kotlin\n@Composable\nfun TabBar(\n    book: TabBook,\n    onActivate: (Int) -> Unit,\n    onClose: (Int) -> Unit,\n    onMove: (Int, Int) -> Unit,\n)\n```\n\nTop tab strip. Dirty tabs show a `●` dot instead of `×`, swapping to `×` on hover. Drag-reorder uses `awaitEachGesture` + `touchSlop` to distinguish a click from a drag — `onMove` only fires after slop is crossed. Wheel scroll is mapped to horizontal scroll\n\n### `LineNumberGutter`\n\n```kotlin\n@Composable\ninternal fun LineNumberGutter(\n    lineCount: Int,\n    currentLine: Int,\n    textStyle: TextStyle,\n)\n```\n\nLeft line-number gutter. `IntrinsicSize.Max` sizes the gutter to the widest number → the gutter doesn't jump around past 1000 lines. Current line uses `onBackground`, others use `onSurfaceVariant`\n\n### `SearchBar`\n\n```kotlin\n@Composable\nfun SearchBar(state: SearchState, ...)\n```\n\nTop search-replace bar. Two-row layout — row 1: query input + match counter (`1 / 12`) + case-sensitive toggle (`Aa`) + prev / next / close chips. Row 2 (replace mode only): replace input + \"바꾸기\" / \"전부 바꾸기\" buttons. Esc closes, Enter advances / replaces\n\nThe `onWindowShortcut(e)` delegate is the load-bearing line. Keys the input doesn't consume are forwarded to the window shortcut handler — global shortcuts like Ctrl+S keep working even while the search bar has focus\n\n### `PreviewPanel`\n\n```kotlin\n@Composable\nfun PreviewPanel(path: Path, kind: FileKind, ...)\n```\n\nImage / SVG preview. `FileKind.IMAGE` decodes via Skia `Image.makeFromEncoded`; `FileKind.SVG` loads via `SVGDOM`. Wheel-scroll zoom, +/− buttons, and label click resets to 100%. First entry uses 70% fit (downscale large images while preserving ratio). PNG / JPG / SVG all share the same `ImageViewer` so zoom / pan behavior stays consistent\n\n### `UnsavedChangesDialog`\n\n```kotlin\n@Composable\ninternal fun UnsavedChangesDialog(\n    fileNames: List<String>,\n    isAppExit: Boolean,\n    onSave / onDiscard / onCancel: () -> Unit,\n)\n```\n\nUnsaved-changes confirmation dialog. An `undecorated` `DialogWindow` with a `WindowDraggableArea` for its custom drag area. Key bindings: `Y` = save, `N` = discard, `Esc` = cancel. Triggered by the main window's `onCloseRequest` — when `book.tabs.any { dirty }`, `pendingClose = PendingClose.App` and the dialog shows\n\n---\n\n## Helpers\n\n### `FileDialogs`\n\n```kotlin\nobject FileDialogs {\n    fun open(parent: Frame): Path?\n    fun saveAs(parent: Frame, suggested: String? = null): Path?\n    fun openDirectory(parent: Frame): Path?\n}\n```\n\nSwing `JFileChooser` wrapper. The simplest way to get an OS-native file dialog out of Compose Desktop. If we ever need true OS-native dialogs (Windows COM, macOS NSOpenPanel), they'll slot in behind the same signatures\n\n### `PendingClose`\n\n```kotlin\ninternal sealed interface PendingClose {\n    data class Tab(val index: Int) : PendingClose\n    data object App : PendingClose\n}\n```\n\nThe kind of `UnsavedChangesDialog` trigger. `Tab(idx)` closes a specific tab; `App` exits the app — the dialog text (\"Save?\" vs \"Discard and exit?\") and the post-save / post-discard branches are decided by the variant\n\n---\n\n## Screen layout\n\n```\nWindow\n├── TitleBar (PAGE · v0.1.0 · active file path)\n└── Row\n    ├── FileTreePanel (sidebar)\n    ├── ResizeHandle (drag to resize sidebar)\n    └── Column\n        ├── TabBar\n        ├── EditorPanel | PreviewPanel  ← branched by active tab's FileKind\n        │   └── (inside EditorPanel) SearchBar + LineNumberGutter + BasicTextField + StatusBar\n        └── (UnsavedChangesDialog lives in a separate DialogWindow)\n```\n\n---\n\n## Planned\n\n| Panel | Module |\n|---|---|\n| Pair chat panel | `page:pair` (LLMProvider adapters) |\n| Atlas code graph | `page:atlas` |\n| Echo timeline | `page:echo` |\n| Git diff / staging | `page:git` |\n| Terminal / build output | `page:runtime` |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n- [Architecture](https://monkshark.github.io/PAGE_IDE/#guides/architecture_en.md)\n","modules/core.md":"# core\n\n> `page/core/` — 공용 도메인 타입과 상수\n\n모듈 간 직접 의존을 차단하기 위한 **공통 베이스**. 다른 모든 모듈은 `page:core` 만 의존하거나 아예 의존하지 않는다 (아키텍처 의존 방향 참조)\n\n> English: [core_en.md](https://monkshark.github.io/PAGE_IDE/#modules/core_en.md)\n\n---\n\n## 의존성\n\n| 종류 | 내용 |\n|---|---|\n| 외부 | 없음 (Kotlin stdlib only) |\n| 내부 | 없음 |\n\nUI / Compose / IO 의존 없음. `core` 가 다른 모듈을 의존하기 시작하면 그 즉시 의존 사이클이 생기므로 절대 금지\n\n---\n\n## `PageIdentity`\n\n```kotlin\nobject PageIdentity {\n    const val NAME = \"PAGE\"\n    const val ACRONYM = \"Pair · Atlas · Glass · Echo\"\n    const val VERSION = \"0.1.0\"\n}\n```\n\n앱 이름·버전·약어. 윈도우 타이틀바 (`page:app` 의 `TitleBar`) 와 About 다이얼로그(예정) 에서 단일 출처로 참조한다. 버전 문자열은 빌드 스크립트가 아니라 코드에 박혀 있다 — 단계적 릴리스 기준은 [Architecture](https://monkshark.github.io/PAGE_IDE/#guides/architecture.md) 참조\n\n---\n\n## 향후 추가 예정\n\n| 타입 | 용도 |\n|---|---|\n| `EventBus` | 모듈 간 단방향 통신 (`editor` ↔ `pair` 직접 의존 회피) |\n| `WorkspaceEvent` / `EditorEvent` 등 | 이벤트 페이로드 sealed 인터페이스 |\n| `Identity<T>` | 모듈 경계용 타입 안전 식별자 래퍼 |\n\n코드가 들어오면 채운다\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n- [아키텍처](https://monkshark.github.io/PAGE_IDE/#guides/architecture.md)\n","modules/core_en.md":"# core\n\n> `page/core/` — shared domain types and constants\n\nA **common base** that breaks direct cross-module dependencies. Every other module depends on `page:core` only, or on nothing at all (see architecture dependency direction)\n\n> 한국어: [core.md](https://monkshark.github.io/PAGE_IDE/#modules/core.md)\n\n---\n\n## Dependencies\n\n| Kind | Content |\n|---|---|\n| External | none (Kotlin stdlib only) |\n| Internal | none |\n\nNo UI / Compose / IO. The moment `core` depends on any other module, a cycle appears — so this rule is hard\n\n---\n\n## `PageIdentity`\n\n```kotlin\nobject PageIdentity {\n    const val NAME = \"PAGE\"\n    const val ACRONYM = \"Pair · Atlas · Glass · Echo\"\n    const val VERSION = \"0.1.0\"\n}\n```\n\nApp name / version / acronym. The window title bar (`TitleBar` in `page:app`) and the (planned) About dialog read from this single source. Version is hard-coded in source rather than fed from the build script — milestone scheme is in [Architecture](https://monkshark.github.io/PAGE_IDE/#guides/architecture_en.md)\n\n---\n\n## Planned\n\n| Type | Purpose |\n|---|---|\n| `EventBus` | One-way cross-module messaging (avoids `editor` ↔ `pair` direct deps) |\n| `WorkspaceEvent` / `EditorEvent` etc. | Event payloads as sealed interfaces |\n| `Identity<T>` | Type-safe identifier wrapper at module boundaries |\n\nFilled in as code lands\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n- [Architecture](https://monkshark.github.io/PAGE_IDE/#guides/architecture_en.md)\n","modules/editor.md":"# editor\r\n\r\n> `page/editor/` — 텍스트 버퍼·편집 동작·신택스 하이라이팅·탭 모델\r\n\r\nUI 프레임워크 의존이 없는 순수 로직 모듈. Compose 위젯과 키 이벤트는 호출자(`page:app`)가 처리하고, 이 모듈은 *무엇을 어떻게 편집하는가* 만 담는다. 모든 동작은 `TextEdit` 입력 → `TextEdit?` 출력으로 단위 테스트만으로 검증 가능\r\n\r\n> English: [editor_en.md](https://monkshark.github.io/PAGE_IDE/#modules/editor_en.md)\r\n\r\n---\r\n\r\n## 의존성\r\n\r\n| 종류 | 내용 |\r\n|---|---|\r\n| 외부 | 없음 (Kotlin stdlib only) |\r\n| 내부 | `page:core` (`Identity` 등 공용 타입) |\r\n\r\nUI / Compose / IO 의존 없음 → 모든 편집 동작 순수 함수로 검증\r\n\r\n---\r\n\r\n## `TextEdit`\r\n\r\n```kotlin\r\ndata class TextEdit(\r\n    val text: String,\r\n    val selectionStart: Int,\r\n    val selectionEnd: Int = selectionStart,\r\n)\r\n```\r\n\r\n대부분 편집 함수의 입출력 타입. `selectionStart == selectionEnd` 면 빈 캐럿, 아니면 선택 범위. anchor / active 가 반전된 역방향 선택도 그대로 표현됨\r\n\r\n---\r\n\r\n## `EditSnapshot`\r\n\r\n```kotlin\r\ndata class EditSnapshot(val text: String, val caret: Int)\r\n```\r\n\r\n`EditHistory` past / future 스택의 원소. undo 한 단계\r\n\r\n---\r\n\r\n## `TextBuffer`\r\n\r\n```kotlin\r\nclass TextBuffer(val text: String) {\r\n    val length: Int\r\n    val lineCount: Int\r\n    fun lineColOf(offset: Int): Pair<Int, Int>\r\n    fun offsetOf(line: Int, col: Int): Int\r\n}\r\n```\r\n\r\n라인 인덱스를 캐시한 텍스트 래퍼. 상태바 Ln/Col 표시와 거터 라인 번호용 좌표 변환 담당. 텍스트 자체는 immutable, 라인 인덱스만 lazy 계산\r\n\r\n---\r\n\r\n## 탭 모델\r\n\r\n### `OpenTab`\r\n\r\n```kotlin\r\ndata class OpenTab(\r\n    val path: Path,\r\n    val text: String,\r\n    val savedText: String = text,\r\n    val caret: Int = 0,\r\n    val history: EditHistory = EditHistory(),\r\n)\r\n```\r\n\r\n한 파일의 편집 상태. `dirty` 는 `text != savedText` 로 파생 → dirty 표시점 / 닫기 확인 다이얼로그 트리거에 사용\r\n\r\n### `TabBook`\r\n\r\n`List<OpenTab>` + 활성 인덱스. immutable, 모든 변경은 새 인스턴스 반환\r\n\r\n| 메서드 | 설명 |\r\n|---|---|\r\n| `openOrFocus(path, text)` | 같은 path 가 이미 열려 있으면 포커스 이동, 아니면 새 탭 |\r\n| `close(index)` / `closeActive()` | 활성 인덱스 보정 포함 |\r\n| `move(from, to)` | 드래그 재배치, 활성 탭 추적 |\r\n| `pushHistoryOnActive(prev)` | 활성 탭의 `EditHistory.pushBeforeChange` 위임 |\r\n| `undoOnActive(curr)` / `redoOnActive(curr)` | 활성 탭 히스토리에서 undo / redo |\r\n| `markActiveSaved()` | 저장 후 dirty 해제 (`savedText = text`) |\r\n| `updateActive(text, caret)` | 편집 결과 반영 |\r\n\r\n활성 인덱스 보정 로직(close, move 등)은 21개 단위 테스트로 검증\r\n\r\n---\r\n\r\n## 편집 동작\r\n\r\n모두 `object` 로 정의된 순수 함수. `TextEdit` → `TextEdit` 또는 `null` (변경 없음)\r\n\r\n### `Indent`\r\n\r\n| 키 | 동작 | 비 마크다운 | 마크다운 펜스 안 |\r\n|---|---|---|---|\r\n| Tab (빈 선택) | 다음 탭 스톱까지 | 4 스페이스 | `\\t` |\r\n| Tab (단일 줄 비어 있지 않은 선택) | 줄 맨 앞 들여쓰기, 선택 보존 | 4 스페이스 | `\\t` |\r\n| Tab (다중 줄 선택) | 각 줄 앞 들여쓰기 | 4 스페이스 | `\\t` |\r\n| Shift+Tab | 한 단위 외감기 | 4 스페이스 / 1 탭 | 동일 |\r\n| Backspace | 들여쓰기 안일 때 한 단위 제거 | — | — |\r\n| Enter | `{` `(` `[` `:` 다음 자동 들여쓰기, `{}` 등 짝 분리 시 새 줄 추가 | — | — |\r\n| `}` `]` `)` 입력 | 줄이 들여쓰기뿐이면 한 단위 외감 후 닫기 | — | — |\r\n\r\n펜스 안 / 밖 분기는 호출자(`page:app` 의 `EditorPanel`)가 [`MarkdownFence.isInsideFence`](#markdownfence) 결과로 결정\r\n\r\n### `AutoClose`\r\n\r\n```kotlin\r\nfun handle(edit: TextEdit, ch: Char): TextEdit?\r\n```\r\n\r\n`(`, `[`, `{`, `\"`, `'` 입력 시 짝 자동 삽입. 선택 범위가 있으면 그 선택을 wrap. 닫는 문자를 그대로 입력한 경우 이미 자동 삽입된 닫는 문자와 겹쳐 한 글자 전진\r\n\r\n### `BracketMatch`\r\n\r\n```kotlin\r\nfun find(text: String, caret: Int): Pair<Int, Int>?\r\n```\r\n\r\n캐럿 옆 괄호와 짝이 되는 위치를 찾아 `(open, close)` 쌍으로 반환. 문자열 / 주석 안 위치는 무시. 호출자가 두 위치에 배경 하이라이트를 그린다\r\n\r\n### `MarkdownFence`\r\n\r\n```kotlin\r\nfun isInsideFence(text: String, caret: Int): Boolean\r\n```\r\n\r\n캐럿이 펜스 (```` ``` ```` / `~~~`) 안인지 판정. 라인 단위 워크 — 들여쓰기 ≤ 3, 백틱·틸드 3개 이상 라인을 펜스 경계로 본다. **펜스 경계 라인 자체는 *바깥*** 으로 친다 (그 줄에서 Tab 은 일반 동작)\r\n\r\n### `LineMove`\r\n\r\n`Alt+Up`, `Alt+Down`, `Alt+Shift+Up`, `Alt+Shift+Down` — 줄 이동 / 복제. 선택 범위가 걸친 모든 줄을 한 덩어리로 옮긴다\r\n\r\n---\r\n\r\n## 검색·치환\r\n\r\n### `SearchState`\r\n\r\n```kotlin\r\ndata class SearchState(\r\n    val query: String = \"\",\r\n    val replace: String = \"\",\r\n    val caseSensitive: Boolean = false,\r\n    val matches: List<IntRange> = emptyList(),\r\n    val activeMatchIndex: Int = -1,\r\n) {\r\n    fun next(): SearchState\r\n    fun prev(): SearchState\r\n    fun recompute(text: String): SearchState\r\n}\r\n```\r\n\r\n`recompute(text)` 는 query 변경 시 전체 매치 다시 계산. `next()` / `prev()` 는 활성 매치 순환\r\n\r\n### `Replace`\r\n\r\n```kotlin\r\nfun replace(text: String, state: SearchState): Pair<String, SearchState>?\r\nfun replaceAll(text: String, state: SearchState): Pair<String, SearchState>\r\n```\r\n\r\n`replace` 는 활성 매치 한 곳만, `replaceAll` 은 일괄 치환 후 활성 인덱스 보정\r\n\r\n---\r\n\r\n## undo / redo\r\n\r\n### `EditHistory`\r\n\r\n```kotlin\r\ndata class EditHistory(\r\n    val past: List<EditSnapshot> = emptyList(),\r\n    val future: List<EditSnapshot> = emptyList(),\r\n) {\r\n    fun pushBeforeChange(prev: EditSnapshot, maxSize: Int = MAX_SIZE): EditHistory\r\n    fun undo(current: EditSnapshot): Pair<EditHistory, EditSnapshot>?\r\n    fun redo(current: EditSnapshot): Pair<EditHistory, EditSnapshot>?\r\n    companion object { const val MAX_SIZE = 1000 }\r\n}\r\n```\r\n\r\nimmutable past / future 스택 — 새 편집은 future 비움, 동일 스냅샷 연속 push 는 collapse, 1000 단계에서 자른다\r\n\r\n**파일별 분리** — `OpenTab` 안에 들어 있어 활성 탭이 바뀌면 히스토리도 자동으로 따라 바뀜. `BasicTextField` 의 내장 undo 는 `Window.onPreviewKeyEvent` 에서 Ctrl+Z / Ctrl+Shift+Z / Ctrl+Y 를 가로채 우회 → 응용 계층이 undo 의 단일 진실원\r\n\r\n> 📎 설계 배경: [개발기 #4](https://monkshark.github.io/p/page-ide-undo-per-file/)\r\n\r\n---\r\n\r\n## 신택스 하이라이팅\r\n\r\n### `SyntaxLexer`\r\n\r\n```kotlin\r\ninterface SyntaxLexer {\r\n    fun tokenize(text: String): List<Token>\r\n}\r\n\r\ndata class Token(val range: IntRange, val kind: TokenKind)\r\n\r\nenum class TokenKind { KEYWORD, STRING, NUMBER, COMMENT, ANNOTATION, TYPE, PUNCT }\r\n```\r\n\r\n언어별 lexer 의 공통 인터페이스. `SyntaxLexers.forPath(path)` 가 확장자로 매핑\r\n\r\n| 확장자 | lexer |\r\n|---|---|\r\n| `.kt`, `.kts` | `KotlinLexer` (`JvmLexer` 위임) |\r\n| `.java` | `JavaLexer` (`JvmLexer` 위임) |\r\n| `.json` | `JsonLexer` |\r\n\r\n장기적으로는 Tree-sitter 로 교체 예정. 첫 단계에서는 정규식·상태기계 조합으로 충분\r\n\r\n---\r\n\r\n## 파일 모델\r\n\r\n> 워크스페이스 영역과 일부 겹치지만 현재는 같은 모듈에 둔다. `page:workspace` 분리 시점에 옮긴다\r\n\r\n| 타입 | 용도 |\r\n|---|---|\r\n| `FileKind` | 텍스트 / 이미지 / SVG / PDF / 기타 |\r\n| `FileDocument` | path, kind, 로드 결과 |\r\n| `FileTree` | 디렉터리 노드 토글 / 펼침 상태 |\r\n\r\n---\r\n\r\n## 테스트 원칙\r\n\r\n모든 편집 동작은 *Compose 없이* 검증. 한 입력(`TextEdit`) → 한 출력(`TextEdit?`) 이라 단언이 좁고 명확하다\r\n\r\n| 영역 | 테스트 수 |\r\n|---|---|\r\n| `Indent` | 53 |\r\n| `MarkdownFence` | 14 |\r\n| `EditHistory` | 8 |\r\n| `TabBook` (활성 인덱스 보정) | 21 |\r\n\r\n```bash\r\n./gradlew :page:editor:test\r\n```\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\r\n- [아키텍처](https://monkshark.github.io/PAGE_IDE/#guides/architecture.md)\r\n","modules/editor_en.md":"# editor\r\n\r\n> `page/editor/` — text buffer, edit operations, syntax highlighting, tab model\r\n\r\nPure-logic module with no UI framework dependency. Compose widgets and key events are handled by the caller (`page:app`); this module only owns *what* gets edited and *how*. Every operation is a pure `TextEdit → TextEdit?` function and is unit-tested as-is\r\n\r\n> 한국어: [editor.md](https://monkshark.github.io/PAGE_IDE/#modules/editor.md)\r\n\r\n---\r\n\r\n## Dependencies\r\n\r\n| Kind | Content |\r\n|---|---|\r\n| External | none (Kotlin stdlib only) |\r\n| Internal | `page:core` (shared types like `Identity`) |\r\n\r\nNo UI / Compose / IO → all edit operations testable as pure functions\r\n\r\n---\r\n\r\n## `TextEdit`\r\n\r\n```kotlin\r\ndata class TextEdit(\r\n    val text: String,\r\n    val selectionStart: Int,\r\n    val selectionEnd: Int = selectionStart,\r\n)\r\n```\r\n\r\nI/O type for most edit functions. Bare caret when `selectionStart == selectionEnd`, otherwise a selection range. Reverse selections (anchor / active swapped) are also representable as-is\r\n\r\n---\r\n\r\n## `EditSnapshot`\r\n\r\n```kotlin\r\ndata class EditSnapshot(val text: String, val caret: Int)\r\n```\r\n\r\nOne element of `EditHistory`'s past / future stacks — a single undo step\r\n\r\n---\r\n\r\n## `TextBuffer`\r\n\r\n```kotlin\r\nclass TextBuffer(val text: String) {\r\n    val length: Int\r\n    val lineCount: Int\r\n    fun lineColOf(offset: Int): Pair<Int, Int>\r\n    fun offsetOf(line: Int, col: Int): Int\r\n}\r\n```\r\n\r\nText wrapper with a cached line index. Powers status bar Ln/Col and line-number gutter coordinate conversions. Text itself is immutable; only the line index is computed lazily\r\n\r\n---\r\n\r\n## Tab model\r\n\r\n### `OpenTab`\r\n\r\n```kotlin\r\ndata class OpenTab(\r\n    val path: Path,\r\n    val text: String,\r\n    val savedText: String = text,\r\n    val caret: Int = 0,\r\n    val history: EditHistory = EditHistory(),\r\n)\r\n```\r\n\r\nEdit state for one file. `dirty` is derived as `text != savedText` → drives the dirty dot and the close-confirmation dialog\r\n\r\n### `TabBook`\r\n\r\n`List<OpenTab>` plus an active index. Immutable — every mutation returns a new instance\r\n\r\n| Method | Behavior |\r\n|---|---|\r\n| `openOrFocus(path, text)` | Focus the existing tab if `path` is already open, otherwise append a new tab |\r\n| `close(index)` / `closeActive()` | Adjusts active index correctly |\r\n| `move(from, to)` | Drag-reorder, tracks active tab |\r\n| `pushHistoryOnActive(prev)` | Delegates to active tab's `EditHistory.pushBeforeChange` |\r\n| `undoOnActive(curr)` / `redoOnActive(curr)` | Undo / redo on active tab's history |\r\n| `markActiveSaved()` | Clears dirty after a save (`savedText = text`) |\r\n| `updateActive(text, caret)` | Apply edit result |\r\n\r\nThe active-index correction logic (close, move, etc.) is verified by 21 unit tests\r\n\r\n---\r\n\r\n## Edit operations\r\n\r\nAll defined as `object` with pure functions. `TextEdit` → `TextEdit` or `null` (no-op)\r\n\r\n### `Indent`\r\n\r\n| Key | Behavior | Non-Markdown | Inside Markdown fence |\r\n|---|---|---|---|\r\n| Tab (empty selection) | Up to next tab stop | 4 spaces | `\\t` |\r\n| Tab (single-line non-empty selection) | Indent at line start, preserve selection | 4 spaces | `\\t` |\r\n| Tab (multi-line selection) | Indent each line | 4 spaces | `\\t` |\r\n| Shift+Tab | Outdent one unit | 4 spaces / 1 tab | same |\r\n| Backspace | Remove one unit when caret is in indent | — | — |\r\n| Enter | Auto-indent after `{` `(` `[` `:`; pair-split (`{}` etc.) opens a new line | — | — |\r\n| `}` `]` `)` typed | Outdent one unit if line is whitespace-only before | — | — |\r\n\r\nThe fence-vs-prose branch is decided by the caller (`page:app`'s `EditorPanel`) using [`MarkdownFence.isInsideFence`](#markdownfence)\r\n\r\n### `AutoClose`\r\n\r\n```kotlin\r\nfun handle(edit: TextEdit, ch: Char): TextEdit?\r\n```\r\n\r\nAuto-inserts the matching closer on `(`, `[`, `{`, `\"`, `'`. Wraps the selection if a selection exists. Typing the closer over an auto-inserted closer collapses to a single forward step\r\n\r\n### `BracketMatch`\r\n\r\n```kotlin\r\nfun find(text: String, caret: Int): Pair<Int, Int>?\r\n```\r\n\r\nLocates the matching bracket next to the caret. Returns an `(open, close)` index pair. Positions inside strings or comments are ignored. The caller draws the highlight at both indices\r\n\r\n### `MarkdownFence`\r\n\r\n```kotlin\r\nfun isInsideFence(text: String, caret: Int): Boolean\r\n```\r\n\r\nTells whether the caret is inside a fenced code block (```` ``` ```` / `~~~`). Line-by-line walk — leading spaces ≤ 3, three or more backticks/tildes opens or closes a fence. **The fence-delimiter line itself counts as *outside*** (Tab on that line uses the prose path)\r\n\r\n### `LineMove`\r\n\r\n`Alt+Up`, `Alt+Down`, `Alt+Shift+Up`, `Alt+Shift+Down` — line move / duplicate. All lines covered by a selection are moved as one block\r\n\r\n---\r\n\r\n## Search & replace\r\n\r\n### `SearchState`\r\n\r\n```kotlin\r\ndata class SearchState(\r\n    val query: String = \"\",\r\n    val replace: String = \"\",\r\n    val caseSensitive: Boolean = false,\r\n    val matches: List<IntRange> = emptyList(),\r\n    val activeMatchIndex: Int = -1,\r\n) {\r\n    fun next(): SearchState\r\n    fun prev(): SearchState\r\n    fun recompute(text: String): SearchState\r\n}\r\n```\r\n\r\n`recompute(text)` rebuilds the full match list when query changes. `next()` / `prev()` cycle the active match\r\n\r\n### `Replace`\r\n\r\n```kotlin\r\nfun replace(text: String, state: SearchState): Pair<String, SearchState>?\r\nfun replaceAll(text: String, state: SearchState): Pair<String, SearchState>\r\n```\r\n\r\n`replace` swaps only the active match; `replaceAll` does a bulk swap and re-pins the active index\r\n\r\n---\r\n\r\n## Undo / redo\r\n\r\n### `EditHistory`\r\n\r\n```kotlin\r\ndata class EditHistory(\r\n    val past: List<EditSnapshot> = emptyList(),\r\n    val future: List<EditSnapshot> = emptyList(),\r\n) {\r\n    fun pushBeforeChange(prev: EditSnapshot, maxSize: Int = MAX_SIZE): EditHistory\r\n    fun undo(current: EditSnapshot): Pair<EditHistory, EditSnapshot>?\r\n    fun redo(current: EditSnapshot): Pair<EditHistory, EditSnapshot>?\r\n    companion object { const val MAX_SIZE = 1000 }\r\n}\r\n```\r\n\r\nImmutable past / future stacks — a new edit clears `future`, consecutive identical pushes collapse, capped at 1000 steps\r\n\r\n**Per-file** — lives on `OpenTab`, so swapping the active tab swaps the history automatically. `BasicTextField`'s built-in undo is bypassed by intercepting Ctrl+Z / Ctrl+Shift+Z / Ctrl+Y at `Window.onPreviewKeyEvent` → the application layer becomes the single source of truth\r\n\r\n> 📎 Design notes: [devlog #4](https://monkshark.github.io/p/page-ide-undo-per-file/)\r\n\r\n---\r\n\r\n## Syntax highlighting\r\n\r\n### `SyntaxLexer`\r\n\r\n```kotlin\r\ninterface SyntaxLexer {\r\n    fun tokenize(text: String): List<Token>\r\n}\r\n\r\ndata class Token(val range: IntRange, val kind: TokenKind)\r\n\r\nenum class TokenKind { KEYWORD, STRING, NUMBER, COMMENT, ANNOTATION, TYPE, PUNCT }\r\n```\r\n\r\nCommon interface for language-specific lexers. `SyntaxLexers.forPath(path)` maps by extension\r\n\r\n| Extension | lexer |\r\n|---|---|\r\n| `.kt`, `.kts` | `KotlinLexer` (delegates to `JvmLexer`) |\r\n| `.java` | `JavaLexer` (delegates to `JvmLexer`) |\r\n| `.json` | `JsonLexer` |\r\n\r\nLong-term we plan to switch to Tree-sitter; for the first stage a regex / state-machine combo is fast and simple enough\r\n\r\n---\r\n\r\n## File model\r\n\r\n> Overlaps the workspace area, but for now lives in this module. Will move once `page:workspace` is split out\r\n\r\n| Type | Purpose |\r\n|---|---|\r\n| `FileKind` | text / image / SVG / PDF / other |\r\n| `FileDocument` | path, kind, load result |\r\n| `FileTree` | directory node toggle / expansion state |\r\n\r\n---\r\n\r\n## Testing principle\r\n\r\nEvery edit operation is verified *without Compose*. One input (`TextEdit`) → one output (`TextEdit?`) keeps assertions tight and clear\r\n\r\n| Area | Test count |\r\n|---|---|\r\n| `Indent` | 53 |\r\n| `MarkdownFence` | 14 |\r\n| `EditHistory` | 8 |\r\n| `TabBook` (active-index correction) | 21 |\r\n\r\n```bash\r\n./gradlew :page:editor:test\r\n```\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\r\n- [Architecture](https://monkshark.github.io/PAGE_IDE/#guides/architecture_en.md)\r\n","modules/ui.md":"# ui\n\n> `page/ui/` — Glass 디자인 토큰, 폰트, 신택스 팔레트\n\nPAGE 의 시각 베이스. 색·폰트·하이라이팅 색상을 한 곳에서 관리해 모든 패널·다이얼로그가 같은 톤을 공유하도록 만든다. 화면을 그리는 Composable 자체는 `page:app` 에 있고, 이 모듈은 *값* 만 제공\n\n> English: [ui_en.md](https://monkshark.github.io/PAGE_IDE/#modules/ui_en.md)\n\n---\n\n## 의존성\n\n| 종류 | 내용 |\n|---|---|\n| 외부 | Compose Material3, Compose Foundation |\n| 내부 | 없음 |\n\n`page:core` 도 의존하지 않음 — 토큰만 다루는 모듈이라 도메인 타입이 들어올 일이 없다\n\n---\n\n## `GlassTheme`\n\n```kotlin\n@Composable\nfun GlassTheme(content: @Composable () -> Unit)\n```\n\nMaterial3 다크 컬러 스킴을 PAGE 톤으로 덮어 적용하는 래퍼. 메인 윈도우와 다이얼로그(`UnsavedChangesDialog`) 모두 이걸로 감싼다\n\n### 컬러 팔레트\n\n| 토큰 | hex | 용도 |\n|---|---|---|\n| `primary` | `#8AB4FF` | 캐럿, 활성 매치, 토글 칩 |\n| `onPrimary` | `#0A1126` | primary 위 텍스트 |\n| `secondary` | `#B8C5E0` | 보조 텍스트 / 강조 |\n| `background` | `#0D1117` | 에디터 본문 배경 |\n| `onBackground` | `#E6EDF3` | 본문 텍스트 |\n| `surface` | `#161B22` | 타이틀바, 탭바, 상태바, 검색바 |\n| `onSurface` | `#E6EDF3` | surface 위 텍스트 |\n| `surfaceVariant` | `#1C2128` | 사이드바 (파일 트리) |\n| `onSurfaceVariant` | `#8B949E` | 보조 라벨, 라인 번호 거터 |\n| `outline` | `#30363D` | 리사이즈 핸들 안내선 |\n\nGitHub Dark 와 비슷한 명도 — 코드 색을 가리지 않으면서도 IDE 톤을 유지한다\n\n---\n\n## `EditorFontFamily`\n\n```kotlin\nval EditorFontFamily: FontFamily\n```\n\n에디터 본문 / 라인 번호 거터에 쓰이는 모노스페이스 폰트. `fonts/D2Coding.ttf` 가 리소스에 있으면 그걸 쓰고, 없으면 `FontFamily.Monospace` 로 폴백 — 폰트 누락이 빌드 에러로 이어지지 않는다\n\n---\n\n## `SyntaxPalette`\n\n```kotlin\ndata class SyntaxPalette(\n    val keyword: Color,\n    val string: Color,\n    val number: Color,\n    val comment: Color,\n    val annotation: Color,\n    val type: Color,\n)\n\nval GlassDarkSyntax: SyntaxPalette\n```\n\n`page:editor` 의 `TokenKind` 와 1:1 매핑되는 색 묶음. `EditorPanel` 의 `CombinedHighlightTransformation` 이 이 팔레트를 받아 토큰별 색을 입힌다\n\n| 토큰 | hex | 비고 |\n|---|---|---|\n| keyword | `#FF7B72` | `class`, `fun`, `val` 등 |\n| string | `#A5D6FF` | 문자열 리터럴 |\n| number | `#79C0FF` | 정수·실수 리터럴 |\n| comment | `#8B949E` | 라인·블록 주석 (회색 톤으로 시야에서 빠지게) |\n| annotation | `#D2A8FF` | `@Override`, `@Composable` 등 |\n| type | `#FFA657` | 타입 식별자 (대문자로 시작) |\n\n`PUNCT` 는 색을 입히지 않고 본문 색 그대로 — 기호가 너무 많아 색이 들어가면 가독성이 오히려 떨어진다\n\n---\n\n## 향후 추가 예정\n\n| 토큰 | 용도 |\n|---|---|\n| `GlassLight` | 라이트 테마 컬러 스킴 (Glass 가치: 사용자 환경 존중) |\n| `GlassLightSyntax` | 라이트 테마용 신택스 팔레트 |\n| `Spacing` / `Radius` | 간격·라운드 토큰 (현재 패널마다 `dp` 직박이) |\n| `Typography` | Material3 `Typography` 오버라이드 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n- [아키텍처](https://monkshark.github.io/PAGE_IDE/#guides/architecture.md)\n","modules/ui_en.md":"# ui\n\n> `page/ui/` — Glass design tokens, fonts, syntax palette\n\nPAGE's visual base. Colors, fonts, and highlighting are centralized so every panel and dialog shares the same tone. The Composables that draw the screens live in `page:app`; this module only provides *values*\n\n> 한국어: [ui.md](https://monkshark.github.io/PAGE_IDE/#modules/ui.md)\n\n---\n\n## Dependencies\n\n| Kind | Content |\n|---|---|\n| External | Compose Material3, Compose Foundation |\n| Internal | none |\n\nDoesn't even depend on `page:core` — token-only, no domain types ever land here\n\n---\n\n## `GlassTheme`\n\n```kotlin\n@Composable\nfun GlassTheme(content: @Composable () -> Unit)\n```\n\nWrapper that applies a Material3 dark color scheme overridden with PAGE's tone. Both the main window and dialogs (`UnsavedChangesDialog`) wrap their content with this\n\n### Color palette\n\n| Token | Hex | Purpose |\n|---|---|---|\n| `primary` | `#8AB4FF` | Caret, active match, toggle chips |\n| `onPrimary` | `#0A1126` | Text on primary |\n| `secondary` | `#B8C5E0` | Secondary text / emphasis |\n| `background` | `#0D1117` | Editor canvas |\n| `onBackground` | `#E6EDF3` | Body text |\n| `surface` | `#161B22` | Title bar, tab bar, status bar, search bar |\n| `onSurface` | `#E6EDF3` | Text on surface |\n| `surfaceVariant` | `#1C2128` | Sidebar (file tree) |\n| `onSurfaceVariant` | `#8B949E` | Secondary labels, line-number gutter |\n| `outline` | `#30363D` | Resize-handle guide line |\n\nBrightness sits close to GitHub Dark — bright enough to stay readable without drowning out code colors\n\n---\n\n## `EditorFontFamily`\n\n```kotlin\nval EditorFontFamily: FontFamily\n```\n\nMonospace font used by the editor body and the line-number gutter. Uses `fonts/D2Coding.ttf` if present in resources, else falls back to `FontFamily.Monospace` — a missing font does not break the build\n\n---\n\n## `SyntaxPalette`\n\n```kotlin\ndata class SyntaxPalette(\n    val keyword: Color,\n    val string: Color,\n    val number: Color,\n    val comment: Color,\n    val annotation: Color,\n    val type: Color,\n)\n\nval GlassDarkSyntax: SyntaxPalette\n```\n\nColor bundle that maps 1:1 to `page:editor`'s `TokenKind`. `EditorPanel`'s `CombinedHighlightTransformation` consumes this palette to color tokens\n\n| Token | Hex | Note |\n|---|---|---|\n| keyword | `#FF7B72` | `class`, `fun`, `val`, etc. |\n| string | `#A5D6FF` | String literals |\n| number | `#79C0FF` | Numeric literals |\n| comment | `#8B949E` | Line / block comments (gray so they recede) |\n| annotation | `#D2A8FF` | `@Override`, `@Composable`, etc. |\n| type | `#FFA657` | Type identifiers (capitalized) |\n\n`PUNCT` is intentionally left uncolored — punctuation is too dense, and coloring it actually hurts readability\n\n---\n\n## Planned\n\n| Token | Purpose |\n|---|---|\n| `GlassLight` | Light-theme color scheme (Glass value: respect the user's environment) |\n| `GlassLightSyntax` | Light-theme syntax palette |\n| `Spacing` / `Radius` | Spacing / corner-radius tokens (currently `dp` literals scattered across panels) |\n| `Typography` | Material3 `Typography` override |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n- [Architecture](https://monkshark.github.io/PAGE_IDE/#guides/architecture_en.md)\n","README.md":"# PAGE IDE Docs\r\n\r\n> English: [README_en.md](https://monkshark.github.io/PAGE_IDE/#README_en.md)\r\n\r\n> 다언어 데스크톱 IDE — Pair · Atlas · Glass · Echo\r\n\r\nPAGE IDE의 공개 문서 진입점. 이 페이지는 목차 역할만 한다. 실제 내용은 각 항목을 따라간다.\r\n\r\n뷰어는 `node build_viewer.js`로 `index.html`을 빌드한 뒤, 별도 서버 없이 브라우저에서 바로 열 수 있다.\r\n\r\n---\r\n\r\n## 목차\r\n\r\n### 가이드\r\n- [PAGE 개요](https://monkshark.github.io/PAGE_IDE/#guides/overview.md) — 핵심 가치 네 가지 (Pair · Atlas · Glass · Echo)와 만들지 않을 것\r\n- [아키텍처](https://monkshark.github.io/PAGE_IDE/#guides/architecture.md) — 모듈 구조와 의존 방향, 기술 스택 결정\r\n\r\n### 모듈\r\n- [core](https://monkshark.github.io/PAGE_IDE/#modules/core.md) — 공용 도메인 타입과 상수 (`PageIdentity`)\r\n- [editor](https://monkshark.github.io/PAGE_IDE/#modules/editor.md) — 텍스트 버퍼, 편집 동작, 신택스 하이라이팅, 탭 모델 (UI 의존 없는 순수 로직)\r\n- [ui](https://monkshark.github.io/PAGE_IDE/#modules/ui.md) — Glass 디자인 토큰, 폰트, 신택스 팔레트\r\n- [app](https://monkshark.github.io/PAGE_IDE/#modules/app.md) — 조립 계층 / 진입점, Compose 패널, 단축키, 다이얼로그\r\n\r\n> `pair`, `atlas`, `echo`, `language`, `runtime`, `git`, `workspace` 모듈은 단계별로 추가된다.\r\n\r\n### 기능\r\n> Pair / Atlas / Glass / Echo 기능 문서는 각 단계가 끝날 때 추가된다.\r\n\r\n---\r\n\r\n## 외부 링크\r\n\r\n- GitHub: <https://github.com/Monkshark/PAGE_IDE>\r\n- 개발기 시리즈: <https://monkshark.github.io/categories/page-개발기/>\r\n","README_en.md":"# PAGE IDE Docs\r\n\r\n> 한국어: [README.md](https://monkshark.github.io/PAGE_IDE/#README.md)\r\n\r\n> Multi-language desktop IDE — Pair · Atlas · Glass · Echo\r\n\r\nPublic documentation entry point for PAGE IDE. This page only serves as a table of contents. Each item below links to the actual content.\r\n\r\nBuild the viewer with `node build_viewer.js` to produce `index.html`, which opens in a browser with no server required.\r\n\r\n---\r\n\r\n## Table of contents\r\n\r\n### Guides\r\n- [PAGE overview](https://monkshark.github.io/PAGE_IDE/#guides/overview_en.md) — The four core values (Pair · Atlas · Glass · Echo) and what we will not build\r\n- [Architecture](https://monkshark.github.io/PAGE_IDE/#guides/architecture_en.md) — Module structure, dependency direction, and stack choices\r\n\r\n### Modules\r\n- [core](https://monkshark.github.io/PAGE_IDE/#modules/core_en.md) — Shared domain types and constants (`PageIdentity`)\r\n- [editor](https://monkshark.github.io/PAGE_IDE/#modules/editor_en.md) — Text buffer, edit operations, syntax highlighting, tab model (pure logic, no UI dependency)\r\n- [ui](https://monkshark.github.io/PAGE_IDE/#modules/ui_en.md) — Glass design tokens, fonts, syntax palette\r\n- [app](https://monkshark.github.io/PAGE_IDE/#modules/app_en.md) — Composition layer / entry point, Compose panels, shortcuts, dialogs\r\n\r\n> `pair`, `atlas`, `echo`, `language`, `runtime`, `git`, `workspace` modules will be added in their respective milestones.\r\n\r\n### Features\r\n> Pair / Atlas / Glass / Echo feature docs will be added at the close of each milestone.\r\n\r\n---\r\n\r\n## External links\r\n\r\n- GitHub: <https://github.com/Monkshark/PAGE_IDE>\r\n- Devlog series (Korean): <https://monkshark.github.io/categories/page-개발기/>\r\n"};

var FILES = [
  { titleKo:'개요', titleEn:'Overview', items:[
    {nameKo:'README (목차)',         nameEn:'README (index)',         pathKo:'README.md',                   pathEn:'README_en.md'}
  ]},
  { titleKo:'가이드', titleEn:'Guides', items:[
    {nameKo:'PAGE 개요',             nameEn:'PAGE overview',          pathKo:'guides/overview.md',          pathEn:'guides/overview_en.md'},
    {nameKo:'아키텍처',              nameEn:'Architecture',           pathKo:'guides/architecture.md',      pathEn:'guides/architecture_en.md'}
  ]}
];

(function(){
  try {
    if(globalThis.markedHighlight && globalThis.hljs){
      marked.use(globalThis.markedHighlight.markedHighlight({
        langPrefix:'hljs language-',
        highlight:function(code,lang){
          try{
            if(lang === 'mermaid') return code;
            if(lang && hljs.getLanguage(lang)) return hljs.highlight(code,{language:lang}).value;
            return hljs.highlightAuto(code).value;
          }catch(e){return code;}
        }
      }));
    }
  }catch(e){ console.warn('Highlight init skipped:', e); }
  marked.use({breaks:false,gfm:true});
  function slugify(text){
    return text.toLowerCase()
      .replace(/<[^>]*>/g,'')
      .replace(/[^\w㄰-㆏가-힯一-鿿 -]/g,'')
      .replace(/ /g,'-')
      .replace(/-+$/,'');
  }
  marked.use({renderer:{code:function(code, lang){
    var raw, language;
    if(typeof code === 'object' && code !== null){
      raw = code.text || '';
      language = (code.lang || '').trim();
    } else {
      raw = code || '';
      language = (lang || '').trim();
    }
    if(language === 'mermaid'){
      var esc = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return '<pre class="mermaid">' + esc + '</pre>';
    }
    return false;
  }}});
  try {
    if(globalThis.mermaid){
      var storedTheme = (localStorage.getItem('docsViewerTheme') === 'light') ? 'default' : 'dark';
      mermaid.initialize({startOnLoad:false, theme: storedTheme, securityLevel:'loose'});
    }
  } catch(e){ console.warn('Mermaid init skipped:', e); }

  var LANG_KEY = 'docsViewerLang';
  function getLang(){ return localStorage.getItem(LANG_KEY) === 'en' ? 'en' : 'ko'; }
  function setLang(l){ localStorage.setItem(LANG_KEY, l === 'en' ? 'en' : 'ko'); }

  var PATH_INDEX = {};
  var PAIR = {};
  FILES.forEach(function(g){
    g.items.forEach(function(it){
      PATH_INDEX[it.pathKo] = { group:g, item:it, lang:'ko' };
      if(it.pathEn){
        PATH_INDEX[it.pathEn] = { group:g, item:it, lang:'en' };
        PAIR[it.pathKo] = it.pathEn;
        PAIR[it.pathEn] = it.pathKo;
      }
    });
  });

  function pathForItem(item, lang){
    if(lang === 'en' && item.pathEn) return item.pathEn;
    return item.pathKo;
  }
  function nameForItem(item, lang){
    return (lang === 'en' && item.nameEn) ? item.nameEn : item.nameKo;
  }
  function titleForGroup(g, lang){
    return (lang === 'en' && g.titleEn) ? g.titleEn : g.titleKo;
  }

  var navList = document.getElementById('navList');
  var allItems = [];

  function renderNav(lang){
    navList.innerHTML = '';
    allItems = [];
    FILES.forEach(function(g){
      var gEl = document.createElement('div');
      gEl.className = 'nav-group';
      var titleEl = document.createElement('div');
      titleEl.className = 'nav-group-title';
      titleEl.textContent = titleForGroup(g, lang);
      gEl.appendChild(titleEl);
      g.items.forEach(function(it){
        var a = document.createElement('a');
        a.className = 'nav-item';
        a.textContent = nameForItem(it, lang);
        a.dataset.path = pathForItem(it, lang);
        a.onclick = function(){ loadFile(a.dataset.path); };
        gEl.appendChild(a);
        allItems.push({el:a, item:it, group:g});
      });
      navList.appendChild(gEl);
    });
  }

  function applyLang(lang, opts){
    opts = opts || {};
    setLang(lang);
    document.documentElement.lang = lang;
    document.getElementById('langKo').classList.toggle('active', lang === 'ko');
    document.getElementById('langEn').classList.toggle('active', lang === 'en');
    document.getElementById('search').placeholder = (lang === 'en') ? 'Search... (Ctrl+K)' : '검색... (Ctrl+K)';
    document.getElementById('sidebarTitle').textContent = (lang === 'en') ? 'PAGE IDE Docs' : 'PAGE IDE Docs';
    renderNav(lang);

    if(!opts.skipContentSwap){
      var cur = currentPath();
      if(cur){
        var info = PATH_INDEX[cur];
        if(info){
          var newPath = pathForItem(info.item, lang);
          if(newPath !== cur){
            loadFile(newPath, { replaceHistory:true });
            return;
          }
        }
      }
    }
    var cur2 = currentPath();
    highlightActive(cur2);
    applySearchFilter();
  }

  function highlightActive(p){
    allItems.forEach(function(i){
      i.el.classList.toggle('active', i.el.dataset.path === p);
    });
  }

  function applySearchFilter(){
    var q = (document.getElementById('search').value || '').toLowerCase().trim();
    allItems.forEach(function(i){
      var hay = (i.item.nameKo + ' ' + (i.item.nameEn||'') + ' ' + i.item.pathKo + ' ' + (i.item.pathEn||'')).toLowerCase();
      i.el.style.display = (!q || hay.indexOf(q) !== -1) ? '' : 'none';
    });
    navList.querySelectorAll('.nav-group').forEach(function(g){
      var vis = Array.from(g.querySelectorAll('.nav-item')).some(function(i){ return i.style.display !== 'none'; });
      g.style.display = vis ? '' : 'none';
    });
  }
  document.getElementById('search').addEventListener('input', applySearchFilter);

  var history = [];
  var historyIndex = -1;
  var navigating = false;

  function currentPath(){
    return historyIndex >= 0 ? history[historyIndex] : null;
  }

  function loadFile(p, opts){
    opts = opts || {};
    var text = MD_DATA[p];
    var inner = document.getElementById('contentInner');
    if(!text){
      inner.innerHTML = '<div class="welcome"><h2>문서를 찾을 수 없습니다</h2><p>' + p + '</p></div>';
      return;
    }

    highlightActive(p);

    if(!opts.fromPopState && !opts.replaceHistory){
      history = history.slice(0, historyIndex + 1);
      history.push(p);
      historyIndex = history.length - 1;
    } else if(opts.replaceHistory){
      if(historyIndex < 0){ history.push(p); historyIndex = 0; }
      else history[historyIndex] = p;
    }

    var html = marked.parse(text);
    var dir = p.indexOf('/') !== -1 ? p.substring(0, p.lastIndexOf('/')) : '';
    var fileName = p.split('/').pop();

    var canBack = historyIndex > 0;
    var canFwd = historyIndex < history.length - 1;
    var lang = getLang();
    var backLabel = (lang === 'en') ? 'Back' : '뒤로';
    var fwdLabel = (lang === 'en') ? 'Forward' : '앞으로';
    var rootPath = (lang === 'en' && MD_DATA['README_en.md']) ? 'README_en.md' : 'README.md';

    var navHtml = '<div class="breadcrumb"><span class="nav-btns">'
      + '<button class="nav-btn" onclick="window._goBack()" ' + (canBack ? '' : 'disabled') + ' title="' + backLabel + '">&#8592;</button>'
      + '<button class="nav-btn" onclick="window._goForward()" ' + (canFwd ? '' : 'disabled') + ' title="' + fwdLabel + '">&#8594;</button>'
      + '</span>'
      + '<a href="#" onclick="window._loadFile(\'' + rootPath + '\');return false">docs</a> / '
      + (dir ? dir + ' / ' : '')
      + '<strong>' + fileName + '</strong></div>';

    inner.innerHTML = navHtml + '<div class="md">' + html + '</div>';

    inner.querySelectorAll('.md h1, .md h2, .md h3, .md h4, .md h5, .md h6').forEach(function(h){
      if(!h.id) h.id = slugify(h.textContent);
    });

    inner.querySelectorAll('.md a[href]').forEach(function(a){
      var href = a.getAttribute('href');
      if(!href || href.indexOf('http') === 0) return;
      var hashOnly = href.charAt(0) === '#';
      if(hashOnly){
        a.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          var id = decodeURIComponent(href.substring(1));
          var target = document.getElementById(id);
          if(target){ target.scrollIntoView({behavior:'smooth',block:'start'}); }
        });
        return;
      }
      var hashTarget = '';
      var hashIdx = href.indexOf('#');
      if(hashIdx !== -1){ hashTarget = decodeURIComponent(href.substring(hashIdx + 1)); href = href.substring(0, hashIdx); }
      if(!href.endsWith('.md')) return;

      if(href.indexOf('./') === 0) href = href.substring(2);

      var resolved;
      if(href.indexOf('../') === 0){
        var parts = dir ? dir.split('/') : [];
        var h = href;
        while(h.indexOf('../') === 0){ parts.pop(); h = h.substring(3); }
        resolved = (parts.length ? parts.join('/') + '/' : '') + h;
      } else if(href.indexOf('/') === 0){
        resolved = href.substring(1);
      } else {
        resolved = dir ? dir + '/' + href : href;
      }
      if(MD_DATA[resolved]){
        a.onclick = function(e){ e.preventDefault(); loadFile(resolved, hashTarget ? {scrollTo: hashTarget} : undefined); };
      } else {
        a.onclick = function(e){ e.preventDefault(); console.warn('Doc not found in viewer:', resolved); };
      }
    });

    try {
      if(globalThis.mermaid){
        var nodes = inner.querySelectorAll('pre.mermaid');
        nodes.forEach(function(n){ if(!n.dataset.mermaidSrc) n.dataset.mermaidSrc = n.textContent; });
        if(nodes.length) mermaid.run({nodes:nodes});
      }
    } catch(e){ console.warn('Mermaid run failed:', e); }

    inner.querySelectorAll('.md img[src]').forEach(function(img){
      var src = img.getAttribute('src');
      if(!src) return;
      if(/^(https?:)?\/\//.test(src) || src.indexOf('data:') === 0) return;
      if(src.indexOf('./') === 0) src = src.substring(2);
      var baseParts = ['docs'];
      if(dir) baseParts = baseParts.concat(dir.split('/'));
      var s = src;
      if(s.indexOf('/') === 0){
        baseParts = ['docs'];
        s = s.substring(1);
      } else {
        while(s.indexOf('../') === 0){ baseParts.pop(); s = s.substring(3); }
      }
      var resolved = baseParts.concat(s ? [s] : []).join('/');
      if(resolved.indexOf('docs/') === 0){
        img.setAttribute('src', resolved.substring(5));
      } else {
        img.setAttribute('src', 'https://raw.githubusercontent.com/Monkshark/PAGE_IDE/main/' + resolved);
      }
    });

    inner.querySelectorAll('.md pre').forEach(function(pre){
      if(pre.classList.contains('mermaid')) return;
      var code = pre.querySelector('code');
      if(!code) return;
      var lang = '';
      (code.className || '').split(/\s+/).forEach(function(c){
        if(c.indexOf('language-') === 0) lang = c.substring(9);
      });
      if(lang){
        var badge = document.createElement('span');
        badge.className = 'code-lang';
        badge.textContent = lang;
        pre.appendChild(badge);
      }
      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.type = 'button';
      btn.textContent = 'Copy';
      btn.onclick = function(){
        var text = code.textContent || '';
        var done = function(){
          btn.textContent = 'Copied';
          btn.classList.add('ok');
          setTimeout(function(){ btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 1200);
        };
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(text).then(done).catch(function(){});
        } else {
          var ta = document.createElement('textarea');
          ta.value = text; document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); done(); } catch(e){}
          document.body.removeChild(ta);
        }
      };
      pre.appendChild(btn);
    });

    var scrollTarget = opts.scrollTo || null;
    if(scrollTarget){
      var el = inner.querySelector('#' + CSS.escape(scrollTarget));
      if(!el){
        var headings = inner.querySelectorAll('.md h1, .md h2, .md h3, .md h4, .md h5, .md h6');
        for(var i = 0; i < headings.length; i++){
          if(headings[i].id && headings[i].id.indexOf(scrollTarget) === 0){
            el = headings[i];
            break;
          }
        }
      }
      if(el){
        el.scrollIntoView({behavior:'auto', block:'start'});
      } else {
        document.getElementById('content').scrollTop = 0;
      }
    } else {
      document.getElementById('content').scrollTop = 0;
    }
    closeSidebar();
    if(!opts.fromPopState){
      var hashPart = '#' + p + (scrollTarget ? '#' + scrollTarget : '');
      window.history.pushState({path:p, scrollTo: scrollTarget}, '', hashPart);
    }
  }

  window._goBack = function(){
    if(historyIndex > 0){
      historyIndex--;
      var p = history[historyIndex];
      loadFile(p, {fromPopState:true});
      window.history.pushState({path:p}, '', '#' + p);
    }
  };
  window._goForward = function(){
    if(historyIndex < history.length - 1){
      historyIndex++;
      var p = history[historyIndex];
      loadFile(p, {fromPopState:true});
      window.history.pushState({path:p}, '', '#' + p);
    }
  };
  window._loadFile = function(p){ loadFile(p); };

  function parseHash(raw){
    if(!raw) return {path:null, scrollTo:null};
    var s = raw.charAt(0) === '#' ? raw.slice(1) : raw;
    if(!s) return {path:null, scrollTo:null};
    var mdIdx = s.indexOf('.md');
    if(mdIdx !== -1){
      var path = s.substring(0, mdIdx + 3);
      var rest = s.substring(mdIdx + 3);
      var scrollTo = (rest.charAt(0) === '#') ? decodeURIComponent(rest.substring(1)) : null;
      return {path: path, scrollTo: scrollTo};
    }
    return {path: s, scrollTo: null};
  }

  window.addEventListener('popstate', function(e){
    if(navigating) return;
    var stateP = e.state && e.state.path;
    var stateScroll = e.state && e.state.scrollTo;
    var p, scrollTo;
    if(stateP){ p = stateP; scrollTo = stateScroll || null; }
    else {
      var parsed = parseHash(location.hash);
      p = parsed.path || initialDefaultPath();
      scrollTo = parsed.scrollTo;
    }
    if(MD_DATA[p]){
      navigating = true;
      var idx = history.lastIndexOf(p);
      if(idx !== -1) historyIndex = idx;
      loadFile(p, {fromPopState:true, scrollTo: scrollTo});
      navigating = false;
    }
  });

  document.addEventListener('keydown', function(e){
    if((e.ctrlKey || e.metaKey) && e.key === 'k'){ e.preventDefault(); document.getElementById('search').focus(); }
    if(e.altKey && e.key === 'ArrowLeft'){ e.preventDefault(); window._goBack(); }
    if(e.altKey && e.key === 'ArrowRight'){ e.preventDefault(); window._goForward(); }
  });

  document.getElementById('langKo').addEventListener('click', function(){ if(getLang()!=='ko') applyLang('ko'); });
  document.getElementById('langEn').addEventListener('click', function(){ if(getLang()!=='en') applyLang('en'); });

  var THEME_KEY = 'docsViewerTheme';
  function getTheme(){ return localStorage.getItem(THEME_KEY) === 'light' ? 'light' : 'dark'; }
  function setThemeStored(t){ localStorage.setItem(THEME_KEY, t === 'light' ? 'light' : 'dark'); }
  function swapHljsStylesheet(theme){
    var link = document.getElementById('hljsTheme');
    if(link) link.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-' + (theme === 'light' ? 'light' : 'dark') + '.min.css';
  }
  function reInitMermaidAndRerender(theme){
    if(!globalThis.mermaid) return;
    try {
      mermaid.initialize({startOnLoad:false, theme: theme === 'light' ? 'default' : 'dark', securityLevel:'loose'});
    } catch(e){ console.warn('Mermaid re-init failed:', e); }
    var inner = document.getElementById('contentInner');
    if(!inner) return;
    var nodes = inner.querySelectorAll('pre.mermaid');
    nodes.forEach(function(n){
      if(n.dataset.mermaidSrc){
        n.removeAttribute('data-processed');
        n.innerHTML = n.dataset.mermaidSrc;
      }
    });
    try {
      if(nodes.length) mermaid.run({nodes: nodes});
    } catch(e){ console.warn('Mermaid re-run failed:', e); }
  }
  function applyTheme(theme, opts){
    opts = opts || {};
    theme = (theme === 'light') ? 'light' : 'dark';
    setThemeStored(theme);
    document.documentElement.setAttribute('data-theme', theme);
    swapHljsStylesheet(theme);
    if(!opts.skipMermaid) reInitMermaidAndRerender(theme);
  }
  document.getElementById('themeToggle').addEventListener('click', function(){
    applyTheme(getTheme() === 'light' ? 'dark' : 'light');
  });

  function initialDefaultPath(){
    return (getLang() === 'en' && MD_DATA['README_en.md']) ? 'README_en.md' : 'README.md';
  }

  var initialLang = getLang();
  applyLang(initialLang, {skipContentSwap:true});

  var parsedInit = parseHash(location.hash);
  if(parsedInit.path && MD_DATA[parsedInit.path]){
    var info = PATH_INDEX[parsedInit.path];
    if(info && info.lang !== initialLang){
      setLang(info.lang);
      document.getElementById('langKo').classList.toggle('active', info.lang === 'ko');
      document.getElementById('langEn').classList.toggle('active', info.lang === 'en');
      document.getElementById('search').placeholder = (info.lang === 'en') ? 'Search... (Ctrl+K)' : '검색... (Ctrl+K)';
      document.getElementById('sidebarTitle').textContent = 'PAGE IDE Docs';
      renderNav(info.lang);
    }
    loadFile(parsedInit.path, parsedInit.scrollTo ? {scrollTo: parsedInit.scrollTo} : undefined);
  } else {
    loadFile(initialDefaultPath());
  }
})();
</script>
</body>
</html>
