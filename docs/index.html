, `future` is the redo stack. A new edit clears `future`.\n\n| Constant | Value | Description |\n|---|---|---|\n| `MAX_SIZE` | `1000` | Max length of `past`. Oldest snapshot drops first when exceeded |\n\n---\n\n## `pushBeforeChange`\n\n```kotlin\nfun pushBeforeChange(prev: EditSnapshot, maxSize: Int = MAX_SIZE): EditHistory\n```\n\nPushes the state *just before* a new edit onto `past` and clears `future`. If the incoming snapshot equals `past.last()`, it's ignored — duplicates don't stack.\n\n---\n\n## `undo` / `redo`\n\n```kotlin\nfun undo(current: EditSnapshot): Pair<EditHistory, EditSnapshot>?\nfun redo(current: EditSnapshot): Pair<EditHistory, EditSnapshot>?\n```\n\n`current` is the currently displayed state. `undo` pops `past.last()` and pushes `current` onto `future`. `redo` reverses it. Returns `null` when the relevant stack is empty.\n\nReturns `(new EditHistory, snapshot to restore)` — the caller must consume both and apply them to tab state (see `TabBook.undoOnActive`).\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `OpenTab.history` | Held per tab |\n| `TabBook.pushHistoryOnActive` | Pushes the previous state from `onValueChange` |\n| `TabBook.undoOnActive` / `redoOnActive` | Ctrl+Z / Ctrl+Shift+Z (Ctrl+Y) handlers |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/editor/file_document.md":"# FileDocument\n\n> `page/editor/src/main/kotlin/page/editor/FileDocument.kt` — 파일 읽기 / 쓰기 (UTF-8)\n\n`Files.readString` / `writeString` 의 얇은 래퍼. 인코딩을 한 곳에 못 박아 두기 위한 단일 진입점\n\n> English: [file_document_en.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/file_document_en.md)\n\n---\n\n## `load`\n\n```kotlin\nfun load(path: Path): String\n```\n\nUTF-8 로 파일 전체를 읽어 문자열로 반환. `IOException` 은 그대로 던진다 — 호출자가 처리\n\n---\n\n## `loadOrNull`\n\n```kotlin\nfun loadOrNull(path: Path): String?\n```\n\n`load` 의 try/catch 버전. 실패 시 `null`. 에러 종류를 구분할 필요 없는 곳 (예: 사이드바에서 파일을 미리 열어보기) 에서 사용\n\n---\n\n## `save`\n\n```kotlin\nfun save(path: Path, text: String)\n```\n\nUTF-8 로 텍스트 전체를 덮어쓴다. 파일이 없으면 새로 생성. 파일 잠금 / 부분 쓰기 / 임시 파일 후 rename 같은 안전 장치는 *없음* — 단순 덮어쓰기\n\n---\n\n## 인코딩 정책\n\n| 항목 | 값 |\n|---|---|\n| `Charset` | `StandardCharsets.UTF_8` (BOM 미포함) |\n| 줄바꿈 | 변환 없음. 파일에 있는 그대로 (Windows CRLF 도 보존) |\n\n향후 사용자 설정에서 인코딩을 바꾸려면 `Charset` 인자를 추가하고 디폴트만 UTF-8 유지\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.Main` (Ctrl+O) | `loadOrNull` 로 파일 열어 탭 추가 |\n| `page.app.Main` (Ctrl+S) | `save` 후 `markActiveSaved` |\n| `page.app.FileTreePanel` | 파일 클릭 시 `loadOrNull` |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/editor/file_document_en.md":"# FileDocument\n\n> 한국어: [file_document.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/file_document.md)\n\n> `page/editor/src/main/kotlin/page/editor/FileDocument.kt` — File read / write (UTF-8)\n\nA thin wrapper over `Files.readString` / `writeString`. Single entry point so the encoding is pinned in one place.\n\n---\n\n## `load`\n\n```kotlin\nfun load(path: Path): String\n```\n\nReads the entire file as UTF-8 and returns it as a string. `IOException` is rethrown — the caller handles it.\n\n---\n\n## `loadOrNull`\n\n```kotlin\nfun loadOrNull(path: Path): String?\n```\n\n`load` with try/catch. Returns `null` on failure. Used where the failure mode doesn't need to be distinguished (e.g. previewing a file from the sidebar).\n\n---\n\n## `save`\n\n```kotlin\nfun save(path: Path, text: String)\n```\n\nOverwrites the file with the text as UTF-8. Creates the file if missing. *No* file locking / partial-write protection / temp-file-then-rename safety — plain overwrite.\n\n---\n\n## Encoding policy\n\n| Item | Value |\n|---|---|\n| `Charset` | `StandardCharsets.UTF_8` (no BOM) |\n| Line endings | Preserved as-is (Windows CRLF stays CRLF) |\n\nTo make encoding user-configurable later, add a `Charset` parameter and keep UTF-8 as the default.\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `page.app.Main` (Ctrl+O) | Opens via `loadOrNull` and adds a tab |\n| `page.app.Main` (Ctrl+S) | `save`, then `markActiveSaved` |\n| `page.app.FileTreePanel` | `loadOrNull` on file click |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/editor/file_kind.md":"# FileKind / FileKinds\n\n> `page/editor/src/main/kotlin/page/editor/FileKind.kt` — 파일 종류 분류 (확장자 기반)\n\n확장자만 보고 텍스트 / 이미지 / SVG 로 분류. MIME 추론이나 파일 헤더 검사는 안 함\n\n> English: [file_kind_en.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/file_kind_en.md)\n\n---\n\n## `FileKind`\n\n```kotlin\nenum class FileKind { TEXT, IMAGE, SVG }\n```\n\n`PreviewPanel` 에서 분기 키로 사용. 향후 `BINARY`, `PDF`, `MARKDOWN` 등이 늘어나면 `EditorPanel` / `PreviewPanel` 의 분기도 같이 넓혀야 함\n\n---\n\n## `FileKinds.classify`\n\n```kotlin\nfun classify(path: Path): FileKind\n```\n\n확장자를 소문자로 정규화한 뒤 분류\n\n| 확장자 | 결과 |\n|---|---|\n| `.svg` | `FileKind.SVG` |\n| `.png`, `.jpg`, `.jpeg`, `.gif`, `.bmp`, `.webp` | `FileKind.IMAGE` |\n| 그 외 / 확장자 없음 | `FileKind.TEXT` |\n\n확장자가 없는 파일 (`Makefile`, `Dockerfile`, `.gitignore`) 도 모두 `TEXT` 처리. 텍스트 파일이라고 단정해도 `BasicTextField` 가 깨지지 않으면 충분\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.Main` | 활성 탭의 파일 종류로 `EditorPanel` / `PreviewPanel` 분기 |\n| `page.app.PreviewPanel` | `IMAGE` / `SVG` 분기로 Skia 디코더 선택 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/editor/file_kind_en.md":"# FileKind / FileKinds\n\n> 한국어: [file_kind.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/file_kind.md)\n\n> `page/editor/src/main/kotlin/page/editor/FileKind.kt` — File classification (extension-based)\n\nClassifies by extension only — text / image / SVG. No MIME inference or header sniffing.\n\n---\n\n## `FileKind`\n\n```kotlin\nenum class FileKind { TEXT, IMAGE, SVG }\n```\n\nUsed as a branch key in `PreviewPanel`. Adding `BINARY`, `PDF`, `MARKDOWN` later means widening the `EditorPanel` / `PreviewPanel` branches too.\n\n---\n\n## `FileKinds.classify`\n\n```kotlin\nfun classify(path: Path): FileKind\n```\n\nLowercases the extension before matching.\n\n| Extension | Result |\n|---|---|\n| `.svg` | `FileKind.SVG` |\n| `.png`, `.jpg`, `.jpeg`, `.gif`, `.bmp`, `.webp` | `FileKind.IMAGE` |\n| Anything else / no extension | `FileKind.TEXT` |\n\nFiles with no extension (`Makefile`, `Dockerfile`, `.gitignore`) all fall through to `TEXT`. Treating them as text is fine as long as `BasicTextField` doesn't choke.\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `page.app.Main` | Branches between `EditorPanel` / `PreviewPanel` based on the active tab |\n| `page.app.PreviewPanel` | `IMAGE` / `SVG` branch picks the Skia decoder |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/editor/file_tree.md":"# FileTree / TreeNode\n\n> `page/editor/src/main/kotlin/page/editor/FileTree.kt` — 사이드바 파일 트리 평탄화\n\n`expanded` 집합을 받아 트리를 깊이-우선으로 펼친 평탄한 노드 리스트를 만든다. `LazyColumn` 으로 그리기 위한 데이터 표현\n\n> English: [file_tree_en.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/file_tree_en.md)\n\n---\n\n## `TreeNode`\n\n```kotlin\ndata class TreeNode(\n    val path: Path,\n    val depth: Int,\n    val isDirectory: Boolean,\n)\n```\n\n평탄한 리스트의 한 행. `depth` 는 들여쓰기 레벨 (`0` = root)\n\n---\n\n## `listTree`\n\n```kotlin\nfun listTree(root: Path, expanded: Set<Path>): List<TreeNode>\n```\n\n`root` 자체를 첫 번째 노드로 추가하고, 펼쳐져 있으면 자식들을 재귀적으로 평탄화. 펼치지 않은 디렉터리는 헤더만 나오고 자식은 빠진다\n\n| 정렬 | 우선순위 |\n|---|---|\n| 1차 | 디렉터리 우선 (`isDirectory` 가 true 인 것들이 먼저) |\n| 2차 | 파일명 사전순 (소문자 비교) |\n\n`Files.list` 가 `IOException` / 권한 오류로 실패하면 그 디렉터리만 빈 자식으로 처리 — 트리 전체가 죽지 않는다\n\n---\n\n## 안전 헬퍼\n\n| 함수 | 동작 |\n|---|---|\n| `isDirectorySafe(path)` | `Files.isDirectory` 의 try/catch 버전. 예외 시 `false` |\n| `listChildrenSorted(dir)` | `Files.list` + 정렬. 예외 시 `null` (자식 없음으로 처리) |\n\n심볼릭 링크 / 끊어진 링크 / 권한 거부 폴더가 섞여 있어도 사이드바가 멈추지 않게 하기 위한 가드\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.FileTreePanel` | `listTree(root, expanded)` 결과를 `LazyColumn` 으로 렌더 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/editor/file_tree_en.md":"# FileTree / TreeNode\n\n> 한국어: [file_tree.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/file_tree.md)\n\n> `page/editor/src/main/kotlin/page/editor/FileTree.kt` — Sidebar file-tree flattening\n\nTakes an `expanded` set and produces a depth-first flattened list of nodes. The data shape consumed by `LazyColumn`.\n\n---\n\n## `TreeNode`\n\n```kotlin\ndata class TreeNode(\n    val path: Path,\n    val depth: Int,\n    val isDirectory: Boolean,\n)\n```\n\nOne row of the flattened list. `depth` is the indent level (`0` = root).\n\n---\n\n## `listTree`\n\n```kotlin\nfun listTree(root: Path, expanded: Set<Path>): List<TreeNode>\n```\n\n`root` is added as the first node; if expanded, children are recursively flattened. Unexpanded directories appear as headers only — their children are skipped.\n\n| Sort | Priority |\n|---|---|\n| Primary | Directories first (`isDirectory == true` ahead of files) |\n| Secondary | Filename, lowercased, lexicographic |\n\nIf `Files.list` fails (`IOException` / permission), that directory shows up empty — the whole tree doesn't die.\n\n---\n\n## Safety helpers\n\n| Function | Behavior |\n|---|---|\n| `isDirectorySafe(path)` | `Files.isDirectory` with try/catch. `false` on exception |\n| `listChildrenSorted(dir)` | `Files.list` + sort. `null` on exception (treated as no children) |\n\nGuards against broken symlinks, denied folders, and other half-readable mounts so the sidebar keeps working.\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `page.app.FileTreePanel` | Renders the `listTree(root, expanded)` result in a `LazyColumn` |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/editor/indent.md":"# Indent\n\n> `page/editor/src/main/kotlin/page/editor/Indent.kt` — 들여쓰기 / 내어쓰기 / Enter 자동 들여쓰기\n\nTab / Shift+Tab / Enter / Backspace 키 동작과 `}` / `]` / `)` 자동 정렬을 한 곳에 모은 순수 함수 묶음\n\n> English: [indent_en.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/indent_en.md)\n\n---\n\n## 상수\n\n| 상수 | 값 | 설명 |\n|---|---|---|\n| `TAB_UNIT` | `4` | 한 단위 들여쓰기 = 4 칸 공백 |\n| `TAB_SPACES` | `\"    \"` | 4 칸 공백 리터럴 |\n| `indentTriggers` | `{`, `(`, `[`, `:` | Enter 직전 글자가 이 중 하나면 한 단계 더 들여씀 |\n| `matchingClosers` | `{→}`, `(→)`, `[→]` | Enter 시 짝이 캐럿 양쪽에 있으면 *분할 들여쓰기* |\n| `unindentChars` | `}`, `]`, `)` | 입력 시 라인의 들여쓰기 한 단계 빼기 |\n\n---\n\n## `handleTab`\n\n```kotlin\nfun handleTab(edit: TextEdit): TextEdit\n```\n\n| 입력 상태 | 동작 |\n|---|---|\n| 캐럿만 있음 | 다음 4 칸 경계까지 공백 삽입 (`col % 4` 만큼) |\n| 한 줄 선택 | 줄 시작에 `TAB_SPACES` 한 단위 추가 (선택 그대로 유지) |\n| 여러 줄 선택 | 모든 줄 시작에 `TAB_SPACES` 추가 |\n\n---\n\n## `handleShiftTab`\n\n```kotlin\nfun handleShiftTab(edit: TextEdit): TextEdit\n```\n\n선택된 모든 줄의 들여쓰기를 한 단계 (최대 `TAB_UNIT` 칸) 줄임. 줄에 공백이 부족하면 가능한 만큼만 제거\n\n---\n\n## `handleLiteralTab`\n\n```kotlin\nfun handleLiteralTab(edit: TextEdit): TextEdit\n```\n\n`\\t` 문자 그대로 삽입. 사용자가 의도적으로 탭 문자를 원하는 경우 (Makefile, TSV)\n\n---\n\n## `handleBackspace`\n\n```kotlin\nfun handleBackspace(edit: TextEdit): TextEdit?\n```\n\n캐럿 앞이 *공백뿐인 들여쓰기* 일 때만 동작. 4 칸 경계까지 한 번에 지운다 (한 칸씩 지우는 대신). 그 외 (선택 있음 / 라인 첫 위치 / 들여쓰기에 비공백 글자) 는 `null` 반환 → 호출자가 기본 백스페이스로 폴백\n\n---\n\n## `maybeApplyEnter`\n\n```kotlin\nfun maybeApplyEnter(old: TextEdit, new: TextEdit): TextEdit\n```\n\n`onValueChange` 단계에서 호출. `new` 가 `old` 위치에 정확히 `\\n` 한 글자 삽입한 결과인지 확인하고, 맞으면 `handleEnter` 로 넘긴다 — IME / 한글 조합 / 붙여넣기 같은 케이스에서 오작동 안 하게 보호하는 가드\n\n---\n\n## `handleEnter`\n\n```kotlin\nfun handleEnter(edit: TextEdit): TextEdit\n```\n\nEnter 키의 핵심 로직\n\n| 케이스 | 동작 |\n|---|---|\n| 캐럿 양쪽이 짝 (`{|}`, `[|]`, `(|)`) | 두 줄 분할 들여쓰기 — 가운데 줄은 한 단계 더 들여쓰고 닫는 짝은 새 줄로 |\n| 직전 글자가 `indentTriggers` 중 하나 | 다음 줄을 한 단계 더 들여씀 |\n| 그 외 | 직전 줄의 선행 공백을 그대로 복사 |\n\n---\n\n## `maybeUnindentClosingBrace`\n\n```kotlin\nfun maybeUnindentClosingBrace(old: TextEdit, new: TextEdit): TextEdit\n```\n\n`}` `]` `)` 를 입력한 직후 라인 전체가 공백 + 입력 글자 한 개로만 구성돼 있으면, 들여쓰기를 한 단계 (`TAB_UNIT`) 줄여 닫는 짝을 여는 짝과 같은 들여쓰기로 정렬\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.EditorPanel` `onValueChange` | `maybeUnindentClosingBrace`, `maybeApplyEnter` 통과 |\n| `page.app.EditorPanel` `onPreviewKeyEvent` | Tab → `handleTab`, Shift+Tab → `handleShiftTab`, Backspace → `handleBackspace` |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/editor/indent_en.md":"# Indent\n\n> 한국어: [indent.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/indent.md)\n\n> `page/editor/src/main/kotlin/page/editor/Indent.kt` — Indent / dedent / smart-Enter\n\nA bundle of pure functions for Tab / Shift+Tab / Enter / Backspace and auto-alignment of `}` / `]` / `)`.\n\n---\n\n## Constants\n\n| Constant | Value | Description |\n|---|---|---|\n| `TAB_UNIT` | `4` | One indent unit = 4 spaces |\n| `TAB_SPACES` | `\"    \"` | Four-space literal |\n| `indentTriggers` | `{`, `(`, `[`, `:` | If the char right before Enter is one of these, indent one level further |\n| `matchingClosers` | `{→}`, `(→)`, `[→]` | Enter inside an empty pair triggers *split indent* |\n| `unindentChars` | `}`, `]`, `)` | Typing one of these dedents the line by one step |\n\n---\n\n## `handleTab`\n\n```kotlin\nfun handleTab(edit: TextEdit): TextEdit\n```\n\n| State | Action |\n|---|---|\n| Caret only | Insert spaces up to the next 4-column boundary |\n| Single-line selection | Add one `TAB_SPACES` at the start of the line (selection preserved) |\n| Multi-line selection | Add `TAB_SPACES` at the start of every line |\n\n---\n\n## `handleShiftTab`\n\n```kotlin\nfun handleShiftTab(edit: TextEdit): TextEdit\n```\n\nDedents every selected line by one step (up to `TAB_UNIT` spaces). If the line has fewer leading spaces, removes only what's there.\n\n---\n\n## `handleLiteralTab`\n\n```kotlin\nfun handleLiteralTab(edit: TextEdit): TextEdit\n```\n\nInserts a literal `\\t`. For files where the user actually wants a tab character (Makefile, TSV).\n\n---\n\n## `handleBackspace`\n\n```kotlin\nfun handleBackspace(edit: TextEdit): TextEdit?\n```\n\nOnly acts when the chars before the caret are *whitespace-only indent*. Deletes back to the previous 4-column boundary in one step. Returns `null` (selection / start of line / non-space inside indent) so the caller falls back to the default backspace.\n\n---\n\n## `maybeApplyEnter`\n\n```kotlin\nfun maybeApplyEnter(old: TextEdit, new: TextEdit): TextEdit\n```\n\nCalled from `onValueChange`. Verifies `new` is exactly `old` with a single `\\n` inserted, then delegates to `handleEnter`. Acts as a guard so IME / Hangul composition / paste cases don't trigger accidentally.\n\n---\n\n## `handleEnter`\n\n```kotlin\nfun handleEnter(edit: TextEdit): TextEdit\n```\n\nEnter key core logic.\n\n| Case | Action |\n|---|---|\n| Caret between matched pair (`{|}`, `[|]`, `(|)`) | Split into two lines — middle line gets extra indent, closer goes to its own line |\n| Char before caret is in `indentTriggers` | Indent the next line one step further |\n| Otherwise | Copy the previous line's leading whitespace |\n\n---\n\n## `maybeUnindentClosingBrace`\n\n```kotlin\nfun maybeUnindentClosingBrace(old: TextEdit, new: TextEdit): TextEdit\n```\n\nAfter typing `}` `]` `)`, if the entire line is whitespace + that one char, dedent by one (`TAB_UNIT`) so the closer aligns with the opener.\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `page.app.EditorPanel` `onValueChange` | Passes through `maybeUnindentClosingBrace`, `maybeApplyEnter` |\n| `page.app.EditorPanel` `onPreviewKeyEvent` | Tab → `handleTab`, Shift+Tab → `handleShiftTab`, Backspace → `handleBackspace` |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/editor/java_lexer.md":"# JavaLexer\n\n> `page/editor/src/main/kotlin/page/editor/JavaLexer.kt` — Java 신택스 렉서 (위임)\n\n`JvmLexer` 에 Java 키워드 셋과 트리플 따옴표 (Text Block) 활성화 옵션만 넘기는 박막 위임. 토큰화 로직 본체는 `JvmLexer` 에 있음\n\n> English: [java_lexer_en.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/java_lexer_en.md)\n\n---\n\n## 정의\n\n```kotlin\nobject JavaLexer : SyntaxLexer by JavaLexerImpl\n\nprivate object JavaLexerImpl : JvmLexer(\n    keywords = JAVA_KEYWORDS,\n    supportTripleQuoted = true,\n)\n```\n\n`SyntaxLexer by JavaLexerImpl` — Kotlin 의 인터페이스 위임. `JavaLexer.tokenize(...)` 호출은 그대로 `JavaLexerImpl.tokenize(...)` 로 전달\n\n`JvmLexerImpl` 을 `private` 으로 가린 이유는 외부에서 직접 인스턴스화할 일이 없기 때문 — 진입점은 `object JavaLexer` 하나\n\n---\n\n## `JAVA_KEYWORDS`\n\nJLS (Java Language Specification) 의 예약어 + 컨텍스트 키워드를 합한 60 여 개 셋\n\n```kotlin\n\"abstract\", \"assert\", \"boolean\", \"break\", \"byte\", \"case\", \"catch\", \"char\",\n\"class\", \"const\", \"continue\", \"default\", \"do\", \"double\", \"else\", \"enum\",\n\"extends\", \"false\", \"final\", \"finally\", \"float\", \"for\", \"goto\", \"if\",\n\"implements\", \"import\", \"instanceof\", \"int\", \"interface\", \"long\", \"native\",\n\"new\", \"non-sealed\", \"null\", \"package\", \"permits\", \"private\", \"protected\",\n\"public\", \"record\", \"return\", \"sealed\", \"short\", \"static\", \"strictfp\",\n\"super\", \"switch\", \"synchronized\", \"this\", \"throw\", \"throws\", \"transient\",\n\"true\", \"try\", \"var\", \"void\", \"volatile\", \"while\", \"yield\",\n```\n\n`record`, `sealed`, `non-sealed`, `permits`, `var`, `yield` 같은 비교적 새 키워드 포함 (Java 17 기준)\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `SyntaxLexers.forPath(path)` | `.java` 확장자 분기 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/editor/java_lexer_en.md":"# JavaLexer\n\n> 한국어: [java_lexer.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/java_lexer.md)\n\n> `page/editor/src/main/kotlin/page/editor/JavaLexer.kt` — Java syntax lexer (delegate)\n\nA thin delegate that passes the Java keyword set and the triple-quote (Text Block) flag to `JvmLexer`. The tokenizer itself lives in `JvmLexer`.\n\n---\n\n## Definition\n\n```kotlin\nobject JavaLexer : SyntaxLexer by JavaLexerImpl\n\nprivate object JavaLexerImpl : JvmLexer(\n    keywords = JAVA_KEYWORDS,\n    supportTripleQuoted = true,\n)\n```\n\n`SyntaxLexer by JavaLexerImpl` — Kotlin interface delegation. `JavaLexer.tokenize(...)` forwards to `JavaLexerImpl.tokenize(...)`.\n\n`JavaLexerImpl` is `private` because there's never a reason to instantiate it directly — the only entry point is `object JavaLexer`.\n\n---\n\n## `JAVA_KEYWORDS`\n\nAbout 60 entries — JLS (Java Language Specification) reserved words plus contextual keywords.\n\n```kotlin\n\"abstract\", \"assert\", \"boolean\", \"break\", \"byte\", \"case\", \"catch\", \"char\",\n\"class\", \"const\", \"continue\", \"default\", \"do\", \"double\", \"else\", \"enum\",\n\"extends\", \"false\", \"final\", \"finally\", \"float\", \"for\", \"goto\", \"if\",\n\"implements\", \"import\", \"instanceof\", \"int\", \"interface\", \"long\", \"native\",\n\"new\", \"non-sealed\", \"null\", \"package\", \"permits\", \"private\", \"protected\",\n\"public\", \"record\", \"return\", \"sealed\", \"short\", \"static\", \"strictfp\",\n\"super\", \"switch\", \"synchronized\", \"this\", \"throw\", \"throws\", \"transient\",\n\"true\", \"try\", \"var\", \"void\", \"volatile\", \"while\", \"yield\",\n```\n\nIncludes newer keywords like `record`, `sealed`, `non-sealed`, `permits`, `var`, `yield` (Java 17 baseline).\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `SyntaxLexers.forPath(path)` | `.java` extension dispatch |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/editor/json_lexer.md":"# JsonLexer\n\n> `page/editor/src/main/kotlin/page/editor/JsonLexer.kt` — JSON 신택스 렉서 (독립)\n\nJSON 은 키워드 / 식별자 / 어노테이션이 없어 `JvmLexer` 를 공유할 만한 공통점이 적다 → 독립 구현\n\n> English: [json_lexer_en.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/json_lexer_en.md)\n\n---\n\n## `tokenize`\n\n```kotlin\noverride fun tokenize(text: String): List<Token>\n```\n\n한 글자씩 스캔하며 다음 종류만 토큰으로 만든다\n\n| 토큰 | 인식 규칙 |\n|---|---|\n| `STRING` | `\"` 시작, `\\` 이스케이프 한 글자 스킵, `\"` 종료. 줄바꿈 만나면 종료 (잘못된 JSON 도 그래도 칠해야 보기 편함) |\n| `NUMBER` | 선택적 `-`, 정수, 선택적 `.소수`, 선택적 `e/E[+−]지수` |\n| `KEYWORD` | `true`, `false`, `null` (정확히 이 셋만) |\n\n`,`, `:`, `{`, `}`, `[`, `]` 같은 punctuation 은 일부러 토큰화 안 함 → `PUNCT` 색이 없으므로 본문 톤 그대로\n\n---\n\n## 비목표\n\n- 스키마 검증 — 잘못된 JSON 도 그대로 그려준다 (편집 중에는 항상 invalid 상태일 수 있음)\n- JSON5 / JSONC — `//`, `/* */`, trailing comma 같은 확장은 미지원. 필요해지면 별도 렉서\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `SyntaxLexers.forPath(path)` | `.json` 확장자 분기 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/editor/json_lexer_en.md":"# JsonLexer\n\n> 한국어: [json_lexer.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/json_lexer.md)\n\n> `page/editor/src/main/kotlin/page/editor/JsonLexer.kt` — JSON syntax lexer (standalone)\n\nJSON has no keywords / identifiers / annotations, so it shares too little with `JvmLexer` to reuse it — implemented standalone.\n\n---\n\n## `tokenize`\n\n```kotlin\noverride fun tokenize(text: String): List<Token>\n```\n\nScans one char at a time and emits only these tokens:\n\n| Token | Rule |\n|---|---|\n| `STRING` | `\"` start, `\\` skips one escape char, `\"` end. Stops at newline (broken JSON should still color cleanly) |\n| `NUMBER` | Optional `-`, integer, optional `.fraction`, optional `e/E[+−]exponent` |\n| `KEYWORD` | `true`, `false`, `null` (exactly these three) |\n\nPunctuation (`,`, `:`, `{`, `}`, `[`, `]`) is intentionally untokenized — `PUNCT` has no color, so it stays the body tone.\n\n---\n\n## Non-goals\n\n- Schema validation — invalid JSON is rendered too (mid-edit it's almost always invalid)\n- JSON5 / JSONC — no support for `//`, `/* */`, trailing commas. Would need a separate lexer\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `SyntaxLexers.forPath(path)` | `.json` extension dispatch |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/editor/jvm_lexer.md":"# JvmLexer\n\n> `page/editor/src/main/kotlin/page/editor/JvmLexer.kt` — Kotlin / Java 공용 토큰화 베이스\n\n`internal abstract class`. `KotlinLexer` 와 `JavaLexer` 가 키워드 셋과 트리플 따옴표 옵션만 다르고 토큰화 규칙은 동일해서 공통 부모로 추출\n\n> English: [jvm_lexer_en.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/jvm_lexer_en.md)\n\n---\n\n## 생성자\n\n```kotlin\ninternal abstract class JvmLexer(\n    private val keywords: Set<String>,\n    private val supportTripleQuoted: Boolean,\n) : SyntaxLexer\n```\n\n| 파라미터 | 설명 |\n|---|---|\n| `keywords` | 해당 언어의 예약어 셋 (식별자가 이 셋에 포함되면 `KEYWORD`) |\n| `supportTripleQuoted` | `\"\"\"...\"\"\"` 인식 활성화 (Kotlin Raw String, Java Text Block) |\n\n---\n\n## `tokenize`\n\n```kotlin\noverride fun tokenize(text: String): List<Token>\n```\n\n한 글자씩 보면서 우선순위 분기로 토큰을 잘라낸다\n\n| 패턴 | 토큰 | 비고 |\n|---|---|---|\n| `//...` 줄 끝까지 | `COMMENT` | |\n| `/* ... */` | `COMMENT` | 닫힘 없으면 텍스트 끝까지 |\n| `\"\"\"...\"\"\"` | `STRING` | `supportTripleQuoted = true` 일 때만 |\n| `\"...\"` | `STRING` | `\\` 이스케이프, 줄바꿈 만나면 종료 |\n| `'...'` | `STRING` | 동일 규칙 |\n| `@식별자` | `ANNOTATION` | `@Override`, `@Composable` |\n| 숫자 | `NUMBER` | `0x...` 16 진, `1_000_000` 언더스코어, `1.5e10`, 접미사 `f F d D L l u` |\n| 식별자 | `KEYWORD` / `TYPE` | 키워드 셋이면 `KEYWORD`, 대문자 시작 + 길이 ≥ 2 면 `TYPE` |\n| 그 외 | (토큰 없음) | 본문 톤 그대로 |\n\n---\n\n## 식별자 규칙\n\n```kotlin\nprivate fun isIdentStart(c: Char) = c == '_' || c.isLetter()\nprivate fun isIdentPart(c: Char) = c == '_' || c.isLetterOrDigit()\nprivate fun startsWithUpperCase(s: String) = s.isNotEmpty() && s[0].isUpperCase() && s.length > 1\n```\n\n`startsWithUpperCase` 의 `length > 1` 가드는 한 글자 대문자 변수 (`T`, `K`) 가 의도치 않게 타입 색을 받지 않게 — 제네릭 타입 파라미터처럼 보이지만 실제로는 본문 색이 더 자연스러움\n\n---\n\n## 비목표\n\n- 의미 분석 — 식별자 → 타입 매칭은 단순 *대문자 시작 = 타입* 규칙. `String` 변수 이름이 `Foo` 면 타입으로 칠해진다 (오인식이지만 비용이 낮음)\n- 매크로 / 어노테이션 인자 파싱 — `@Composable` 자체만 토큰화, `(arg = 1)` 부분은 건너뜀\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `KotlinLexer` | `keywords = KOTLIN_KEYWORDS`, `supportTripleQuoted = true` |\n| `JavaLexer` | `keywords = JAVA_KEYWORDS`, `supportTripleQuoted = true` |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/editor/jvm_lexer_en.md":"# JvmLexer\n\n> 한국어: [jvm_lexer.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/jvm_lexer.md)\n\n> `page/editor/src/main/kotlin/page/editor/JvmLexer.kt` — Shared tokenizer base for Kotlin / Java\n\n`internal abstract class`. Kotlin and Java differ only in keyword set and the triple-quote flag, so the common tokenizer was lifted into a parent.\n\n---\n\n## Constructor\n\n```kotlin\ninternal abstract class JvmLexer(\n    private val keywords: Set<String>,\n    private val supportTripleQuoted: Boolean,\n) : SyntaxLexer\n```\n\n| Parameter | Description |\n|---|---|\n| `keywords` | Reserved words for the language (identifiers in this set become `KEYWORD`) |\n| `supportTripleQuoted` | Enables `\"\"\"...\"\"\"` recognition (Kotlin raw string, Java text block) |\n\n---\n\n## `tokenize`\n\n```kotlin\noverride fun tokenize(text: String): List<Token>\n```\n\nWalks one char at a time, emitting tokens in priority order.\n\n| Pattern | Token | Note |\n|---|---|---|\n| `//...` to end of line | `COMMENT` | |\n| `/* ... */` | `COMMENT` | Runs to EOF if unclosed |\n| `\"\"\"...\"\"\"` | `STRING` | Only when `supportTripleQuoted = true` |\n| `\"...\"` | `STRING` | `\\` escapes, ends at newline |\n| `'...'` | `STRING` | Same rule |\n| `@identifier` | `ANNOTATION` | `@Override`, `@Composable` |\n| Numbers | `NUMBER` | `0x...` hex, `1_000_000` underscores, `1.5e10`, suffix `f F d D L l u` |\n| Identifiers | `KEYWORD` / `TYPE` | In keyword set → `KEYWORD`; capitalized start, length ≥ 2 → `TYPE` |\n| Other | (no token) | Body tone preserved |\n\n---\n\n## Identifier rules\n\n```kotlin\nprivate fun isIdentStart(c: Char) = c == '_' || c.isLetter()\nprivate fun isIdentPart(c: Char) = c == '_' || c.isLetterOrDigit()\nprivate fun startsWithUpperCase(s: String) = s.isNotEmpty() && s[0].isUpperCase() && s.length > 1\n```\n\nThe `length > 1` guard in `startsWithUpperCase` keeps single-letter uppercase identifiers (`T`, `K`) from being colored as types — they look like generic type parameters, but body color reads more naturally.\n\n---\n\n## Non-goals\n\n- Semantic analysis — type matching is a simple *capitalized start = type* rule. A variable named `Foo` gets type-colored (a misclass, but cheap)\n- Macro / annotation-arg parsing — `@Composable` itself is tokenized, but `(arg = 1)` is skipped\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `KotlinLexer` | `keywords = KOTLIN_KEYWORDS`, `supportTripleQuoted = true` |\n| `JavaLexer` | `keywords = JAVA_KEYWORDS`, `supportTripleQuoted = true` |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/editor/kotlin_lexer.md":"# KotlinLexer\n\n> `page/editor/src/main/kotlin/page/editor/KotlinLexer.kt` — Kotlin 신택스 렉서 (위임)\n\n`JvmLexer` 에 Kotlin 키워드 셋만 넘기는 박막 위임. `JavaLexer` 와 같은 구조\n\n> English: [kotlin_lexer_en.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/kotlin_lexer_en.md)\n\n---\n\n## 정의\n\n```kotlin\nobject KotlinLexer : SyntaxLexer by KotlinLexerImpl\n\nprivate object KotlinLexerImpl : JvmLexer(\n    keywords = KOTLIN_KEYWORDS,\n    supportTripleQuoted = true,\n)\n```\n\n`SyntaxLexer by KotlinLexerImpl` — 인터페이스 위임. 외부에서는 `object KotlinLexer` 만 보인다\n\n---\n\n## `KOTLIN_KEYWORDS`\n\nKotlin 의 hard keywords + soft keywords + modifier keywords 75 여 개\n\n```kotlin\n\"abstract\", \"actual\", \"annotation\", \"as\", \"break\", \"by\", \"catch\",\n\"class\", \"companion\", \"const\", \"constructor\", \"continue\", \"crossinline\",\n\"data\", \"delegate\", \"do\", \"dynamic\", \"else\", \"enum\", \"expect\", \"external\",\n\"false\", \"field\", \"file\", \"final\", \"finally\", \"for\", \"fun\", \"get\", \"if\",\n\"import\", \"in\", \"infix\", \"init\", \"inline\", \"inner\", \"interface\", \"internal\",\n\"is\", \"it\", \"lateinit\", \"noinline\", \"null\", \"object\", \"open\", \"operator\",\n\"out\", \"override\", \"package\", \"param\", \"private\", \"property\", \"protected\",\n\"public\", \"receiver\", \"reified\", \"return\", \"sealed\", \"set\", \"setparam\",\n\"super\", \"suspend\", \"tailrec\", \"this\", \"throw\", \"true\", \"try\", \"typealias\",\n\"typeof\", \"val\", \"var\", \"vararg\", \"when\", \"where\", \"while\",\n```\n\n`it` 도 키워드로 포함 — 람다 안에서 자주 등장하는 암묵적 파라미터라 색을 입혀두면 가독성에 도움. `delegate`, `field`, `file` 같은 modifier-only 키워드도 포함\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `SyntaxLexers.forPath(path)` | `.kt`, `.kts` 확장자 분기 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/editor/kotlin_lexer_en.md":"# KotlinLexer\n\n> 한국어: [kotlin_lexer.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/kotlin_lexer.md)\n\n> `page/editor/src/main/kotlin/page/editor/KotlinLexer.kt` — Kotlin syntax lexer (delegate)\n\nA thin delegate that passes the Kotlin keyword set to `JvmLexer`. Same shape as `JavaLexer`.\n\n---\n\n## Definition\n\n```kotlin\nobject KotlinLexer : SyntaxLexer by KotlinLexerImpl\n\nprivate object KotlinLexerImpl : JvmLexer(\n    keywords = KOTLIN_KEYWORDS,\n    supportTripleQuoted = true,\n)\n```\n\n`SyntaxLexer by KotlinLexerImpl` — interface delegation. Only `object KotlinLexer` is exposed.\n\n---\n\n## `KOTLIN_KEYWORDS`\n\nAbout 75 entries — Kotlin's hard keywords + soft keywords + modifier keywords.\n\n```kotlin\n\"abstract\", \"actual\", \"annotation\", \"as\", \"break\", \"by\", \"catch\",\n\"class\", \"companion\", \"const\", \"constructor\", \"continue\", \"crossinline\",\n\"data\", \"delegate\", \"do\", \"dynamic\", \"else\", \"enum\", \"expect\", \"external\",\n\"false\", \"field\", \"file\", \"final\", \"finally\", \"for\", \"fun\", \"get\", \"if\",\n\"import\", \"in\", \"infix\", \"init\", \"inline\", \"inner\", \"interface\", \"internal\",\n\"is\", \"it\", \"lateinit\", \"noinline\", \"null\", \"object\", \"open\", \"operator\",\n\"out\", \"override\", \"package\", \"param\", \"private\", \"property\", \"protected\",\n\"public\", \"receiver\", \"reified\", \"return\", \"sealed\", \"set\", \"setparam\",\n\"super\", \"suspend\", \"tailrec\", \"this\", \"throw\", \"true\", \"try\", \"typealias\",\n\"typeof\", \"val\", \"var\", \"vararg\", \"when\", \"where\", \"while\",\n```\n\n`it` is included — it's the implicit lambda parameter that shows up everywhere, and coloring it helps scanability. Modifier-only keywords like `delegate`, `field`, `file` are included too.\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `SyntaxLexers.forPath(path)` | `.kt`, `.kts` extension dispatch |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/editor/line_move.md":"# LineMove\n\n> `page/editor/src/main/kotlin/page/editor/LineMove.kt` — 라인 이동 / 복제\n\nAlt+↑ / Alt+↓ 와 (향후) Shift+Alt+↑·↓ 의 핵심 로직. 선택 범위 전체를 *하나의 블록* 으로 다루어 위/아래 라인과 자리를 바꾼다\n\n> English: [line_move_en.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/line_move_en.md)\n\n---\n\n## `moveUp` / `moveDown`\n\n```kotlin\nfun moveUp(edit: TextEdit): TextEdit?\nfun moveDown(edit: TextEdit): TextEdit?\n```\n\n선택된 줄 블록 전체와 직전/직후 한 줄을 통째로 swap. 선택 범위는 같이 따라간다 (드래그 중인 코드를 그대로 옮기는 느낌)\n\n| 경계 케이스 | 반환 |\n|---|---|\n| `moveUp` 인데 첫 줄이 이미 0 행 | `null` (호출자가 무시) |\n| `moveDown` 인데 마지막 줄이 EOF | `null` |\n\n---\n\n## `duplicateUp` / `duplicateDown`\n\n```kotlin\nfun duplicateUp(edit: TextEdit): TextEdit\nfun duplicateDown(edit: TextEdit): TextEdit\n```\n\n선택된 줄 블록을 위/아래로 복제\n\n| 함수 | 동작 |\n|---|---|\n| `duplicateUp` | 사본을 *위* 에 두고, 캐럿/선택은 아래쪽 (원본) 에 머무름 |\n| `duplicateDown` | 사본을 *아래* 에 두고, 캐럿/선택은 아래쪽 (사본) 으로 이동 |\n\n블록 길이를 알기 위해 `lastEnd - firstStart + 1` (줄바꿈 한 글자 포함) 을 더해 캐럿을 보정\n\n---\n\n## 라인 경계\n\n```kotlin\nprivate fun lineStart(text: String, offset: Int): Int\nprivate fun lineEnd(text: String, offset: Int): Int\n```\n\n`\\n` 만 보고 라인 경계를 잡는다. CRLF 환경에서도 `\\r` 은 라인 끝의 일부로 같이 swap 됨 (별도 처리 안 함)\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.EditorPanel` `onPreviewKeyEvent` | Alt+Up → `moveUp`, Alt+Down → `moveDown` |\n\n향후 Shift+Alt+Up / Down 단축키로 `duplicateUp` / `duplicateDown` 와이어링 예정\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/editor/line_move_en.md":"# LineMove\n\n> 한국어: [line_move.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/line_move.md)\n\n> `page/editor/src/main/kotlin/page/editor/LineMove.kt` — Line move / duplicate\n\nCore logic for Alt+↑ / Alt+↓ (and future Shift+Alt+↑·↓). Treats the entire selection as *one block* and swaps it with the line above/below.\n\n---\n\n## `moveUp` / `moveDown`\n\n```kotlin\nfun moveUp(edit: TextEdit): TextEdit?\nfun moveDown(edit: TextEdit): TextEdit?\n```\n\nSwaps the selected line block with the line directly above/below. The selection follows along (feels like dragging code with you).\n\n| Boundary case | Return |\n|---|---|\n| `moveUp` and the first line is already row 0 | `null` (caller ignores) |\n| `moveDown` and the last line is EOF | `null` |\n\n---\n\n## `duplicateUp` / `duplicateDown`\n\n```kotlin\nfun duplicateUp(edit: TextEdit): TextEdit\nfun duplicateDown(edit: TextEdit): TextEdit\n```\n\nDuplicates the selected block above or below.\n\n| Function | Behavior |\n|---|---|\n| `duplicateUp` | Copy goes *above*, caret/selection stays on the original (now below) |\n| `duplicateDown` | Copy goes *below*, caret/selection moves to the copy (now below) |\n\nUses `lastEnd - firstStart + 1` (block length including the trailing newline) as the caret offset.\n\n---\n\n## Line boundaries\n\n```kotlin\nprivate fun lineStart(text: String, offset: Int): Int\nprivate fun lineEnd(text: String, offset: Int): Int\n```\n\nBoundaries are determined by `\\n` only. On CRLF inputs, `\\r` rides along as part of the line end (no special handling).\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `page.app.EditorPanel` `onPreviewKeyEvent` | Alt+Up → `moveUp`, Alt+Down → `moveDown` |\n\nShift+Alt+Up / Down → `duplicateUp` / `duplicateDown` wiring is planned.\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/editor/markdown_fence.md":"# MarkdownFence\n\n> `page/editor/src/main/kotlin/page/editor/MarkdownFence.kt` — 캐럿이 코드 펜스 안에 있는지 판별\n\nMarkdown 의 ```` ``` ```` / `~~~` 코드 펜스 안에서는 `AutoClose` / `Indent` 같은 자동 동작을 멈춰야 깔끔하다. 그 판별을 위한 단일 함수\n\n> English: [markdown_fence_en.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/markdown_fence_en.md)\n\n---\n\n## `isInsideFence`\n\n```kotlin\nfun isInsideFence(text: String, caret: Int): Boolean\n```\n\n텍스트 처음부터 한 줄씩 진행하며 펜스 상태를 추적. 캐럿이 위치한 줄에 도달했을 때의 상태를 반환\n\n| 케이스 | 반환 |\n|---|---|\n| 펜스 밖에서 캐럿 만남 | `false` |\n| 펜스 안에서 캐럿 만남 (열기/닫기 라인 자체는 제외) | `true` |\n| 펜스가 닫히지 않은 채 EOF | `inFence` 의 마지막 값 |\n\n펜스 *경계 라인* (열기 / 닫기 글자가 있는 줄) 에 캐럿이 있으면 `false` — 마크다운 의미상 그 라인은 펜스 *바깥* 으로 친다\n\n---\n\n## `parseFenceLine`\n\n```kotlin\nprivate fun parseFenceLine(text: String, lineStart: Int, lineEnd: Int): Pair<Char, Int>?\n```\n\nCommonMark 펜스 규칙을 따른다\n\n| 규칙 | 값 |\n|---|---|\n| 선행 공백 | 최대 3 칸 |\n| 펜스 글자 | `` ` `` 또는 `~` |\n| 펜스 길이 | 3 개 이상 연속 |\n\n여는 펜스의 *글자 종류* 와 *길이* 를 기억해 두고, 닫는 펜스는 같은 글자 + 같거나 더 긴 길이여야 인정\n\n---\n\n## 비목표\n\n- 인라인 코드 (\\`...\\`) 판별 — 한 줄 안의 백틱 블록은 처리 안 함\n- 들여쓰기 코드 블록 (4 칸 이상 들여쓰기) — 펜스만 인식\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.EditorPanel` (`.md` 파일) | `AutoClose` / `Indent` 자동 동작 비활성화 가드 |\n\n> 현재 직접 호출 지점은 향후 `EditorPanel` 에서 추가 예정 — 모듈 자체는 준비 완료\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/editor/markdown_fence_en.md":"# MarkdownFence\n\n> 한국어: [markdown_fence.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/markdown_fence.md)\n\n> `page/editor/src/main/kotlin/page/editor/MarkdownFence.kt` — Detects whether the caret is inside a code fence\n\nInside Markdown ```` ``` ```` / `~~~` fences, behaviors like `AutoClose` / `Indent` should be disabled — typing prose-style code samples gets messy otherwise. This file provides the single detection function.\n\n---\n\n## `isInsideFence`\n\n```kotlin\nfun isInsideFence(text: String, caret: Int): Boolean\n```\n\nWalks line by line from the start, tracking fence state. Returns the state on the line containing the caret.\n\n| Case | Return |\n|---|---|\n| Caret reached while outside a fence | `false` |\n| Caret reached while inside a fence (excluding the open/close lines themselves) | `true` |\n| Reached EOF still inside a fence | The last `inFence` value |\n\nIf the caret lands on a *fence boundary line* (the line with the opening/closing chars), the result is `false` — Markdown semantics treat that line as *outside* the fence.\n\n---\n\n## `parseFenceLine`\n\n```kotlin\nprivate fun parseFenceLine(text: String, lineStart: Int, lineEnd: Int): Pair<Char, Int>?\n```\n\nFollows CommonMark's fence rules.\n\n| Rule | Value |\n|---|---|\n| Leading spaces | Up to 3 |\n| Fence char | `` ` `` or `~` |\n| Fence length | 3 or more in a row |\n\nRemembers the opening fence's *char* and *length*; a closer must match the char and be at least as long.\n\n---\n\n## Non-goals\n\n- Inline code (\\`...\\`) — single-line backtick spans not handled\n- Indented code blocks (4+ space indent) — only fenced blocks are recognized\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `page.app.EditorPanel` (in `.md` files) | Guard to disable `AutoClose` / `Indent` |\n\n> The actual callsite in `EditorPanel` is planned — the module itself is ready.\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/editor/replace.md":"# Replace\n\n> `page/editor/src/main/kotlin/page/editor/Replace.kt` — 검색 매치 치환\n\n`SearchState.matches` 가 만들어 놓은 매치 범위들을 받아 텍스트를 치환한다. 매치를 찾는 일은 `SearchState`, 치환만 이 파일\n\n> English: [replace_en.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/replace_en.md)\n\n---\n\n## `Result`\n\n```kotlin\ndata class Result(val text: String, val caret: Int, val replacedCount: Int)\n```\n\n치환 결과 묶음\n\n| 필드 | 의미 |\n|---|---|\n| `text` | 치환된 새 텍스트 |\n| `caret` | 치환 후 캐럿 위치 |\n| `replacedCount` | 실제로 치환된 매치 개수 (0 도 가능) |\n\n---\n\n## `applyCurrent`\n\n```kotlin\nfun applyCurrent(text: String, range: IntRange, replacement: String): Result\n```\n\n매치 한 개 (`range`) 를 `replacement` 로 치환. 캐럿은 치환된 글자 끝 (`start + replacement.length`) — 다음 매치로 넘어가기 좋은 위치\n\n`replacedCount` 는 항상 `1`\n\n---\n\n## `applyAll`\n\n```kotlin\nfun applyAll(text: String, matches: List<IntRange>, replacement: String): Result\n```\n\n매치 리스트 전체를 한 번에 치환. `StringBuilder` 로 매치 사이의 원본 조각을 그대로 이어붙여 단일 패스로 새 문자열을 만든다\n\n`matches` 가 비어 있으면 원본 텍스트와 `replacedCount = 0` 반환. 캐럿은 `0` 으로 리셋 — *전부 치환* 후 캐럿 위치는 의미가 모호해서 일단 단순화\n\n`matches` 는 *서로 겹치지 않고* *오름차순* 이라는 전제 — `SearchState.findAll` 이 이 조건을 만족시킨다\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.SearchBar` \"바꾸기\" | `applyCurrent(text, search.active, replace)` |\n| `page.app.SearchBar` \"전부 바꾸기\" | `applyAll(text, search.matches, replace)` |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/editor/replace_en.md":"# Replace\n\n> 한국어: [replace.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/replace.md)\n\n> `page/editor/src/main/kotlin/page/editor/Replace.kt` — Search match replacement\n\nTakes match ranges produced by `SearchState.matches` and replaces them in the text. Finding matches lives in `SearchState`; replacement only is here.\n\n---\n\n## `Result`\n\n```kotlin\ndata class Result(val text: String, val caret: Int, val replacedCount: Int)\n```\n\nReplacement result.\n\n| Field | Meaning |\n|---|---|\n| `text` | New text after replacement |\n| `caret` | Caret position after replacement |\n| `replacedCount` | Actual number of replaced matches (0 is possible) |\n\n---\n\n## `applyCurrent`\n\n```kotlin\nfun applyCurrent(text: String, range: IntRange, replacement: String): Result\n```\n\nReplaces a single match (`range`) with `replacement`. The caret lands at the end of the replacement (`start + replacement.length`) — a natural spot to step to the next match.\n\n`replacedCount` is always `1`.\n\n---\n\n## `applyAll`\n\n```kotlin\nfun applyAll(text: String, matches: List<IntRange>, replacement: String): Result\n```\n\nReplaces every match in one pass. Uses `StringBuilder` to splice the unchanged segments between matches, producing the new text in a single pass.\n\nIf `matches` is empty, returns the original text with `replacedCount = 0`. The caret is reset to `0` — after a *replace all*, the caret position is ambiguous, so this keeps it simple.\n\nAssumes `matches` is *non-overlapping* and *ascending* — `SearchState.findAll` already guarantees that.\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `page.app.SearchBar` \"Replace\" | `applyCurrent(text, search.active, replace)` |\n| `page.app.SearchBar` \"Replace All\" | `applyAll(text, search.matches, replace)` |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/editor/search_state.md":"# SearchState\n\n> `page/editor/src/main/kotlin/page/editor/SearchState.kt` — 검색 / 치환 상태\n\n검색바의 모든 상태가 들어있는 이뮤터블 데이터 클래스. `null` 이면 검색바 닫힘, 인스턴스가 있으면 열림\n\n> English: [search_state_en.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/search_state_en.md)\n\n---\n\n## 필드\n\n```kotlin\ndata class SearchState(\n    val query: String = \"\",\n    val replace: String = \"\",\n    val replaceVisible: Boolean = false,\n    val caseSensitive: Boolean = false,\n    val matches: List<IntRange> = emptyList(),\n    val activeMatchIndex: Int = -1,\n)\n```\n\n| 필드 | 의미 |\n|---|---|\n| `query` | 검색어 |\n| `replace` | 치환 텍스트 |\n| `replaceVisible` | `true` 면 치환 입력칸과 버튼이 두 번째 줄에 표시 |\n| `caseSensitive` | 대소문자 구분 토글 (`Aa` 칩) |\n| `matches` | 본문에서 찾은 매치 범위 리스트 |\n| `activeMatchIndex` | 현재 강조된 매치의 인덱스 (`matches.getOrNull` 으로 사용) |\n\n---\n\n## 파생 프로퍼티\n\n```kotlin\nval isActive: Boolean get() = query.isNotEmpty()\nval active: IntRange? get() = matches.getOrNull(activeMatchIndex)\n```\n\n`isActive` 는 *질의가 들어있는 상태* (검색바가 열려 있어도 빈 검색어일 수 있음). `active` 는 활성 매치의 범위 — 없으면 `null`\n\n---\n\n## 변환 메서드 (with*)\n\n| 메서드 | 동작 |\n|---|---|\n| `withQuery(text, query)` | 검색어 변경 → 새로 매치 찾고 활성 인덱스 0 으로 |\n| `withReplace(value)` | 치환 텍스트만 갱신 |\n| `withReplaceVisible(value)` | 치환 줄 표시/숨김 |\n| `withCaseSensitive(text, value)` | 토글 후 동일 검색어로 다시 찾기 |\n| `retarget(text)` | 본문이 바뀌었을 때 매치 다시 찾고, 직전 활성 위치에 가장 가까운 매치를 새 활성으로 |\n\n`retarget` 가 핵심 — 사용자가 치환하거나 본문을 편집한 뒤에도 *현재 보던 매치 근처* 에 머무르게 하는 사용감을 만든다\n\n---\n\n## 이동 메서드\n\n```kotlin\nfun next(): SearchState\nfun prev(): SearchState\n```\n\n`activeMatchIndex` 만 순환 (마지막 → 0, 0 → 마지막). 매치가 없으면 자기 자신 반환\n\n---\n\n## `findAll` (private)\n\n```kotlin\nprivate fun findAll(text: String, query: String, caseSensitive: Boolean): List<IntRange>\n```\n\n`String.regionMatches` 로 한 번씩 비교하며 *겹치지 않는* 매치만 수집 — 매치를 찾으면 인덱스를 `query.length` 만큼 건너뛴다 (예: `aaa` 에서 `aa` 검색 → `[0..1]` 한 개. `[0..1]`, `[1..2]` 가 아님)\n\n대소문자는 `ignoreCase = !caseSensitive` 로 한 줄 처리. 정규식 미사용\n\n---\n\n## 비목표\n\n- 정규식 검색 — 향후 추가 예정 (별도 토글)\n- 단어 단위 (whole word) 검색 — 향후 토글\n- 다중 라인 / 멀티커서 검색 — 미지원\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.Main` `search: SearchState?` | 윈도우 상태 |\n| `page.app.SearchBar` | 모든 입력은 `SearchState` 변환으로 |\n| `CombinedHighlightTransformation` | `matches` 와 `activeMatchIndex` 로 매치 / 활성 매치 배경 색 입힘 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/editor/search_state_en.md":"# SearchState\n\n> 한국어: [search_state.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/search_state.md)\n\n> `page/editor/src/main/kotlin/page/editor/SearchState.kt` — Search / replace state\n\nImmutable data class holding the entire search-bar state. `null` means the bar is closed; an instance means open.\n\n---\n\n## Fields\n\n```kotlin\ndata class SearchState(\n    val query: String = \"\",\n    val replace: String = \"\",\n    val replaceVisible: Boolean = false,\n    val caseSensitive: Boolean = false,\n    val matches: List<IntRange> = emptyList(),\n    val activeMatchIndex: Int = -1,\n)\n```\n\n| Field | Meaning |\n|---|---|\n| `query` | Search query |\n| `replace` | Replace text |\n| `replaceVisible` | When `true`, the second row (replace input + buttons) is shown |\n| `caseSensitive` | Case-sensitivity toggle (the `Aa` chip) |\n| `matches` | Match ranges found in the body |\n| `activeMatchIndex` | Index of the currently highlighted match (used via `matches.getOrNull`) |\n\n---\n\n## Derived properties\n\n```kotlin\nval isActive: Boolean get() = query.isNotEmpty()\nval active: IntRange? get() = matches.getOrNull(activeMatchIndex)\n```\n\n`isActive` means *a query is present* (the bar can be open with an empty query). `active` is the range of the active match, or `null`.\n\n---\n\n## Transform methods (with*)\n\n| Method | Behavior |\n|---|---|\n| `withQuery(text, query)` | Updates the query → re-finds matches → resets active index to 0 |\n| `withReplace(value)` | Updates only the replace text |\n| `withReplaceVisible(value)` | Shows/hides the replace row |\n| `withCaseSensitive(text, value)` | Toggles, then re-runs the search with the same query |\n| `retarget(text)` | When body changes, re-finds matches and picks the nearest match to the previous active position as the new active |\n\n`retarget` is the load-bearing one — it preserves the *position the user was looking at* across edits and replacements.\n\n---\n\n## Cursor movement\n\n```kotlin\nfun next(): SearchState\nfun prev(): SearchState\n```\n\nCycles `activeMatchIndex` (last → 0, 0 → last). With no matches, returns itself.\n\n---\n\n## `findAll` (private)\n\n```kotlin\nprivate fun findAll(text: String, query: String, caseSensitive: Boolean): List<IntRange>\n```\n\nUses `String.regionMatches` to scan; collects *non-overlapping* matches by skipping forward by `query.length` after a hit (so searching `aa` in `aaa` yields one match `[0..1]`, not both `[0..1]`, `[1..2]`).\n\nCase folding is handled in one line via `ignoreCase = !caseSensitive`. No regex.\n\n---\n\n## Non-goals\n\n- Regex search — planned (separate toggle)\n- Whole-word search — planned (toggle)\n- Multi-line / multi-cursor search — not supported\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `page.app.Main` `search: SearchState?` | Window state |\n| `page.app.SearchBar` | Every input goes through a `SearchState` transform |\n| `CombinedHighlightTransformation` | Uses `matches` + `activeMatchIndex` to apply match / active-match backgrounds |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/editor/syntax_lexer.md":"# SyntaxLexer / Token / TokenKind\n\n> `page/editor/src/main/kotlin/page/editor/SyntaxLexer.kt` — 신택스 렉서 인터페이스\n\n언어별 렉서가 따라야 할 계약. 토큰 종류는 `TokenKind` enum 6 종으로 한정 (`PUNCT` 포함 7 종이지만 실제 색은 6 종만)\n\n> English: [syntax_lexer_en.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/syntax_lexer_en.md)\n\n---\n\n## `TokenKind`\n\n```kotlin\nenum class TokenKind {\n    KEYWORD,\n    STRING,\n    NUMBER,\n    COMMENT,\n    ANNOTATION,\n    TYPE,\n    PUNCT,\n}\n```\n\n`SyntaxPalette` 의 6 색과 1:1 매핑. `PUNCT` 는 의도적으로 색이 비어 있어 본문 톤 그대로 보임 — 자세한 이유는 `SyntaxColors` 참고\n\n---\n\n## `Token`\n\n```kotlin\ndata class Token(val kind: TokenKind, val range: IntRange) {\n    val start: Int get() = range.first\n    val endExclusive: Int get() = range.last + 1\n}\n```\n\n토큰 한 개 = 종류 + 텍스트 범위. `endExclusive` 는 `AnnotatedString.Builder.addStyle(start, end)` 의 *exclusive end* 와 맞추기 위한 편의 프로퍼티\n\n---\n\n## `SyntaxLexer`\n\n```kotlin\ninterface SyntaxLexer {\n    fun tokenize(text: String): List<Token>\n}\n```\n\n파일 한 번 읽고 토큰 리스트 한 번 만드는 단순 계약. *증분 토큰화* / *부분 갱신* 같은 최적화는 미지원 — `EditorPanel` 이 `remember(value.text)` 로 캐싱\n\n---\n\n## 구현체\n\n| 구현 | 대상 |\n|---|---|\n| `KotlinLexer` | `.kt`, `.kts` |\n| `JavaLexer` | `.java` |\n| `JsonLexer` | `.json` |\n\n분기 진입점은 `SyntaxLexers.forPath(path)` — 미지원 확장자는 `null` 반환 → 토큰 색 없음 (본문 톤만)\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.EditorPanel` `CombinedHighlightTransformation` | `lexer.tokenize(text)` 결과를 `palette[kind]` 색과 함께 `AnnotatedString` 으로 변환 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/editor/syntax_lexers.md":"# SyntaxLexers\n\n> `page/editor/src/main/kotlin/page/editor/SyntaxLexers.kt` — 확장자 기반 렉서 분기\n\n`Path` 를 받아 적절한 `SyntaxLexer` 를 골라준다. 미지원 확장자는 `null` 반환 — 호출자는 본문 톤 그대로 그리기\n\n> English: [syntax_lexers_en.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/syntax_lexers_en.md)\n\n---\n\n## `forPath`\n\n```kotlin\nfun forPath(path: Path): SyntaxLexer?\n```\n\n확장자를 소문자로 정규화한 뒤 매칭\n\n| 확장자 | 렉서 |\n|---|---|\n| `.kt`, `.kts` | `KotlinLexer` |\n| `.java` | `JavaLexer` |\n| `.json` | `JsonLexer` |\n| 그 외 / 확장자 없음 | `null` |\n\n`when` 문 한 블록만 늘리면 새 언어 추가 가능 — 새 렉서 구현 → `forPath` 분기 한 줄 추가가 끝\n\n---\n\n## 향후 추가\n\n| 확장자 | 렉서 (예정) |\n|---|---|\n| `.py` | `PythonLexer` |\n| `.md` | `MarkdownLexer` (`MarkdownFence` 와 별개로 본문 토큰화) |\n| `.xml`, `.html` | `XmlLexer` |\n| `.css`, `.scss` | `CssLexer` |\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.Main` (탭 활성화 시) | 활성 탭의 파일 경로로 렉서를 골라 `EditorPanel` 에 전달 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/editor/syntax_lexers_en.md":"# SyntaxLexers\n\n> 한국어: [syntax_lexers.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/syntax_lexers.md)\n\n> `page/editor/src/main/kotlin/page/editor/SyntaxLexers.kt` — Extension-based lexer dispatch\n\nTakes a `Path` and returns the matching `SyntaxLexer`. Unsupported extensions return `null` — the caller renders body-tone only.\n\n---\n\n## `forPath`\n\n```kotlin\nfun forPath(path: Path): SyntaxLexer?\n```\n\nLowercases the extension before matching.\n\n| Extension | Lexer |\n|---|---|\n| `.kt`, `.kts` | `KotlinLexer` |\n| `.java` | `JavaLexer` |\n| `.json` | `JsonLexer` |\n| Anything else / no extension | `null` |\n\nAdding a new language is a one-line addition to the `when` — implement the lexer and add a branch.\n\n---\n\n## Planned\n\n| Extension | Lexer (planned) |\n|---|---|\n| `.py` | `PythonLexer` |\n| `.md` | `MarkdownLexer` (separate from `MarkdownFence`, for body tokenization) |\n| `.xml`, `.html` | `XmlLexer` |\n| `.css`, `.scss` | `CssLexer` |\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `page.app.Main` (on tab activation) | Picks a lexer from the active tab's path and passes it to `EditorPanel` |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/editor/syntax_lexer_en.md":"# SyntaxLexer / Token / TokenKind\n\n> 한국어: [syntax_lexer.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/syntax_lexer.md)\n\n> `page/editor/src/main/kotlin/page/editor/SyntaxLexer.kt` — Syntax-lexer interface\n\nThe contract every language lexer follows. `TokenKind` keeps the kinds limited to seven (six color, one transparent).\n\n---\n\n## `TokenKind`\n\n```kotlin\nenum class TokenKind {\n    KEYWORD,\n    STRING,\n    NUMBER,\n    COMMENT,\n    ANNOTATION,\n    TYPE,\n    PUNCT,\n}\n```\n\nMaps 1:1 to the six colors in `SyntaxPalette`. `PUNCT` is intentionally uncolored, preserving the body tone — see `SyntaxColors` for the why.\n\n---\n\n## `Token`\n\n```kotlin\ndata class Token(val kind: TokenKind, val range: IntRange) {\n    val start: Int get() = range.first\n    val endExclusive: Int get() = range.last + 1\n}\n```\n\nOne token = kind + text range. `endExclusive` is a convenience for `AnnotatedString.Builder.addStyle(start, end)`'s *exclusive end*.\n\n---\n\n## `SyntaxLexer`\n\n```kotlin\ninterface SyntaxLexer {\n    fun tokenize(text: String): List<Token>\n}\n```\n\nA simple contract: read the file once, return a token list once. No *incremental tokenization* or *partial update* optimization — `EditorPanel` caches the result via `remember(value.text)`.\n\n---\n\n## Implementations\n\n| Implementation | Target |\n|---|---|\n| `KotlinLexer` | `.kt`, `.kts` |\n| `JavaLexer` | `.java` |\n| `JsonLexer` | `.json` |\n\nThe dispatch entry point is `SyntaxLexers.forPath(path)` — unsupported extensions return `null` (body tone only, no token colors).\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `CombinedHighlightTransformation` in `page.app.EditorPanel` | Feeds `lexer.tokenize(text)` into an `AnnotatedString` with `palette[kind]` colors |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/editor/tab_book.md":"# TabBook / OpenTab\n\n> `page/editor/src/main/kotlin/page/editor/TabBook.kt` — 탭 묶음과 활성 인덱스\n\n이뮤터블 자료구조. 탭마다 본문 / 저장된 본문 / 캐럿 / 히스토리를 따로 들고 있어 탭 간 상태가 섞이지 않는다\n\n> English: [tab_book_en.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/tab_book_en.md)\n\n---\n\n## `OpenTab`\n\n```kotlin\ndata class OpenTab(\n    val path: Path,\n    val text: String,\n    val savedText: String = text,\n    val caret: Int = 0,\n    val history: EditHistory = EditHistory(),\n) {\n    val dirty: Boolean get() = text != savedText\n}\n```\n\n| 필드 | 의미 |\n|---|---|\n| `path` | 파일 경로 (탭 식별자 역할) |\n| `text` | 현재 본문 |\n| `savedText` | 마지막 저장 시점의 본문 |\n| `caret` | 마지막 캐럿 위치 (탭 전환 시 복원) |\n| `history` | 이 탭만의 undo/redo 스택 |\n\n`dirty` 는 *현재 본문 ≠ 저장 본문* 일 때 `true`. `Ctrl+W` 누를 때 다이얼로그 띄울지 결정하는 핵심\n\n---\n\n## `TabBook`\n\n```kotlin\ndata class TabBook(\n    val tabs: List<OpenTab> = emptyList(),\n    val activeIndex: Int = -1,\n)\n```\n\n전체 탭 리스트와 활성 인덱스. `activeIndex == -1` 이면 활성 탭 없음 (탭이 0 개)\n\n---\n\n## `openOrFocus`\n\n```kotlin\nfun openOrFocus(path: Path, text: String): TabBook\n```\n\n같은 경로의 탭이 이미 있으면 활성화만, 없으면 새 탭 추가하고 마지막을 활성화. 같은 파일을 두 번 열어도 탭이 늘어나지 않게\n\n---\n\n## `close` / `closeActive`\n\n```kotlin\nfun close(index: Int): TabBook\nfun closeActive(): TabBook\n```\n\n탭 제거 후 `activeIndex` 보정\n\n| 닫는 위치 | 새 활성 인덱스 |\n|---|---|\n| `index < activeIndex` | `activeIndex - 1` |\n| `index == activeIndex` | `index.coerceAtMost(lastIndex)` (다음 탭 또는 마지막) |\n| `index > activeIndex` | 그대로 |\n\n마지막 탭을 닫으면 `TabBook()` (빈 상태) 반환\n\n---\n\n## `updateActive`\n\n```kotlin\nfun updateActive(text: String, caret: Int): TabBook\n```\n\n활성 탭의 `text` / `caret` 갱신. 같은 값이면 자기 자신 반환 (불필요한 리컴포지션 회피)\n\n---\n\n## `pushHistoryOnActive` / `undoOnActive` / `redoOnActive`\n\n```kotlin\nfun pushHistoryOnActive(prev: EditSnapshot): TabBook\nfun undoOnActive(current: EditSnapshot): Pair<TabBook, EditSnapshot>?\nfun redoOnActive(current: EditSnapshot): Pair<TabBook, EditSnapshot>?\n```\n\n`EditHistory` 호출을 활성 탭에만 적용하고 결과를 다시 끼워넣는 래퍼. undo/redo 가 성공하면 `(새 TabBook, 복원할 스냅샷)` 반환\n\n---\n\n## `markActiveSaved`\n\n```kotlin\nfun markActiveSaved(): TabBook\n```\n\n`savedText = text` 로 갱신해 `dirty` 를 `false` 로 만든다. `Ctrl+S` 후 호출\n\n---\n\n## `move`\n\n```kotlin\nfun move(from: Int, to: Int): TabBook\n```\n\n탭 재배치 (드래그 앤 드롭). `activeIndex` 도 따라 보정\n\n| 이동 케이스 | 새 활성 인덱스 |\n|---|---|\n| 활성 탭이 옮겨지는 경우 | `to` |\n| 옮긴 범위 안에 활성 탭이 끼임 | 한 칸 밀려남 |\n| 그 외 | 그대로 |\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.Main` `book: TabBook` | 윈도우 상태 |\n| `page.app.TabBar` | `book.tabs` / `activeIndex` 로 탭 칩 렌더 |\n| `Ctrl+O` / `Ctrl+W` / `Ctrl+S` 핸들러 | `openOrFocus` / `closeActive` / `markActiveSaved` |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/editor/tab_book_en.md":"# TabBook / OpenTab\n\n> 한국어: [tab_book.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/tab_book.md)\n\n> `page/editor/src/main/kotlin/page/editor/TabBook.kt` — Tab collection + active index\n\nImmutable data structure. Each tab carries its own text / saved text / caret / history, so per-tab state never mixes.\n\n---\n\n## `OpenTab`\n\n```kotlin\ndata class OpenTab(\n    val path: Path,\n    val text: String,\n    val savedText: String = text,\n    val caret: Int = 0,\n    val history: EditHistory = EditHistory(),\n) {\n    val dirty: Boolean get() = text != savedText\n}\n```\n\n| Field | Meaning |\n|---|---|\n| `path` | File path (also the tab identity) |\n| `text` | Current body |\n| `savedText` | Body as of the last save |\n| `caret` | Last caret position (restored on tab switch) |\n| `history` | undo/redo stack scoped to this tab |\n\n`dirty` is `true` when *current body ≠ saved body*. The signal that drives the unsaved-changes dialog on `Ctrl+W`.\n\n---\n\n## `TabBook`\n\n```kotlin\ndata class TabBook(\n    val tabs: List<OpenTab> = emptyList(),\n    val activeIndex: Int = -1,\n)\n```\n\nTab list + active index. `activeIndex == -1` means no active tab (zero tabs).\n\n---\n\n## `openOrFocus`\n\n```kotlin\nfun openOrFocus(path: Path, text: String): TabBook\n```\n\nIf a tab with the same path already exists, just activates it; otherwise appends a new tab and activates the last. Prevents duplicate tabs for the same file.\n\n---\n\n## `close` / `closeActive`\n\n```kotlin\nfun close(index: Int): TabBook\nfun closeActive(): TabBook\n```\n\nRemoves the tab and adjusts `activeIndex`.\n\n| Close position | New active index |\n|---|---|\n| `index < activeIndex` | `activeIndex - 1` |\n| `index == activeIndex` | `index.coerceAtMost(lastIndex)` (next tab or last) |\n| `index > activeIndex` | Unchanged |\n\nClosing the last tab returns an empty `TabBook()`.\n\n---\n\n## `updateActive`\n\n```kotlin\nfun updateActive(text: String, caret: Int): TabBook\n```\n\nUpdates `text` / `caret` on the active tab. Returns itself when nothing changed (avoids needless recomposition).\n\n---\n\n## `pushHistoryOnActive` / `undoOnActive` / `redoOnActive`\n\n```kotlin\nfun pushHistoryOnActive(prev: EditSnapshot): TabBook\nfun undoOnActive(current: EditSnapshot): Pair<TabBook, EditSnapshot>?\nfun redoOnActive(current: EditSnapshot): Pair<TabBook, EditSnapshot>?\n```\n\nWrappers that apply `EditHistory` operations to the active tab and re-stitch the result. On success, undo/redo returns `(new TabBook, snapshot to restore)`.\n\n---\n\n## `markActiveSaved`\n\n```kotlin\nfun markActiveSaved(): TabBook\n```\n\nSets `savedText = text` on the active tab → flips `dirty` to `false`. Called after `Ctrl+S`.\n\n---\n\n## `move`\n\n```kotlin\nfun move(from: Int, to: Int): TabBook\n```\n\nDrag-reorder. Adjusts `activeIndex` accordingly.\n\n| Move case | New active index |\n|---|---|\n| The active tab itself was moved | `to` |\n| Active tab is inside the swept range | Shifted by one |\n| Otherwise | Unchanged |\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `page.app.Main` `book: TabBook` | Window state |\n| `page.app.TabBar` | Renders chips from `book.tabs` / `activeIndex` |\n| `Ctrl+O` / `Ctrl+W` / `Ctrl+S` handlers | `openOrFocus` / `closeActive` / `markActiveSaved` |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/editor/text_buffer.md":"# TextBuffer / LineCol\n\n> `page/editor/src/main/kotlin/page/editor/TextBuffer.kt` — `StringBuilder` 래퍼 + 라인/컬럼 좌표\n\n`offset` ↔ `(line, col)` 변환과 라인 단위 접근을 제공. 현재 `EditorPanel` 의 라인 번호 거터·상태바·현재 줄 하이라이트가 같은 인덱스를 본다\n\n> English: [text_buffer_en.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/text_buffer_en.md)\n\n---\n\n## `LineCol`\n\n```kotlin\ndata class LineCol(val line: Int, val col: Int)\n```\n\n행/열 좌표. 둘 다 0-기반 (`(0, 0)` = 첫 줄 첫 글자)\n\n---\n\n## 생성\n\n```kotlin\nclass TextBuffer(initial: String = \"\")\n```\n\n`StringBuilder` 를 내부에 보유. 빈 버퍼 (`length = 0`) 도 `lineCount = 1` (빈 한 줄)\n\n---\n\n## 메서드\n\n| 메서드 | 동작 |\n|---|---|\n| `length` / `lineCount` / `text()` | 길이, 줄 수, 전체 문자열 스냅샷 |\n| `lineAt(index)` | 해당 줄의 텍스트 (개행 미포함). 범위 밖이면 `IllegalArgumentException` |\n| `insert(offset, text)` | 위치에 삽입 |\n| `delete(start, end)` | 범위 삭제 (`end` 는 exclusive) |\n| `insertAt(line, col, text)` | 라인/컬럼 좌표로 삽입 (내부에서 `offsetOf` 변환) |\n| `deleteAt(startLine, startCol, endLine, endCol)` | 라인/컬럼 좌표로 삭제 |\n| `offsetOf(line, col)` | 좌표 → offset |\n| `lineColOf(offset)` | offset → 좌표 |\n\n모든 변경 메서드는 `require` 로 경계 검사 — 잘못된 인자는 즉시 예외, 호출자 버그를 빨리 잡자\n\n---\n\n## 라인 좌표 계산\n\n```kotlin\nprivate fun lineStartOffset(line: Int): Int\nprivate fun lineEndOffset(line: Int): Int\n```\n\n`\\n` 을 매번 처음부터 카운트. 큰 파일에선 *O(N)* 비용이라 호출 빈도가 높으면 라인 인덱스 캐시가 필요 — 현재는 `EditorPanel` 이 `remember(value.text)` 로 한 번만 만들고 공유하므로 충분\n\n---\n\n## 비목표\n\n- 증분 갱신 / rope / piece table — `BasicTextField` 가 `String` 을 그대로 다뤄 호환성 우선\n- 멀티 캐럿 / 멀티 셀렉션 좌표 — 현재 `TextEdit` 한 쌍의 selection 만 다룸\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.EditorPanel` | `remember(value.text) { TextBuffer(...) }` 로 라인 인덱스 한 번만 만들고 공유 |\n| `LineNumberGutter` | `lineCount` 로 거터 줄 수 |\n| `EditorStatusBar` | `lineColOf(caret)` 로 현재 행/열 표시 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/editor/text_buffer_en.md":"# TextBuffer / LineCol\n\n> 한국어: [text_buffer.md](https://monkshark.github.io/PAGE_IDE/#modules/editor/text_buffer.md)\n\n> `page/editor/src/main/kotlin/page/editor/TextBuffer.kt` — `StringBuilder` wrapper + line/column coordinates\n\nProvides `offset` ↔ `(line, col)` conversion and line-level access. Today, the line-number gutter, status bar, and current-line highlight in `EditorPanel` all read from the same index.\n\n---\n\n## `LineCol`\n\n```kotlin\ndata class LineCol(val line: Int, val col: Int)\n```\n\nLine/column coordinate. Both 0-indexed (`(0, 0)` = first char of the first line).\n\n---\n\n## Construction\n\n```kotlin\nclass TextBuffer(initial: String = \"\")\n```\n\nWraps a `StringBuilder`. An empty buffer (`length = 0`) still has `lineCount = 1` (one empty line).\n\n---\n\n## Methods\n\n| Method | Behavior |\n|---|---|\n| `length` / `lineCount` / `text()` | Length, line count, full string snapshot |\n| `lineAt(index)` | Text of the line (excluding newline). Out-of-range → `IllegalArgumentException` |\n| `insert(offset, text)` | Insert at offset |\n| `delete(start, end)` | Delete range (`end` exclusive) |\n| `insertAt(line, col, text)` | Line/col-coordinate insert (internally converts via `offsetOf`) |\n| `deleteAt(startLine, startCol, endLine, endCol)` | Line/col-coordinate delete |\n| `offsetOf(line, col)` | Coord → offset |\n| `lineColOf(offset)` | Offset → coord |\n\nEvery mutating method has `require` bounds checks — bad arguments throw immediately so caller bugs surface fast.\n\n---\n\n## Line offset computation\n\n```kotlin\nprivate fun lineStartOffset(line: Int): Int\nprivate fun lineEndOffset(line: Int): Int\n```\n\nCounts `\\n` from the start each time. *O(N)* on large files, so a cached line index would be needed under heavy use — today `EditorPanel`'s `remember(value.text)` builds it once per text snapshot, which is enough.\n\n---\n\n## Non-goals\n\n- Incremental update / rope / piece table — keeps direct compatibility with `BasicTextField`'s `String`\n- Multi-caret / multi-selection coordinates — current `TextEdit` carries a single selection pair\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `page.app.EditorPanel` | `remember(value.text) { TextBuffer(...) }` builds the line index once and shares it |\n| `LineNumberGutter` | `lineCount` for the gutter row count |\n| `EditorStatusBar` | `lineColOf(caret)` for the row/col indicator |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/ui/editor_fonts.md":"# EditorFontFamily\n\n> `page/ui/src/main/kotlin/page/ui/EditorFonts.kt` — 에디터 본문 폰트 (D2Coding fallback Monospace)\n\n리소스에 `D2Coding.ttf` 가 있으면 쓰고, 없으면 `FontFamily.Monospace`. 폰트가 빠져도 빌드는 깨지지 않음\n\n> English: [editor_fonts_en.md](https://monkshark.github.io/PAGE_IDE/#modules/ui/editor_fonts_en.md)\n\n---\n\n## 정의\n\n```kotlin\nprivate const val PRIMARY_FONT_RESOURCE = \"fonts/D2Coding.ttf\"\n\nval EditorFontFamily: FontFamily = run {\n    val cl = Thread.currentThread().contextClassLoader\n        ?: object {}.javaClass.classLoader\n    if (cl?.getResource(PRIMARY_FONT_RESOURCE) != null) {\n        FontFamily(Font(resource = PRIMARY_FONT_RESOURCE))\n    } else {\n        FontFamily.Monospace\n    }\n}\n```\n\n`run { ... }` 으로 톱레벨 `val` 에 한 번만 평가. 클래스로더 조회는 부팅 시 단 한 번\n\n| 조건 | 결과 |\n|---|---|\n| `fonts/D2Coding.ttf` 가 클래스패스에 있음 | D2Coding 사용 |\n| 리소스 없음 | `FontFamily.Monospace` (JDK 기본 모노스페이스) |\n\n`Thread.currentThread().contextClassLoader` 가 `null` 인 환경 (일부 IDE 테스트 러너) 대비로 `object {}.javaClass.classLoader` 폴백. 이 한 줄이 없으면 NPE 로 앱이 시작 못 함\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.EditorPanel` | `BasicTextField` 의 `textStyle.fontFamily` |\n| `page.app.LineNumberGutter` | 라인 번호 텍스트 — 본문과 같은 폰트로 줄 높이가 정확히 맞아야 거터가 흔들리지 않음 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/ui/editor_fonts_en.md":"# EditorFontFamily\n\n> 한국어: [editor_fonts.md](https://monkshark.github.io/PAGE_IDE/#modules/ui/editor_fonts.md)\n\n> `page/ui/src/main/kotlin/page/ui/EditorFonts.kt` — Editor body font (D2Coding with Monospace fallback)\n\nUses `D2Coding.ttf` from resources if present, falls back to `FontFamily.Monospace`. A missing font does not break the build.\n\n---\n\n## Definition\n\n```kotlin\nprivate const val PRIMARY_FONT_RESOURCE = \"fonts/D2Coding.ttf\"\n\nval EditorFontFamily: FontFamily = run {\n    val cl = Thread.currentThread().contextClassLoader\n        ?: object {}.javaClass.classLoader\n    if (cl?.getResource(PRIMARY_FONT_RESOURCE) != null) {\n        FontFamily(Font(resource = PRIMARY_FONT_RESOURCE))\n    } else {\n        FontFamily.Monospace\n    }\n}\n```\n\nThe `run { ... }` evaluates once into a top-level `val`. Classloader lookup happens once at boot.\n\n| Condition | Result |\n|---|---|\n| `fonts/D2Coding.ttf` is on the classpath | D2Coding |\n| Resource missing | `FontFamily.Monospace` (JDK default mono) |\n\nThe `object {}.javaClass.classLoader` fallback covers environments where `Thread.currentThread().contextClassLoader` is `null` (some IDE test runners). Without it the app NPEs at startup.\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `page.app.EditorPanel` | `textStyle.fontFamily` for `BasicTextField` |\n| `page.app.LineNumberGutter` | Line-number text — must match the body font for line heights to align |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/ui/glass_theme.md":"# GlassTheme\n\n> `page/ui/src/main/kotlin/page/ui/GlassTheme.kt` — Material3 다크 컬러 스킴 + 래퍼 Composable\n\nPAGE 의 다크 팔레트. 메인 윈도우와 모든 다이얼로그가 이 함수로 콘텐츠를 감싸야 같은 색이 적용된다\n\n> English: [glass_theme_en.md](https://monkshark.github.io/PAGE_IDE/#modules/ui/glass_theme_en.md)\n\n---\n\n## 컬러 스킴\n\n```kotlin\nprivate val GlassDark = darkColorScheme(\n    primary = Color(0xFF8AB4FF),\n    onPrimary = Color(0xFF0A1126),\n    secondary = Color(0xFFB8C5E0),\n    background = Color(0xFF0D1117),\n    onBackground = Color(0xFFE6EDF3),\n    surface = Color(0xFF161B22),\n    onSurface = Color(0xFFE6EDF3),\n    surfaceVariant = Color(0xFF1C2128),\n    onSurfaceVariant = Color(0xFF8B949E),\n    outline = Color(0xFF30363D),\n)\n```\n\n| 토큰 | Hex | 용도 |\n|---|---|---|\n| `primary` | `#8AB4FF` | 캐럿, 활성 매치, 토글 칩 |\n| `onPrimary` | `#0A1126` | primary 위 텍스트 |\n| `secondary` | `#B8C5E0` | 보조 텍스트 |\n| `background` | `#0D1117` | 에디터 캔버스 |\n| `onBackground` | `#E6EDF3` | 본문 텍스트 |\n| `surface` | `#161B22` | 타이틀바, 탭바, 상태바, 검색바 |\n| `onSurface` | `#E6EDF3` | surface 위 텍스트 |\n| `surfaceVariant` | `#1C2128` | 사이드바 (파일 트리) |\n| `onSurfaceVariant` | `#8B949E` | 보조 라벨, 라인 번호 거터 |\n| `outline` | `#30363D` | 리사이즈 핸들 가이드 |\n\nGitHub Dark 톤. 본문 가독성과 신택스 색이 같이 살아있는 명도\n\n---\n\n## `GlassTheme`\n\n```kotlin\n@Composable\nfun GlassTheme(content: @Composable () -> Unit) {\n    MaterialTheme(colorScheme = GlassDark, content = content)\n}\n```\n\n`MaterialTheme` 래핑 한 줄. `colorScheme` 만 덮어쓰고 `Typography` / `Shapes` 는 Material3 기본값. 폰트는 `EditorFontFamily` 가 별도 처리\n\n`Window` 와 `DialogWindow` (`UnsavedChangesDialog`) 양쪽이 이 함수로 감싸야 한다. 누락된 윈도우는 Material3 기본 다크 (회색톤) 로 보임\n\n---\n\n## 향후\n\n| 토큰 | 용도 |\n|---|---|\n| `GlassLight` | 라이트 컬러 스킴 |\n| `Theme(content)` | 다크/라이트 자동 분기 래퍼 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/ui/glass_theme_en.md":"# GlassTheme\n\n> 한국어: [glass_theme.md](https://monkshark.github.io/PAGE_IDE/#modules/ui/glass_theme.md)\n\n> `page/ui/src/main/kotlin/page/ui/GlassTheme.kt` — Material3 dark color scheme + wrapper Composable\n\nPAGE's dark palette. The main window and every dialog must wrap their content with this function to get the same colors.\n\n---\n\n## Color scheme\n\n```kotlin\nprivate val GlassDark = darkColorScheme(\n    primary = Color(0xFF8AB4FF),\n    onPrimary = Color(0xFF0A1126),\n    secondary = Color(0xFFB8C5E0),\n    background = Color(0xFF0D1117),\n    onBackground = Color(0xFFE6EDF3),\n    surface = Color(0xFF161B22),\n    onSurface = Color(0xFFE6EDF3),\n    surfaceVariant = Color(0xFF1C2128),\n    onSurfaceVariant = Color(0xFF8B949E),\n    outline = Color(0xFF30363D),\n)\n```\n\n| Token | Hex | Purpose |\n|---|---|---|\n| `primary` | `#8AB4FF` | Caret, active match, toggle chips |\n| `onPrimary` | `#0A1126` | Text on primary |\n| `secondary` | `#B8C5E0` | Secondary text |\n| `background` | `#0D1117` | Editor canvas |\n| `onBackground` | `#E6EDF3` | Body text |\n| `surface` | `#161B22` | Title bar, tab bar, status bar, search bar |\n| `onSurface` | `#E6EDF3` | Text on surface |\n| `surfaceVariant` | `#1C2128` | Sidebar (file tree) |\n| `onSurfaceVariant` | `#8B949E` | Secondary labels, line-number gutter |\n| `outline` | `#30363D` | Resize-handle guide |\n\nGitHub Dark tones. Body readability and token colors both stay legible at this brightness.\n\n---\n\n## `GlassTheme`\n\n```kotlin\n@Composable\nfun GlassTheme(content: @Composable () -> Unit) {\n    MaterialTheme(colorScheme = GlassDark, content = content)\n}\n```\n\nA one-line `MaterialTheme` wrap. Only `colorScheme` is overridden; `Typography` and `Shapes` keep Material3 defaults. Fonts are handled separately by `EditorFontFamily`.\n\nBoth `Window` and `DialogWindow` (`UnsavedChangesDialog`) must wrap their content with this. A window that omits it falls back to Material3's default dark (grayer) palette.\n\n---\n\n## Planned\n\n| Token | Purpose |\n|---|---|\n| `GlassLight` | Light color scheme |\n| `Theme(content)` | Dark/light auto-dispatch wrapper |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","modules/ui/syntax_colors.md":"# SyntaxPalette / GlassDarkSyntax\n\n> `page/ui/src/main/kotlin/page/ui/SyntaxColors.kt` — 신택스 토큰 색상 번들\n\n`page:editor` 의 `TokenKind` 와 1:1 로 매핑. 팔레트와 렉서가 분리돼 있어 다른 테마는 인스턴스만 갈아끼우면 끝\n\n> English: [syntax_colors_en.md](https://monkshark.github.io/PAGE_IDE/#modules/ui/syntax_colors_en.md)\n\n---\n\n## `SyntaxPalette`\n\n```kotlin\ndata class SyntaxPalette(\n    val keyword: Color,\n    val string: Color,\n    val number: Color,\n    val comment: Color,\n    val annotation: Color,\n    val type: Color,\n)\n```\n\n`data class` — 동등성/`copy` 자동. `PUNCT` 는 의도적으로 빠져 있음 (괄호·세미콜론·콤마는 너무 자주 나와 색을 입히면 본문이 시끄럽다 → `onBackground` 그대로)\n\n---\n\n## `GlassDarkSyntax`\n\n```kotlin\nval GlassDarkSyntax = SyntaxPalette(\n    keyword = Color(0xFFFF7B72),\n    string = Color(0xFFA5D6FF),\n    number = Color(0xFF79C0FF),\n    comment = Color(0xFF8B949E),\n    annotation = Color(0xFFD2A8FF),\n    type = Color(0xFFFFA657),\n)\n```\n\n| 토큰 | Hex | 예시 |\n|---|---|---|\n| keyword | `#FF7B72` | `class`, `fun`, `val`, `if`, `return` |\n| string | `#A5D6FF` | `\"hello\"`, `'a'`, `\"\"\"multi\"\"\"` |\n| number | `#79C0FF` | `42`, `3.14f`, `0xFF`, `1e10` |\n| comment | `#8B949E` | `// line`, `/* block */` |\n| annotation | `#D2A8FF` | `@Composable`, `@Override` |\n| type | `#FFA657` | `String`, `MutableList` (대문자 시작 식별자) |\n\nGitHub Dark 와 같은 색감\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.EditorPanel` 의 `CombinedHighlightTransformation` | `Token.kind` → `palette[kind]` 매핑으로 `AnnotatedString` 의 `SpanStyle` 생성 |\n\n---\n\n## 향후\n\n| 토큰 | 용도 |\n|---|---|\n| `GlassLightSyntax` | 라이트 테마 |\n| 사용자 커스텀 팔레트 | 설정 화면 컬러 피커 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/PAGE_IDE/#README.md)\n","modules/ui/syntax_colors_en.md":"# SyntaxPalette / GlassDarkSyntax\n\n> 한국어: [syntax_colors.md](https://monkshark.github.io/PAGE_IDE/#modules/ui/syntax_colors.md)\n\n> `page/ui/src/main/kotlin/page/ui/SyntaxColors.kt` — Syntax token color bundle\n\nMaps 1:1 to `TokenKind` in `page:editor`. Palette and lexer are decoupled — swap the instance to re-color.\n\n---\n\n## `SyntaxPalette`\n\n```kotlin\ndata class SyntaxPalette(\n    val keyword: Color,\n    val string: Color,\n    val number: Color,\n    val comment: Color,\n    val annotation: Color,\n    val type: Color,\n)\n```\n\n`data class` — equality/`copy` for free. `PUNCT` is intentionally absent (parens, semicolons, commas are too frequent — coloring them adds noise → keep `onBackground`).\n\n---\n\n## `GlassDarkSyntax`\n\n```kotlin\nval GlassDarkSyntax = SyntaxPalette(\n    keyword = Color(0xFFFF7B72),\n    string = Color(0xFFA5D6FF),\n    number = Color(0xFF79C0FF),\n    comment = Color(0xFF8B949E),\n    annotation = Color(0xFFD2A8FF),\n    type = Color(0xFFFFA657),\n)\n```\n\n| Token | Hex | Examples |\n|---|---|---|\n| keyword | `#FF7B72` | `class`, `fun`, `val`, `if`, `return` |\n| string | `#A5D6FF` | `\"hello\"`, `'a'`, `\"\"\"multi\"\"\"` |\n| number | `#79C0FF` | `42`, `3.14f`, `0xFF`, `1e10` |\n| comment | `#8B949E` | `// line`, `/* block */` |\n| annotation | `#D2A8FF` | `@Composable`, `@Override` |\n| type | `#FFA657` | `String`, `MutableList` (capitalized identifiers) |\n\nGitHub Dark tones.\n\n---\n\n## Usage\n\n| Location | Purpose |\n|---|---|\n| `CombinedHighlightTransformation` in `page.app.EditorPanel` | Maps `Token.kind` → `palette[kind]` to build `SpanStyle`s on the `AnnotatedString` |\n\n---\n\n## Planned\n\n| Token | Purpose |\n|---|---|\n| `GlassLightSyntax` | Light theme |\n| User-custom palette | Settings color picker |\n\n---\n\n- [Back to index](https://monkshark.github.io/PAGE_IDE/#README_en.md)\n","README.md":"# PAGE IDE Docs\r\n\r\n> English: [README_en.md](https://monkshark.github.io/PAGE_IDE/#README_en.md)\r\n\r\n> 다언어 데스크톱 IDE — Pair · Atlas · Glass · Echo\r\n\r\nPAGE IDE의 공개 문서 진입점. 이 페이지는 목차 역할만 한다. 실제 내용은 각 항목을 따라간다.\r\n\r\n뷰어는 `node build_viewer.js`로 `index.html`을 빌드한 뒤, 별도 서버 없이 브라우저에서 바로 열 수 있다.\r\n\r\n---\r\n\r\n## 목차\r\n\r\n### 가이드\r\n- [PAGE 개요](https://monkshark.github.io/PAGE_IDE/#guides/overview.md) — 핵심 가치 네 가지 (Pair · Atlas · Glass · Echo)와 만들지 않을 것\r\n- [아키텍처](https://monkshark.github.io/PAGE_IDE/#guides/architecture.md) — 모듈 구조와 의존 방향, 기술 스택 결정\r\n\r\n### core 모듈\r\n- [PageIdentity](https://monkshark.github.io/PAGE_IDE/#modules/core/page_identity.md) — 앱 이름/약자/태그라인 한곳 모음\r\n\r\n### editor 모듈\r\n- [TextBuffer](https://monkshark.github.io/PAGE_IDE/#modules/editor/text_buffer.md) — `StringBuilder` 래퍼 + 라인/컬럼 좌표\r\n- [TabBook](https://monkshark.github.io/PAGE_IDE/#modules/editor/tab_book.md) — 탭 묶음과 활성 인덱스\r\n- [EditHistory](https://monkshark.github.io/PAGE_IDE/#modules/editor/edit_history.md) — undo/redo 스택\r\n- [FileDocument](https://monkshark.github.io/PAGE_IDE/#modules/editor/file_document.md) — 본문/저장본/dirty 한 묶음\r\n- [FileKind](https://monkshark.github.io/PAGE_IDE/#modules/editor/file_kind.md) — 텍스트/이미지/SVG 분류\r\n- [FileTree](https://monkshark.github.io/PAGE_IDE/#modules/editor/file_tree.md) — 사이드바 트리 노드 빌더\r\n- [SearchState](https://monkshark.github.io/PAGE_IDE/#modules/editor/search_state.md) — 검색어 + 매치 + active 인덱스\r\n- [Replace](https://monkshark.github.io/PAGE_IDE/#modules/editor/replace.md) — 검색 매치 치환\r\n- [AutoClose](https://monkshark.github.io/PAGE_IDE/#modules/editor/auto_close.md) — 자동 짝괄호/따옴표\r\n- [BracketMatch](https://monkshark.github.io/PAGE_IDE/#modules/editor/bracket_match.md) — 매칭 괄호 위치 찾기\r\n- [Indent](https://monkshark.github.io/PAGE_IDE/#modules/editor/indent.md) — Tab/Enter 자동 들여쓰기\r\n- [LineMove](https://monkshark.github.io/PAGE_IDE/#modules/editor/line_move.md) — 줄 이동/복제\r\n- [MarkdownFence](https://monkshark.github.io/PAGE_IDE/#modules/editor/markdown_fence.md) — 코드 펜스 안 판정\r\n- [SyntaxLexer](https://monkshark.github.io/PAGE_IDE/#modules/editor/syntax_lexer.md) — 어휘 분석기 인터페이스\r\n- [SyntaxLexers](https://monkshark.github.io/PAGE_IDE/#modules/editor/syntax_lexers.md) — 확장자 → 렉서 라우팅\r\n- [JvmLexer](https://monkshark.github.io/PAGE_IDE/#modules/editor/jvm_lexer.md) — Java/Kotlin 공통 스캐너\r\n- [KotlinLexer](https://monkshark.github.io/PAGE_IDE/#modules/editor/kotlin_lexer.md) — Kotlin 키워드 셋\r\n- [JavaLexer](https://monkshark.github.io/PAGE_IDE/#modules/editor/java_lexer.md) — Java 키워드 셋\r\n- [JsonLexer](https://monkshark.github.io/PAGE_IDE/#modules/editor/json_lexer.md) — JSON 토크나이저\r\n\r\n### ui 모듈\r\n- [GlassTheme](https://monkshark.github.io/PAGE_IDE/#modules/ui/glass_theme.md) — Glass 디자인 토큰 / `MaterialTheme` 적용\r\n- [EditorFonts](https://monkshark.github.io/PAGE_IDE/#modules/ui/editor_fonts.md) — 본문 폰트 패밀리\r\n- [SyntaxColors](https://monkshark.github.io/PAGE_IDE/#modules/ui/syntax_colors.md) — 신택스 팔레트\r\n\r\n### app 모듈\r\n- [Main](https://monkshark.github.io/PAGE_IDE/#modules/app/main.md) — `application` 진입점 + 윈도우 상태\r\n- [EditorPanel](https://monkshark.github.io/PAGE_IDE/#modules/app/editor_panel.md) — 본문 + 거터 + 하이라이트\r\n- [TabBar](https://monkshark.github.io/PAGE_IDE/#modules/app/tab_bar.md) — 상단 탭 줄 + 드래그\r\n- [SearchBar](https://monkshark.github.io/PAGE_IDE/#modules/app/search_bar.md) — 검색/치환 바\r\n- [FileTreePanel](https://monkshark.github.io/PAGE_IDE/#modules/app/file_tree_panel.md) — 좌측 사이드바\r\n- [LineNumberGutter](https://monkshark.github.io/PAGE_IDE/#modules/app/line_number_gutter.md) — 라인 번호 거터\r\n- [PreviewPanel](https://monkshark.github.io/PAGE_IDE/#modules/app/preview_panel.md) — 이미지/SVG 미리보기\r\n- [UnsavedChangesDialog](https://monkshark.github.io/PAGE_IDE/#modules/app/unsaved_changes_dialog.md) — 저장 확인 다이얼로그\r\n- [PendingClose](https://monkshark.github.io/PAGE_IDE/#modules/app/pending_close.md) — 닫기 요청 식별\r\n- [FileDialogs](https://monkshark.github.io/PAGE_IDE/#modules/app/file_dialogs.md) — `JFileChooser` 래퍼\r\n\r\n> `pair`, `atlas`, `echo`, `language`, `runtime`, `git`, `workspace` 모듈은 단계별로 추가된다.\r\n\r\n### 기능\r\n> Pair / Atlas / Glass / Echo 기능 문서는 각 단계가 끝날 때 추가된다.\r\n\r\n---\r\n\r\n## 외부 링크\r\n\r\n- GitHub: <https://github.com/Monkshark/PAGE_IDE>\r\n- 개발기 시리즈: <https://monkshark.github.io/categories/page-개발기/>\r\n","README_en.md":"# PAGE IDE Docs\r\n\r\n> 한국어: [README.md](https://monkshark.github.io/PAGE_IDE/#README.md)\r\n\r\n> Multi-language desktop IDE — Pair · Atlas · Glass · Echo\r\n\r\nPublic documentation entry point for PAGE IDE. This page only serves as a table of contents. Each item below links to the actual content.\r\n\r\nBuild the viewer with `node build_viewer.js` to produce `index.html`, which opens in a browser with no server required.\r\n\r\n---\r\n\r\n## Table of contents\r\n\r\n### Guides\r\n- [PAGE overview](https://monkshark.github.io/PAGE_IDE/#guides/overview_en.md) — The four core values (Pair · Atlas · Glass · Echo) and what we will not build\r\n- [Architecture](https://monkshark.github.io/PAGE_IDE/#guides/architecture_en.md) — Module structure, dependency direction, and stack choices\r\n\r\n### core module\r\n- [PageIdentity](https://monkshark.github.io/PAGE_IDE/#modules/core/page_identity_en.md) — Single home for app name / acronym / tagline\r\n\r\n### editor module\r\n- [TextBuffer](https://monkshark.github.io/PAGE_IDE/#modules/editor/text_buffer_en.md) — `StringBuilder` wrapper + line/column coordinates\r\n- [TabBook](https://monkshark.github.io/PAGE_IDE/#modules/editor/tab_book_en.md) — Tab collection + active index\r\n- [EditHistory](https://monkshark.github.io/PAGE_IDE/#modules/editor/edit_history_en.md) — Undo/redo stack\r\n- [FileDocument](https://monkshark.github.io/PAGE_IDE/#modules/editor/file_document_en.md) — Body / saved body / dirty bundle\r\n- [FileKind](https://monkshark.github.io/PAGE_IDE/#modules/editor/file_kind_en.md) — Text / image / SVG classification\r\n- [FileTree](https://monkshark.github.io/PAGE_IDE/#modules/editor/file_tree_en.md) — Sidebar tree node builder\r\n- [SearchState](https://monkshark.github.io/PAGE_IDE/#modules/editor/search_state_en.md) — Query + matches + act
