gistered backends and picks the right one for a file path (`forFile`). When routing needs to be overridden, `routingInterceptor` injects a decision ahead of the default extension rule.\r\n\r\nA language's static metadata (extensions, server binary names, per-OS install guidance, launch args) comes from `LanguageRegistry`, which reads `languages.json` from resources into a list of `LanguageDefinition`. This is where languages can be added as data rather than code.\r\n\r\n---\r\n\r\n## LspClient — the client and initialization\r\n\r\n`LspClient` implements the lsp4j `LanguageClient`. `start()` builds a launcher, obtains the server proxy, and announces client capabilities via `initialize`. It declares completion snippet/resolve, code-action literal/resolve, call hierarchy, diagnostic tags (`Unnecessary` · `Deprecated`), `applyEdit`, and work-done progress, to draw on as much server capability as possible.\r\n\r\nAsynchronous notifications from the server flow to listeners: subscribe with `onDiagnostics` · `onLogMessage` · `onShowMessage` · `onProgress` · `onApplyEdit`. State is tracked with `LspState`, and shutdown has two paths — a graceful `shutdown()` and a forced `forceClose()`. JDT-LS's non-standard notifications (`language/status`, etc.) are quietly accepted and ignored.\r\n\r\n---\r\n\r\n## LspTransport — process stdio\r\n\r\n`ProcessTransport` wires the server process's stdin/stdout to the client, and pumps stderr on a daemon thread into the log. On close it cleans up the process tree: on Windows it force-kills children with `taskkill /F /T`, and on other systems it destroys descendant processes. This is what keeps servers from lingering as zombies.\r\n\r\n---\r\n\r\n## Per-feature requests and augmentation\r\n\r\nCompletion, hover, definition, references, rename, signature help, symbols, call hierarchy, inlay hints, code actions, and diagnostics each live in their own file, building the lsp4j request and translating the response into a form the IDE can use.\r\n\r\nWhere the server response alone is not enough, this layer augments it. `CompletionProfile` holds the per-language keyword set and whether auto-import is supported; `CompletionAugmentor` folds keywords and import candidates (found via workspace symbols) into the completion list. `PageQuickFixes` synthesizes quick fixes the server does not provide. `CompletionFrecency` promotes frequently and recently chosen items.\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/perf/main.md":"# Perf\r\n\r\n> `page:perf` — 시작 성능 계측과 UI 멈춤 감시. 기동 구간의 시간을 재고, 이벤트 스레드가 막히면 스택을 덤프\r\n\r\nIDE에서 \"느리다\"는 대개 두 가지다. 켜는 데 오래 걸리거나, 켠 뒤 순간순간 멈춘다. 이 모듈은 그 둘을 각각 다룬다. `PerfTracer`는 기동 단계의 소요 시간을 이름 붙여 기록하고, `UiFreezeWatchdog`는 UI 스레드가 일정 시간 이상 막히면 그 순간의 스택을 뽑아 원인을 남긴다.\r\n\r\n> English: [main_en.md](https://monkshark.github.io/page-ide/#modules/perf/main_en.md)\r\n\r\n---\r\n\r\n## 구성\r\n\r\n```mermaid\r\nflowchart LR\r\n    phases[\"StartupPhases<br/>기동 구간 이름\"] --> tracer[\"PerfTracer<br/>구간별 시간 측정\"]\r\n    tracer --> reg[\"PerfRegistry<br/>전역 접근점\"]\r\n    awt[\"AWT 이벤트 큐\"] --> wd[\"UiFreezeWatchdog<br/>멈춤 감지·스택 덤프\"]\r\n```\r\n\r\n| 요소 | 역할 |\r\n|---|---|\r\n| `PerfTracer` | 구간을 begin/end로 감싸 소요 시간을 모으고 요약 |\r\n| `PerfMark` | 한 구간의 측정 결과 (phase · startMs · endMs · durationMs) |\r\n| `StartupPhases` | 기동 단계 이름 상수 모음 |\r\n| `StartupKind` | 콜드/웜 시작 구분 (COLD · WARM) |\r\n| `PerfRegistry` | 어디서든 트레이서에 접근하는 전역 진입점 |\r\n| `UiFreezeWatchdog` | 이벤트 스레드 멈춤을 감시하고 스택을 덤프 |\r\n\r\n---\r\n\r\n## PerfTracer — 기동 구간 측정\r\n\r\n`PerfTracer`는 구간을 이름으로 열고 닫는다. `begin(phase)`로 시작 시각을 찍고 `end(phase)`로 종료 시각을 찍으면 `PerfMark` 하나가 쌓인다. 블록을 감싸는 `trace(phase) { ... }` 형태도 있다. `snapshot()`은 지금까지의 마크 목록을, `summary()`는 사람이 읽을 요약 문자열을 돌려준다.\r\n\r\n측정 대상 구간은 `StartupPhases`에 상수로 고정돼 있어, 코드 여러 곳에서 같은 이름으로 같은 지점을 가리킨다.\r\n\r\n| 단계 | 의미 |\r\n|---|---|\r\n| `COMPOSE_INIT` | Compose 런타임 초기화 |\r\n| `WINDOW_SHOWN` | 첫 윈도우 표시 |\r\n| `FIRST_FRAME` | 첫 프레임 렌더 |\r\n| `WORKSPACE_OPEN` | 워크스페이스 열기 |\r\n| `WORKSPACE_INDEX_BUILT` | 파일 인덱스 구축 완료 |\r\n| `WORKSPACE_FIRST_TAB_VISIBLE` | 첫 탭이 보이는 시점 |\r\n| `LSP_SPAWNED` | 언어 서버 기동 |\r\n| `LSP_FIRST_DIAGNOSTIC` | 첫 진단 도착 |\r\n\r\n콜드 스타트와 웜 스타트는 성격이 다르므로 `StartupKind`로 구분해 기록한다. 전역 접근이 필요한 곳은 `PerfRegistry`를 거쳐 같은 트레이서를 공유한다.\r\n\r\n---\r\n\r\n## UiFreezeWatchdog — 멈춤 감시\r\n\r\nCompose Desktop은 AWT 이벤트 스레드 위에서 돈다. 이 스레드가 오래 막히면 화면 전체가 얼어붙는다. `UiFreezeWatchdog.start(thresholdMs = 3000)`는 데몬 스레드를 최고 우선순위로 띄워 AWT 이벤트 큐에 주기적으로 핑을 보낸다. 핑이 임계 시간 안에 처리되지 않으면 UI 스레드를 막고 있는 지점의 스택 트레이스를 덤프한다. 원인 코드를 사후에 지목하기 위한 진단 도구다.\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/perf/main_en.md":"# Perf\r\n\r\n> `page:perf` — startup instrumentation and a UI-freeze watchdog. Times the boot phases, and dumps stacks when the event thread stalls\r\n\r\n\"Slow\" in an IDE usually means one of two things: it takes too long to open, or it hitches after it opens. This module addresses each. `PerfTracer` records named durations for boot phases, and `UiFreezeWatchdog` captures the current stack when the UI thread is blocked beyond a threshold, so the cause is on the record.\r\n\r\n> 한국어: [main.md](https://monkshark.github.io/page-ide/#modules/perf/main.md)\r\n\r\n---\r\n\r\n## Structure\r\n\r\n```mermaid\r\nflowchart LR\r\n    phases[\"StartupPhases<br/>phase names\"] --> tracer[\"PerfTracer<br/>time each phase\"]\r\n    tracer --> reg[\"PerfRegistry<br/>global access point\"]\r\n    awt[\"AWT event queue\"] --> wd[\"UiFreezeWatchdog<br/>detect stall · dump stack\"]\r\n```\r\n\r\n| Element | Role |\r\n|---|---|\r\n| `PerfTracer` | Wraps a phase in begin/end to collect durations and summarize |\r\n| `PerfMark` | One phase's measurement (phase · startMs · endMs · durationMs) |\r\n| `StartupPhases` | Constants for the boot phase names |\r\n| `StartupKind` | Cold vs. warm start (COLD · WARM) |\r\n| `PerfRegistry` | Global entry point to reach the tracer from anywhere |\r\n| `UiFreezeWatchdog` | Watches for event-thread stalls and dumps stacks |\r\n\r\n---\r\n\r\n## PerfTracer — timing boot phases\r\n\r\n`PerfTracer` opens and closes phases by name. `begin(phase)` stamps a start time and `end(phase)` stamps the end, producing one `PerfMark`. A block form, `trace(phase) { ... }`, is also available. `snapshot()` returns the marks collected so far; `summary()` returns a human-readable string.\r\n\r\nThe phases being measured are fixed as constants in `StartupPhases`, so many call sites refer to the same point by the same name.\r\n\r\n| Phase | Meaning |\r\n|---|---|\r\n| `COMPOSE_INIT` | Compose runtime initialized |\r\n| `WINDOW_SHOWN` | First window shown |\r\n| `FIRST_FRAME` | First frame rendered |\r\n| `WORKSPACE_OPEN` | Workspace opened |\r\n| `WORKSPACE_INDEX_BUILT` | File index built |\r\n| `WORKSPACE_FIRST_TAB_VISIBLE` | First tab visible |\r\n| `LSP_SPAWNED` | Language server spawned |\r\n| `LSP_FIRST_DIAGNOSTIC` | First diagnostic arrived |\r\n\r\nCold and warm starts behave differently, so they are recorded separately via `StartupKind`. Anywhere that needs global access shares the same tracer through `PerfRegistry`.\r\n\r\n---\r\n\r\n## UiFreezeWatchdog — watching for stalls\r\n\r\nCompose Desktop runs on the AWT event thread. When that thread is blocked for long, the whole UI freezes. `UiFreezeWatchdog.start(thresholdMs = 3000)` launches a max-priority daemon thread that periodically pings the AWT event queue. If a ping is not processed within the threshold, it dumps the stack trace of whatever is blocking the UI thread. It is a diagnostic tool for naming the culprit after the fact.\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/runtime/main.md":"# Runtime\r\n\r\n> `page:runtime` — 툴체인·언어 서버 설치, 프로그램 실행, 내장 터미널. IDE가 코드를 실제로 돌리는 데 필요한 바깥세상 전부\r\n\r\n에디터가 코드를 보여 준다면, 이 모듈은 그 코드를 돌린다. 언어 서버와 SDK를 내려받아 설치하고, 실행 구성으로 프로그램을 띄워 출력을 스트리밍하고, PTY 기반 내장 터미널을 제공한다. 그 과정에서 관리 툴체인의 경로를 실행 환경에 얹어 준다.\r\n\r\n> English: [main_en.md](https://monkshark.github.io/page-ide/#modules/runtime/main_en.md)\r\n\r\n---\r\n\r\n## 구성\r\n\r\n```mermaid\r\nflowchart TB\r\n    inst[\"설치<br/>LspInstaller · SDK 인스톨러\"] --> env[\"PageRuntimeEnv<br/>관리 툴체인 경로 주입\"]\r\n    env --> run[\"RunController<br/>프로세스 실행·출력 스트림\"]\r\n    env --> term[\"TerminalManager<br/>PTY 터미널\"]\r\n    det[\"SystemToolchainDetector<br/>시스템 컴파일러 탐지\"] --> env\r\n```\r\n\r\n| 층 | 역할 |\r\n|---|---|\r\n| 설치 | `LspInstaller`와 언어 서버·SDK 인스톨러들 — 서버와 툴체인을 내려받아 `~/.page-ide` 아래 설치 |\r\n| 환경 | `PageRuntimeEnv` — 관리 툴체인의 bin·env를 실행 환경에 주입 |\r\n| 실행 | `RunController`·`RunConfig` — 실행 구성으로 프로세스를 띄우고 출력을 스트리밍 |\r\n| 터미널 | `TerminalManager`·`TerminalSession`·`AnsiParser` — pty4j 기반 내장 터미널 |\r\n| 탐지 | `SystemToolchainDetector` — 시스템에 이미 있는 컴파일러 찾기 |\r\n\r\n---\r\n\r\n## 설치 — 서버와 툴체인\r\n\r\n`LspInstaller`는 언어 서버 설치의 공통 인터페이스다.\r\n\r\n```kotlin\r\ninterface LspInstaller {\r\n    val languageId: String\r\n    val precheck: Precheck\r\n    fun isInstalled(): Boolean\r\n    fun executable(): Path?\r\n    fun install(version: String?, onProgress: (Progress) -> Unit)\r\n}\r\n```\r\n\r\n`install`은 다운로드·압축 해제·완료·실패를 `Progress`로 흘려, UI가 진행률을 그린다. 설치물은 `~/.page-ide/lsp` 아래 언어·버전별로 정리된다. 구현체는 KLS(Kotlin)·JDT-LS(Java)·gopls·Metals·rust-analyzer·HLS·F# 등 언어별로 있다.\r\n\r\n언어 서버뿐 아니라 SDK·툴체인 인스톨러도 여기 산다. JDK·Node·Python·Go·Rust·Dart·Flutter·.NET·Swift·C++(LLVM/MinGW)·Ruby, 그리고 Windows SDK까지. 시스템에 이미 설치된 컴파일러는 `SystemToolchainDetector`가 MSVC·clang·gcc·Xcode를 탐지해, 굳이 다시 받지 않도록 한다.\r\n\r\n---\r\n\r\n## PageRuntimeEnv — 실행 환경 주입\r\n\r\n관리 툴체인은 사용자의 `PATH`에 없다. `PageRuntimeEnv`는 프로그램을 띄우기 직전, 설치된 툴체인들의 bin 디렉터리를 `PATH` 앞에 붙이고 `JAVA_HOME`·`GOROOT`·`DOTNET_ROOT`·`SDKROOT` 같은 환경 변수를 채운다. 그래야 관리 JDK로 빌드하고 관리 Go로 실행하는 흐름이 이어진다.\r\n\r\nWindows에서는 대소문자만 다른 중복 환경 변수를 하나로 접고(`normalizeForLaunch`), MinGW용 clangd 설정을 자동 생성한다. Java처럼 특정 버전 이상을 요구하는 백엔드에는 `pinJavaRuntime(minMajor = 21)`으로 관리 JDK나 시스템 JDK 중 조건을 만족하는 것을 골라 고정한다.\r\n\r\n---\r\n\r\n## RunController — 프로그램 실행\r\n\r\n`RunConfig`는 하나의 실행 구성이다 — 명령·인자·작업 디렉터리·환경, 그리고 선택적 prelaunch 빌드 단계. `RunController`는 이 구성으로 프로세스를 띄우고 stdout·stderr를 8KB 청크로 읽어 `RunEvent`(Started·Stdout·Stderr·Exited·Failed)로 흘린다.\r\n\r\nprelaunch가 있으면 본 실행 전에 빌드를 돌리는데, `BuildCache`가 입력이 안 바뀌었다고 판정하면 재빌드를 건너뛴다. 실행 환경은 `PageRuntimeEnv`가 주입한 뒤 구성의 `env`를 덧씌운다. 여러 구성과 활성 선택은 `RunConfigsState`가 관리한다.\r\n\r\n---\r\n\r\n## TerminalManager — 내장 터미널\r\n\r\n터미널은 흉내가 아니라 진짜 PTY다. `TerminalSession`은 pty4j `PtyProcess`로 셸을 띄우고, `TerminalManager`가 탭 여러 개를 관리한다. 셸은 OS별로 탐지한다 — PowerShell·CMD·Git Bash·WSL(Windows), bash·zsh·sh(그 외). `TerminalBuffer`·`TerminalGrid`가 화면 격자를, `AnsiParser`가 ANSI 이스케이프를 해석해 색과 커서를 재현한다.\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/runtime/main_en.md":"# Runtime\r\n\r\n> `page:runtime` — toolchain and language-server installation, program execution, and an embedded terminal. Everything from the outside world the IDE needs to actually run code\r\n\r\nIf the editor shows the code, this module runs it. It downloads and installs language servers and SDKs, launches programs from a run configuration and streams their output, and provides a PTY-backed embedded terminal. Along the way it layers managed-toolchain paths onto the execution environment.\r\n\r\n> 한국어: [main.md](https://monkshark.github.io/page-ide/#modules/runtime/main.md)\r\n\r\n---\r\n\r\n## Structure\r\n\r\n```mermaid\r\nflowchart TB\r\n    inst[\"install<br/>LspInstaller · SDK installers\"] --> env[\"PageRuntimeEnv<br/>inject managed toolchain paths\"]\r\n    env --> run[\"RunController<br/>run process · stream output\"]\r\n    env --> term[\"TerminalManager<br/>PTY terminal\"]\r\n    det[\"SystemToolchainDetector<br/>detect system compilers\"] --> env\r\n```\r\n\r\n| Layer | Role |\r\n|---|---|\r\n| Install | `LspInstaller` and the language-server / SDK installers — download servers and toolchains into `~/.page-ide` |\r\n| Environment | `PageRuntimeEnv` — inject managed-toolchain bin/env into the run environment |\r\n| Execution | `RunController` · `RunConfig` — launch a process from a run config and stream output |\r\n| Terminal | `TerminalManager` · `TerminalSession` · `AnsiParser` — pty4j-backed embedded terminal |\r\n| Detection | `SystemToolchainDetector` — find compilers already on the system |\r\n\r\n---\r\n\r\n## Install — servers and toolchains\r\n\r\n`LspInstaller` is the shared interface for installing a language server.\r\n\r\n```kotlin\r\ninterface LspInstaller {\r\n    val languageId: String\r\n    val precheck: Precheck\r\n    fun isInstalled(): Boolean\r\n    fun executable(): Path?\r\n    fun install(version: String?, onProgress: (Progress) -> Unit)\r\n}\r\n```\r\n\r\n`install` streams download, extract, done, and failure as `Progress`, so the UI can draw progress. Installed artifacts are organized under `~/.page-ide/lsp` by language and version. Implementations exist per language — KLS (Kotlin), JDT-LS (Java), gopls, Metals, rust-analyzer, HLS, F#, and more.\r\n\r\nBeyond language servers, SDK and toolchain installers live here too: JDK, Node, Python, Go, Rust, Dart, Flutter, .NET, Swift, C++ (LLVM/MinGW), Ruby, and even the Windows SDK. Compilers already installed on the system are detected by `SystemToolchainDetector` — MSVC, clang, gcc, Xcode — so they need not be downloaded again.\r\n\r\n---\r\n\r\n## PageRuntimeEnv — injecting the run environment\r\n\r\nManaged toolchains are not on the user's `PATH`. Just before launching a program, `PageRuntimeEnv` prepends the bin directories of installed toolchains to `PATH` and fills environment variables like `JAVA_HOME`, `GOROOT`, `DOTNET_ROOT`, and `SDKROOT`. That is what makes building with the managed JDK and running with managed Go hold together.\r\n\r\nOn Windows it collapses environment variables that differ only in case (`normalizeForLaunch`) and auto-generates a clangd config for MinGW. For backends that require a minimum version, like Java, `pinJavaRuntime(minMajor = 21)` selects and pins a managed or system JDK that satisfies the constraint.\r\n\r\n---\r\n\r\n## RunController — running programs\r\n\r\n`RunConfig` is one run configuration — command, args, working directory, environment, and an optional prelaunch build step. `RunController` launches a process from it and reads stdout/stderr in 8 KB chunks, emitting them as `RunEvent` (Started · Stdout · Stderr · Exited · Failed).\r\n\r\nWhen a prelaunch step is present, it runs a build before the main run; if `BuildCache` judges the inputs unchanged, the rebuild is skipped. The run environment is injected by `PageRuntimeEnv` and then overlaid with the config's own `env`. Multiple configs and the active selection are managed by `RunConfigsState`.\r\n\r\n---\r\n\r\n## TerminalManager — the embedded terminal\r\n\r\nThe terminal is a real PTY, not an imitation. `TerminalSession` spawns a shell via pty4j `PtyProcess`, and `TerminalManager` manages multiple tabs. Shells are detected per OS — PowerShell, CMD, Git Bash, WSL (Windows); bash, zsh, sh (otherwise). `TerminalBuffer` · `TerminalGrid` hold the screen grid, and `AnsiParser` interprets ANSI escapes to reproduce color and cursor.\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/shared-core/main.md":"# Shared Core\n\n> `shared-core` — 데스크톱 IDE와 wasm 문서 뷰어가 함께 쓰는 멀티플랫폼 기반 코드\n\nPAGE는 두 곳에서 같은 로직이 필요하다. JVM 데스크톱 IDE와, 브라우저에서 도는 wasm 문서 뷰어다. 마크다운을 파싱하고, 그래프를 다루고, 경로를 계산하는 코드를 양쪽에 두 번 짜지 않으려고, 순수 Kotlin과 Compose로만 된 부분을 `shared-core` 로 뽑았다. 이 모듈은 `jvm` 과 `wasmJs` 두 타깃으로 컴파일되고, `java.*` 를 전혀 쓰지 않는다.\n\n> English: [main_en.md](https://monkshark.github.io/page-ide/#modules/shared-core/main_en.md)\n\n---\n\n## 구성\n\n| 패키지 | 역할 |\n|---|---|\n| `md` | 마크다운 파서 (`MdParser` → `MdNode` 트리) |\n| `json` | 의존성 없는 소형 JSON 파서 (`Json`) |\n| `syntax` | 렉서 인터페이스와 Kotlin·Java·JSON 렉서 |\n| `graph` | 슬림 그래프 모델·질의·스냅샷 코덱 |\n| `widget` | Compose 그래프 캔버스 (`GraphCanvas`) |\n| `path` | 문자열 기반 경로 (`FilePath`, `java.nio.Path` 대체) |\n| `docs` | 문서 라우팅·인덱스·언어 변형 |\n\n---\n\n## md — 마크다운 파서\n\n`MdParser.parse(src)` 는 마크다운을 `MdNode` 트리로 바꾼다. 헤딩·문단·코드 펜스·목록·태스크 목록·표·인용·콜아웃·인라인(링크·강조·코드 스팬)을 다룬다. 헤딩에는 슬러그가 붙어 목차와 앵커에 쓰인다.\n\n특별한 노드가 하나 있다. 펜스 언어가 `page-widget` 이면 파서는 `WidgetRef(name, args)` 를 낸다. 문서 뷰어는 이걸 만나면 산문 대신 Compose 위젯 섬을 그 자리에 마운트한다.\n\n---\n\n## json — 소형 파서\n\n`Json.parse(text)` 는 텍스트를 `JsonValue`(`JsonObject`·`JsonArray`·`JsonString`·`JsonNumber`·`JsonBool`·`JsonNull`) 로 파싱한다. `asString()`·`asArray()`·`asObject()` 확장으로 값을 꺼낸다. 외부 라이브러리 의존이 없어 wasm 타깃에서도 그대로 돈다 — 스냅샷 JSON과 문서 인덱스를 읽는 데 쓴다.\n\n---\n\n## syntax — 렉서\n\n`SyntaxLexer.tokenize(text)` 는 `Token`(`TokenKind` + 범위) 목록을 낸다. `CodeLexers.forLang(lang)` 이 언어 이름을 렉서로 라우팅한다.\n\n| 언어 | 렉서 |\n|---|---|\n| `kotlin` · `kt` · `kts` | `KotlinLexer` |\n| `java` | `JavaLexer` |\n| `json` | `JsonLexer` |\n\n`SyntaxHighlight` 와 `SyntaxPalette` 가 토큰을 색으로 옮긴다. 문서 뷰어 코드 블록 하이라이팅이 이 층 위에 선다.\n\n---\n\n## graph — 모델과 질의\n\n`GraphNode`·`GraphEdge`·`GraphSlice` 가 슬림 그래프를 이룬다. `GraphInsights` 는 한 노드의 이웃(`neighborhood`), 진입 차수(`indegrees`), 순환(`cycles`, 강결합 요소 기반)을 계산한다. `GraphSnapshot.parse(json)` 은 내보낸 JSON 스냅샷을 다시 `GraphSlice` 로 읽어들인다.\n\n---\n\n## widget — 그래프 캔버스\n\n`GraphCanvas` 는 `GraphSlice` 를 받아 노드·엣지를 그리는 Compose 컴포저블이다. 노드에 마우스를 올리면 이웃만 남고, 휠로 확대·드래그로 이동한다. 색은 `GraphColors` 로 주입받아 테마와 무관하게 동작한다.\n\n---\n\n## path — FilePath\n\n`FilePath` 는 문자열 하나를 감싼 경로 값이다. `parent`·`fileName`·`segments`·`startsWith`·`relativize`·`resolve` 를 제공하고, 입력은 `/` 로 정규화한다. `java.nio.Path` 가 없는 wasm 에서도 같은 계층 연산을 하려고 만든 대체물로, Atlas의 그래프 모델이 이 위에 선다.\n\n---\n\n## docs — 라우팅\n\n문서 뷰어의 경로 규칙이 여기 모인다. `parseDocIndex` 는 문서 인덱스 JSON을 읽고, `parseDocHash`·`buildDocHash` 는 `path#heading` 형태의 URL 해시를 오간다. `DocLang` 은 `_en` 접미어로 한국어·영어 변형을 짝짓고, `buildDocTree` 는 평면 경로 목록을 사이드바 트리로 접는다.\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/shared-core/main_en.md":"# Shared Core\n\n> `shared-core` — multiplatform foundation shared by the desktop IDE and the wasm docs viewer\n\nPAGE needs the same logic in two places: the JVM desktop IDE and the wasm docs viewer that runs in a browser. To avoid writing markdown parsing, graph handling, and path math twice, the parts that are pure Kotlin and Compose live in `shared-core`. This module compiles to both `jvm` and `wasmJs` targets and never touches `java.*`.\n\n> 한국어: [main.md](https://monkshark.github.io/page-ide/#modules/shared-core/main.md)\n\n---\n\n## Structure\n\n| Package | Role |\n|---|---|\n| `md` | Markdown parser (`MdParser` → `MdNode` tree) |\n| `json` | Dependency-free small JSON parser (`Json`) |\n| `syntax` | Lexer interface plus Kotlin / Java / JSON lexers |\n| `graph` | Slim graph model / queries / snapshot codec |\n| `widget` | Compose graph canvas (`GraphCanvas`) |\n| `path` | String-backed path (`FilePath`, a `java.nio.Path` replacement) |\n| `docs` | Doc routing / index / language variants |\n\n---\n\n## md — markdown parser\n\n`MdParser.parse(src)` turns markdown into an `MdNode` tree. It handles headings, paragraphs, code fences, lists, task lists, tables, block quotes, callouts, and inlines (links, emphasis, code spans). Headings carry a slug used by the table of contents and anchors.\n\nOne node is special. When a fence's language is `page-widget`, the parser emits `WidgetRef(name, args)`. On encountering it, the docs viewer mounts a Compose widget island in place instead of prose.\n\n---\n\n## json — small parser\n\n`Json.parse(text)` parses text into a `JsonValue` (`JsonObject`, `JsonArray`, `JsonString`, `JsonNumber`, `JsonBool`, `JsonNull`). The `asString()`, `asArray()`, and `asObject()` extensions pull values out. It has no external dependency, so it runs as-is on the wasm target — used to read snapshot JSON and the document index.\n\n---\n\n## syntax — lexers\n\n`SyntaxLexer.tokenize(text)` returns a list of `Token`s (a `TokenKind` plus a range). `CodeLexers.forLang(lang)` routes a language name to a lexer.\n\n| Language | Lexer |\n|---|---|\n| `kotlin` · `kt` · `kts` | `KotlinLexer` |\n| `java` | `JavaLexer` |\n| `json` | `JsonLexer` |\n\n`SyntaxHighlight` and `SyntaxPalette` map tokens to colors. The docs viewer's code-block highlighting builds on this layer.\n\n---\n\n## graph — model and queries\n\n`GraphNode`, `GraphEdge`, and `GraphSlice` form a slim graph. `GraphInsights` computes a node's neighborhood (`neighborhood`), in-degrees (`indegrees`), and cycles (`cycles`, via strongly-connected components). `GraphSnapshot.parse(json)` reads an exported JSON snapshot back into a `GraphSlice`.\n\n---\n\n## widget — graph canvas\n\n`GraphCanvas` is a Compose composable that takes a `GraphSlice` and draws its nodes and edges. Hover a node to isolate its neighbors; scroll to zoom, drag to pan. Colors are injected via `GraphColors`, so it works regardless of theme.\n\n---\n\n## path — FilePath\n\n`FilePath` wraps a single string as a path value. It offers `parent`, `fileName`, `segments`, `startsWith`, `relativize`, and `resolve`, and normalizes input on `/`. It is the replacement for `java.nio.Path` where wasm has none, so Atlas's graph model can do the same hierarchy math on both targets.\n\n---\n\n## docs — routing\n\nThe docs viewer's path rules live here. `parseDocIndex` reads the document index JSON; `parseDocHash` and `buildDocHash` move between the `path#heading` URL hash and its parts. `DocLang` pairs Korean and English variants by the `_en` suffix, and `buildDocTree` folds a flat path list into the sidebar tree.\n\n---\n\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\n","modules/ui/editor_fonts.md":"# EditorFontFamily\r\n\r\n> `page/ui/src/main/kotlin/page/ui/EditorFonts.kt` — 에디터 본문 폰트 (D2Coding fallback Monospace)\r\n\r\n리소스에 `D2Coding.ttf` 가 있으면 쓰고, 없으면 `FontFamily.Monospace`. 폰트가 빠져도 빌드는 깨지지 않음\r\n\r\n> English: [editor_fonts_en.md](https://monkshark.github.io/page-ide/#modules/ui/editor_fonts_en.md)\r\n\r\n---\r\n\r\n## 정의\r\n\r\n```kotlin\r\nprivate const val PRIMARY_FONT_RESOURCE = \"fonts/D2Coding.ttf\"\r\n\r\nval EditorFontFamily: FontFamily = run {\r\n    val cl = Thread.currentThread().contextClassLoader\r\n        ?: object {}.javaClass.classLoader\r\n    if (cl?.getResource(PRIMARY_FONT_RESOURCE) != null) {\r\n        FontFamily(Font(resource = PRIMARY_FONT_RESOURCE))\r\n    } else {\r\n        FontFamily.Monospace\r\n    }\r\n}\r\n```\r\n\r\n`run { ... }` 으로 톱레벨 `val` 에 한 번만 평가. 클래스로더 조회는 부팅 시 단 한 번\r\n\r\n| 조건 | 결과 |\r\n|---|---|\r\n| `fonts/D2Coding.ttf` 가 클래스패스에 있음 | D2Coding 사용 |\r\n| 리소스 없음 | `FontFamily.Monospace` (JDK 기본 모노스페이스) |\r\n\r\n`Thread.currentThread().contextClassLoader` 가 `null` 인 환경 (일부 IDE 테스트 러너) 대비로 `object {}.javaClass.classLoader` 폴백. 이 한 줄이 없으면 NPE 로 앱이 시작 못 함\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.EditorPanel` | `BasicTextField` 의 `textStyle.fontFamily` |\r\n| `page.app.LineNumberGutter` | 라인 번호 텍스트 — 본문과 같은 폰트로 줄 높이가 정확히 맞아야 거터가 흔들리지 않음 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/ui/editor_fonts_en.md":"# EditorFontFamily\r\n\r\n> 한국어: [editor_fonts.md](https://monkshark.github.io/page-ide/#modules/ui/editor_fonts.md)\r\n\r\n> `page/ui/src/main/kotlin/page/ui/EditorFonts.kt` — Editor body font (D2Coding with Monospace fallback)\r\n\r\nUses `D2Coding.ttf` from resources if present, falls back to `FontFamily.Monospace`. A missing font does not break the build.\r\n\r\n---\r\n\r\n## Definition\r\n\r\n```kotlin\r\nprivate const val PRIMARY_FONT_RESOURCE = \"fonts/D2Coding.ttf\"\r\n\r\nval EditorFontFamily: FontFamily = run {\r\n    val cl = Thread.currentThread().contextClassLoader\r\n        ?: object {}.javaClass.classLoader\r\n    if (cl?.getResource(PRIMARY_FONT_RESOURCE) != null) {\r\n        FontFamily(Font(resource = PRIMARY_FONT_RESOURCE))\r\n    } else {\r\n        FontFamily.Monospace\r\n    }\r\n}\r\n```\r\n\r\nThe `run { ... }` evaluates once into a top-level `val`. Classloader lookup happens once at boot.\r\n\r\n| Condition | Result |\r\n|---|---|\r\n| `fonts/D2Coding.ttf` is on the classpath | D2Coding |\r\n| Resource missing | `FontFamily.Monospace` (JDK default mono) |\r\n\r\nThe `object {}.javaClass.classLoader` fallback covers environments where `Thread.currentThread().contextClassLoader` is `null` (some IDE test runners). Without it the app NPEs at startup.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.EditorPanel` | `textStyle.fontFamily` for `BasicTextField` |\r\n| `page.app.LineNumberGutter` | Line-number text — must match the body font for line heights to align |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/ui/glass_theme.md":"# GlassTheme\r\n\r\n> `page/ui/src/main/kotlin/page/ui/GlassTheme.kt` — Material3 다크 컬러 스킴 + 래퍼 Composable\r\n\r\nPAGE 의 다크 팔레트. 메인 윈도우와 모든 다이얼로그가 이 함수로 콘텐츠를 감싸야 같은 색이 적용된다\r\n\r\n> English: [glass_theme_en.md](https://monkshark.github.io/page-ide/#modules/ui/glass_theme_en.md)\r\n\r\n---\r\n\r\n## 컬러 스킴\r\n\r\n```kotlin\r\nprivate val GlassDark = darkColorScheme(\r\n    primary = Color(0xFF8AB4FF),\r\n    onPrimary = Color(0xFF0A1126),\r\n    secondary = Color(0xFFB8C5E0),\r\n    background = Color(0xFF0D1117),\r\n    onBackground = Color(0xFFE6EDF3),\r\n    surface = Color(0xFF161B22),\r\n    onSurface = Color(0xFFE6EDF3),\r\n    surfaceVariant = Color(0xFF1C2128),\r\n    onSurfaceVariant = Color(0xFF8B949E),\r\n    outline = Color(0xFF30363D),\r\n)\r\n```\r\n\r\n| 토큰 | Hex | 용도 |\r\n|---|---|---|\r\n| `primary` | `#8AB4FF` | 캐럿, 활성 매치, 토글 칩 |\r\n| `onPrimary` | `#0A1126` | primary 위 텍스트 |\r\n| `secondary` | `#B8C5E0` | 보조 텍스트 |\r\n| `background` | `#0D1117` | 에디터 캔버스 |\r\n| `onBackground` | `#E6EDF3` | 본문 텍스트 |\r\n| `surface` | `#161B22` | 타이틀바, 탭바, 상태바, 검색바 |\r\n| `onSurface` | `#E6EDF3` | surface 위 텍스트 |\r\n| `surfaceVariant` | `#1C2128` | 사이드바 (파일 트리) |\r\n| `onSurfaceVariant` | `#8B949E` | 보조 라벨, 라인 번호 거터 |\r\n| `outline` | `#30363D` | 리사이즈 핸들 가이드 |\r\n\r\nGitHub Dark 톤. 본문 가독성과 신택스 색이 같이 살아있는 명도\r\n\r\n---\r\n\r\n## `GlassTheme`\r\n\r\n```kotlin\r\n@Composable\r\nfun GlassTheme(content: @Composable () -> Unit) {\r\n    MaterialTheme(colorScheme = GlassDark, content = content)\r\n}\r\n```\r\n\r\n`MaterialTheme` 래핑 한 줄. `colorScheme` 만 덮어쓰고 `Typography` / `Shapes` 는 Material3 기본값. 폰트는 `EditorFontFamily` 가 별도 처리\r\n\r\n`Window` 와 `DialogWindow` (`UnsavedChangesDialog`) 양쪽이 이 함수로 감싸야 한다. 누락된 윈도우는 Material3 기본 다크 (회색톤) 로 보임\r\n\r\n---\r\n\r\n## 향후\r\n\r\n| 토큰 | 용도 |\r\n|---|---|\r\n| `GlassLight` | 라이트 컬러 스킴 |\r\n| `Theme(content)` | 다크/라이트 자동 분기 래퍼 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/ui/glass_theme_en.md":"# GlassTheme\r\n\r\n> 한국어: [glass_theme.md](https://monkshark.github.io/page-ide/#modules/ui/glass_theme.md)\r\n\r\n> `page/ui/src/main/kotlin/page/ui/GlassTheme.kt` — Material3 dark color scheme + wrapper Composable\r\n\r\nPAGE's dark palette. The main window and every dialog must wrap their content with this function to get the same colors.\r\n\r\n---\r\n\r\n## Color scheme\r\n\r\n```kotlin\r\nprivate val GlassDark = darkColorScheme(\r\n    primary = Color(0xFF8AB4FF),\r\n    onPrimary = Color(0xFF0A1126),\r\n    secondary = Color(0xFFB8C5E0),\r\n    background = Color(0xFF0D1117),\r\n    onBackground = Color(0xFFE6EDF3),\r\n    surface = Color(0xFF161B22),\r\n    onSurface = Color(0xFFE6EDF3),\r\n    surfaceVariant = Color(0xFF1C2128),\r\n    onSurfaceVariant = Color(0xFF8B949E),\r\n    outline = Color(0xFF30363D),\r\n)\r\n```\r\n\r\n| Token | Hex | Purpose |\r\n|---|---|---|\r\n| `primary` | `#8AB4FF` | Caret, active match, toggle chips |\r\n| `onPrimary` | `#0A1126` | Text on primary |\r\n| `secondary` | `#B8C5E0` | Secondary text |\r\n| `background` | `#0D1117` | Editor canvas |\r\n| `onBackground` | `#E6EDF3` | Body text |\r\n| `surface` | `#161B22` | Title bar, tab bar, status bar, search bar |\r\n| `onSurface` | `#E6EDF3` | Text on surface |\r\n| `surfaceVariant` | `#1C2128` | Sidebar (file tree) |\r\n| `onSurfaceVariant` | `#8B949E` | Secondary labels, line-number gutter |\r\n| `outline` | `#30363D` | Resize-handle guide |\r\n\r\nGitHub Dark tones. Body readability and token colors both stay legible at this brightness.\r\n\r\n---\r\n\r\n## `GlassTheme`\r\n\r\n```kotlin\r\n@Composable\r\nfun GlassTheme(content: @Composable () -> Unit) {\r\n    MaterialTheme(colorScheme = GlassDark, content = content)\r\n}\r\n```\r\n\r\nA one-line `MaterialTheme` wrap. Only `colorScheme` is overridden; `Typography` and `Shapes` keep Material3 defaults. Fonts are handled separately by `EditorFontFamily`.\r\n\r\nBoth `Window` and `DialogWindow` (`UnsavedChangesDialog`) must wrap their content with this. A window that omits it falls back to Material3's default dark (grayer) palette.\r\n\r\n---\r\n\r\n## Planned\r\n\r\n| Token | Purpose |\r\n|---|---|\r\n| `GlassLight` | Light color scheme |\r\n| `Theme(content)` | Dark/light auto-dispatch wrapper |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/ui/syntax_colors.md":"# SyntaxPalette / GlassDarkSyntax\r\n\r\n> `page/ui/src/main/kotlin/page/ui/SyntaxColors.kt` — 신택스 토큰 색상 번들\r\n\r\n`page:editor` 의 `TokenKind` 와 1:1 로 매핑. 팔레트와 렉서가 분리돼 있어 다른 테마는 인스턴스만 갈아끼우면 끝\r\n\r\n> English: [syntax_colors_en.md](https://monkshark.github.io/page-ide/#modules/ui/syntax_colors_en.md)\r\n\r\n---\r\n\r\n## `SyntaxPalette`\r\n\r\n```kotlin\r\ndata class SyntaxPalette(\r\n    val keyword: Color,\r\n    val string: Color,\r\n    val number: Color,\r\n    val comment: Color,\r\n    val annotation: Color,\r\n    val type: Color,\r\n)\r\n```\r\n\r\n`data class` — 동등성/`copy` 자동. `PUNCT` 는 의도적으로 빠져 있음 (괄호·세미콜론·콤마는 너무 자주 나와 색을 입히면 본문이 시끄럽다 → `onBackground` 그대로)\r\n\r\n---\r\n\r\n## `GlassDarkSyntax`\r\n\r\n```kotlin\r\nval GlassDarkSyntax = SyntaxPalette(\r\n    keyword = Color(0xFFFF7B72),\r\n    string = Color(0xFFA5D6FF),\r\n    number = Color(0xFF79C0FF),\r\n    comment = Color(0xFF8B949E),\r\n    annotation = Color(0xFFD2A8FF),\r\n    type = Color(0xFFFFA657),\r\n)\r\n```\r\n\r\n| 토큰 | Hex | 예시 |\r\n|---|---|---|\r\n| keyword | `#FF7B72` | `class`, `fun`, `val`, `if`, `return` |\r\n| string | `#A5D6FF` | `\"hello\"`, `'a'`, `\"\"\"multi\"\"\"` |\r\n| number | `#79C0FF` | `42`, `3.14f`, `0xFF`, `1e10` |\r\n| comment | `#8B949E` | `// line`, `/* block */` |\r\n| annotation | `#D2A8FF` | `@Composable`, `@Override` |\r\n| type | `#FFA657` | `String`, `MutableList` (대문자 시작 식별자) |\r\n\r\nGitHub Dark 와 같은 색감\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.EditorPanel` 의 `CombinedHighlightTransformation` | `Token.kind` → `palette[kind]` 매핑으로 `AnnotatedString` 의 `SpanStyle` 생성 |\r\n\r\n---\r\n\r\n## 향후\r\n\r\n| 토큰 | 용도 |\r\n|---|---|\r\n| `GlassLightSyntax` | 라이트 테마 |\r\n| 사용자 커스텀 팔레트 | 설정 화면 컬러 피커 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/ui/syntax_colors_en.md":"# SyntaxPalette / GlassDarkSyntax\r\n\r\n> 한국어: [syntax_colors.md](https://monkshark.github.io/page-ide/#modules/ui/syntax_colors.md)\r\n\r\n> `page/ui/src/main/kotlin/page/ui/SyntaxColors.kt` — Syntax token color bundle\r\n\r\nMaps 1:1 to `TokenKind` in `page:editor`. Palette and lexer are decoupled — swap the instance to re-color.\r\n\r\n---\r\n\r\n## `SyntaxPalette`\r\n\r\n```kotlin\r\ndata class SyntaxPalette(\r\n    val keyword: Color,\r\n    val string: Color,\r\n    val number: Color,\r\n    val comment: Color,\r\n    val annotation: Color,\r\n    val type: Color,\r\n)\r\n```\r\n\r\n`data class` — equality/`copy` for free. `PUNCT` is intentionally absent (parens, semicolons, commas are too frequent — coloring them adds noise → keep `onBackground`).\r\n\r\n---\r\n\r\n## `GlassDarkSyntax`\r\n\r\n```kotlin\r\nval GlassDarkSyntax = SyntaxPalette(\r\n    keyword = Color(0xFFFF7B72),\r\n    string = Color(0xFFA5D6FF),\r\n    number = Color(0xFF79C0FF),\r\n    comment = Color(0xFF8B949E),\r\n    annotation = Color(0xFFD2A8FF),\r\n    type = Color(0xFFFFA657),\r\n)\r\n```\r\n\r\n| Token | Hex | Examples |\r\n|---|---|---|\r\n| keyword | `#FF7B72` | `class`, `fun`, `val`, `if`, `return` |\r\n| string | `#A5D6FF` | `\"hello\"`, `'a'`, `\"\"\"multi\"\"\"` |\r\n| number | `#79C0FF` | `42`, `3.14f`, `0xFF`, `1e10` |\r\n| comment | `#8B949E` | `// line`, `/* block */` |\r\n| annotation | `#D2A8FF` | `@Composable`, `@Override` |\r\n| type | `#FFA657` | `String`, `MutableList` (capitalized identifiers) |\r\n\r\nGitHub Dark tones.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `CombinedHighlightTransformation` in `page.app.EditorPanel` | Maps `Token.kind` → `palette[kind]` to build `SpanStyle`s on the `AnnotatedString` |\r\n\r\n---\r\n\r\n## Planned\r\n\r\n| Token | Purpose |\r\n|---|---|\r\n| `GlassLightSyntax` | Light theme |\r\n| User-custom palette | Settings color picker |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/workspace/main.md":"# Workspace\r\n\r\n> `page:workspace` — 파일 트리, 파일 조작, 이름 변경 리팩터, 프로젝트 검색. 워크스페이스를 다루는 손\r\n\r\n에디터가 한 파일을 다룬다면, 이 모듈은 프로젝트 전체를 다룬다. 좌측 파일 트리와 드래그, 파일 생성·삭제·이동, 이동 시 Kotlin 패키지·import를 따라 고치는 리팩터, 그리고 빠른 열기·전체 검색 다이얼로그가 여기 산다.\r\n\r\n> English: [main_en.md](https://monkshark.github.io/page-ide/#modules/workspace/main_en.md)\r\n\r\n---\r\n\r\n## 구성\r\n\r\n```mermaid\r\nflowchart TB\r\n    tree[\"FileTreePanel<br/>트리 UI · 드래그 · 컨텍스트 메뉴\"] --> ops[\"파일 조작<br/>Actions · Clipboard · Watcher\"]\r\n    ops --> rename[\"리팩터<br/>RenameTransaction · PackageSync\"]\r\n    tree --> search[\"검색<br/>QuickOpen · FindInFiles\"]\r\n    rename --> hist[\"FileOpHistory<br/>되돌리기\"]\r\n```\r\n\r\n| 층 | 역할 |\r\n|---|---|\r\n| 트리 | `FileTreePanel`·`TreeRow`와 드래그(`TreeDrag*`)·선택·클립보드·감시 |\r\n| 조작 | `FileTreeActions`·`FileTreeClipboard`·`FileTreeWatcher` — 생성·삭제·복사·외부 변경 감지 |\r\n| 리팩터 | `RenameTransaction`·`FolderPackageRename`·`FileSymbolRename`·`sync/PackageSyncEngine` |\r\n| 검색 | `QuickOpenDialog`·`FindInFilesDialog`·`SearchBar` |\r\n| 편집 보조 | `KdocContinuation`·`CommentKeywordCompletion`·`TodoMultiKeyword`·`EditorScrollMemory` |\r\n\r\n---\r\n\r\n## 파일 트리\r\n\r\n`FileTreePanel`은 좌측 사이드바 트리를 그리는 Compose 컴포저블이다. 행 렌더(`TreeRow`), 선택(`FileTreeSelection`), 클립보드(`FileTreeClipboard`), 컨텍스트 메뉴가 붙는다. 드래그는 트리 안 재배치와 트리 밖으로의 내보내기를 모두 다루며, `TreeDragController`·`TreeDragGestures`·`TreeOutboundTransferable`로 나뉜다. 외부에서 파일이 바뀌면 `FileTreeWatcher`가 감지해 트리를 갱신한다. 워크스페이스별 설정(팔레트 등)은 `WorkspaceStore`가 `workspace.json`으로 저장한다.\r\n\r\n---\r\n\r\n## 리팩터 — 이동이 부수는 것을 고친다\r\n\r\n폴더나 파일을 옮기면 두 가지가 깨진다. 이동 자체가 중간에 실패할 수 있고, Kotlin이라면 패키지 선언과 import가 어긋난다. 이 모듈은 둘 다 다룬다.\r\n\r\n`RenameTransaction`은 이동을 크래시에 안전하게 만든다. 복사(COPY)와 삭제(DELETE) 두 단계를 마커 파일에 기록하며 진행하고, 도중에 프로세스가 죽어도 `recover`가 마커를 읽어 재개하거나 롤백한다. 원본을 지우기 전에 반드시 대상이 온전한지 트리를 비교한다.\r\n\r\n`PackageSyncEngine`은 이동 뒤 Kotlin 소스를 따라 고친다. 옮겨진 폴더 안 파일의 패키지 선언을 새 위치에 맞추고(`FolderPackageRename`), 프로젝트 전체에서 그 심볼을 가리키던 import를 다시 쓴다. 단일 파일 이동은 `SingleFileMovePlan`으로 자기 자신과 참조처를 함께 갱신한다. 이 모든 재작성은 `FileOpHistory`에 원본·수정본으로 남아 한 번에 되돌릴 수 있다.\r\n\r\n---\r\n\r\n## 검색\r\n\r\n`QuickOpenDialog`는 프로젝트 파일을 퍼지 매칭으로 빠르게 여는 다이얼로그다. `FindInFilesDialog`는 내용 전체 검색을, `SearchBar`는 열린 문서 안 검색을 맡는다.\r\n\r\n---\r\n\r\n## 편집 보조\r\n\r\n트리와 검색 외에, 타이핑을 거드는 작은 기능들이 여기 모인다. KDoc 주석 줄 이어 쓰기(`KdocContinuation`), 주석 안 키워드 완성(`CommentKeywordCompletion`), `TODO`·`FIXME` 같은 다중 키워드 인식(`TodoMultiKeyword`), 그리고 파일별 스크롤 위치 기억(`EditorScrollMemory`).\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/workspace/main_en.md":"# Workspace\r\n\r\n> `page:workspace` — the file tree, file operations, rename refactors, and project search. The hand that manipulates the workspace\r\n\r\nIf the editor handles one file, this module handles the whole project. The left-hand file tree and its drag, file create/delete/move, the refactor that follows Kotlin packages and imports on a move, and the Quick Open / find-in-files dialogs all live here.\r\n\r\n> 한국어: [main.md](https://monkshark.github.io/page-ide/#modules/workspace/main.md)\r\n\r\n---\r\n\r\n## Structure\r\n\r\n```mermaid\r\nflowchart TB\r\n    tree[\"FileTreePanel<br/>tree UI · drag · context menu\"] --> ops[\"file operations<br/>Actions · Clipboard · Watcher\"]\r\n    ops --> rename[\"refactor<br/>RenameTransaction · PackageSync\"]\r\n    tree --> search[\"search<br/>QuickOpen · FindInFiles\"]\r\n    rename --> hist[\"FileOpHistory<br/>undo\"]\r\n```\r\n\r\n| Layer | Role |\r\n|---|---|\r\n| Tree | `FileTreePanel` · `TreeRow` with drag (`TreeDrag*`), selection, clipboard, watcher |\r\n| Operations | `FileTreeActions` · `FileTreeClipboard` · `FileTreeWatcher` — create/delete/copy, external-change detection |\r\n| Refactor | `RenameTransaction` · `FolderPackageRename` · `FileSymbolRename` · `sync/PackageSyncEngine` |\r\n| Search | `QuickOpenDialog` · `FindInFilesDialog` · `SearchBar` |\r\n| Editing aids | `KdocContinuation` · `CommentKeywordCompletion` · `TodoMultiKeyword` · `EditorScrollMemory` |\r\n\r\n---\r\n\r\n## The file tree\r\n\r\n`FileTreePanel` is the Compose composable that draws the left sidebar tree. Row rendering (`TreeRow`), selection (`FileTreeSelection`), clipboard (`FileTreeClipboard`), and a context menu attach to it. Drag handles both in-tree reordering and export out of the tree, split across `TreeDragController` · `TreeDragGestures` · `TreeOutboundTransferable`. When files change externally, `FileTreeWatcher` detects it and refreshes the tree. Per-workspace settings (palette, etc.) are persisted by `WorkspaceStore` in `workspace.json`.\r\n\r\n---\r\n\r\n## Refactor — fixing what a move breaks\r\n\r\nMoving a folder or file breaks two things: the move itself can fail midway, and for Kotlin the package declaration and imports go out of sync. This module handles both.\r\n\r\n`RenameTransaction` makes a move crash-safe. It proceeds in two stages, copy (COPY) and delete (DELETE), recording each in a marker file; if the process dies partway, `recover` reads the marker to resume or roll back. It always compares the trees to confirm the target is intact before deleting the source.\r\n\r\n`PackageSyncEngine` fixes up Kotlin sources after a move. It aligns the package declaration of files inside the moved folder to their new location (`FolderPackageRename`) and rewrites the imports across the whole project that pointed at those symbols. A single-file move uses a `SingleFileMovePlan` to update both the file itself and its references. All these rewrites are recorded as original/rewritten pairs in `FileOpHistory`, so they can be undone at once.\r\n\r\n---\r\n\r\n## Search\r\n\r\n`QuickOpenDialog` is a fuzzy-matching dialog for opening project files fast. `FindInFilesDialog` handles full-content search, and `SearchBar` handles search within the open document.\r\n\r\n---\r\n\r\n## Editing aids\r\n\r\nBeyond the tree and search, small typing helpers gather here: continuing KDoc comment lines (`KdocContinuation`), keyword completion inside comments (`CommentKeywordCompletion`), recognizing multi-keywords like `TODO` and `FIXME` (`TodoMultiKeyword`), and remembering per-file scroll position (`EditorScrollMemory`).\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","README_en.md":"# PAGE IDE Docs\r\n\r\n> 한국어: [README_kr.md](https://monkshark.github.io/page-ide/#README_kr.md)\r\n\r\n> Multi-language desktop IDE — Pair · Atlas · Glass · Echo\r\n\r\nPublic documentation entry point for PAGE IDE. This page only serves as a table of contents. Each item below links to the actual content.\r\n\r\nBuild the viewer with `node build_viewer.js` to produce `index.html`, which opens in a browser with no server required.\r\n\r\n---\r\n\r\n## Table of contents\r\n\r\n### Guides\r\n- [Getting started](https://monkshark.github.io/page-ide/#guides/getting_started_en.md) — The shortest path from a clone to a running desktop IDE\r\n- [PAGE overview](https://monkshark.github.io/page-ide/#guides/overview_en.md) — The four core values (Pair · Atlas · Glass · Echo) and what we will not build\r\n- [Architecture](https://monkshark.github.io/page-ide/#guides/architecture_en.md) — Module structure, dependency direction, and stack choices\r\n\r\n### core module\r\n- [PageIdentity](https://monkshark.github.io/page-ide/#modules/core/page_identity_en.md) — Single home for app name / acronym / tagline\r\n\r\n### shared-core module\r\n- [Shared Core](https://monkshark.github.io/page-ide/#modules/shared-core/main_en.md) — Multiplatform foundation shared by the desktop IDE and wasm viewer (markdown / JSON parsers, graph model, FilePath)\r\n\r\n### editor module\r\n- [TextBuffer](https://monkshark.github.io/page-ide/#modules/editor/text_buffer_en.md) — `StringBuilder` wrapper + line/column coordinates\r\n- [TabBook](https://monkshark.github.io/page-ide/#modules/editor/tab_book_en.md) — Tab collection + active index\r\n- [EditHistory](https://monkshark.github.io/page-ide/#modules/editor/edit_history_en.md) — Undo/redo stack\r\n- [FileDocument](https://monkshark.github.io/page-ide/#modules/editor/file_document_en.md) — Body / saved body / dirty bundle\r\n- [FileKind](https://monkshark.github.io/page-ide/#modules/editor/file_kind_en.md) — Text / image / SVG classification\r\n- [FileTree](https://monkshark.github.io/page-ide/#modules/editor/file_tree_en.md) — Sidebar tree node builder\r\n- [SearchState](https://monkshark.github.io/page-ide/#modules/editor/search_state_en.md) — Query + matches + active index\r\n- [Replace](https://monkshark.github.io/page-ide/#modules/editor/replace_en.md) — Replace match ranges\r\n- [AutoClose](https://monkshark.github.io/page-ide/#modules/editor/auto_close_en.md) — Bracket / quote auto-pairing\r\n- [BracketMatch](https://monkshark.github.io/page-ide/#modules/editor/bracket_match_en.md) — Find the matching bracket\r\n- [Indent](https://monkshark.github.io/page-ide/#modules/editor/indent_en.md) — Tab / Enter auto-indent\r\n- [LineMove](https://monkshark.github.io/page-ide/#modules/editor/line_move_en.md) — Line move / duplicate\r\n- [WordBoundary](https://monkshark.github.io/page-ide/#modules/editor/word_boundary_en.md) — Word-wise motion / deletion boundaries\r\n- [FoldRegions](https://monkshark.github.io/page-ide/#modules/editor/fold_regions_en.md) — Code-fold region detection + offset mapping\r\n- [FuzzyMatcher](https://monkshark.github.io/page-ide/#modules/editor/fuzzy_matcher_en.md) — Subsequence fuzzy match + score\r\n- [QuickOpen](https://monkshark.github.io/page-ide/#modules/editor/quick_open_en.md) — Quick Open result ranking\r\n- [ProjectFileIndex](https://monkshark.github.io/page-ide/#modules/editor/project_file_index_en.md) — Flattening walker over the project root\r\n- [MarkdownFence](https://monkshark.github.io/page-ide/#modules/editor/markdown_fence_en.md) — Inside-code-fence detection\r\n- [SyntaxLexer](https://monkshark.github.io/page-ide/#modules/editor/syntax_lexer_en.md) — Lexer interface\r\n- [SyntaxLexers](https://monkshark.github.io/page-ide/#modules/editor/syntax_lexers_en.md) — Extension → lexer dispatch\r\n- [JvmLexer](https://monkshark.github.io/page-ide/#modules/editor/jvm_lexer_en.md) — Shared Java/Kotlin scanner\r\n- [KotlinLexer](https://monkshark.github.io/page-ide/#modules/editor/kotlin_lexer_en.md) — Kotlin keyword set\r\n- [JavaLexer](https://monkshark.github.io/page-ide/#modules/editor/java_lexer_en.md) — Java keyword set\r\n- [JsonLexer](https://monkshark.github.io/page-ide/#modules/editor/json_lexer_en.md) — JSON tokenizer\r\n\r\n### ui module\r\n- [GlassTheme](https://monkshark.github.io/page-ide/#modules/ui/glass_theme_en.md) — Glass design tokens / `MaterialTheme` application\r\n- [EditorFonts](https://monkshark.github.io/page-ide/#modules/ui/editor_fonts_en.md) — Body font family\r\n- [SyntaxColors](https://monkshark.github.io/page-ide/#modules/ui/syntax_colors_en.md) — Syntax palette\r\n\r\n### app module\r\n- [Main](https://monkshark.github.io/page-ide/#modules/app/main_en.md) — `application` entry point + window state\r\n- [EditorPanel](https://monkshark.github.io/page-ide/#modules/app/editor_panel_en.md) — Body + gutter + highlights\r\n- [TabBar](https://monkshark.github.io/page-ide/#modules/app/tab_bar_en.md) — Tab strip + drag-reorder\r\n- [SearchBar](https://monkshark.github.io/page-ide/#modules/app/search_bar_en.md) — Find/replace strip\r\n- [FileTreePanel](https://monkshark.github.io/page-ide/#modules/app/file_tree_panel_en.md) — Left sidebar\r\n- [LineNumberGutter](https://monkshark.github.io/page-ide/#modules/app/line_number_gutter_en.md) — Line-number gutter\r\n- [PreviewPanel](https://monkshark.github.io/page-ide/#modules/app/preview_panel_en.md) — Image / SVG preview\r\n- [UnsavedChangesDialog](https://monkshark.github.io/page-ide/#modules/app/unsaved_changes_dialog_en.md) — Save-confirmation modal\r\n- [QuickOpenDialog](https://monkshark.github.io/page-ide/#modules/app/quick_open_dialog_en.md) — `Ctrl+P` Quick Open dialog\r\n- [PendingClose](https://monkshark.github.io/page-ide/#modules/app/pending_close_en.md) — Close-request identifier\r\n- [FileDialogs](https://monkshark.github.io/page-ide/#modules/app/file_dialogs_en.md) — `JFileChooser` wrappers\r\n\r\n### atlas module\r\n- [Atlas](https://monkshark.github.io/page-ide/#modules/atlas/main_en.md) — code graph (import · call · module dependencies)\r\n\r\n### atlas-view module\r\n- [Atlas View](https://monkshark.github.io/page-ide/#modules/atlas-view/main_en.md) — overview graph model / render (multiplatform, shared by desktop and the docs viewer)\r\n\r\n### lsp module\r\n- [LSP](https://monkshark.github.io/page-ide/#modules/lsp/main_en.md) — Language server client layer (transport · init · backend registry)\r\n\r\n### language module\r\n- [Language](https://monkshark.github.io/page-ide/#modules/language/main_en.md) — Language-intelligence orchestration (routing · document sync · completion · diagnostics)\r\n\r\n### runtime module\r\n- [Runtime](https://monkshark.github.io/page-ide/#modules/runtime/main_en.md) — Toolchain / language-server install, program execution, embedded terminal\r\n\r\n### workspace module\r\n- [Workspace](https://monkshark.github.io/page-ide/#modules/workspace/main_en.md) — File tree, file operations, rename refactors, project search\r\n\r\n### git module\r\n- [Git](https://monkshark.github.io/page-ide/#modules/git/main_en.md) — Workspace VCS status (change kinds from git status)\r\n\r\n### perf module\r\n- [Perf](https://monkshark.github.io/page-ide/#modules/perf/main_en.md) — Startup instrumentation and a UI-freeze watchdog\r\n\r\n### docs-viewer module\r\n- [Docs Viewer](https://monkshark.github.io/page-ide/#modules/docs-viewer/main_en.md) — The Compose wasmJs app that renders this docs site, plus its widget islands\r\n\r\n> `pair`, `echo` modules will be added in their respective milestones.\r\n\r\n---\r\n\r\n## External links\r\n\r\n- GitHub: <https://github.com/monkshark/page-ide>\r\n- Devlog series (Korean): <https://monkshark.github.io/categories/page-개발기/>\r\n","README_kr.md":"# PAGE IDE Docs\r\n\r\n> English: [README_en.md](https://monkshark.github.io/page-ide/#README_en.md)\r\n\r\n> 다언어 데스크톱 IDE — Pair · Atlas · Glass · Echo\r\n\r\nPAGE IDE의 공개 문서 진입점. 이 페이지는 목차 역할만 한다. 실제 내용은 각 항목을 따라간다.\r\n\r\n뷰어는 `node build_viewer.js`로 `index.html`을 빌드한 뒤, 별도 서버 없이 브라우저에서 바로 열 수 있다.\r\n\r\n---\r\n\r\n## 목차\r\n\r\n### 가이드\r\n- [시작하기](https://monkshark.github.io/page-ide/#guides/getting_started.md) — 레포를 받아 데스크톱 IDE 를 빌드·실행하는 최소 경로\r\n- [PAGE 개요](https://monkshark.github.io/page-ide/#guides/overview.md) — 핵심 가치 네 가지 (Pair · Atlas · Glass · Echo)와 만들지 않을 것\r\n- [아키텍처](https://monkshark.github.io/page-ide/#guides/architecture.md) — 모듈 구조와 의존 방향, 기술 스택 결정\r\n\r\n### core 모듈\r\n- [PageIdentity](https://monkshark.github.io/page-ide/#modules/core/page_identity.md) — 앱 이름/약자/태그라인 한곳 모음\r\n\r\n### shared-core 모듈\r\n- [Shared Core](https://monkshark.github.io/page-ide/#modules/shared-core/main.md) — 데스크톱·wasm 뷰어 공용 멀티플랫폼 기반 (마크다운·JSON 파서, 그래프 모델, FilePath)\r\n\r\n### editor 모듈\r\n- [TextBuffer](https://monkshark.github.io/page-ide/#modules/editor/text_buffer.md) — `StringBuilder` 래퍼 + 라인/컬럼 좌표\r\n- [TabBook](https://monkshark.github.io/page-ide/#modules/editor/tab_book.md) — 탭 묶음과 활성 인덱스\r\n- [EditHistory](https://monkshark.github.io/page-ide/#modules/editor/edit_history.md) — undo/redo 스택\r\n- [FileDocument](https://monkshark.github.io/page-ide/#modules/editor/file_document.md) — 본문/저장본/dirty 한 묶음\r\n- [FileKind](https://monkshark.github.io/page-ide/#modules/editor/file_kind.md) — 텍스트/이미지/SVG 분류\r\n- [FileTree](https://monkshark.github.io/page-ide/#modules/editor/file_tree.md) — 사이드바 트리 노드 빌더\r\n- [SearchState](https://monkshark.github.io/page-ide/#modules/editor/search_state.md) — 검색어 + 매치 + active 인덱스\r\n- [Replace](https://monkshark.github.io/page-ide/#modules/editor/replace.md) — 검색 매치 치환\r\n- [AutoClose](https://monkshark.github.io/page-ide/#modules/editor/auto_close.md) — 자동 짝괄호/따옴표\r\n- [BracketMatch](https://monkshark.github.io/page-ide/#modules/editor/bracket_match.md) — 매칭 괄호 위치 찾기\r\n- [Indent](https://monkshark.github.io/page-ide/#modules/editor/indent.md) — Tab/Enter 자동 들여쓰기\r\n- [LineMove](https://monkshark.github.io/page-ide/#modules/editor/line_move.md) — 줄 이동/복제\r\n- [WordBoundary](https://monkshark.github.io/page-ide/#modules/editor/word_boundary.md) — 워드 단위 이동/삭제 경계\r\n- [FoldRegions](https://monkshark.github.io/page-ide/#modules/editor/fold_regions.md) — 코드 폴딩 영역 + 오프셋 매핑\r\n- [FuzzyMatcher](https://monkshark.github.io/page-ide/#modules/editor/fuzzy_matcher.md) — 서브시퀀스 퍼지 매칭 + 점수\r\n- [QuickOpen](https://monkshark.github.io/page-ide/#modules/editor/quick_open.md) — 빠른 열기 결과 랭킹\r\n- [ProjectFileIndex](https://monkshark.github.io/page-ide/#modules/editor/project_file_index.md) — 프로젝트 루트 평탄화 워커\r\n- [MarkdownFence](https://monksha shark.github.io/page-ide/#modules/app/pending_close.md) — 닫기 요청 식별\r\n- [FileDialogs](https://monkshark.github.io/page-ide/#modules/app/file_dialogs.md) — `JFileChooser` 래퍼\r\n\r\n### atlas 모듈\r\n- [Atlas](https://monkshark.github.io/page-ide/#modules/atlas/main.md) — 코드 그래프 (import · 호출 · 모듈 의존)\r\n\r\n### atlas-view 모듈\r\n- [Atlas View](https://monkshark.github.io/page-ide/#modules/atlas-view/main.md) — overview 그래프 모델·렌더 (데스크톱·문서 뷰어 공용 멀티플랫폼)\r\n\r\n### lsp 모듈\r\n- [LSP](https://monkshark.github.io/page-ide/#modules/lsp/main.md) — 언어 서버 클라이언트 층 (전송 · 초기화 · 백엔드 등록)\r\n\r\n### language 모듈\r\n- [Language](https://monkshark.github.io/page-ide/#modules/language/main.md) — 언어 지능 오케스트레이션 (라우팅 · 문서 동기화 · 완성 · 진단)\r\n\r\n### runtime 모듈\r\n- [Runtime](https://monkshark.github.io/page-ide/#modules/runtime/main.md) — 툴체인·언어 서버 설치, 프로그램 실행, 내장 터미널\r\n\r\n### workspace 모듈\r\n- [Workspace](https://monkshark.github.io/page-ide/#modules/workspace/main.md) — 파일 트리, 파일 조작, 이름 변경 리팩터, 프로젝트 검색\r\n\r\n### git 모듈\r\n- [Git](https://monkshark.github.io/page-ide/#modules/git/main.md) — 워크스페이스 VCS 상태 (git status 기반 변경 종류)\r\n\r\n### perf 모듈\r\n- [Perf](https://monkshark.github.io/page-ide/#modules/perf/main.md) — 시작 성능 계측과 UI 멈춤 감시\r\n\r\n### docs-viewer 모듈\r\n- [Docs Viewer](https://monkshark.github.io/page-ide/#modules/docs-viewer/main.md) — 이 문서 사이트를 그리는 Compose wasmJs 앱과 위젯 섬\r\n\r\n> `pair`, `echo` 모듈은 단계별로 추가된다.\r\n\r\n---\r\n\r\n## 외부 링크\r\n\r\n- GitHub: <https://github.com/monkshark/page-ide>\r\n- 개발기 시리즈: <https://monkshark.github.io/categories/page-개발기/>\r\n"};

        if(info){
          var newPath = pathForItem(info.item, lang);
          if(newPath !== cur){
            loadFile(newPath, { replaceHistory:true });
            return;
          }
        }
      }
    }
    var cur2 = currentPath();
    highlightActive(cur2);
    applySearchFilter();
  }

  function highlightActive(p){
    allItems.forEach(function(i){
      var on = i.el.dataset.path === p;
      i.el.classList.toggle('active', on);
      if(on){ var grp = i.el.closest('.nav-group'); if(grp) grp.classList.remove('collapsed'); }
    });
  }

  function applySearchFilter(){
    var q = (document.getElementById('search').value || '').toLowerCase().trim();
    var lang = getLang();
    allItems.forEach(function(i){
      var hay = (i.item.nameKo + ' ' + (i.item.nameEn||'') + ' ' + i.item.pathKo + ' ' + (i.item.pathEn||'')).toLowerCase();
      var nameHit = !q || hay.indexOf(q) !== -1;
      var bodyHit = false;
      if(q && !nameHit){
        var body = CONTENT_INDEX[pathForItem(i.item, lang)];
        if(body && body.indexOf(q) !== -1) bodyHit = true;
      }
      i.el.style.display = (nameHit || bodyHit) ? '' : 'none';
      if(bodyHit) i.el.dataset.hit = '1'; else i.el.removeAttribute('data-hit');
    });
    navList.querySelectorAll('.nav-group').forEach(function(g){
      var vis = Array.from(g.querySelectorAll('.nav-item')).some(function(i){ return i.style.display !== 'none'; });
      g.style.display = vis ? '' : 'none';
      if(q) g.classList.remove('collapsed');
    });
  }
  document.getElementById('search').addEventListener('input', applySearchFilter);
  document.getElementById('search').addEventListener('keydown', function(e){
    if(e.key !== 'Enter') return;
    for(var i = 0; i < allItems.length; i++){
      if(allItems[i].el.style.display !== 'none'){
        loadFile(allItems[i].el.dataset.path);
        this.blur();
        break;
      }
    }
  });

  var history = [];
  var historyIndex = -1;
  var navigating = false;

  function currentPath(){
    return historyIndex >= 0 ? history[historyIndex] : null;
  }

  var SVGNS = 'http://www.w3.org/2000/svg';
  function svg(tag, attrs){
    var e = document.createElementNS(SVGNS, tag);
    if(attrs) for(var k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }
  function renderAtlasWidget(el){
    el.innerHTML = '';
    var data = ATLAS_DATA;
    if(!data || !data.nodes || !data.nodes.length){
      el.textContent = getLang() === 'ko' ? 'Atlas 그래프를 사용할 수 없습니다.' : 'Atlas graph unavailable.';
      return;
    }
    var nodes = data.nodes.slice();
    var edges = (data.edges || []).slice();
    var byId = {};
    nodes.forEach(function(n){ byId[n.id] = n; });
    var out = {}, adj = {};
    nodes.forEach(function(n){ out[n.id] = []; adj[n.id] = {}; });
    edges.forEach(function(e){
      if(!(e.from in out) || !(e.to in byId)) return;
      out[e.from].push(e.to);
      adj[e.from][e.to] = true; adj[e.to][e.from] = true;
    });
    var rankOf = {};
    function rank(id, seen){
      if(id in rankOf) return rankOf[id];
      seen = seen || {};
      if(seen[id]) return 0;
      seen[id] = true;
      var r = 0;
      out[id].forEach(function(c){ r = Math.max(r, 1 + rank(c, seen)); });
      rankOf[id] = r;
      return r;
    }
    nodes.forEach(function(n){ rank(n.id); });
    var maxRank = 0;
    nodes.forEach(function(n){ maxRank = Math.max(maxRank, rankOf[n.id]); });
    var rows = {};
    nodes.forEach(function(n){ (rows[rankOf[n.id]] = rows[rankOf[n.id]] || []).push(n); });
    Object.keys(rows).forEach(function(r){ rows[r].sort(function(a,b){ return a.id < b.id ? -1 : 1; }); });

    var W = 760, H = 460, vpad = 40, hpad = 30;
    var rowGap = maxRank > 0 ? (H - 2 * vpad) / maxRank : 0;
    var pos = {};
    Object.keys(rows).forEach(function(r){
      var list = rows[r];
      var y = vpad + (maxRank - Number(r)) * rowGap;
      list.forEach(function(n, i){
        var x = hpad + (W - 2 * hpad) * (i + 1) / (list.length + 1);
        pos[n.id] = { x: x, y: y };
      });
    });

    var root = svg('svg', { 'class': 'atlas-graph', viewBox: '0 0 ' + W + ' ' + H, preserveAspectRatio: 'xMidYMid meet' });
    var vp = svg('g', {});
    root.appendChild(vp);
    var nodeH = 26;
    var edgeEls = [];
    edges.forEach(function(e){
      var a = pos[e.from], b = pos[e.to];
      if(!a || !b) return;
      var ln = svg('line', { 'class': 'atlas-edge', x1: a.x, y1: a.y + nodeH / 2, x2: b.x, y2: b.y - nodeH / 2 });
      ln.dataset.from = e.from; ln.dataset.to = e.to;
      vp.appendChild(ln);
      edgeEls.push(ln);
    });
    var nodeEls = [];
    nodes.forEach(function(n){
      var p = pos[n.id];
      var w = Math.max(48, n.label.length * 8 + 22);
      var g = svg('g', { 'class': 'atlas-node' });
      g.dataset.id = n.id;
      g.appendChild(svg('rect', { x: p.x - w / 2, y: p.y - nodeH / 2, width: w, height: nodeH, rx: 7 }));
      var t = svg('text', { x: p.x, y: p.y + 4, 'text-anchor': 'middle' });
      t.textContent = n.label;
      g.appendChild(t);
      g.addEventListener('mouseenter', function(){ hover(n.id); });
      g.addEventListener('mouseleave', clear);
      vp.appendChild(g);
      nodeEls.push(g);
    });
    function hover(id){
      nodeEls.forEach(function(g){
        var on = g.dataset.id === id || adj[id][g.dataset.id];
        g.classList.toggle('hot', g.dataset.id === id);
        g.classList.toggle('dim', !on);
      });
      edgeEls.forEach(function(ln){
        var inc = ln.dataset.from === id || ln.dataset.to === id;
        ln.classList.toggle('hot', inc);
        ln.classList.toggle('dim', !inc);
      });
    }
    function clear(){
      nodeEls.forEach(function(g){ g.classList.remove('hot', 'dim'); });
      edgeEls.forEach(function(ln){ ln.classList.remove('hot', 'dim'); });
    }

    var scale = 1, tx = 0, ty = 0;
    function apply(){ vp.setAttribute('transform', 'translate(' + tx + ' ' + ty + ') scale(' + scale + ')'); }
    root.addEventListener('wheel', function(ev){
      ev.preventDefault();
      var f = ev.deltaY < 0 ? 1.1 : 1 / 1.1;
      var ns = Math.min(3, Math.max(0.5, scale * f));
      var r = root.getBoundingClientRect();
      var mx = (ev.clientX - r.left) / r.width * W;
      var my = (ev.clientY - r.top) / r.height * H;
      tx = mx - (mx - tx) * (ns / scale);
      ty = my - (my - ty) * (ns / scale);
      scale = ns; apply();
    });
    var drag = null;
    root.addEventListener('mousedown', function(ev){ if(ev.target === root || ev.target === vp) drag = { x: ev.clientX, y: ev.clientY, tx: tx, ty: ty }; });
    window.addEventListener('mousemove', function(ev){
      if(!drag) return;
      var r = root.getBoundingClientRect();
      tx = drag.tx + (ev.clientX - drag.x) / r.width * W;
      ty = drag.ty + (ev.clientY - drag.y) / r.height * H;
      apply();
    });
    window.addEventListener('mouseup', function(){ drag = null; });

    var cap = document.createElement('div');
    cap.className = 'atlas-caption';
    cap.textContent = nodes.length + (getLang() === 'ko' ? ' 모듈 · ' : ' modules · ') + edges.length + (getLang() === 'ko' ? ' 의존 · 노드에 마우스를 올려보세요' : ' dependencies · hover a node');
    el.appendChild(root);
    el.appendChild(cap);
  }

  function copyText(text, onDone){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(onDone || function(){}).catch(function(){});
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); if(onDone) onDone(); } catch(e){}
      document.body.removeChild(ta);
    }
  }

  var tocHeads = [], tocLinks = [];
  function buildTocFor(inner, p){
    var toc = document.getElementById('toc');
    if(!toc){
      toc = document.createElement('nav'); toc.id = 'toc'; toc.className = 'toc';
      document.getElementById('content').appendChild(toc);
    }
    toc.innerHTML = '';
    tocHeads = []; tocLinks = [];
    var heads = Array.prototype.slice.call(inner.querySelectorAll('.md h2, .md h3'));
    if(heads.length < 2){ toc.style.display = 'none'; return; }
    toc.style.display = '';
    var label = document.createElement('div');
    label.className = 'toc-label';
    label.textContent = getLang() === 'en' ? 'On this page' : '이 페이지';
    toc.appendChild(label);
    heads.forEach(function(h){
      if(!h.id) h.id = slugify(h.textContent);
      var a = document.createElement('a');
      a.textContent = h.textContent;
      a.className = h.tagName === 'H3' ? 'lvl3' : 'lvl2';
      a.href = '#' + p + '#' + h.id;
      a.addEventListener('click', function(e){
        e.preventDefault();
        h.scrollIntoView({behavior:'smooth', block:'start'});
        window.history.pushState({path:p, scrollTo:h.id}, '', '#' + p + '#' + h.id);
      });
      toc.appendChild(a);
      tocHeads.push(h); tocLinks.push(a);
    });
    syncTocActive();
  }
  function syncTocActive(){
    if(!tocHeads.length) return;
    var scroller = document.getElementById('content');
    var stop = scroller.getBoundingClientRect().top;
    var active = 0;
    for(var i = 0; i < tocHeads.length; i++){
      if(tocHeads[i].getBoundingClientRect().top - stop <= 100) active = i; else break;
    }
    tocLinks.forEach(function(a, idx){ a.classList.toggle('active', idx === active); });
  }
  document.getElementById('content').addEventListener('scroll', syncTocActive, {passive:true});

  function addHeadingAnchors(inner, p){
    inner.querySelectorAll('.md h1, .md h2, .md h3, .md h4').forEach(function(h){
      if(!h.id || h.querySelector('.heading-anchor')) return;
      var a = document.createElement('a');
      a.className = 'heading-anchor';
      a.href = '#' + p + '#' + h.id;
      a.textContent = '#';
      a.title = getLang() === 'en' ? 'Copy link to this section' : '이 섹션 링크 복사';
      a.addEventListener('click', function(e){
        e.preventDefault();
        copyText(location.origin + location.pathname + '#' + p + '#' + h.id);
        window.history.pushState({path:p, scrollTo:h.id}, '', '#' + p + '#' + h.id);
        h.scrollIntoView({behavior:'smooth', block:'start'});
      });
      h.appendChild(a);
    });
  }

  function loadFile(p, opts){
    opts = opts || {};
    var text = MD_DATA[p];
    var inner = document.getElementById('contentInner');
    if(!text){
      inner.innerHTML = '<div class="welcome"><h2>문서를 찾을 수 없습니다</h2><p>' + p + '</p></div>';
      return;
    }

    highlightActive(p);

    if(!opts.fromPopState && !opts.replaceHistory){
      history = history.slice(0, historyIndex + 1);
      history.push(p);
      historyIndex = history.length - 1;
    } else if(opts.replaceHistory){
      if(historyIndex < 0){ history.push(p); historyIndex = 0; }
      else history[historyIndex] = p;
    }

    var html = marked.parse(text);
    var dir = p.indexOf('/') !== -1 ? p.substring(0, p.lastIndexOf('/')) : '';
    var fileName = p.split('/').pop();

    var canBack = historyIndex > 0;
    var canFwd = historyIndex < history.length - 1;
    var lang = getLang();
    var backLabel = (lang === 'en') ? 'Back' : '뒤로';
    var fwdLabel = (lang === 'en') ? 'Forward' : '앞으로';
    var rootPath = (lang === 'en' && MD_DATA['README_en.md']) ? 'README_en.md' : 'README_kr.md';

    var navHtml = '<div class="breadcrumb"><span class="nav-btns">'
      + '<button class="nav-btn" onclick="window._goBack()" ' + (canBack ? '' : 'disabled') + ' title="' + backLabel + '">&#8592;</button>'
      + '<button class="nav-btn" onclick="window._goForward()" ' + (canFwd ? '' : 'disabled') + ' title="' + fwdLabel + '">&#8594;</button>'
      + '</span>'
      + '<a href="#" onclick="window._loadFile(\'' + rootPath + '\');return false">docs</a> / '
      + (dir ? dir + ' / ' : '')
      + '<strong>' + fileName + '</strong>'
      + '<a class="src-link" href="https://github.com/monkshark/page-ide/blob/main/docs/' + p + '" target="_blank" rel="noopener">' + (lang === 'en' ? 'Edit on GitHub' : 'GitHub에서 편집') + '</a>'
      + '</div>';

    inner.innerHTML = navHtml + '<div class="md">' + html + '</div>';

    inner.querySelectorAll('.md h1, .md h2, .md h3, .md h4, .md h5, .md h6').forEach(function(h){
      if(!h.id) h.id = slugify(h.textContent);
    });

    buildTocFor(inner, p);
    addHeadingAnchors(inner, p);

    inner.querySelectorAll('.md a[href]').forEach(function(a){
      var href = a.getAttribute('href');
      if(!href || href.indexOf('http') === 0) return;
      var hashOnly = href.charAt(0) === '#';
      if(hashOnly){
        a.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          var id = decodeURIComponent(href.substring(1));
          var target = document.getElementById(id);
          if(target){ target.scrollIntoView({behavior:'smooth',block:'start'}); }
        });
        return;
      }
      var hashTarget = '';
      var hashIdx = href.indexOf('#');
      if(hashIdx !== -1){ hashTarget = decodeURIComponent(href.substring(hashIdx + 1)); href = href.substring(0, hashIdx); }
      if(!href.endsWith('.md')) return;

      if(href.indexOf('./') === 0) href = href.substring(2);

      var resolved;
      if(href.indexOf('../') === 0){
        var parts = dir ? dir.split('/') : [];
        var h = href;
        while(h.indexOf('../') === 0){ parts.pop(); h = h.substring(3); }
        resolved = (parts.length ? parts.join('/') + '/' : '') + h;
      } else if(href.indexOf('/') === 0){
        resolved = href.substring(1);
      } else {
        resolved = dir ? dir + '/' + href : href;
      }
      if(MD_DATA[resolved]){
        a.onclick = function(e){ e.preventDefault(); loadFile(resolved, hashTarget ? {scrollTo: hashTarget} : undefined); };
      } else {
        a.onclick = function(e){ e.preventDefault(); console.warn('Doc not found in viewer:', resolved); };
      }
    });

    try {
      if(globalThis.mermaid){
        var nodes = inner.querySelectorAll('pre.mermaid');
        nodes.forEach(function(n){ if(!n.dataset.mermaidSrc) n.dataset.mermaidSrc = n.textContent; });
        if(nodes.length) mermaid.run({nodes:nodes});
      }
    } catch(e){ console.warn('Mermaid run failed:', e); }

    try {
      inner.querySelectorAll('.page-widget[data-widget="atlas"]').forEach(renderAtlasWidget);
    } catch(e){ console.warn('Atlas widget failed:', e); }

    inner.querySelectorAll('.md img[src]').forEach(function(img){
      var src = img.getAttribute('src');
      if(!src) return;
      if(/^(https?:)?\/\//.test(src) || src.indexOf('data:') === 0) return;
      if(src.indexOf('./') === 0) src = src.substring(2);
      var baseParts = ['docs'];
      if(dir) baseParts = baseParts.concat(dir.split('/'));
      var s = src;
      if(s.indexOf('/') === 0){
        baseParts = ['docs'];
        s = s.substring(1);
      } else {
        while(s.indexOf('../') === 0){ baseParts.pop(); s = s.substring(3); }
      }
      var resolved = baseParts.concat(s ? [s] : []).join('/');
      if(resolved.indexOf('docs/') === 0){
        img.setAttribute('src', resolved.substring(5));
      } else {
        img.setAttribute('src', 'https://raw.githubusercontent.com/monkshark/page-ide/main/' + resolved);
      }
    });

    inner.querySelectorAll('.md pre').forEach(function(pre){
      if(pre.classList.contains('mermaid')) return;
      var code = pre.querySelector('code');
      if(!code) return;
      var lang = '';
      (code.className || '').split(/\s+/).forEach(function(c){
        if(c.indexOf('language-') === 0) lang = c.substring(9);
      });
      if(lang){
        var badge = document.createElement('span');
        badge.className = 'code-lang';
        badge.textContent = lang;
        pre.appendChild(badge);
      }
      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.type = 'button';
      btn.textContent = 'Copy';
      btn.onclick = function(){
        var text = code.textContent || '';
        var done = function(){
          btn.textContent = 'Copied';
          btn.classList.add('ok');
          setTimeout(function(){ btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 1200);
        };
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(text).then(done).catch(function(){});
        } else {
          var ta = document.createElement('textarea');
          ta.value = text; document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); done(); } catch(e){}
          document.body.removeChild(ta);
        }
      };
      pre.appendChild(btn);
    });

    var scrollTarget = opts.scrollTo || null;
    if(scrollTarget){
      var el = inner.querySelector('#' + CSS.escape(scrollTarget));
      if(!el){
        var headings = inner.querySelectorAll('.md h1, .md h2, .md h3, .md h4, .md h5, .md h6');
        for(var i = 0; i < headings.length; i++){
          if(headings[i].id && headings[i].id.indexOf(scrollTarget) === 0){
            el = headings[i];
            break;
          }
        }
      }
      if(el){
        el.scrollIntoView({behavior:'auto', block:'start'});
      } else {
        document.getElementById('content').scrollTop = 0;
      }
    } else {
      document.getElementById('content').scrollTop = 0;
    }
    closeSidebar();
    if(!opts.fromPopState){
      var hashPart = '#' + p + (scrollTarget ? '#' + scrollTarget : '');
      window.history.pushState({path:p, scrollTo: scrollTarget}, '', hashPart);
    }
  }

  window._goBack = function(){
    if(historyIndex > 0){
      historyIndex--;
      var p = history[historyIndex];
      loadFile(p, {fromPopState:true});
      window.history.pushState({path:p}, '', '#' + p);
    }
  };
  window._goForward = function(){
    if(historyIndex < history.length - 1){
      historyIndex++;
      var p = history[historyIndex];
      loadFile(p, {fromPopState:true});
      window.history.pushState({path:p}, '', '#' + p);
    }
  };
  window._loadFile = function(p){ loadFile(p); };

  function parseHash(raw){
    if(!raw) return {path:null, scrollTo:null};
    var s = raw.charAt(0) === '#' ? raw.slice(1) : raw;
    if(!s) return {path:null, scrollTo:null};
    var mdIdx = s.indexOf('.md');
    if(mdIdx !== -1){
      var path = s.substring(0, mdIdx + 3);
      var rest = s.substring(mdIdx + 3);
      var scrollTo = (rest.charAt(0) === '#') ? decodeURIComponent(rest.substring(1)) : null;
      return {path: path, scrollTo: scrollTo};
    }
    return {path: s, scrollTo: null};
  }

  window.addEventListener('popstate', function(e){
    if(navigating) return;
    var stateP = e.state && e.state.path;
    var stateScroll = e.state && e.state.scrollTo;
    var p, scrollTo;
    if(stateP){ p = stateP; scrollTo = stateScroll || null; }
    else {
      var parsed = parseHash(location.hash);
      p = parsed.path || initialDefaultPath();
      scrollTo = parsed.scrollTo;
    }
    if(MD_DATA[p]){
      navigating = true;
      var idx = history.lastIndexOf(p);
      if(idx !== -1) historyIndex = idx;
      loadFile(p, {fromPopState:true, scrollTo: scrollTo});
      navigating = false;
    }
  });

  document.addEventListener('keydown', function(e){
    if((e.ctrlKey || e.metaKey) && e.key === 'k'){ e.preventDefault(); document.getElementById('search').focus(); }
    if(e.altKey && e.key === 'ArrowLeft'){ e.preventDefault(); window._goBack(); }
    if(e.altKey && e.key === 'ArrowRight'){ e.preventDefault(); window._goForward(); }
  });

  document.getElementById('langKo').addEventListener('click', function(){ if(getLang()!=='ko') applyLang('ko'); });
  document.getElementById('langEn').addEventListener('click', function(){ if(getLang()!=='en') applyLang('en'); });

  var THEME_KEY = 'docsViewerTheme';
  function getTheme(){ return localStorage.getItem(THEME_KEY) === 'light' ? 'light' : 'dark'; }
  function setThemeStored(t){ localStorage.setItem(THEME_KEY, t === 'light' ? 'light' : 'dark'); }
  function swapHljsStylesheet(theme){
    var link = document.getElementById('hljsTheme');
    if(link) link.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-' + (theme === 'light' ? 'light' : 'dark') + '.min.css';
  }
  function reInitMermaidAndRerender(theme){
    if(!globalThis.mermaid) return;
    try {
      mermaid.initialize({startOnLoad:false, theme: theme === 'light' ? 'default' : 'dark', securityLevel:'loose'});
    } catch(e){ console.warn('Mermaid re-init failed:', e); }
    var inner = document.getElementById('contentInner');
    if(!inner) return;
    var nodes = inner.querySelectorAll('pre.mermaid');
    nodes.forEach(function(n){
      if(n.dataset.mermaidSrc){
        n.removeAttribute('data-processed');
        n.innerHTML = n.dataset.mermaidSrc;
      }
    });
    try {
      if(nodes.length) mermaid.run({nodes: nodes});
    } catch(e){ console.warn('Mermaid re-run failed:', e); }
  }
  function applyTheme(theme, opts){
    opts = opts || {};
    theme = (theme === 'light') ? 'light' : 'dark';
    setThemeStored(theme);
    document.documentElement.setAttribute('data-theme', theme);
    swapHljsStylesheet(theme);
    if(!opts.skipMermaid) reInitMermaidAndRerender(theme);
  }
  document.getElementById('themeToggle').addEventListener('click', function(){
    applyTheme(getTheme() === 'light' ? 'dark' : 'light');
  });

  function initialDefaultPath(){
    return (getLang() === 'en' && MD_DATA['README_en.md']) ? 'README_en.md' : 'README_kr.md';
  }

  var initialLang = getLang();
  applyLang(initialLang, {skipContentSwap:true});

  var parsedInit = parseHash(location.hash);
  if(parsedInit.path && MD_DATA[parsedInit.path]){
    var info = PATH_INDEX[parsedInit.path];
    if(info && info.lang !== initialLang){
      setLang(info.lang);
      document.getElementById('langKo').classList.toggle('active', info.lang === 'ko');
      document.getElementById('langEn').classList.toggle('active', info.lang === 'en');
      document.getElementById('search').placeholder = (info.lang === 'en') ? 'Search... (Ctrl+K)' : '검색... (Ctrl+K)';
      renderNav(info.lang);
    }
    loadFile(parsedInit.path, parsedInit.scrollTo ? {scrollTo: parsedInit.scrollTo} : undefined);
  } else {
    loadFile(initialDefaultPath());
  }
})();
</script>
