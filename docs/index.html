<!DOCTYPE html>
<html lang="en">
<head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>

<style>
:root{--bg:#0d1117;--sidebar-bg:#161b22;--card-bg:#1c2128;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--accent-dim:#1f6feb33;--pre-bg:#1e2228;--inline-code:#e6d9a2;--code-text:#abb2bf;--badge-bg:#282c34;--copy-bg:#2d333b;--mermaid-bg:#ffffff;--shadow:rgba(0,0,0,.4);color-scheme:dark}
html[data-theme="light"]{--bg:#ffffff;--sidebar-bg:#f6f8fa;--card-bg:#eaeef2;--border:#d0d7de;--text:#1f2328;--muted:#59636e;--accent:#0969da;--accent-dim:#0969da1a;--pre-bg:#f6f8fa;--inline-code:#953800;--code-text:#1f2328;--badge-bg:#eaeef2;--copy-bg:#ffffff;--mermaid-bg:#fafbfc;--shadow:rgba(0,0,0,.15);color-scheme:light}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
.sidebar{width:280px;min-width:280px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sidebar-header h1{font-size:15px;font-weight:600}
.lang-toggle{display:inline-flex;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.lang-btn{background:transparent;border:none;color:var(--muted);font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer;transition:background .15s,color .15s}
.lang-btn.active{background:var(--accent-dim);color:var(--accent)}
.lang-btn:not(.active):hover{color:var(--text)}
.search-box{width:100%;padding:7px 10px;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--muted)}
.nav-list{flex:1;overflow-y:auto;padding:8px 0}
.nav-group{padding:0 8px;margin-bottom:4px}
.nav-section{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text);padding:14px 16px 6px;margin-top:8px;border-top:1px solid var(--accent-dim)}
.nav-group-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:8px 8px 4px;display:flex;align-items:center;gap:7px;user-select:none;border-radius:6px}
.nav-group-title.module{color:var(--text);font-weight:700;font-size:12.5px;letter-spacing:.3px;cursor:pointer;transition:background .15s}
.nav-group-title.module:hover{background:var(--accent-dim)}
.nav-group-title.module::before{content:"";width:3px;height:13px;border-radius:2px;background:var(--accent);flex:none}
.nav-chevron{margin-left:auto;display:inline-flex;align-items:center;color:var(--muted);opacity:.65;transition:transform .25s ease,opacity .15s;transform:rotate(90deg)}
.nav-chevron svg{display:block}
.nav-group-title.module:hover .nav-chevron{opacity:1}
.nav-group.collapsed .nav-chevron{transform:rotate(0deg)}
.nav-group-items{overflow:hidden;max-height:1600px;opacity:1;transform:translateY(0);transition:max-height .28s ease,opacity .22s ease,transform .28s ease}
.nav-group.collapsed .nav-group-items{max-height:0;opacity:0;transform:translateY(-6px)}
.nav-item{display:block;padding:6px 12px;font-size:13px;color:var(--muted);text-decoration:none;border-radius:6px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .15s}
.nav-item:hover{background:var(--accent-dim);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:500}
.content{flex:1;overflow-y:auto;padding:40px;scroll-behavior:smooth}
.content-inner{max-width:860px;margin:0 auto;padding-bottom:40vh}
.welcome{text-align:center;padding:120px 20px;color:var(--muted)}
.welcome h2{font-size:20px;margin-bottom:8px;color:var(--text)}
.welcome p{font-size:14px}
.md h1{font-size:28px;font-weight:600;margin:0 0 16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.md h2{font-size:22px;font-weight:600;margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.md h3{font-size:17px;font-weight:600;margin:24px 0 8px}
.md h4{font-size:15px;font-weight:600;margin:20px 0 6px}
.md p{font-size:14px;line-height:1.7;margin:0 0 12px}
.md a{color:var(--accent);text-decoration:none}
.md a:hover{text-decoration:underline}
.md ul,.md ol{padding-left:24px;margin:0 0 12px}
.md li{font-size:14px;line-height:1.7;margin:2px 0}
.md code{background:var(--card-bg);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'JetBrains Mono','Fira Code',Consolas,monospace;color:var(--inline-code)}
.md pre{background:var(--pre-bg);border:1px solid var(--border);border-radius:8px;margin:0 0 16px;overflow:hidden;position:relative}
.md pre code{background:none;padding:16px;font-size:13px;line-height:1.55;display:block;overflow-x:auto;font-family:'JetBrains Mono','Fira Code',Consolas,monospace;color:var(--code-text)}
.md pre code.hljs{background:none;padding:16px}
.md pre .code-lang{position:absolute;top:0;right:44px;font-size:11px;color:var(--muted);background:var(--badge-bg);padding:2px 8px;border-radius:0 0 4px 4px;font-family:'JetBrains Mono',monospace;text-transform:lowercase;letter-spacing:.3px;user-select:none;pointer-events:none}
.md pre .copy-btn{position:absolute;top:6px;right:6px;background:var(--copy-bg);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;opacity:0;transition:opacity .15s,background .15s,color .15s;font-family:inherit}
.md pre:hover .copy-btn{opacity:1}
.md pre .copy-btn:hover{background:var(--accent-dim);color:var(--text);border-color:var(--accent)}
.md pre .copy-btn.ok{color:#2ea043;border-color:#2ea043}
.md pre.mermaid{background:var(--mermaid-bg);text-align:center;padding:16px;border-color:var(--border)}
.md pre.mermaid svg{max-width:100%;height:auto}
.md .page-widget{margin:18px 0}
.atlas-graph{width:100%;height:460px;display:block;border:1px solid var(--border);border-radius:14px;background:var(--card-bg);cursor:grab;touch-action:none}
.atlas-graph:active{cursor:grabbing}
.atlas-edge{stroke:var(--muted);stroke-width:1.4;opacity:.45;transition:opacity .15s,stroke .15s,stroke-width .15s}
.atlas-edge.hot{stroke:var(--accent);opacity:.95;stroke-width:2}
.atlas-edge.dim{opacity:.06}
.atlas-node{cursor:pointer}
.atlas-node rect{fill:var(--pre-bg);stroke:var(--border);stroke-width:1.4;transition:stroke .15s,fill .15s}
.atlas-node text{fill:var(--text);font:600 12px system-ui,sans-serif}
.atlas-node.hot rect{stroke:var(--accent);fill:var(--accent-dim)}
.atlas-node.dim{opacity:.3}
.atlas-caption{color:var(--muted);font-size:12px;margin-top:8px;text-align:center}
.md blockquote{border-left:3px solid var(--accent);padding:4px 16px;margin:0 0 12px;color:var(--muted)}
.md table{width:100%;border-collapse:collapse;margin:0 0 16px;font-size:13px}
.md th,.md td{padding:8px 12px;border:1px solid var(--border);text-align:left}
.md th{background:var(--card-bg);font-weight:600}
.md hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.md img{max-width:100%;border-radius:8px}
.md details{margin:0 0 12px}
.md summary{cursor:pointer;font-weight:600;font-size:14px;padding:6px 0}
.md details[open] summary{margin-bottom:8px}
.breadcrumb{font-size:12px;color:var(--muted);margin-bottom:20px}
.breadcrumb a{color:var(--accent);text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.nav-btns{display:inline-flex;gap:4px;margin-right:10px;vertical-align:middle}
.nav-btn{background:var(--card-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);width:28px;height:28px;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .15s}
.nav-btn:hover:not(:disabled){background:var(--accent-dim);border-color:var(--accent)}
.nav-btn:disabled{opacity:.3;cursor:default}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:98}
.overlay.show{display:block}
.menu-toggle{display:none;position:fixed;bottom:20px;right:20px;width:48px;height:48px;background:var(--accent);border:none;border-radius:50%;color:#fff;font-size:22px;cursor:pointer;z-index:100;box-shadow:0 4px 12px var(--shadow)}
.theme-toggle{background:var(--card-bg);border:1px solid var(--border);border-radius:6px;width:30px;height:26px;padding:0;cursor:pointer;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;margin-right:6px;transition:background .15s,color .15s,border-color .15s}
.theme-toggle:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
.theme-toggle svg{width:15px;height:15px;display:block}
.theme-toggle .icon-sun{display:none}
.theme-toggle .icon-moon{display:block}
html[data-theme="light"] .theme-toggle .icon-sun{display:block}
html[data-theme="light"] .theme-toggle .icon-moon{display:none}
@media(max-width:768px){.sidebar{position:fixed;left:-300px;top:0;bottom:0;z-index:99;transition:left .25s ease}.sidebar.open{left:0}.overlay.show{display:block}.menu-toggle{display:block}.content{padding:20px 14px}.md h1{font-size:22px}.md h2{font-size:18px}.md h3{font-size:15px}.md pre{padding:10px 12px;font-size:12px}.md table{font-size:12px;display:block;overflow-x:auto}.md th,.md td{padding:6px 8px;white-space:nowrap}}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--muted)}
</style>
<script>
(function(){
  try {
    var t = localStorage.getItem('docsViewerTheme');

    var link = document.getElementById('hljsTheme');
    if(link) link.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-' + (t === 'light' ? 'light' : 'dark') + '.min.css';
  } catch(e){}
})();
</script>

<script>
const MD_DATA = {"guides/architecture.md":"# 아키텍처\n\n> English: [architecture_en.md](https://monkshark.github.io/page-ide/#guides/architecture_en.md)\n\n> 모듈 경계, 의존 방향, 기술 스택 결정.\n\n이 문서는 코드가 채워지면서 살이 붙는다. 현재는 결정된 골격만 정리한다.\n\n---\n\n## 기술 스택\n\n| 영역 | 선택 | 비고 |\n|---|---|---|\n| 언어 | Kotlin (JVM 21+) | 자바 생태계 라이브러리 그대로 활용 |\n| UI | Compose Multiplatform Desktop | JetBrains Fleet 동일 스택, Skia 기반 |\n| 빌드 | Gradle (Kotlin DSL) | 멀티모듈 |\n| LSP | LSP4J (Eclipse) | 다언어 지원 표준 |\n| 신택스 | Tree-sitter | JNI 바인딩 |\n| Git | JGit | 자체 구현 회피 |\n| 로컬 저장 | SQLite (xerial JDBC) | Echo 타임라인 |\n| AI HTTP | OkHttp | `LLMProvider` 인터페이스 + 어댑터 4종 |\n| PTY | JediTerm 또는 pty4j | 프로토타입 후 결정 |\n\n---\n\n## 모듈 구조 (계획)\n\n```\npage/\n├── core         (공통 유틸, 도메인 타입, 이벤트 버스)\n├── editor       (텍스트 버퍼, 신택스 하이라이팅, 키 입력)\n├── language     (LSP 클라이언트, 언어 정의 JSON 로더)\n├── workspace    (파일 트리, 다중 탭, 분할 화면, 프로젝트 모델)\n├── ui           (Compose 컴포넌트, Glass 디자인 토큰)\n├── atlas        (코드 그래프 분석 + 렌더)\n├── echo         (키스트로크 레코더 + 타임라인 UI)\n├── pair         (LLMProvider, 어댑터, 채팅/관찰자/에이전트/튜터)\n├── runtime      (PTY, 빌드/실행, 출력 패널)\n├── git          (JGit 래퍼, diff/스테이지/커밋 UI)\n└── app          (조립층, 메인 진입점)\n```\n\n> 각 모듈의 상세 책임은 코드가 들어오면서 별도 문서로 분리한다.\n\n---\n\n## 의존 방향\n\n아래 그래프는 현재 모듈이 서로 어떻게 의존하는지 그대로 보여준다. 노드에 마우스를 올리면 이웃만 남고, 휠로 확대·드래그로 이동한다.\n\n```page-widget\natlas\n```\n\n의존은 위에서 아래로만 흐르고 순환이 없다.\n\n- `core` · `shared-core` 는 아무것도 의존하지 않는 바닥층이다.\n- `editor` 는 `ui` · `language` · `workspace` 가 함께 딛는 텍스트 기반이라, 기능 모듈이 그 위에 선다.\n- 기능 모듈은 필요한 바닥·기반 모듈(`core` · `editor` · `lsp` · `runtime` · `ui`)만 아래로 의존하고, 서로 옆으로는 의존하지 않는다.\n- 조립과 와이어링은 `app` 이 전담한다.\n\n---\n\n## AI 프로바이더 전략\n\n`LLMProvider` 인터페이스를 두고 어댑터 네 가지로 갈아끼운다.\n\n```kotlin\ninterface LLMProvider {\n    suspend fun complete(prompt: Prompt): Flow<TokenChunk>\n    fun supportsTools(): Boolean\n}\n```\n\n- Ollama — 로컬, 기본. 코드가 PC를 떠나지 않는다.\n- Anthropic Claude — 사용자 본인 API 키.\n- OpenAI ChatGPT — 사용자 본인 API 키.\n- OpenAI 호환 endpoint — Together AI / Groq / 자체 호스팅 등 endpoint URL 직접 입력.\n\nAPI 키는 OS 키체인에 저장한다 (Windows Credential Manager 등). 평문 저장 금지.\n\n---\n\n- [개요로 돌아가기](https://monkshark.github.io/page-ide/#guides/overview.md)\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","guides/architecture_en.md":"# Architecture\n\n> 한국어: [architecture.md](https://monkshark.github.io/page-ide/#guides/architecture.md)\n\n> Module boundaries, dependency direction, and stack choices.\n\nThis document grows as code lands. For now, only the decided skeleton is captured.\n\n---\n\n## Stack\n\n| Area | Choice | Note |\n|---|---|---|\n| Language | Kotlin (JVM 21+) | Reuse JVM libraries directly |\n| UI | Compose Multiplatform Desktop | Same stack as JetBrains Fleet, Skia-based |\n| Build | Gradle (Kotlin DSL) | Multi-module |\n| LSP | LSP4J (Eclipse) | Multi-language standard |\n| Syntax | Tree-sitter | JNI bindings |\n| Git | JGit | Avoid reimplementing |\n| Local store | SQLite (xerial JDBC) | Echo timeline |\n| AI HTTP | OkHttp | `LLMProvider` interface + 4 adapters |\n| PTY | JediTerm or pty4j | Decide after prototyping |\n\n---\n\n## Module structure (planned)\n\n```\npage/\n├── core         (shared utilities, domain types, event bus)\n├── editor       (text buffer, syntax highlighting, key input)\n├── language     (LSP client, language-definition JSON loader)\n├── workspace    (file tree, multi-tab, split panes, project model)\n├── ui           (Compose components, Glass design tokens)\n├── atlas        (code graph analysis + render)\n├── echo         (keystroke recorder + timeline UI)\n├── pair         (LLMProvider, adapters, chat/observer/agent/tutor)\n├── runtime      (PTY, build/run, output panel)\n├── git          (JGit wrapper, diff/stage/commit UI)\n└── app          (assembly layer, main entry point)\n```\n\n> Each module's detailed responsibilities will move to its own document as code lands.\n\n---\n\n## Dependency direction\n\nThe graph below shows how the modules actually depend on each other today. Hover a node to isolate its neighbors; scroll to zoom, drag to pan.\n\n```page-widget\natlas\n```\n\nDependencies flow strictly downward, with no cycles.\n\n- `core` and `shared-core` are the foundation — they depend on nothing.\n- `editor` is the text substrate that `ui`, `language`, and `workspace` all build on.\n- Feature modules depend only downward on the foundation and substrate modules they need (`core`, `editor`, `lsp`, `runtime`, `ui`) — never sideways on each other.\n- Assembly and wiring live in `app`.\n\n---\n\n## AI provider strategy\n\nA single `LLMProvider` interface with four swappable adapters.\n\n```kotlin\ninterface LLMProvider {\n    suspend fun complete(prompt: Prompt): Flow<TokenChunk>\n    fun supportsTools(): Boolean\n}\n```\n\n- Ollama — local, default. Code never leaves the user's machine.\n- Anthropic Claude — user-supplied API key.\n- OpenAI ChatGPT — user-supplied API key.\n- OpenAI-compatible endpoint — Together AI / Groq / self-hosted; user supplies the endpoint URL.\n\nAPI keys are stored in the OS keychain (Windows Credential Manager, macOS Keychain, libsecret on Linux). No plaintext storage.\n\n---\n\n- [Back to overview](https://monkshark.github.io/page-ide/#guides/overview_en.md)\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\n","guides/overview.md":"# PAGE 개요\n\n> English: [overview_en.md](https://monkshark.github.io/page-ide/#guides/overview_en.md)\n\n> 다언어 데스크톱 IDE. 이름은 핵심 가치 네 개의 머리글자 — Pair · Atlas · Glass · Echo.\n\nPAGE는 한 페이지 안에서 네 가지 차원을 동시에 보는 것을 목표로 한다. 코드(텍스트), 코드 그래프(공간), 작업 시간축(시간), AI 동반자(대화). 기존 IDE가 이 중 하나만 잘 푸는 동안, PAGE는 이 넷을 한 화면 안에 통합하려 한다.\n\n---\n\n## 현재 구현 상태\n\n이 개요는 지향점 네 가지를 함께 설명한다. 그중 지금 동작하는 것과 아직 계획 단계인 것을 먼저 구분한다.\n\n| 차원 | 상태 |\n| --- | --- |\n| 에디터 · LSP (기반) | 동작 — 다언어 편집, 진단, 자동완성 |\n| Atlas | 동작 — import · 호출 · 모듈 그래프 |\n| Glass | 부분 — 디자인 토큰, 글래스 표면, 다크/라이트 테마 |\n| Pair | 계획 — 아직 코드 없음 |\n| Echo | 계획 — 아직 코드 없음 |\n\n아래 네 절은 완성된 모습을 함께 설명하므로, 각 절 첫 줄에 현재 상태를 표시한다.\n\n---\n\n## 핵심 가치 네 가지\n\n### Pair — AI 동반자\n\n> 상태: 계획 단계. 아래는 목표 동작이며 아직 구현되지 않았다.\n\n곁에서 코드를 함께 보는 모드. 명령을 받고 실행하는 외주형이 아니라, 사용자의 작업을 관찰하고 짧게 거드는 동행형을 지향한다.\n\n- 관찰자 — 사용자가 짜는 코드를 보고 자발적으로 짧게 코멘트.\n- 대화 — 채팅 기반 질문/답변, 코드 컨텍스트 자동 첨부.\n- 에이전트 — 도구 호출로 파일 수정, 명령 실행. 모든 변경은 사용자 승인 필요.\n- 튜터 — 학습자용. 코드의 의도를 묻고 대안을 제시한다.\n\n### Atlas — 코드 그래프 (공간)\n\n> 상태: 동작. import · 호출 · 모듈 그래프 뷰를 제공한다.\n\n파일 트리는 디렉터리 구조일 뿐이다. Atlas는 모듈, 함수, 의존성을 노드와 엣지로 시각화한다.\n\n- 노드: 파일 / 주요 심볼\n- 엣지: import, 호출, 상속\n- 줌·팬, 노드 클릭으로 파일 오픈, 호버 미리보기\n- \"현재 파일에서 도달 가능한 노드만 보기\" 필터\n\n### Glass — UI 미감\n\n> 상태: 부분 구현. 디자인 토큰과 글래스 표면, 다크/라이트 테마 전환이 있다. 포커스 모드 등은 예정.\n\n매일 8시간 보는 화면이라면 보고 싶은 화면이어야 한다. Glass는 글래스모피즘 기반 디자인 시스템이다.\n\n- 다크 모드 기본, 라이트 모드 전환\n- 반투명 패널, 부드러운 모션, 네온 액센트\n- 포커스 모드 (현재 파일 외 흐림)\n- Compose Multiplatform Material 3 위에 디자인 토큰 v1\n\n### Echo — 키스트로크 타임라인 (시간)\n\n> 상태: 계획 단계. 아직 구현되지 않았다.\n\nGit 커밋은 결과 스냅샷이지, 작업 흐름이 아니다. Echo는 키 입력을 로컬 SQLite에 저장해서 작업 시간축을 그대로 되감을 수 있게 한다.\n\n- 디바운스된 키 입력 자동 레코딩 (오프라인, 로컬 DB)\n- 하단 타임라인 바, 스크럽으로 시점 이동 (read-only 뷰)\n- \"이 시점으로 복원\" 버튼\n- 보존 기간 기본 30일, 커스터마이즈 가능\n\n---\n\n## 만들지 않을 것\n\n스코프 보호는 컨셉의 일부다.\n\n- 모바일/웹 버전 — 데스크톱 우선\n- 자체 언어 서버 — LSP 클라이언트만\n- 자체 디버거 엔진 — 추후 DAP 사용\n- 협업 편집 (Live Share 류) — 후순위\n- 마켓플레이스/플러그인 SDK — v2.0 이후\n\n---\n\n## 단계 구성\n\n네 단계로 나누어 단계마다 배포 가능한 결과물을 남긴다.\n\n1. 기반 — 예쁜 다언어 에디터.\n2. Atlas + Git — 코드 그래프와 버전 관리 통합.\n3. Echo — 키스트로크 타임라인.\n4. Pair — AI 동반자 (멀티 프로바이더).\n\n---\n\n## 다음 문서\n\n- [아키텍처](https://monkshark.github.io/page-ide/#guides/architecture.md) — 모듈 구조와 의존 방향, 기술 스택 결정\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","guides/overview_en.md":"# PAGE Overview\n\n> 한국어: [overview.md](https://monkshark.github.io/page-ide/#guides/overview.md)\n\n> Multi-language desktop IDE. The name comes from the initials of four core values — Pair · Atlas · Glass · Echo.\n\nPAGE aims to put four dimensions on a single page: code (text), code graph (space), work timeline (time), and an AI companion (conversation). Where existing IDEs solve one of these well, PAGE aims to integrate all four into one screen.\n\n---\n\n## Current implementation status\n\nThis overview describes all four goals together. First, it separates what works today from what is still planned.\n\n| Dimension | Status |\n| --- | --- |\n| Editor · LSP (foundation) | Working — multi-language editing, diagnostics, completion |\n| Atlas | Working — import · call · module graphs |\n| Glass | Partial — design tokens, glass surfaces, dark/light theme |\n| Pair | Planned — no code yet |\n| Echo | Planned — no code yet |\n\nThe four sections below describe the finished vision, so each opens with its current status.\n\n---\n\n## The four core values\n\n### Pair — AI companion\n\n> Status: Planned. The behavior below is the goal and is not yet implemented.\n\nA mode where the AI sits beside you and watches the code. Not the outsourcing model where you issue a command and receive a result, but a companion model that observes your work and chimes in briefly.\n\n- Observer — Watches the code you write and offers short, unsolicited comments.\n- Chat — Question/answer with automatic code-context attachment.\n- Agent — Tool-calling for file edits and command execution. Every change requires explicit user approval.\n- Tutor — For learners. Asks about the intent of your code and proposes alternatives.\n\n### Atlas — code graph (space)\n\n> Status: Working. Provides import · call · module graph views.\n\nThe file tree is just directory structure. Atlas visualizes modules, functions, and dependencies as nodes and edges.\n\n- Nodes: files / major symbols\n- Edges: imports, calls, inheritance\n- Zoom/pan, click to open the file, hover to preview\n- \"Show only nodes reachable from the current file\" filter\n\n### Glass — UI aesthetic\n\n> Status: Partial. Design tokens, glass surfaces, and dark/light theme toggling exist. Focus mode and more are planned.\n\nIf you stare at a screen eight hours a day, it should be a screen you want to look at. Glass is a glassmorphism-based design system.\n\n- Dark mode by default, light mode toggle\n- Translucent panels, smooth motion, neon accents\n- Focus mode (everything except the current file dims)\n- Design tokens v1 layered on top of Compose Multiplatform Material 3\n\n### Echo — keystroke timeline (time)\n\n> Status: Planned. Not yet implemented.\n\nA git commit is a result snapshot, not a record of work. Echo stores keystrokes in a local SQLite database so you can rewind the work timeline as it happened.\n\n- Debounced auto-recording of keystrokes (offline, local DB)\n- Bottom timeline bar, scrub to navigate (read-only view)\n- \"Restore to this point\" button\n- Default 30-day retention, configurable\n\n---\n\n## What we will not build\n\nScope protection is part of the concept.\n\n- Mobile/web versions — desktop first\n- Our own language server — LSP client only\n- Our own debugger engine — DAP later\n- Collaborative editing (Live Share style) — deferred\n- Marketplace / plugin SDK — post-v2.0\n\n---\n\n## Stages\n\nFour stages, each ending with something shippable.\n\n1. Foundation — a good-looking multi-language editor.\n2. Atlas + Git — code graph plus version control.\n3. Echo — keystroke timeline.\n4. Pair — AI companion (multi-provider).\n\n---\n\n## Next document\n\n- [Architecture](https://monkshark.github.io/page-ide/#guides/architecture_en.md) — Module structure, dependency direction, and stack choices\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\n","modules/app/editor_panel.md":"# EditorPanel\n\n> `page/app/src/main/kotlin/page/app/EditorPanel.kt` — 에디터 본문\n\n`BasicTextField` 한 개를 띄우고, 그 위에 라인 번호 거터 / 토큰 컬러 / 매치 하이라이트 / 브래킷 매치 / 현재 줄 배경 / 상태바를 얹는다\n\n> English: [editor_panel_en.md](https://monkshark.github.io/page-ide/#modules/app/editor_panel_en.md)\n\n---\n\n## 시그니처\n\n```kotlin\n@Composable\nfun EditorPanel(\n    value: TextFieldValue,\n    onValueChange: (TextFieldValue) -> Unit,\n    activePath: Path?,\n    lexer: SyntaxLexer?,\n    search: SearchState?,\n    onUndo: () -> Unit,\n    onRedo: () -> Unit,\n    pushHistory: (EditSnapshot) -> Unit,\n    modifier: Modifier = Modifier,\n)\n```\n\n| 파라미터 | 의미 |\n|---|---|\n| `value` | 텍스트 + selection — Compose `TextFieldValue` 그대로 |\n| `lexer` | `null` 이면 토큰 색칠 없음 (본문 톤만) |\n| `search` | 검색 매치/active match 강조용 |\n| `pushHistory(prev)` | 변경 전 스냅샷 푸시 — undo/redo 입력은 `Main` 의 `doUndo` / `doRedo` |\n\n---\n\n## TextBuffer & 토큰\n\n```kotlin\nval buffer = remember(value.text) { TextBuffer(value.text) }\nval tokens = remember(value.text, lexer) { lexer?.tokenize(value.text).orEmpty() }\n```\n\n`buffer` 와 `tokens` 둘 다 `value.text` 기준으로 메모이즈 — 텍스트가 바뀔 때만 재계산. 라인 번호 거터, 상태바, 현재 줄 강조가 모두 같은 `buffer` 를 본다\n\n---\n\n## 브래킷 매치\n\n```kotlin\nval bracketMatch = remember(value.text, value.selection.start, value.selection.end) {\n    if (value.selection.collapsed) BracketMatch.find(value.text, value.selection.start) else null\n}\n```\n\nselection 이 collapsed (= 캐럿) 일 때만 매칭. 선택 중에는 `null` 로 두어 시각 노이즈 제거\n\n---\n\n## 현재 줄 배경\n\n```kotlin\nval currentLineBg = MaterialTheme.colorScheme.onBackground.copy(alpha = 0.06f)\n.drawBehind { ... }\n```\n\n`buffer.lineColOf(caret).line` 의 y 범위에 직사각형 한 줄. `drawBehind` 로 그려서 텍스트 셰이프 위에 색이 깔리지 않게\n\n---\n\n## 포커스 후 스크롤 보존\n\n```kotlin\nfocusGainVersion ↑ 시 LaunchedEffect(focusGainVersion) {\n    delay(250)\n    scrollState.scrollTo(scrollState.value, MutatePriority.PreventUserInput)\n}\n```\n\n탭 전환 직후 BasicTextField 가 캐럿을 화면 안으로 끌고 오는 기본 동작이 있다 — 250ms 안에 한 번 잠궈서 무시하게 만든다. `MutatePriority.PreventUserInput` 으로 사용자 스크롤만 풀어줌\n\n---\n\n## `onValueChange` 체인\n\n```kotlin\nval after = AutoClose.apply(value, next)\nval unindented = Indent.maybeUnindentClosingBrace(after)\nval final = Indent.maybeApplyEnter(unindented)\nonValueChange(final)\n```\n\n타이핑 직후 세 단계로 후처리. `AutoClose` 가 짝괄호/따옴표, `Indent` 가 닫는 중괄호 정렬과 `Enter` 자동 들여쓰기\n\n---\n\n## 키 처리 (`onPreviewKeyEvent`)\n\n| 키 | 동작 |\n|---|---|\n| `Alt+Up/Down` | `LineMove.moveUp/moveDown` |\n| `Alt+Shift+Up/Down` | `duplicateUp/duplicateDown` |\n| `Tab` | 마크다운 코드 펜스 안이면 `handleLiteralTab`, 아니면 들여쓰기 |\n| `Shift+Tab` | `handleShiftTab` (역들여쓰기) |\n| `Enter` | `handleEnter` (자동 들여쓰기) |\n| `Backspace` | `handleBackspace` — `null` 폴백이면 기본 동작 |\n\n`MarkdownFence.isInsideFence` 가 `Tab` 분기를 결정 — 코드 블록 안에서는 리터럴 탭이 들어가야 위지윅이 안 깨짐\n\n---\n\n## 마우스 클릭 (더블 / 트리플)\n\n```kotlin\n.pointerInput(Unit) {\n    awaitPointerEventScope {\n        ... PointerEventPass.Final 의 Press 이벤트만 본다\n        clickCount = if (now - lastClickTime < 400 && close && clickCount < 3) clickCount + 1 else 1\n    }\n}\n```\n\n`onTextLayout` 으로 잡아둔 `TextLayoutResult.getOffsetForPosition` 으로 클릭 좌표를 텍스트 오프셋으로 변환\n\n| 클릭 | 동작 |\n|---|---|\n| 더블 | `WordBoundary.wordRangeAt(text, offset)` → 같은 클래스 런 선택 (공백/개행 위에서는 무시) |\n| 트리플 | `WordBoundary.lineRangeAt(text, offset)` → 줄 시작 ~ `\\n` 직전 |\n\n`PointerEventPass.Final` 이라 `BasicTextField` 가 자체 포인터 처리를 끝낸 뒤 우리가 덮어 쓴다. 400ms / 8px 안에서만 시퀀스로 인정 → 그 외엔 카운터 리셋\n\n---\n\n## 코드 폴딩\n\n```kotlin\nval foldRegions = remember(value.text) { FoldRegions.detect(value.text) }\nvar foldedRegions by remember(activePath) { mutableStateOf(emptySet<FoldRegions.Region>()) }\nval foldSegments = FoldRegions.segmentsFor(value.text, activeFolds)\n```\n\n`{`/`}` 페어 기준 폴딩. 거터에 ▾/▸ 토글이 뜨고, 클릭하면 `foldedRegions` 셋이 갱신됨. 텍스트가 바뀌면 `foldRegions` 가 재계산되며 이미 사라진 region 은 자동으로 폴드에서 빠짐 (`activeFolds` 필터)\n\n접힌 영역은 `{ ... }` 모양으로 표시되고, `...` 부분만 회색 + 옅은 배경으로 강조됨 — `...` 위 클릭만 펼침으로 동작하고 `{`, 좌우 공백, `}` 는 일반 텍스트처럼 선택/드래그 가능. pointerInput Press 에서 `FoldRegions.foldedRegionAt` 가 `...` 안인지 검사해 일치할 때만 토글 + 이벤트 소비\n\n거터에 넘기는 `gutterLines` 는 `(startLine+1..endLine)` 에 들어가는 줄을 뺀 리스트 — 본문에서 안 보이는 줄은 거터에서도 같이 안 보임\n\n탭 전환 시 (`activePath` 변경) 폴드 상태는 초기화 — `remember(activePath)` 로 키잉됨\n\n---\n\n## `CombinedHighlightTransformation`\n\n`VisualTransformation` 한 번에 네 종류를 처리한다:\n\n1. 토큰 컬러 (`colorFor(kind)`, `PUNCT` 는 `null` → 본문 색 유지)\n2. 매치 배경 — active match 와 일반 match 색 구분\n3. 브래킷 매치 배경\n4. 폴딩 — `foldSegments` 가 있으면 본문을 ` ... ` 플레이스홀더로 치환하고 `FoldOffsetMapping` 사용\n\n폴딩이 없을 때는 `OffsetMapping.Identity`. 있을 때는 `FoldRegions.{originalToTransformed, transformedToOriginal}` 위에 얇게 씌운 매핑\n\n---\n\n## `EditorStatusBar`\n\n하단 한 줄. `Ln {line+1}, Col {col+1}` · 줄 수 · 글자 수. `buffer.lineColOf(caret)` 결과를 직접 표시\n\n---\n\n## 폰트\n\n| 항목 | 값 |\n|---|---|\n| 패밀리 | `EditorFontFamily` |\n| 크기 | `14sp` |\n| 줄 높이 | `20sp` |\n| 줄 정렬 | `LineHeightStyle(Center, Trim.None)` |\n\n`Trim.None` 이라 첫 줄/마지막 줄에도 같은 줄 높이 → 거터와 정확히 정렬\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.Main` 본문 영역 | 활성 탭의 텍스트/lexer/search 를 그대로 전달 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/app/editor_panel_en.md":"# EditorPanel\r\n\r\n> 한국어: [editor_panel.md](https://monkshark.github.io/page-ide/#modules/app/editor_panel.md)\r\n\r\n> `page/app/src/main/kotlin/page/app/EditorPanel.kt` — Editor body\r\n\r\nA single `BasicTextField` with a line-number gutter, token coloring, match highlights, bracket match, current-line background, and a status bar layered on top.\r\n\r\n---\r\n\r\n## Signature\r\n\r\n```kotlin\r\n@Composable\r\nfun EditorPanel(\r\n    value: TextFieldValue,\r\n    onValueChange: (TextFieldValue) -> Unit,\r\n    activePath: Path?,\r\n    lexer: SyntaxLexer?,\r\n    search: SearchState?,\r\n    onUndo: () -> Unit,\r\n    onRedo: () -> Unit,\r\n    pushHistory: (EditSnapshot) -> Unit,\r\n    modifier: Modifier = Modifier,\r\n)\r\n```\r\n\r\n| Parameter | Meaning |\r\n|---|---|\r\n| `value` | Text + selection — vanilla Compose `TextFieldValue` |\r\n| `lexer` | `null` ⇒ no token coloring (body tone only) |\r\n| `search` | Drives match / active-match highlights |\r\n| `pushHistory(prev)` | Pushes a pre-edit snapshot — actual undo/redo dispatch lives in `Main`'s `doUndo` / `doRedo` |\r\n\r\n---\r\n\r\n## TextBuffer & tokens\r\n\r\n```kotlin\r\nval buffer = remember(value.text) { TextBuffer(value.text) }\r\nval tokens = remember(value.text, lexer) { lexer?.tokenize(value.text).orEmpty() }\r\n```\r\n\r\n`buffer` and `tokens` are both keyed on `value.text` — recomputed only when text changes. The line-number gutter, status bar, and current-line highlight all read from the same `buffer`.\r\n\r\n---\r\n\r\n## Bracket match\r\n\r\n```kotlin\r\nval bracketMatch = remember(value.text, value.selection.start, value.selection.end) {\r\n    if (value.selection.collapsed) BracketMatch.find(value.text, value.selection.start) else null\r\n}\r\n```\r\n\r\nOnly matches when the selection is collapsed (i.e., a single caret). During a selection it stays `null` to avoid visual noise.\r\n\r\n---\r\n\r\n## Current-line background\r\n\r\n```kotlin\r\nval currentLineBg = MaterialTheme.colorScheme.onBackground.copy(alpha = 0.06f)\r\n.drawBehind { ... }\r\n```\r\n\r\nA thin rectangle at the y range of `buffer.lineColOf(caret).line`. Painted with `drawBehind` so the color sits under the glyphs.\r\n\r\n---\r\n\r\n## Scroll lock after focus\r\n\r\n```kotlin\r\nwhen focusGainVersion ↑, LaunchedEffect(focusGainVersion) {\r\n    delay(250)\r\n    scrollState.scrollTo(scrollState.value, MutatePriority.PreventUserInput)\r\n}\r\n```\r\n\r\nRight after a tab switch, `BasicTextField` likes to drag the caret into view. We pin the scroll position once during the first 250ms to ignore that. `MutatePriority.PreventUserInput` means real user scroll still wins.\r\n\r\n---\r\n\r\n## `onValueChange` chain\r\n\r\n```kotlin\r\nval after = AutoClose.apply(value, next)\r\nval unindented = Indent.maybeUnindentClosingBrace(after)\r\nval final = Indent.maybeApplyEnter(unindented)\r\nonValueChange(final)\r\n```\r\n\r\nEach keystroke runs through three post-processors: `AutoClose` for matched brackets/quotes, `Indent` for closing-brace alignment and Enter-driven auto-indent.\r\n\r\n---\r\n\r\n## Key handling (`onPreviewKeyEvent`)\r\n\r\n| Key | Action |\r\n|---|---|\r\n| `Alt+Up/Down` | `LineMove.moveUp/moveDown` |\r\n| `Alt+Shift+Up/Down` | `duplicateUp/duplicateDown` |\r\n| `Tab` | Inside a Markdown fence ⇒ `handleLiteralTab`; otherwise indent |\r\n| `Shift+Tab` | `handleShiftTab` (outdent) |\r\n| `Enter` | `handleEnter` (auto-indent) |\r\n| `Backspace` | `handleBackspace`; if it returns `null`, default behavior runs |\r\n\r\n`MarkdownFence.isInsideFence` decides the `Tab` branch — code blocks need a literal tab so the WYSIWYG output stays intact.\r\n\r\n---\r\n\r\n## Mouse clicks (double / triple)\r\n\r\n```kotlin\r\n.pointerInput(Unit) {\r\n    awaitPointerEventScope {\r\n        ... only Press events on PointerEventPass.Final\r\n        clickCount = if (now - lastClickTime < 400 && close && clickCount < 3) clickCount + 1 else 1\r\n    }\r\n}\r\n```\r\n\r\n`onTextLayout` captures the `TextLayoutResult`; `getOffsetForPosition` converts the click coordinates to a text offset.\r\n\r\n| Click | Action |\r\n|---|---|\r\n| Double | `WordBoundary.wordRangeAt(text, offset)` — selects the same-class run (no-op on whitespace / newline) |\r\n| Triple | `WordBoundary.lineRangeAt(text, offset)` — line start to just before `\\n` |\r\n\r\n`PointerEventPass.Final` runs after `BasicTextField`'s built-in pointer logic, so we override its result. The sequence only counts within 400 ms and 8 px; outside that the counter resets.\r\n\r\n---\r\n\r\n## Code folding\r\n\r\n```kotlin\r\nval foldRegions = remember(value.text) { FoldRegions.detect(value.text) }\r\nvar foldedRegions by remember(activePath) { mutableStateOf(emptySet<FoldRegions.Region>()) }\r\nval foldSegments = FoldRegions.segmentsFor(value.text, activeFolds)\r\n```\r\n\r\nBrace-pair folding. The gutter shows ▾/▸ toggles; clicking updates the `foldedRegions` set. When the text changes, `foldRegions` is recomputed and any folded region that no longer exists drops out automatically (`activeFolds` filter).\r\n\r\nA folded region renders as `{ ... }` with only the `...` substring tinted gray and softly backgrounded. Only clicks on `...` unfold — `{`, the surrounding spaces, and `}` stay regular text so drag-selection / copy-paste shortcuts work over the placeholder. The `pointerInput` Press handler hands the transformed offset to `FoldRegions.foldedRegionAt`, which only matches inside the `...` window, and consumes the event on a hit.\r\n\r\n`gutterLines` excludes every line in `(startLine+1..endLine)` for an active fold — lines hidden from the body are hidden from the gutter as well.\r\n\r\nTab switches (`activePath` change) reset the fold state — keyed via `remember(activePath)`.\r\n\r\n---\r\n\r\n## `CombinedHighlightTransformation`\r\n\r\nA single `VisualTransformation` handles four things:\r\n\r\n1. Token colors (`colorFor(kind)`; `PUNCT` returns `null` to keep body color).\r\n2. Match backgrounds — active match vs. regular match.\r\n3. Bracket-match background.\r\n4. Folding — when `foldSegments` is non-empty, the body gets spliced with ` ... ` placeholders and a `FoldOffsetMapping` is used.\r\n\r\nWithout folds it returns `OffsetMapping.Identity`. With folds it returns a thin mapping built on top of `FoldRegions.{originalToTransformed, transformedToOriginal}`.\r\n\r\n---\r\n\r\n## `EditorStatusBar`\r\n\r\nA thin bottom row: `Ln {line+1}, Col {col+1}` · line count · char count. The numbers come straight from `buffer.lineColOf(caret)`.\r\n\r\n---\r\n\r\n## Font\r\n\r\n| Property | Value |\r\n|---|---|\r\n| Family | `EditorFontFamily` |\r\n| Size | `14sp` |\r\n| Line height | `20sp` |\r\n| Line alignment | `LineHeightStyle(Center, Trim.None)` |\r\n\r\n`Trim.None` keeps the same line height on the first/last line — perfect alignment with the gutter.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.Main`'s body slot | Pipes the active tab's text / lexer / search through |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/app/file_dialogs.md":"# FileDialogs\n\n> `page/app/src/main/kotlin/page/app/FileDialogs.kt` — `JFileChooser` 래퍼\n\nSwing 의 `JFileChooser` 를 그대로 띄우되, 결과를 `Path?` 로 통일해 호출부가 `null` 만 보고 취소를 판정하도록 만든다\n\n> English: [file_dialogs_en.md](https://monkshark.github.io/page-ide/#modules/app/file_dialogs_en.md)\n\n---\n\n## `open`\n\n```kotlin\nfun open(parent: Frame): Path?\n```\n\n파일 열기 다이얼로그. `FILES_ONLY` 모드. 사용자가 Cancel 을 누르면 `null`\n\n| 호출부 | 시점 |\n|---|---|\n| `Ctrl+O` | 단일 파일 열기 |\n\n---\n\n## `saveAs`\n\n```kotlin\nfun saveAs(parent: Frame, suggested: String? = null): Path?\n```\n\n저장 다이얼로그. `suggested` 가 있으면 기본 파일명으로 채운다 (e.g., `Untitled.kt`)\n\n| 호출부 | 시점 |\n|---|---|\n| `Ctrl+S` (탭 경로가 가상 untitled 일 때) | 새 경로로 저장 |\n\n---\n\n## `openDirectory`\n\n```kotlin\nfun openDirectory(parent: Frame): Path?\n```\n\n폴더 열기 다이얼로그. `DIRECTORIES_ONLY` 모드 — 사이드바 트리의 루트로 사용\n\n| 호출부 | 시점 |\n|---|---|\n| `Ctrl+Shift+O` | 프로젝트 폴더 열기 |\n\n---\n\n## 왜 Compose 가 아니라 Swing 인가\n\nCompose Desktop 자체가 Swing 위에 얹혀 있고, JVM 표준 파일 다이얼로그가 OS 네이티브 룩에 가장 가깝다. Compose 로 직접 그리면 OS 별 파일 시스템 디테일을 다시 구현해야 함\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/app/file_dialogs_en.md":"# FileDialogs\r\n\r\n> 한국어: [file_dialogs.md](https://monkshark.github.io/page-ide/#modules/app/file_dialogs.md)\r\n\r\n> `page/app/src/main/kotlin/page/app/FileDialogs.kt` — `JFileChooser` wrappers\r\n\r\nWraps Swing's `JFileChooser` and normalizes the result to `Path?`, so callers only need to check `null` for cancellation.\r\n\r\n---\r\n\r\n## `open`\r\n\r\n```kotlin\r\nfun open(parent: Frame): Path?\r\n```\r\n\r\nFile-open dialog in `FILES_ONLY` mode. Returns `null` on Cancel.\r\n\r\n| Caller | When |\r\n|---|---|\r\n| `Ctrl+O` | Open a single file |\r\n\r\n---\r\n\r\n## `saveAs`\r\n\r\n```kotlin\r\nfun saveAs(parent: Frame, suggested: String? = null): Path?\r\n```\r\n\r\nSave dialog. When `suggested` is given (e.g., `Untitled.kt`), it pre-fills the filename.\r\n\r\n| Caller | When |\r\n|---|---|\r\n| `Ctrl+S` on a tab whose path is a virtual untitled | Pick a new path |\r\n\r\n---\r\n\r\n## `openDirectory`\r\n\r\n```kotlin\r\nfun openDirectory(parent: Frame): Path?\r\n```\r\n\r\nFolder-open dialog in `DIRECTORIES_ONLY` mode — used as the sidebar tree root.\r\n\r\n| Caller | When |\r\n|---|---|\r\n| `Ctrl+Shift+O` | Open a project folder |\r\n\r\n---\r\n\r\n## Why Swing, not Compose\r\n\r\nCompose Desktop already runs on top of Swing, and the JVM file dialog is the closest thing to a native OS chooser. Drawing one in pure Compose would mean re-implementing OS-specific filesystem behavior.\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/app/file_tree_panel.md":"# FileTreePanel\n\n> `page/app/src/main/kotlin/page/app/FileTreePanel.kt` — 좌측 사이드바 (파일 트리)\n\n`FileTree.listTree(root, expanded)` 결과를 `LazyColumn` 으로 렌더. 디렉터리 chevron 토글, 파일 클릭으로 탭 열기\n\n> English: [file_tree_panel_en.md](https://monkshark.github.io/page-ide/#modules/app/file_tree_panel_en.md)\n\n---\n\n## 시그니처\n\n```kotlin\n@Composable\nfun FileTreePanel(\n    root: Path?,\n    expanded: Set<Path>,\n    activePath: Path?,\n    onToggle: (Path) -> Unit,\n    onOpen: (Path) -> Unit,\n    modifier: Modifier = Modifier,\n)\n```\n\n| 파라미터 | 의미 |\n|---|---|\n| `root` | 프로젝트 루트 — `null` 이면 빈 상태 힌트 표시 |\n| `expanded` | 현재 펼쳐진 디렉터리 집합 (위쪽에서 관리) |\n| `activePath` | 활성 탭 경로 — 같은 행을 selected 톤으로 |\n| `onToggle(path)` | 디렉터리 클릭 → `expanded` 토글 |\n| `onOpen(path)` | 파일 클릭 → `openOrFocus` |\n\n---\n\n## 상수\n\n```kotlin\nprivate val RowHeight = 22.dp\nprivate val ChevronWidth = 14.dp\nprivate val IndentStep = 14.dp\nprivate val EdgePadding = 8.dp\n```\n\n`IndentStep` 은 깊이 1 단계의 들여쓰기. chevron 영역은 깊이가 들어가도 고정 폭 — 파일/디렉터리 아이콘이 흔들리지 않게\n\n---\n\n## 렌더 흐름\n\n```kotlin\nSurface(surfaceVariant) {\n    Column {\n        SectionHeader   // \"PROJECT\"\n        HorizontalDivider\n        if (root == null) EmptyTreeHint\n        else LazyColumn {\n            items(nodes, key = { it.path.toString() }) { TreeRow(...) }\n        }\n    }\n}\n```\n\n`nodes = remember(root, expanded) { FileTree.listTree(root, expanded) }` — `root` / `expanded` 가 변할 때만 재계산\n\n`key` 가 path string 이라 동일 경로 노드는 재사용 → 펼침/접힘 시 깜빡임 없음\n\n---\n\n## `TreeRow`\n\n```kotlin\n@Composable\nprivate fun TreeRow(\n    node: FileTreeNode,\n    isActive: Boolean,\n    onToggle: () -> Unit,\n    onOpen: () -> Unit,\n)\n```\n\n| 상태 | 배경 |\n|---|---|\n| `isActive` (활성 탭과 같은 파일) | `primary 16%` |\n| hover | `onSurface 6%` |\n| 그 외 | 투명 |\n\n| chevron | |\n|---|---|\n| 디렉터리 + 펼침 | `▾` |\n| 디렉터리 + 접힘 | `▸` |\n| 파일 | (chevron 폭만큼 빈칸 → 정렬 유지) |\n\n텍스트는 12sp, 디렉터리는 `Medium` / 파일은 `Normal`. `maxLines = 1` + `Ellipsis` — 긴 이름은 `…` 로\n\n---\n\n## `EmptyTreeHint`\n\n```kotlin\n\"No folder open\"\n\"Press Ctrl+Shift+O\"\n```\n\n`root == null` 일 때 두 줄 안내. 사이드바를 닫는 단축키와 폴더 여는 단축키를 같은 자리에서 노출 → 진입점 명확\n\n---\n\n## `SectionHeader`\n\n상단 \"PROJECT\" 라벨. `10sp`, `FontWeight.Medium`, `letterSpacing = 0.8sp` — 작은 캡션 톤\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.Main` 좌측 (`sidebarWidth = 260.dp`) | 트리 + 토글/오픈 콜백 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/app/file_tree_panel_en.md":"# FileTreePanel\r\n\r\n> 한국어: [file_tree_panel.md](https://monkshark.github.io/page-ide/#modules/app/file_tree_panel.md)\r\n\r\n> `page/app/src/main/kotlin/page/app/FileTreePanel.kt` — Left sidebar (file tree)\r\n\r\nRenders `FileTree.listTree(root, expanded)` in a `LazyColumn`. Click a chevron to toggle a directory, click a file to open it as a tab.\r\n\r\n---\r\n\r\n## Signature\r\n\r\n```kotlin\r\n@Composable\r\nfun FileTreePanel(\r\n    root: Path?,\r\n    expanded: Set<Path>,\r\n    activePath: Path?,\r\n    onToggle: (Path) -> Unit,\r\n    onOpen: (Path) -> Unit,\r\n    modifier: Modifier = Modifier,\r\n)\r\n```\r\n\r\n| Parameter | Meaning |\r\n|---|---|\r\n| `root` | Project root — `null` shows the empty hint |\r\n| `expanded` | Set of currently-expanded directories (owned upstream) |\r\n| `activePath` | Path of the active tab — the matching row gets the selected tint |\r\n| `onToggle(path)` | Directory click → toggles `expanded` |\r\n| `onOpen(path)` | File click → `openOrFocus` |\r\n\r\n---\r\n\r\n## Constants\r\n\r\n```kotlin\r\nprivate val RowHeight = 22.dp\r\nprivate val ChevronWidth = 14.dp\r\nprivate val IndentStep = 14.dp\r\nprivate val EdgePadding = 8.dp\r\n```\r\n\r\n`IndentStep` is the per-depth indent. The chevron column is fixed-width regardless of depth so the file/folder glyphs stay aligned.\r\n\r\n---\r\n\r\n## Render flow\r\n\r\n```kotlin\r\nSurface(surfaceVariant) {\r\n    Column {\r\n        SectionHeader   // \"PROJECT\"\r\n        HorizontalDivider\r\n        if (root == null) EmptyTreeHint\r\n        else LazyColumn {\r\n            items(nodes, key = { it.path.toString() }) { TreeRow(...) }\r\n        }\r\n    }\r\n}\r\n```\r\n\r\n`nodes = remember(root, expanded) { FileTree.listTree(root, expanded) }` — recomputed only when `root` or `expanded` changes.\r\n\r\n`key` is the path string, so unchanged rows are reused on expand/collapse — no flicker.\r\n\r\n---\r\n\r\n## `TreeRow`\r\n\r\n```kotlin\r\n@Composable\r\nprivate fun TreeRow(\r\n    node: FileTreeNode,\r\n    isActive: Boolean,\r\n    onToggle: () -> Unit,\r\n    onOpen: () -> Unit,\r\n)\r\n```\r\n\r\n| State | Background |\r\n|---|---|\r\n| `isActive` (same file as the active tab) | `primary 16%` |\r\n| Hover | `onSurface 6%` |\r\n| Otherwise | Transparent |\r\n\r\n| Chevron | |\r\n|---|---|\r\n| Directory + expanded | `▾` |\r\n| Directory + collapsed | `▸` |\r\n| File | Blank space the width of a chevron — keeps alignment |\r\n\r\nText is 12sp, directories use `Medium`, files use `Normal`. `maxLines = 1` + `Ellipsis` — long names truncate.\r\n\r\n---\r\n\r\n## `EmptyTreeHint`\r\n\r\n```kotlin\r\n\"No folder open\"\r\n\"Press Ctrl+Shift+O\"\r\n```\r\n\r\nTwo-line hint when `root == null`. Showing the open-folder shortcut where the empty state lives makes the entry point obvious.\r\n\r\n---\r\n\r\n## `SectionHeader`\r\n\r\nThe \"PROJECT\" caption: `10sp`, `FontWeight.Medium`, `letterSpacing = 0.8sp` — small caption tone.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| Left of `page.app.Main` (`sidebarWidth = 260.dp`) | Tree + toggle/open callbacks |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/app/line_number_gutter.md":"# LineNumberGutter\n\n> `page/app/src/main/kotlin/page/app/LineNumberGutter.kt` — 에디터 좌측 라인 번호 + 폴딩 토글\n\n`EditorPanel` 본문 옆에 붙는 거터. 현재 줄만 진하게, 나머지는 흐리게. 폴딩 가능 줄에는 ▾/▸ 토글이 같이 표시됨\n\n> English: [line_number_gutter_en.md](https://monkshark.github.io/page-ide/#modules/app/line_number_gutter_en.md)\n\n---\n\n## 시그니처\n\n```kotlin\n@Composable\ninternal fun LineNumberGutter(\n    lines: List<GutterLine>,\n    currentOriginalLine: Int,\n    onToggleFold: (Int) -> Unit,\n    textStyle: TextStyle,\n    modifier: Modifier = Modifier,\n)\n\ninternal data class GutterLine(\n    val originalLine: Int,\n    val foldable: Boolean,\n    val folded: Boolean,\n)\n```\n\n| 파라미터 | 의미 |\n|---|---|\n| `lines` | 실제로 그릴 행 — 폴딩으로 숨겨진 줄은 호출자가 미리 솎아서 넘김 |\n| `currentOriginalLine` | 캐럿 줄 (원본 텍스트 기준) — 매칭 행만 진하게 |\n| `onToggleFold(originalLine)` | 토글 클릭 콜백 — 인자는 0-인덱스 원본 줄 번호 |\n| `textStyle` | 본문과 동일한 폰트/줄 높이 — 행 정렬을 위해 본문 스타일 그대로 받음 |\n\n---\n\n## 색\n\n| 행 상태 | 색 |\n|---|---|\n| `originalLine == currentOriginalLine` | `colorScheme.onBackground` (강조) |\n| 그 외 | `colorScheme.onSurfaceVariant` (흐림) |\n| 토글 (접힌 상태) | `colorScheme.primary` 살짝 밝게 — 접혀 있다는 시그널 |\n| 토글 (펼친 상태 / 미사용) | `onSurfaceVariant` |\n\n---\n\n## 행 구조\n\n각 행은 `Row { FoldToggle; Text(번호) }`. `FoldToggle` 은 14dp 폭의 클릭 가능한 `Box` — 폴딩 가능 줄에는 ▾ (펼침) / ▸ (접힘), 그 외에는 공백이 들어가 폭이 일정하게 유지됨\n\n---\n\n## 정렬\n\n`fillMaxWidth()` + `TextAlign.End` — 자릿수가 늘어도 우측 정렬 유지. 내부적으로 `IntrinsicSize.Max` 폭을 잡아 가장 큰 번호 (`lineCount`) 기준으로 거터 폭이 자동 결정됨\n\n상하 16dp 패딩은 `EditorPanel` 본문의 첫 줄 위 여백과 정확히 맞춰져 본문/거터 줄이 정렬됨\n\n---\n\n## 폴딩 행 솎기\n\n호출자 (`EditorPanel`) 가 `hiddenLines = 각 fold 의 (startLine+1..endLine)` 을 계산하고 그 외의 줄만 `lines` 로 넘김. 거터 행 수가 본문에서 보이는 행 수와 정확히 일치 — 폴딩된 영역은 시작 줄 한 행으로 압축됨\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.EditorPanel` | `Row { LineNumberGutter(...); editorBody }` 좌측 컬럼 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/app/line_number_gutter_en.md":"# LineNumberGutter\r\n\r\n> 한국어: [line_number_gutter.md](https://monkshark.github.io/page-ide/#modules/app/line_number_gutter.md)\r\n\r\n> `page/app/src/main/kotlin/page/app/LineNumberGutter.kt` — Left-edge line numbers + fold toggles\r\n\r\nHugs the left edge of `EditorPanel`. The current line is bright, the rest are muted, and foldable lines pick up a ▾/▸ toggle.\r\n\r\n---\r\n\r\n## Signature\r\n\r\n```kotlin\r\n@Composable\r\ninternal fun LineNumberGutter(\r\n    lines: List<GutterLine>,\r\n    currentOriginalLine: Int,\r\n    onToggleFold: (Int) -> Unit,\r\n    textStyle: TextStyle,\r\n    modifier: Modifier = Modifier,\r\n)\r\n\r\ninternal data class GutterLine(\r\n    val originalLine: Int,\r\n    val foldable: Boolean,\r\n    val folded: Boolean,\r\n)\r\n```\r\n\r\n| Parameter | Meaning |\r\n|---|---|\r\n| `lines` | Rows that should actually render — caller pre-filters out fold-hidden lines |\r\n| `currentOriginalLine` | Caret line in original-text coords — the matching row gets the active color |\r\n| `onToggleFold(originalLine)` | Toggle click callback — argument is a 0-indexed original line number |\r\n| `textStyle` | Same font / line height as the body so rows align exactly |\r\n\r\n---\r\n\r\n## Colors\r\n\r\n| Row state | Color |\r\n|---|---|\r\n| `originalLine == currentOriginalLine` | `colorScheme.onBackground` (active) |\r\n| Otherwise | `colorScheme.onSurfaceVariant` (muted) |\r\n| Toggle (folded) | Slightly brighter `colorScheme.primary` — visual signal that the block is collapsed |\r\n| Toggle (unfolded / not foldable) | `onSurfaceVariant` |\r\n\r\n---\r\n\r\n## Row structure\r\n\r\nEach row is `Row { FoldToggle; Text(number) }`. `FoldToggle` is a 14dp clickable `Box` — foldable lines get ▾ (open) / ▸ (folded); everything else gets a space so the column width stays steady.\r\n\r\n---\r\n\r\n## Alignment\r\n\r\n`fillMaxWidth()` + `TextAlign.End` — right-aligned even when the digit count grows. Internally uses `IntrinsicSize.Max`, so the gutter width tracks the largest number (`lineCount`).\r\n\r\nThe 16dp top/bottom padding has to match `EditorPanel`'s body padding exactly, otherwise gutter rows drift relative to the body.\r\n\r\n---\r\n\r\n## Filtering rows for folds\r\n\r\nThe caller (`EditorPanel`) computes `hiddenLines = union of (startLine+1..endLine) for each folded region` and passes only the surviving lines as `lines`. Gutter row count then matches the visible body row count exactly — a folded region collapses to its start line.\r\n\r\n---\r\n\r\n## Used by\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.EditorPanel` | `Row { LineNumberGutter(...); editorBody }` left column |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/app/main.md":"# Main\n\n> `page/app/src/main/kotlin/page/app/Main.kt` — `application { ... }` 진입점 + 윈도우 상태\n\n윈도우/탭/사이드바/검색/저장 다이얼로그를 묶는 톱레벨. `TabBook`, `TextFieldValue`, `rootDir`, `expanded`, `sidebarWidth`, `search`, `pendingClose` 가 모두 여기서 산다\n\n> English: [main_en.md](https://monkshark.github.io/page-ide/#modules/app/main_en.md)\n\n---\n\n## 윈도우 상태\n\n```kotlin\nvar book by remember { mutableStateOf(TabBook()) }\nvar editorValue by remember { mutableStateOf(TextFieldValue(\"\")) }\nvar rootDir by remember { mutableStateOf<Path?>(null) }\nvar expanded by remember { mutableStateOf<Set<Path>>(emptySet()) }\nvar sidebarWidth by remember { mutableStateOf(260.dp) }\nvar search by remember { mutableStateOf<SearchState?>(null) }\nvar pendingClose by remember { mutableStateOf<PendingClose?>(null) }\n```\n\n| 필드 | 의미 |\n|---|---|\n| `book` | 모든 탭과 활성 인덱스 (불변 자료구조 → 매 변경마다 새 인스턴스) |\n| `editorValue` | 활성 탭의 본문/캐럿 (Compose `TextFieldValue`). 활성 탭이 바뀌면 동기화 |\n| `rootDir` / `expanded` | 사이드바 트리 — 루트 + 펼친 디렉터리 집합 |\n| `sidebarWidth` | 드래그 핸들로 조정. 기본 `260.dp` |\n| `search` | `null` 이면 검색 바 숨김 |\n| `pendingClose` | dirty 닫기 요청. `null` 이 아니면 다이얼로그 표시 |\n\n---\n\n## 활성 탭 ↔ editorValue 동기화\n\n```kotlin\nLaunchedEffect(book.activeIndex, book.tabs.size) {\n    val active = book.tabs.getOrNull(book.activeIndex)\n    editorValue = active?.let {\n        TextFieldValue(it.text, TextRange(it.caret))\n    } ?: TextFieldValue(\"\")\n    search = search?.retargetedFor(active?.text)\n}\n```\n\n탭 전환/새 탭 시 `editorValue` 를 그 탭의 본문/캐럿으로 갈아끼운다. 검색이 켜져 있으면 새 본문으로 매치 재계산\n\n---\n\n## 핵심 핸들러 (요약)\n\n| 이름 | 역할 |\n|---|---|\n| `openInTab(path, text)` | `book = book.openOrFocus(path, text)` — 같은 경로 탭 있으면 활성화만 |\n| `openFile()` | `FileDialogs.open` → 텍스트 읽고 `openInTab` |\n| `openFolder()` | `FileDialogs.openDirectory` → `rootDir` 설정 |\n| `saveFile()` | 활성 탭 텍스트를 디스크에 쓰고 `book.markActiveSaved()` |\n| `requestCloseTab(i)` / `closeActiveTab()` | dirty 면 `pendingClose = PendingClose.Tab(i)`, 아니면 즉시 닫기 |\n| `requestExit()` | dirty 가 있으면 `pendingClose = PendingClose.App`, 아니면 `exitApplication()` |\n| `openSearch()` / `openReplace()` / `closeSearch()` | `search` 토글 |\n| `onSearchNext` / `onSearchPrev` | 매치 이동 + `moveCaretToActiveMatch` 로 캐럿 동기화 |\n| `onReplace` / `onReplaceAll` | `Replace.applyCurrent` / `applyAll` 후 본문 갱신 |\n| `doUndo` / `doRedo` | `book.undoOnActive(...)` / `redoOnActive(...)` 결과로 `editorValue` 복원 |\n\n---\n\n## `handleShortcut`\n\n```kotlin\nprivate fun handleShortcut(e: KeyEvent): Boolean\n```\n\n윈도우 레벨 단축키 핸들러. 이미 검색 바가 포커스 가져갈 때만 처리해야 하는 키는 `if (search != null) false` 로 흘려보낸다\n\n| 키 | 동작 |\n|---|---|\n| `Ctrl+O` | `openFile` |\n| `Ctrl+Shift+O` | `openFolder` |\n| `Ctrl+S` | `saveFile` |\n| `Ctrl+W` | `closeActiveTab` |\n| `Ctrl+F` | `openSearch` |\n| `Ctrl+R` | `openReplace` |\n| `Ctrl+Z` | 검색 바 켜져 있으면 패스, 아니면 `doUndo` |\n| `Ctrl+Shift+Z` / `Ctrl+Y` | `doRedo` |\n| `Esc` | `closeSearch` (검색 바 켜져 있을 때만) |\n\n---\n\n## `windowTitle`\n\n```kotlin\nprivate fun windowTitle(path: Path?): String =\n    \"${path?.fileName ?: \"Untitled\"} — ${PageIdentity.NAME}\"\n```\n\n활성 탭 파일명 + ` — PAGE` — 탭 없으면 `Untitled`. `PageIdentity.NAME` 을 직접 박지 않고 한 군데에서 가져온다\n\n---\n\n## 비공개 컴포저블\n\n| 이름 | 역할 |\n|---|---|\n| `Shell` | 사이드바 + 본문 + 상태바를 묶는 가로 분할 컨테이너 |\n| `TitleBar` | undecorated 윈도우 상단 — 드래그 영역 + 메뉴 버튼 |\n| `ResizeHandle` | 사이드바 폭 조절 핸들 (드래그) |\n\n---\n\n## 사용처\n\n이 파일이 `page:app` 의 진입점. `mainClassName = \"page.app.MainKt\"` 로 패키징됨\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/app/main_en.md":"# Main\r\n\r\n> 한국어: [main.md](https://monkshark.github.io/page-ide/#modules/app/main.md)\r\n\r\n> `page/app/src/main/kotlin/page/app/Main.kt` — `application { ... }` entry point + window state\r\n\r\nThe top-level that wires window / tabs / sidebar / search / save dialog together. `TabBook`, `TextFieldValue`, `rootDir`, `expanded`, `sidebarWidth`, `search`, `pendingClose` all live here.\r\n\r\n---\r\n\r\n## Window state\r\n\r\n```kotlin\r\nvar book by remember { mutableStateOf(TabBook()) }\r\nvar editorValue by remember { mutableStateOf(TextFieldValue(\"\")) }\r\nvar rootDir by remember { mutableStateOf<Path?>(null) }\r\nvar expanded by remember { mutableStateOf<Set<Path>>(emptySet()) }\r\nvar sidebarWidth by remember { mutableStateOf(260.dp) }\r\nvar search by remember { mutableStateOf<SearchState?>(null) }\r\nvar pendingClose by remember { mutableStateOf<PendingClose?>(null) }\r\n```\r\n\r\n| Field | Meaning |\r\n|---|---|\r\n| `book` | All tabs + active index (immutable — every mutation produces a new instance) |\r\n| `editorValue` | Active tab's body / caret (Compose `TextFieldValue`). Resyncs on tab switch |\r\n| `rootDir` / `expanded` | Sidebar tree — root + the set of expanded directories |\r\n| `sidebarWidth` | Adjusted by the resize handle. Defaults to `260.dp` |\r\n| `search` | `null` hides the search bar |\r\n| `pendingClose` | A dirty-close request. Non-null shows the dialog |\r\n\r\n---\r\n\r\n## Sync between active tab and editorValue\r\n\r\n```kotlin\r\nLaunchedEffect(book.activeIndex, book.tabs.size) {\r\n    val active = book.tabs.getOrNull(book.activeIndex)\r\n    editorValue = active?.let {\r\n        TextFieldValue(it.text, TextRange(it.caret))\r\n    } ?: TextFieldValue(\"\")\r\n    search = search?.retargetedFor(active?.text)\r\n}\r\n```\r\n\r\nOn tab switch / open, swap `editorValue` to the new tab's body and caret. If search is open, recompute matches against the new body.\r\n\r\n---\r\n\r\n## Key handlers (summary)\r\n\r\n| Name | Role |\r\n|---|---|\r\n| `openInTab(path, text)` | `book = book.openOrFocus(path, text)` — same-path tab is just activated |\r\n| `openFile()` | `FileDialogs.open` → read text → `openInTab` |\r\n| `openFolder()` | `FileDialogs.openDirectory` → set `rootDir` |\r\n| `saveFile()` | Write active tab text to disk and `book.markActiveSaved()` |\r\n| `requestCloseTab(i)` / `closeActiveTab()` | If dirty, `pendingClose = PendingClose.Tab(i)`; else close immediately |\r\n| `requestExit()` | If any tab is dirty, `pendingClose = PendingClose.App`; else `exitApplication()` |\r\n| `openSearch()` / `openReplace()` / `closeSearch()` | Toggle `search` |\r\n| `onSearchNext` / `onSearchPrev` | Move match + `moveCaretToActiveMatch` |\r\n| `onReplace` / `onReplaceAll` | Run `Replace.applyCurrent` / `applyAll` and update body |\r\n| `doUndo` / `doRedo` | Restore `editorValue` from `book.undoOnActive(...)` / `redoOnActive(...)` |\r\n\r\n---\r\n\r\n## `handleShortcut`\r\n\r\n```kotlin\r\nprivate fun handleShortcut(e: KeyEvent): Boolean\r\n```\r\n\r\nWindow-level shortcut handler. Keys that should defer to the search bar pass through with `if (search != null) false`.\r\n\r\n| Key | Action |\r\n|---|---|\r\n| `Ctrl+O` | `openFile` |\r\n| `Ctrl+Shift+O` | `openFolder` |\r\n| `Ctrl+S` | `saveFile` |\r\n| `Ctrl+W` | `closeActiveTab` |\r\n| `Ctrl+F` | `openSearch` |\r\n| `Ctrl+R` | `openReplace` |\r\n| `Ctrl+Z` | Pass through if search is open, else `doUndo` |\r\n| `Ctrl+Shift+Z` / `Ctrl+Y` | `doRedo` |\r\n| `Esc` | `closeSearch` (only when search is open) |\r\n\r\n---\r\n\r\n## `windowTitle`\r\n\r\n```kotlin\r\nprivate fun windowTitle(path: Path?): String =\r\n    \"${path?.fileName ?: \"Untitled\"} — ${PageIdentity.NAME}\"\r\n```\r\n\r\nActive tab's filename + ` — PAGE`; falls back to `Untitled` when there are no tabs. `PageIdentity.NAME` keeps the brand string in one place rather than duplicated here.\r\n\r\n---\r\n\r\n## Private composables\r\n\r\n| Name | Role |\r\n|---|---|\r\n| `Shell` | Horizontal split of sidebar + body + status bar |\r\n| `TitleBar` | Top of the undecorated window — draggable area + menu buttons |\r\n| `ResizeHandle` | Drag handle that resizes the sidebar |\r\n\r\n---\r\n\r\n## Usage\r\n\r\nThis file is the entry point for `page:app`. It packages as `mainClassName = \"page.app.MainKt\"`.\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/app/pending_close.md":"# PendingClose\n\n> `page/app/src/main/kotlin/page/app/PendingClose.kt` — 저장 안 된 닫기 요청 식별\n\n`UnsavedChangesDialog` 가 어떤 닫기 요청을 처리 중인지를 구분하기 위한 sealed interface\n\n> English: [pending_close_en.md](https://monkshark.github.io/page-ide/#modules/app/pending_close_en.md)\n\n---\n\n## 정의\n\n```kotlin\ninternal sealed interface PendingClose {\n    data class Tab(val index: Int) : PendingClose\n    data object App : PendingClose\n}\n```\n\n| 케이스 | 의미 |\n|---|---|\n| `Tab(index)` | 탭 하나만 닫는 요청 — `Ctrl+W` 또는 탭 칩의 `×` |\n| `App` | 앱 전체 종료 요청 — 창 닫기 버튼 |\n\n---\n\n## 왜 sealed interface 인가\n\n다이얼로그 콜백이 두 케이스를 다르게 다룬다 — 탭 닫기는 `book.close(index)` 만, 앱 종료는 `exitApplication()` 까지 연쇄. 한 곳에서 분기하므로 enum + payload 보다 sealed 가 깔끔\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.Main` `pendingClose: PendingClose?` | 다이얼로그 표시 트리거 |\n| `page.app.UnsavedChangesDialog` `isAppExit` | `pendingClose is PendingClose.App` 으로 메시지 분기 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/app/pending_close_en.md":"# PendingClose\r\n\r\n> 한국어: [pending_close.md](https://monkshark.github.io/page-ide/#modules/app/pending_close.md)\r\n\r\n> `page/app/src/main/kotlin/page/app/PendingClose.kt` — Identifies which close request is in flight\r\n\r\nA sealed interface so `UnsavedChangesDialog` can distinguish the close request it is handling.\r\n\r\n---\r\n\r\n## Definition\r\n\r\n```kotlin\r\ninternal sealed interface PendingClose {\r\n    data class Tab(val index: Int) : PendingClose\r\n    data object App : PendingClose\r\n}\r\n```\r\n\r\n| Case | Meaning |\r\n|---|---|\r\n| `Tab(index)` | Closing a single tab — `Ctrl+W` or the chip's `×` |\r\n| `App` | Closing the whole window |\r\n\r\n---\r\n\r\n## Why a sealed interface\r\n\r\nThe dialog callbacks branch on the case — tab close ends at `book.close(index)`, app close cascades to `exitApplication()`. A sealed interface keeps that branch in one place.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.Main` `pendingClose: PendingClose?` | Drives dialog visibility |\r\n| `page.app.UnsavedChangesDialog` `isAppExit` | `pendingClose is PendingClose.App` flips the trailing question |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/app/preview_panel.md":"# PreviewPanel\n\n> `page/app/src/main/kotlin/page/app/PreviewPanel.kt` — 이미지/SVG 미리보기\n\n`FileKind` 가 `IMAGE` 또는 `SVG` 인 탭에서 본문 대신 표시. 휠 줌, +/− 버튼, 100% 라벨 클릭으로 리셋\n\n> English: [preview_panel_en.md](https://monkshark.github.io/page-ide/#modules/app/preview_panel_en.md)\n\n---\n\n## 시그니처\n\n```kotlin\n@Composable\nfun PreviewPanel(\n    path: Path,\n    kind: FileKind,\n    modifier: Modifier = Modifier,\n)\n```\n\n`path` / `kind` 가 바뀌면 `loadPreview` 가 다시 돌고 `zoom` 도 `1.0f` 로 리셋\n\n---\n\n## `PreviewSource`\n\n```kotlin\nprivate sealed interface PreviewSource {\n    val intrinsic: Size\n\n    class Raster(val bitmap: ImageBitmap) : PreviewSource\n    class Svg(val dom: SVGDOM) : PreviewSource\n}\n```\n\n| 케이스 | 디코더 |\n|---|---|\n| `Raster` | `SkiaImage.makeFromEncoded(bytes).toComposeImageBitmap()` |\n| `Svg` | `SVGDOM(Data.makeFromBytes(bytes))` |\n\n`loadPreview(path, kind)` 는 `runCatching {...}.getOrNull()` — 디코딩 실패해도 패널이 죽지 않고 \"Cannot preview\" 텍스트로 폴백\n\n---\n\n## 줌 모델\n\n| 상수 | 값 | 의미 |\n|---|---|---|\n| `MIN_ZOOM` / `MAX_ZOOM` | `0.1f` / `8f` | 줌 한계 |\n| `ZOOM_STEP` | `1.25f` | `+` / `−` 버튼 1단계 |\n| `INITIAL_FIT_FRACTION` | `0.7f` | 초기에 패널의 70% 만 채워서 여백 확보 |\n| `WHEEL_ZOOM_FACTOR` | `1.1f` | 휠 한 노치 |\n\n```kotlin\nprivate fun effectiveScale(intrinsic: Size, panelW: Float, panelH: Float, zoom: Float): Float\n```\n\n`baseline = min(panelW/iw, panelH/ih) × 0.7` — 큰 이미지는 패널에 맞춰 줄이고, 작은 이미지는 원본 크기까지만. 그 위에 사용자 `zoom` 을 곱해 최종 스케일\n\n`computeBaseline` 은 intrinsic 이 무한/0/음수일 때 `INITIAL_FIT_FRACTION` 을 그대로 반환 — SVG 의 `width=\"100%\"` 같은 단위 없는 케이스 대비\n\n---\n\n## SVG 렌더\n\n```kotlin\n.drawBehind {\n    drawIntoCanvas { canvas ->\n        val nativeCanvas = canvas.nativeCanvas\n        source.dom.setContainerSize(intrinsicW, intrinsicH)\n        val cp = nativeCanvas.save()\n        nativeCanvas.scale(size.width / intrinsicW, size.height / intrinsicH)\n        source.dom.render(nativeCanvas)\n        nativeCanvas.restoreToCount(cp)\n    }\n}\n```\n\nintrinsic 좌표계로 `setContainerSize` 한 다음 `scale` 로 박스 크기에 맞춤. `save/restoreToCount` 로 캔버스 변환을 격리해 다음 프레임에 누적되지 않게\n\n---\n\n## 휠 / 버튼\n\n```kotlin\n.onPointerEvent(PointerEventType.Scroll, PointerEventPass.Initial) { ... }\n```\n\n`PointerEventPass.Initial` 로 받아서 자식 위젯보다 먼저 처리 → 휠이 스크롤 대신 줌으로 직행. 위로 스크롤하면 축소 (`1/WHEEL_ZOOM_FACTOR`), 아래로 확대\n\n`ZoomToolbar` 하단:\n- `−` 버튼 → `zoom / ZOOM_STEP`\n- `100%` 라벨 → `zoom = 1f` (리셋)\n- `+` 버튼 → `zoom * ZOOM_STEP`\n\n전부 `coerceIn(MIN_ZOOM, MAX_ZOOM)`\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.Main` (활성 탭의 `FileKind` 가 텍스트가 아닐 때) | 본문 대신 이 패널 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/app/preview_panel_en.md":"# PreviewPanel\r\n\r\n> 한국어: [preview_panel.md](https://monkshark.github.io/page-ide/#modules/app/preview_panel.md)\r\n\r\n> `page/app/src/main/kotlin/page/app/PreviewPanel.kt` — Image / SVG preview\r\n\r\nReplaces the editor body when the active tab's `FileKind` is `IMAGE` or `SVG`. Wheel zoom, +/− buttons, click on `100%` to reset.\r\n\r\n---\r\n\r\n## Signature\r\n\r\n```kotlin\r\n@Composable\r\nfun PreviewPanel(\r\n    path: Path,\r\n    kind: FileKind,\r\n    modifier: Modifier = Modifier,\r\n)\r\n```\r\n\r\nWhen `path` / `kind` changes, `loadPreview` re-runs and `zoom` resets to `1.0f`.\r\n\r\n---\r\n\r\n## `PreviewSource`\r\n\r\n```kotlin\r\nprivate sealed interface PreviewSource {\r\n    val intrinsic: Size\r\n\r\n    class Raster(val bitmap: ImageBitmap) : PreviewSource\r\n    class Svg(val dom: SVGDOM) : PreviewSource\r\n}\r\n```\r\n\r\n| Case | Decoder |\r\n|---|---|\r\n| `Raster` | `SkiaImage.makeFromEncoded(bytes).toComposeImageBitmap()` |\r\n| `Svg` | `SVGDOM(Data.makeFromBytes(bytes))` |\r\n\r\n`loadPreview(path, kind)` is wrapped in `runCatching {...}.getOrNull()` — a failed decode falls back to a \"Cannot preview\" message instead of crashing the panel.\r\n\r\n---\r\n\r\n## Zoom model\r\n\r\n| Constant | Value | Meaning |\r\n|---|---|---|\r\n| `MIN_ZOOM` / `MAX_ZOOM` | `0.1f` / `8f` | Zoom clamps |\r\n| `ZOOM_STEP` | `1.25f` | One `+` / `−` step |\r\n| `INITIAL_FIT_FRACTION` | `0.7f` | Initially fills only 70% of the panel — leaves margin |\r\n| `WHEEL_ZOOM_FACTOR` | `1.1f` | One wheel notch |\r\n\r\n```kotlin\r\nprivate fun effectiveScale(intrinsic: Size, panelW: Float, panelH: Float, zoom: Float): Float\r\n```\r\n\r\n`baseline = min(panelW/iw, panelH/ih) × 0.7` — large images shrink to fit the panel, small ones cap at native size. The user's `zoom` multiplies on top.\r\n\r\n`computeBaseline` returns `INITIAL_FIT_FRACTION` when intrinsic is non-finite, zero, or negative — covers SVGs with `width=\"100%\"` and similar unitless declarations.\r\n\r\n---\r\n\r\n## SVG rendering\r\n\r\n```kotlin\r\n.drawBehind {\r\n    drawIntoCanvas { canvas ->\r\n        val nativeCanvas = canvas.nativeCanvas\r\n        source.dom.setContainerSize(intrinsicW, intrinsicH)\r\n        val cp = nativeCanvas.save()\r\n        nativeCanvas.scale(size.width / intrinsicW, size.height / intrinsicH)\r\n        source.dom.render(nativeCanvas)\r\n        nativeCanvas.restoreToCount(cp)\r\n    }\r\n}\r\n```\r\n\r\nSets the container to the intrinsic size, then scales to the layout box. `save` / `restoreToCount` keeps the canvas transform isolated so it doesn't accumulate across frames.\r\n\r\n---\r\n\r\n## Wheel / buttons\r\n\r\n```kotlin\r\n.onPointerEvent(PointerEventType.Scroll, PointerEventPass.Initial) { ... }\r\n```\r\n\r\n`PointerEventPass.Initial` runs before any child handler — wheel routes straight to zoom, not scroll. Up shrinks (`1/WHEEL_ZOOM_FACTOR`), down enlarges.\r\n\r\n`ZoomToolbar` at the bottom:\r\n- `−` → `zoom / ZOOM_STEP`\r\n- `100%` label → `zoom = 1f` (reset)\r\n- `+` → `zoom * ZOOM_STEP`\r\n\r\nEverything `coerceIn(MIN_ZOOM, MAX_ZOOM)`.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.Main` (when the active tab's `FileKind` isn't text) | Renders this panel instead of the body |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/app/quick_open_dialog.md":"# QuickOpenDialog\n\n> `page/app/src/main/kotlin/page/app/QuickOpenDialog.kt` — `Ctrl+P` 빠른 열기 다이얼로그\n\nVS Code 류 \"go to file\". 사이드바를 펼치지 않고 파일명 한 번 입력으로 탭에 연다\n\n> English: [quick_open_dialog_en.md](https://monkshark.github.io/page-ide/#modules/app/quick_open_dialog_en.md)\n\n---\n\n## 시그니처\n\n```kotlin\n@Composable\ninternal fun QuickOpenDialog(\n    files: List<IndexedFile>,\n    onPick: (IndexedFile) -> Unit,\n    onDismiss: () -> Unit,\n)\n```\n\n`files` 는 `Main` 이 `Ctrl+P` 누르는 순간 `ProjectFileIndex.walk(rootDir)` 로 한 번 만들어 넘긴 인덱스. 다이얼로그 자체는 디스크에 안 닿는다 — 매칭 + 그림만\n\n---\n\n## 키맵\n\n| 키 | 동작 |\n|---|---|\n| 글자 입력 | `query` 갱신 → `QuickOpen.rank(query, files)` 재계산, `selected` 0 으로 |\n| `↓` / `↑` | `selected` 이동, 리스트 자동 스크롤 |\n| `Enter` | `selected` 위치의 `file` 로 `onPick` 호출 후 닫힘 |\n| `Esc` | `onDismiss` 호출 후 닫힘 |\n| 행 클릭 | `onPick` 호출 후 닫힘 |\n\n`onPreviewKeyEvent` 가 `KeyDown` 만 잡아서 `Enter` 가 두 번 발사되는 문제 방지\n\n---\n\n## 레이아웃\n\n```\n┌─ Surface (640×420, undecorated) ──────────────┐\n│ ┌─ QueryInput (32dp, BasicTextField) ──────┐ │\n│ └──────────────────────────────────────────┘ │\n│   spacer 8dp                                  │\n│ ┌─ ResultList (LazyColumn) ────────────────┐ │\n│ │  Foo.kt           src/                    │ │ ← selected 행은 primary @ 18% bg\n│ │  Foo_en.md        docs/                   │ │\n│ │  ...                                      │ │\n│ └──────────────────────────────────────────┘ │\n└───────────────────────────────────────────────┘\n```\n\n`undecorated = true` + `Surface(border)` — `UnsavedChangesDialog` 와 같은 패턴이라 글래스 테마와 톤이 맞는다\n\n---\n\n## 매치 강조\n\n```kotlin\nprivate fun highlightedName(\n    text: String,\n    indices: IntArray,\n    base: Color,\n    highlight: Color,\n): AnnotatedString\n```\n\n`QuickOpenResult.nameIndices` 가 가리키는 글자만 `primary` 색 + `Bold` 로 그린다. 부모 경로 (`parent` = `relative.dropLast(name.length).trimEnd('/')`) 는 흐릿한 `onSurfaceVariant` 로 그대로 표기 — 매치 강조 없음 (지금은 이름 매치만 충분히 잘 잡혀서)\n\n---\n\n## 빈 결과\n\n`rank` 가 빈 리스트를 돌려주면 \"결과 없음\" 만 가운데 표시. `Enter` 를 눌러도 `getOrNull(0)` 이 null 이라 아무 일 안 일어남\n\n---\n\n## 사용처\n\n| 위치 | 트리거 |\n|---|---|\n| `page.app.Main` `openQuickOpen` | `Ctrl+P` (`rootDir != null` 일 때만) |\n\n폴더 안 열린 상태 (`rootDir == null`) 에서는 다이얼로그가 뜨지 않는다 — 인덱싱 대상이 없기 때문\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/app/quick_open_dialog_en.md":"# QuickOpenDialog\r\n\r\n> 한국어: [quick_open_dialog.md](https://monkshark.github.io/page-ide/#modules/app/quick_open_dialog.md)\r\n\r\n> `page/app/src/main/kotlin/page/app/QuickOpenDialog.kt` — `Ctrl+P` Quick Open dialog\r\n\r\nVS Code-style \"go to file\". Open any file by name without expanding the sidebar.\r\n\r\n---\r\n\r\n## Signature\r\n\r\n```kotlin\r\n@Composable\r\ninternal fun QuickOpenDialog(\r\n    files: List<IndexedFile>,\r\n    onPick: (IndexedFile) -> Unit,\r\n    onDismiss: () -> Unit,\r\n)\r\n```\r\n\r\n`files` is the index `Main` builds with `ProjectFileIndex.walk(rootDir)` the moment `Ctrl+P` fires. The dialog never touches disk — it only matches and renders.\r\n\r\n---\r\n\r\n## Keymap\r\n\r\n| Key | Effect |\r\n|---|---|\r\n| Character input | Updates `query`, recomputes `QuickOpen.rank(query, files)`, resets `selected` to 0 |\r\n| `↓` / `↑` | Move selection, list auto-scrolls |\r\n| `Enter` | Calls `onPick` with the file at `selected`; closes |\r\n| `Esc` | Calls `onDismiss`; closes |\r\n| Row click | Calls `onPick`; closes |\r\n\r\nThe `onPreviewKeyEvent` only consumes `KeyDown` events, avoiding `Enter` firing twice.\r\n\r\n---\r\n\r\n## Layout\r\n\r\n```\r\n┌─ Surface (640×420, undecorated) ──────────────┐\r\n│ ┌─ QueryInput (32dp, BasicTextField) ──────┐ │\r\n│ └──────────────────────────────────────────┘ │\r\n│   spacer 8dp                                  │\r\n│ ┌─ ResultList (LazyColumn) ────────────────┐ │\r\n│ │  Foo.kt           src/                    │ │ ← selected row uses primary @ 18% bg\r\n│ │  Foo_en.md        docs/                   │ │\r\n│ │  ...                                      │ │\r\n│ └──────────────────────────────────────────┘ │\r\n└───────────────────────────────────────────────┘\r\n```\r\n\r\n`undecorated = true` + `Surface(border)` — same pattern as `UnsavedChangesDialog`, so the glass theme tone matches.\r\n\r\n---\r\n\r\n## Match highlight\r\n\r\n```kotlin\r\nprivate fun highlightedName(\r\n    text: String,\r\n    indices: IntArray,\r\n    base: Color,\r\n    highlight: Color,\r\n): AnnotatedString\r\n```\r\n\r\nOnly glyphs at `QuickOpenResult.nameIndices` are painted in `primary` + `Bold`. The parent path (`parent = relative.dropLast(name.length).trimEnd('/')`) is rendered in dim `onSurfaceVariant` with no highlight — name-match alone is plenty for now.\r\n\r\n---\r\n\r\n## Empty result\r\n\r\nIf `rank` returns an empty list the dialog shows \"결과 없음\" centered. `Enter` is a no-op (`getOrNull(0)` is null).\r\n\r\n---\r\n\r\n## Used by\r\n\r\n| Location | Trigger |\r\n|---|---|\r\n| `page.app.Main` `openQuickOpen` | `Ctrl+P` (only when `rootDir != null`) |\r\n\r\nIf no folder is open (`rootDir == null`), the dialog doesn't appear — there's nothing to index.\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/app/search_bar.md":"# SearchBar\n\n> `page/app/src/main/kotlin/page/app/SearchBar.kt` — 에디터 상단 검색/치환 바\n\n`SearchState` 를 받아 검색어 입력, 매치 카운트, 케이스 토글, 이전/다음, 치환 입력 / 한 개 / 전부 치환을 한 줄(또는 두 줄) 로 그린다\n\n> English: [search_bar_en.md](https://monkshark.github.io/page-ide/#modules/app/search_bar_en.md)\n\n---\n\n## 시그니처\n\n```kotlin\n@Composable\nfun SearchBar(\n    state: SearchState,\n    onQueryChange: (String) -> Unit,\n    onReplaceChange: (String) -> Unit,\n    onToggleCase: () -> Unit,\n    onNext: () -> Unit,\n    onPrev: () -> Unit,\n    onReplace: () -> Unit,\n    onReplaceAll: () -> Unit,\n    onClose: () -> Unit,\n    onWindowShortcut: (KeyEvent) -> Boolean,\n    modifier: Modifier = Modifier,\n)\n```\n\n| 파라미터 | 의미 |\n|---|---|\n| `state` | 현재 검색 상태 — query / replace / matches / activeMatchIndex / replaceVisible |\n| `onWindowShortcut` | 검색 바가 처리하지 않은 키를 위 윈도우로 위임 — `Ctrl+S` 같은 글로벌 단축키 보존 |\n\n---\n\n## 레이아웃\n\n| 줄 | 구성 |\n|---|---|\n| 1줄 | 검색 입력 · `n / total` 카운터 · `Aa` 케이스 토글 · `<` 이전 · `>` 다음 · `×` 닫기 |\n| 2줄 (옵션) | 치환 입력 · `바꾸기` · `전부 바꾸기` |\n\n`state.replaceVisible` 가 `true` 일 때만 2줄 표시 — `Ctrl+R` 로 토글\n\n---\n\n## 포커스 자동 이동\n\n```kotlin\nLaunchedEffect(state.replaceVisible) {\n    if (state.replaceVisible) replaceFocus.requestFocus() else queryFocus.requestFocus()\n}\n```\n\n치환 줄을 켜면 자동으로 치환 입력에 포커스, 끄면 검색 입력으로 돌아감\n\n---\n\n## 키 처리\n\n| 입력 위젯 | 키 | 동작 |\n|---|---|---|\n| 검색 | `Enter` | `onNext` |\n| 검색 | `Shift+Enter` | `onPrev` |\n| 검색 | `Esc` | `onClose` |\n| 치환 | `Enter` | `onReplace` |\n| 치환 | `Esc` | `onClose` |\n| 둘 다 | 그 외 | `onWindowShortcut(e)` 로 윈도우 키핸들러에 위임 |\n\n`Ctrl+S` 같이 검색 바와 무관한 단축키는 위로 흘려보내야 하므로 `onWindowShortcut` 위임이 필수\n\n---\n\n## 보조 컴포넌트\n\n| 이름 | 역할 |\n|---|---|\n| `InputBox` | 입력 필드의 박스/보더 (`220 × 24 dp`) |\n| `CounterLabel` | `state.query.isEmpty()` 이면 빈 문자열, 매치 0이면 `0 matches`, 그 외 `n / total` |\n| `ToggleChip` | `Aa` 케이스 토글 (`active` 면 primary 톤) |\n| `IconChip` | `<` `>` `×` (단문자 + hover bg) |\n| `TextChip` | `바꾸기` / `전부 바꾸기` (텍스트 라벨 + hover bg, `enabled = matches.isNotEmpty()`) |\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.Main` `search != null` 일 때 에디터 상단에 표시 | 검색/치환 입력 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/app/search_bar_en.md":"# SearchBar\r\n\r\n> 한국어: [search_bar.md](https://monkshark.github.io/page-ide/#modules/app/search_bar.md)\r\n\r\n> `page/app/src/main/kotlin/page/app/SearchBar.kt` — Editor's find/replace strip\r\n\r\nTakes a `SearchState` and renders the query input, match counter, case toggle, prev/next, and (when expanded) the replace input + `Replace` / `Replace All`.\r\n\r\n---\r\n\r\n## Signature\r\n\r\n```kotlin\r\n@Composable\r\nfun SearchBar(\r\n    state: SearchState,\r\n    onQueryChange: (String) -> Unit,\r\n    onReplaceChange: (String) -> Unit,\r\n    onToggleCase: () -> Unit,\r\n    onNext: () -> Unit,\r\n    onPrev: () -> Unit,\r\n    onReplace: () -> Unit,\r\n    onReplaceAll: () -> Unit,\r\n    onClose: () -> Unit,\r\n    onWindowShortcut: (KeyEvent) -> Boolean,\r\n    modifier: Modifier = Modifier,\r\n)\r\n```\r\n\r\n| Parameter | Meaning |\r\n|---|---|\r\n| `state` | Current search state — query / replace / matches / activeMatchIndex / replaceVisible |\r\n| `onWindowShortcut` | Forwards keys the search bar doesn't handle to the parent window — keeps global shortcuts like `Ctrl+S` working |\r\n\r\n---\r\n\r\n## Layout\r\n\r\n| Row | Contents |\r\n|---|---|\r\n| 1st | Query input · `n / total` counter · `Aa` case toggle · `<` prev · `>` next · `×` close |\r\n| 2nd (optional) | Replace input · `바꾸기` (Replace) · `전부 바꾸기` (Replace All) |\r\n\r\nThe 2nd row only renders when `state.replaceVisible` is `true` — toggled by `Ctrl+R`.\r\n\r\n---\r\n\r\n## Auto focus\r\n\r\n```kotlin\r\nLaunchedEffect(state.replaceVisible) {\r\n    if (state.replaceVisible) replaceFocus.requestFocus() else queryFocus.requestFocus()\r\n}\r\n```\r\n\r\nOpening the replace row puts focus in the replace input; closing it returns focus to the query input.\r\n\r\n---\r\n\r\n## Key handling\r\n\r\n| Field | Key | Action |\r\n|---|---|---|\r\n| Query | `Enter` | `onNext` |\r\n| Query | `Shift+Enter` | `onPrev` |\r\n| Query | `Esc` | `onClose` |\r\n| Replace | `Enter` | `onReplace` |\r\n| Replace | `Esc` | `onClose` |\r\n| Both | other | Delegated via `onWindowShortcut(e)` |\r\n\r\nThe delegation is essential: shortcuts unrelated to search (e.g., `Ctrl+S`) must reach the window key handler unblocked.\r\n\r\n---\r\n\r\n## Helpers\r\n\r\n| Name | Role |\r\n|---|---|\r\n| `InputBox` | Box + border for an input field (`220 × 24 dp`) |\r\n| `CounterLabel` | Empty when query is empty, `0 matches` for none, else `n / total` |\r\n| `ToggleChip` | `Aa` case toggle (primary tone when active) |\r\n| `IconChip` | `<` `>` `×` (single glyph + hover bg) |\r\n| `TextChip` | Replace / Replace All (text label + hover bg, `enabled = matches.isNotEmpty()`) |\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.Main` shows it above the editor when `search != null` | Find/replace input |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/app/tab_bar.md":"# TabBar\n\n> `page/app/src/main/kotlin/page/app/TabBar.kt` — 상단 탭 줄 + 드래그 재배치\n\n`TabBook.tabs` 를 가로 스크롤 row 로 그리고, 활성 칩에 배경 톤을 입힌다. 드래그로 순서를 바꾸고, 휠로 좌우 스크롤\n\n> English: [tab_bar_en.md](https://monkshark.github.io/page-ide/#modules/app/tab_bar_en.md)\n\n---\n\n## 시그니처\n\n```kotlin\n@Composable\nfun TabBar(\n    book: TabBook,\n    onActivate: (Int) -> Unit,\n    onClose: (Int) -> Unit,\n    onMove: (Int, Int) -> Unit,\n    modifier: Modifier = Modifier,\n)\n```\n\n| 파라미터 | 의미 |\n|---|---|\n| `book` | 탭 묶음 — `tabs` / `activeIndex` 를 직접 읽는다 |\n| `onActivate(i)` | 탭 클릭 시 활성 인덱스 전환 |\n| `onClose(i)` | 칩의 `×` 클릭 시 — dirty 면 호출부가 다이얼로그 띄움 |\n| `onMove(from, to)` | 드래그 결과 — `TabBook.move` 호출 |\n\n높이는 `TabBarHeight = 32.dp` 고정\n\n---\n\n## 드래그 재배치\n\n`pointerInput(book.tabs.size)` 안에서 `awaitFirstDown` → `drag`. `touchSlop` 를 넘긴 뒤부터 `dragOffsetPx` 를 누적\n\n옆 칩의 폭의 절반을 넘기면 그 자리로 swap — `tabBounds` 맵을 함께 swap 해 다음 임계값을 자연스럽게 갱신. 한 번의 드래그에서 여러 칩을 쉽게 통과 가능\n\n```kotlin\nprivate fun swapBounds(bounds: MutableMap<Int, IntRange>, a: Int, b: Int)\n```\n\n---\n\n## 휠 스크롤\n\n탭이 화면 폭을 넘기면 `horizontalScroll(scrollState)`. `PointerEventType.Scroll` 을 가로채 `scrollState.scrollBy(deltaY * 60f)` 로 가로 스크롤로 변환 — 트랙패드/마우스 휠 모두 좌우 이동에 매핑\n\n---\n\n## `TabChip`\n\n```kotlin\n@Composable\nprivate fun TabChip(\n    tab: OpenTab,\n    isActive: Boolean,\n    offsetPx: Int,\n    onClose: () -> Unit,\n    onBoundsChanged: (Int, Int) -> Unit,\n)\n```\n\n`onBoundsChanged` 는 `onGloballyPositioned` 에서 호출 — 드래그 로직이 칩 폭을 알아야 swap 임계값을 잡는다\n\n활성 칩 배경: `colorScheme.background` (에디터 본문 톤과 같음 → \"이 칩 = 지금 보고 있는 본문\" 시각적 연결)\n\n---\n\n## `CloseButton`\n\n```kotlin\n@Composable\nprivate fun CloseButton(dirty: Boolean, onClick: () -> Unit)\n```\n\n평소엔 `×`. dirty 인데 마우스가 칩 위에 없으면 `●` (저장 표시). 호버 시 `×` 로 전환 — 저장 표시와 닫기 버튼이 같은 자리를 공유해 칩 폭이 일정\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.Main` 상단 | 탭 칩 렌더 + 드래그/닫기/활성 콜백 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/app/tab_bar_en.md":"# TabBar\r\n\r\n> 한국어: [tab_bar.md](https://monkshark.github.io/page-ide/#modules/app/tab_bar.md)\r\n\r\n> `page/app/src/main/kotlin/page/app/TabBar.kt` — Top tab strip with drag-reorder\r\n\r\nRenders `TabBook.tabs` as a horizontally scrollable row, tints the active chip, drags reorder, wheel scrolls.\r\n\r\n---\r\n\r\n## Signature\r\n\r\n```kotlin\r\n@Composable\r\nfun TabBar(\r\n    book: TabBook,\r\n    onActivate: (Int) -> Unit,\r\n    onClose: (Int) -> Unit,\r\n    onMove: (Int, Int) -> Unit,\r\n    modifier: Modifier = Modifier,\r\n)\r\n```\r\n\r\n| Parameter | Meaning |\r\n|---|---|\r\n| `book` | The tab bundle — reads `tabs` / `activeIndex` directly |\r\n| `onActivate(i)` | Tab tap activates that index |\r\n| `onClose(i)` | `×` click — caller pops the dialog if the tab is dirty |\r\n| `onMove(from, to)` | Drag result — calls `TabBook.move` |\r\n\r\nFixed height: `TabBarHeight = 32.dp`.\r\n\r\n---\r\n\r\n## Drag-reorder\r\n\r\nInside `pointerInput(book.tabs.size)`, `awaitFirstDown` → `drag`. `dragOffsetPx` accumulates after `touchSlop` is crossed.\r\n\r\nWhen the offset exceeds half of the neighbor chip's width, the two swap. `tabBounds` swaps with them so the next threshold updates naturally — a single drag can pass through several chips smoothly.\r\n\r\n```kotlin\r\nprivate fun swapBounds(bounds: MutableMap<Int, IntRange>, a: Int, b: Int)\r\n```\r\n\r\n---\r\n\r\n## Wheel scrolling\r\n\r\nWhen tabs exceed the viewport, `horizontalScroll(scrollState)` kicks in. `PointerEventType.Scroll` is intercepted and translated to `scrollState.scrollBy(deltaY * 60f)` — trackpad and mouse wheel both map to horizontal motion.\r\n\r\n---\r\n\r\n## `TabChip`\r\n\r\n```kotlin\r\n@Composable\r\nprivate fun TabChip(\r\n    tab: OpenTab,\r\n    isActive: Boolean,\r\n    offsetPx: Int,\r\n    onClose: () -> Unit,\r\n    onBoundsChanged: (Int, Int) -> Unit,\r\n)\r\n```\r\n\r\n`onBoundsChanged` fires from `onGloballyPositioned` — the drag logic needs each chip's width to compute s
