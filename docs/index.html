or/` 폴더 내 모든 파일이 아니라 `Editor.kt` 류가 위로 올라온다\n\n---\n\n## `QuickOpenResult`\n\n```kotlin\ndata class QuickOpenResult(\n    val file: IndexedFile,\n    val nameIndices: IntArray,\n    val pathIndices: IntArray,\n    val score: Int,\n)\n```\n\n| 필드 | 용도 |\n|---|---|\n| `file` | 선택했을 때 열어야 할 대상 |\n| `nameIndices` | 파일명 영역에서 어떤 글자를 강조할지 |\n| `pathIndices` | 경로 영역 강조 (현재 UI 에선 미사용 — 부모 경로는 흐릿하게만 표시) |\n| `score` | 정렬 키 |\n\n`equals`/`hashCode` 는 `IntArray` 안의 값까지 비교하도록 직접 작성\n\n---\n\n## `nameOf` / `nameOffset`\n\n```kotlin\nfun nameOf(relative: String): String\nfun nameOffset(relative: String): Int\n```\n\n`a/b/Foo.kt` → `Foo.kt` / `4`. 마지막 `/` 만 본다 — 이미 `walk` 에서 `\\` 를 `/` 로 정규화해 두었으므로 plat-dep 없음\n\n---\n\n## 사용처\n\n| 위치 | 역할 |\n|---|---|\n| `page.app.QuickOpenDialog` | `query` 가 바뀔 때마다 `rank(query, files)` 재계산 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/editor/quick_open_en.md":"# QuickOpen\r\n\r\n> 한국어: [quick_open.md](https://monkshark.github.io/page-ide/#modules/editor/quick_open.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/QuickOpen.kt` — Quick Open result ranking\r\n\r\nRuns `FuzzyMatcher` over the file list, sums per-file scores, sorts, and trims. The dialog only consumes the resulting `QuickOpenResult` list — it never matches strings itself.\r\n\r\n---\r\n\r\n## `rank`\r\n\r\n```kotlin\r\nfun rank(query: String, files: List<IndexedFile>): List<QuickOpenResult>\r\n```\r\n\r\n| Case | Behavior |\r\n|---|---|\r\n| `query` empty or whitespace | First 50 files in input order (score 0, empty indices) |\r\n| Matches neither name nor path | Excluded |\r\n| Matches at least one | Sum score → sort desc → cap at 50 |\r\n\r\nFilename matches dominate (`+200` bonus); path matches are scaled down (`/4`). So typing `editor` ranks `Editor.kt` above arbitrary files inside an `editor/` folder.\r\n\r\n---\r\n\r\n## `QuickOpenResult`\r\n\r\n```kotlin\r\ndata class QuickOpenResult(\r\n    val file: IndexedFile,\r\n    val nameIndices: IntArray,\r\n    val pathIndices: IntArray,\r\n    val score: Int,\r\n)\r\n```\r\n\r\n| Field | Purpose |\r\n|---|---|\r\n| `file` | What to open on selection |\r\n| `nameIndices` | Which glyphs in the filename to highlight |\r\n| `pathIndices` | Path-area highlights (currently unused — parent path is rendered dim) |\r\n| `score` | Sort key |\r\n\r\n`equals`/`hashCode` are overridden to do deep comparisons on the `IntArray` fields.\r\n\r\n---\r\n\r\n## `nameOf` / `nameOffset`\r\n\r\n```kotlin\r\nfun nameOf(relative: String): String\r\nfun nameOffset(relative: String): Int\r\n```\r\n\r\n`a/b/Foo.kt` → `Foo.kt` / `4`. Splits on the last `/` only — the walker normalizes `\\` to `/`, so this stays platform-independent.\r\n\r\n---\r\n\r\n## Used by\r\n\r\n| Location | Role |\r\n|---|---|\r\n| `page.app.QuickOpenDialog` | Recomputes `rank(query, files)` whenever the query changes |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/replace.md":"# Replace\n\n> `page/editor/src/main/kotlin/page/editor/Replace.kt` — 검색 매치 치환\n\n`SearchState.matches` 가 만들어 놓은 매치 범위들을 받아 텍스트를 치환한다. 매치를 찾는 일은 `SearchState`, 치환만 이 파일\n\n> English: [replace_en.md](https://monkshark.github.io/page-ide/#modules/editor/replace_en.md)\n\n---\n\n## `Result`\n\n```kotlin\ndata class Result(val text: String, val caret: Int, val replacedCount: Int)\n```\n\n치환 결과 묶음\n\n| 필드 | 의미 |\n|---|---|\n| `text` | 치환된 새 텍스트 |\n| `caret` | 치환 후 캐럿 위치 |\n| `replacedCount` | 실제로 치환된 매치 개수 (0 도 가능) |\n\n---\n\n## `applyCurrent`\n\n```kotlin\nfun applyCurrent(text: String, range: IntRange, replacement: String): Result\n```\n\n매치 한 개 (`range`) 를 `replacement` 로 치환. 캐럿은 치환된 글자 끝 (`start + replacement.length`) — 다음 매치로 넘어가기 좋은 위치\n\n`replacedCount` 는 항상 `1`\n\n---\n\n## `applyAll`\n\n```kotlin\nfun applyAll(text: String, matches: List<IntRange>, replacement: String): Result\n```\n\n매치 리스트 전체를 한 번에 치환. `StringBuilder` 로 매치 사이의 원본 조각을 그대로 이어붙여 단일 패스로 새 문자열을 만든다\n\n`matches` 가 비어 있으면 원본 텍스트와 `replacedCount = 0` 반환. 캐럿은 `0` 으로 리셋 — 전부 치환 후 캐럿 위치는 의미가 모호해서 일단 단순화\n\n`matches` 는 서로 겹치지 않고 오름차순 이라는 전제 — `SearchState.findAll` 이 이 조건을 만족시킨다\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.SearchBar` \"바꾸기\" | `applyCurrent(text, search.active, replace)` |\n| `page.app.SearchBar` \"전부 바꾸기\" | `applyAll(text, search.matches, replace)` |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/editor/replace_en.md":"# Replace\r\n\r\n> 한국어: [replace.md](https://monkshark.github.io/page-ide/#modules/editor/replace.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/Replace.kt` — Search match replacement\r\n\r\nTakes match ranges produced by `SearchState.matches` and replaces them in the text. Finding matches lives in `SearchState`; replacement only is here.\r\n\r\n---\r\n\r\n## `Result`\r\n\r\n```kotlin\r\ndata class Result(val text: String, val caret: Int, val replacedCount: Int)\r\n```\r\n\r\nReplacement result.\r\n\r\n| Field | Meaning |\r\n|---|---|\r\n| `text` | New text after replacement |\r\n| `caret` | Caret position after replacement |\r\n| `replacedCount` | Actual number of replaced matches (0 is possible) |\r\n\r\n---\r\n\r\n## `applyCurrent`\r\n\r\n```kotlin\r\nfun applyCurrent(text: String, range: IntRange, replacement: String): Result\r\n```\r\n\r\nReplaces a single match (`range`) with `replacement`. The caret lands at the end of the replacement (`start + replacement.length`) — a natural spot to step to the next match.\r\n\r\n`replacedCount` is always `1`.\r\n\r\n---\r\n\r\n## `applyAll`\r\n\r\n```kotlin\r\nfun applyAll(text: String, matches: List<IntRange>, replacement: String): Result\r\n```\r\n\r\nReplaces every match in one pass. Uses `StringBuilder` to splice the unchanged segments between matches, producing the new text in a single pass.\r\n\r\nIf `matches` is empty, returns the original text with `replacedCount = 0`. The caret is reset to `0` — after a replace all, the caret position is ambiguous, so this keeps it simple.\r\n\r\nAssumes `matches` is non-overlapping and ascending — `SearchState.findAll` already guarantees that.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.SearchBar` \"Replace\" | `applyCurrent(text, search.active, replace)` |\r\n| `page.app.SearchBar` \"Replace All\" | `applyAll(text, search.matches, replace)` |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/search_state.md":"# SearchState\n\n> `page/editor/src/main/kotlin/page/editor/SearchState.kt` — 검색 / 치환 상태\n\n검색바의 모든 상태가 들어있는 이뮤터블 데이터 클래스. `null` 이면 검색바 닫힘, 인스턴스가 있으면 열림\n\n> English: [search_state_en.md](https://monkshark.github.io/page-ide/#modules/editor/search_state_en.md)\n\n---\n\n## 필드\n\n```kotlin\ndata class SearchState(\n    val query: String = \"\",\n    val replace: String = \"\",\n    val replaceVisible: Boolean = false,\n    val caseSensitive: Boolean = false,\n    val matches: List<IntRange> = emptyList(),\n    val activeMatchIndex: Int = -1,\n)\n```\n\n| 필드 | 의미 |\n|---|---|\n| `query` | 검색어 |\n| `replace` | 치환 텍스트 |\n| `replaceVisible` | `true` 면 치환 입력칸과 버튼이 두 번째 줄에 표시 |\n| `caseSensitive` | 대소문자 구분 토글 (`Aa` 칩) |\n| `matches` | 본문에서 찾은 매치 범위 리스트 |\n| `activeMatchIndex` | 현재 강조된 매치의 인덱스 (`matches.getOrNull` 으로 사용) |\n\n---\n\n## 파생 프로퍼티\n\n```kotlin\nval isActive: Boolean get() = query.isNotEmpty()\nval active: IntRange? get() = matches.getOrNull(activeMatchIndex)\n```\n\n`isActive` 는 질의가 들어있는 상태 (검색바가 열려 있어도 빈 검색어일 수 있음). `active` 는 활성 매치의 범위 — 없으면 `null`\n\n---\n\n## 변환 메서드 (with*)\n\n| 메서드 | 동작 |\n|---|---|\n| `withQuery(text, query)` | 검색어 변경 → 새로 매치 찾고 활성 인덱스 0 으로 |\n| `withReplace(value)` | 치환 텍스트만 갱신 |\n| `withReplaceVisible(value)` | 치환 줄 표시/숨김 |\n| `withCaseSensitive(text, value)` | 토글 후 동일 검색어로 다시 찾기 |\n| `retarget(text)` | 본문이 바뀌었을 때 매치 다시 찾고, 직전 활성 위치에 가장 가까운 매치를 새 활성으로 |\n\n`retarget` 가 핵심 — 사용자가 치환하거나 본문을 편집한 뒤에도 현재 보던 매치 근처 에 머무르게 하는 사용감을 만든다\n\n---\n\n## 이동 메서드\n\n```kotlin\nfun next(): SearchState\nfun prev(): SearchState\n```\n\n`activeMatchIndex` 만 순환 (마지막 → 0, 0 → 마지막). 매치가 없으면 자기 자신 반환\n\n---\n\n## `findAll` (private)\n\n```kotlin\nprivate fun findAll(text: String, query: String, caseSensitive: Boolean): List<IntRange>\n```\n\n`String.regionMatches` 로 한 번씩 비교하며 겹치지 않는 매치만 수집 — 매치를 찾으면 인덱스를 `query.length` 만큼 건너뛴다 (예: `aaa` 에서 `aa` 검색 → `[0..1]` 한 개. `[0..1]`, `[1..2]` 가 아님)\n\n대소문자는 `ignoreCase = !caseSensitive` 로 한 줄 처리. 정규식 미사용\n\n---\n\n## 비목표\n\n- 정규식 검색 — 향후 추가 예정 (별도 토글)\n- 단어 단위 (whole word) 검색 — 향후 토글\n- 다중 라인 / 멀티커서 검색 — 미지원\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.Main` `search: SearchState?` | 윈도우 상태 |\n| `page.app.SearchBar` | 모든 입력은 `SearchState` 변환으로 |\n| `CombinedHighlightTransformation` | `matches` 와 `activeMatchIndex` 로 매치 / 활성 매치 배경 색 입힘 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/editor/search_state_en.md":"# SearchState\r\n\r\n> 한국어: [search_state.md](https://monkshark.github.io/page-ide/#modules/editor/search_state.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/SearchState.kt` — Search / replace state\r\n\r\nImmutable data class holding the entire search-bar state. `null` means the bar is closed; an instance means open.\r\n\r\n---\r\n\r\n## Fields\r\n\r\n```kotlin\r\ndata class SearchState(\r\n    val query: String = \"\",\r\n    val replace: String = \"\",\r\n    val replaceVisible: Boolean = false,\r\n    val caseSensitive: Boolean = false,\r\n    val matches: List<IntRange> = emptyList(),\r\n    val activeMatchIndex: Int = -1,\r\n)\r\n```\r\n\r\n| Field | Meaning |\r\n|---|---|\r\n| `query` | Search query |\r\n| `replace` | Replace text |\r\n| `replaceVisible` | When `true`, the second row (replace input + buttons) is shown |\r\n| `caseSensitive` | Case-sensitivity toggle (the `Aa` chip) |\r\n| `matches` | Match ranges found in the body |\r\n| `activeMatchIndex` | Index of the currently highlighted match (used via `matches.getOrNull`) |\r\n\r\n---\r\n\r\n## Derived properties\r\n\r\n```kotlin\r\nval isActive: Boolean get() = query.isNotEmpty()\r\nval active: IntRange? get() = matches.getOrNull(activeMatchIndex)\r\n```\r\n\r\n`isActive` means a query is present (the bar can be open with an empty query). `active` is the range of the active match, or `null`.\r\n\r\n---\r\n\r\n## Transform methods (with*)\r\n\r\n| Method | Behavior |\r\n|---|---|\r\n| `withQuery(text, query)` | Updates the query → re-finds matches → resets active index to 0 |\r\n| `withReplace(value)` | Updates only the replace text |\r\n| `withReplaceVisible(value)` | Shows/hides the replace row |\r\n| `withCaseSensitive(text, value)` | Toggles, then re-runs the search with the same query |\r\n| `retarget(text)` | When body changes, re-finds matches and picks the nearest match to the previous active position as the new active |\r\n\r\n`retarget` is the load-bearing one — it preserves the position the user was looking at across edits and replacements.\r\n\r\n---\r\n\r\n## Cursor movement\r\n\r\n```kotlin\r\nfun next(): SearchState\r\nfun prev(): SearchState\r\n```\r\n\r\nCycles `activeMatchIndex` (last → 0, 0 → last). With no matches, returns itself.\r\n\r\n---\r\n\r\n## `findAll` (private)\r\n\r\n```kotlin\r\nprivate fun findAll(text: String, query: String, caseSensitive: Boolean): List<IntRange>\r\n```\r\n\r\nUses `String.regionMatches` to scan; collects non-overlapping matches by skipping forward by `query.length` after a hit (so searching `aa` in `aaa` yields one match `[0..1]`, not both `[0..1]`, `[1..2]`).\r\n\r\nCase folding is handled in one line via `ignoreCase = !caseSensitive`. No regex.\r\n\r\n---\r\n\r\n## Non-goals\r\n\r\n- Regex search — planned (separate toggle)\r\n- Whole-word search — planned (toggle)\r\n- Multi-line / multi-cursor search — not supported\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.Main` `search: SearchState?` | Window state |\r\n| `page.app.SearchBar` | Every input goes through a `SearchState` transform |\r\n| `CombinedHighlightTransformation` | Uses `matches` + `activeMatchIndex` to apply match / active-match backgrounds |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/syntax_lexer.md":"# SyntaxLexer / Token / TokenKind\n\n> `page/editor/src/main/kotlin/page/editor/SyntaxLexer.kt` — 신택스 렉서 인터페이스\n\n언어별 렉서가 따라야 할 계약. 토큰 종류는 `TokenKind` enum 6 종으로 한정 (`PUNCT` 포함 7 종이지만 실제 색은 6 종만)\n\n> English: [syntax_lexer_en.md](https://monkshark.github.io/page-ide/#modules/editor/syntax_lexer_en.md)\n\n---\n\n## `TokenKind`\n\n```kotlin\nenum class TokenKind {\n    KEYWORD,\n    STRING,\n    NUMBER,\n    COMMENT,\n    ANNOTATION,\n    TYPE,\n    PUNCT,\n}\n```\n\n`SyntaxPalette` 의 6 색과 1:1 매핑. `PUNCT` 는 의도적으로 색이 비어 있어 본문 톤 그대로 보임 — 자세한 이유는 `SyntaxColors` 참고\n\n---\n\n## `Token`\n\n```kotlin\ndata class Token(val kind: TokenKind, val range: IntRange) {\n    val start: Int get() = range.first\n    val endExclusive: Int get() = range.last + 1\n}\n```\n\n토큰 한 개 = 종류 + 텍스트 범위. `endExclusive` 는 `AnnotatedString.Builder.addStyle(start, end)` 의 exclusive end 와 맞추기 위한 편의 프로퍼티\n\n---\n\n## `SyntaxLexer`\n\n```kotlin\ninterface SyntaxLexer {\n    fun tokenize(text: String): List<Token>\n}\n```\n\n파일 한 번 읽고 토큰 리스트 한 번 만드는 단순 계약. 증분 토큰화 / 부분 갱신 같은 최적화는 미지원 — `EditorPanel` 이 `remember(value.text)` 로 캐싱\n\n---\n\n## 구현체\n\n| 구현 | 대상 |\n|---|---|\n| `KotlinLexer` | `.kt`, `.kts` |\n| `JavaLexer` | `.java` |\n| `JsonLexer` | `.json` |\n\n분기 진입점은 `SyntaxLexers.forPath(path)` — 미지원 확장자는 `null` 반환 → 토큰 색 없음 (본문 톤만)\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.EditorPanel` `CombinedHighlightTransformation` | `lexer.tokenize(text)` 결과를 `palette[kind]` 색과 함께 `AnnotatedString` 으로 변환 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/editor/syntax_lexers.md":"# SyntaxLexers\n\n> `page/editor/src/main/kotlin/page/editor/SyntaxLexers.kt` — 확장자 기반 렉서 분기\n\n`Path` 를 받아 적절한 `SyntaxLexer` 를 골라준다. 미지원 확장자는 `null` 반환 — 호출자는 본문 톤 그대로 그리기\n\n> English: [syntax_lexers_en.md](https://monkshark.github.io/page-ide/#modules/editor/syntax_lexers_en.md)\n\n---\n\n## `forPath`\n\n```kotlin\nfun forPath(path: Path): SyntaxLexer?\n```\n\n확장자를 소문자로 정규화한 뒤 매칭\n\n| 확장자 | 렉서 |\n|---|---|\n| `.kt`, `.kts` | `KotlinLexer` |\n| `.java` | `JavaLexer` |\n| `.json` | `JsonLexer` |\n| 그 외 / 확장자 없음 | `null` |\n\n`when` 문 한 블록만 늘리면 새 언어 추가 가능 — 새 렉서 구현 → `forPath` 분기 한 줄 추가가 끝\n\n---\n\n## 향후 추가\n\n| 확장자 | 렉서 (예정) |\n|---|---|\n| `.py` | `PythonLexer` |\n| `.md` | `MarkdownLexer` (`MarkdownFence` 와 별개로 본문 토큰화) |\n| `.xml`, `.html` | `XmlLexer` |\n| `.css`, `.scss` | `CssLexer` |\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.Main` (탭 활성화 시) | 활성 탭의 파일 경로로 렉서를 골라 `EditorPanel` 에 전달 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/editor/syntax_lexers_en.md":"# SyntaxLexers\r\n\r\n> 한국어: [syntax_lexers.md](https://monkshark.github.io/page-ide/#modules/editor/syntax_lexers.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/SyntaxLexers.kt` — Extension-based lexer dispatch\r\n\r\nTakes a `Path` and returns the matching `SyntaxLexer`. Unsupported extensions return `null` — the caller renders body-tone only.\r\n\r\n---\r\n\r\n## `forPath`\r\n\r\n```kotlin\r\nfun forPath(path: Path): SyntaxLexer?\r\n```\r\n\r\nLowercases the extension before matching.\r\n\r\n| Extension | Lexer |\r\n|---|---|\r\n| `.kt`, `.kts` | `KotlinLexer` |\r\n| `.java` | `JavaLexer` |\r\n| `.json` | `JsonLexer` |\r\n| Anything else / no extension | `null` |\r\n\r\nAdding a new language is a one-line addition to the `when` — implement the lexer and add a branch.\r\n\r\n---\r\n\r\n## Planned\r\n\r\n| Extension | Lexer (planned) |\r\n|---|---|\r\n| `.py` | `PythonLexer` |\r\n| `.md` | `MarkdownLexer` (separate from `MarkdownFence`, for body tokenization) |\r\n| `.xml`, `.html` | `XmlLexer` |\r\n| `.css`, `.scss` | `CssLexer` |\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.Main` (on tab activation) | Picks a lexer from the active tab's path and passes it to `EditorPanel` |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/syntax_lexer_en.md":"# SyntaxLexer / Token / TokenKind\r\n\r\n> 한국어: [syntax_lexer.md](https://monkshark.github.io/page-ide/#modules/editor/syntax_lexer.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/SyntaxLexer.kt` — Syntax-lexer interface\r\n\r\nThe contract every language lexer follows. `TokenKind` keeps the kinds limited to seven (six color, one transparent).\r\n\r\n---\r\n\r\n## `TokenKind`\r\n\r\n```kotlin\r\nenum class TokenKind {\r\n    KEYWORD,\r\n    STRING,\r\n    NUMBER,\r\n    COMMENT,\r\n    ANNOTATION,\r\n    TYPE,\r\n    PUNCT,\r\n}\r\n```\r\n\r\nMaps 1:1 to the six colors in `SyntaxPalette`. `PUNCT` is intentionally uncolored, preserving the body tone — see `SyntaxColors` for the why.\r\n\r\n---\r\n\r\n## `Token`\r\n\r\n```kotlin\r\ndata class Token(val kind: TokenKind, val range: IntRange) {\r\n    val start: Int get() = range.first\r\n    val endExclusive: Int get() = range.last + 1\r\n}\r\n```\r\n\r\nOne token = kind + text range. `endExclusive` is a convenience for `AnnotatedString.Builder.addStyle(start, end)`'s exclusive end.\r\n\r\n---\r\n\r\n## `SyntaxLexer`\r\n\r\n```kotlin\r\ninterface SyntaxLexer {\r\n    fun tokenize(text: String): List<Token>\r\n}\r\n```\r\n\r\nA simple contract: read the file once, return a token list once. No incremental tokenization or partial update optimization — `EditorPanel` caches the result via `remember(value.text)`.\r\n\r\n---\r\n\r\n## Implementations\r\n\r\n| Implementation | Target |\r\n|---|---|\r\n| `KotlinLexer` | `.kt`, `.kts` |\r\n| `JavaLexer` | `.java` |\r\n| `JsonLexer` | `.json` |\r\n\r\nThe dispatch entry point is `SyntaxLexers.forPath(path)` — unsupported extensions return `null` (body tone only, no token colors).\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `CombinedHighlightTransformation` in `page.app.EditorPanel` | Feeds `lexer.tokenize(text)` into an `AnnotatedString` with `palette[kind]` colors |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/tab_book.md":"# TabBook / OpenTab\n\n> `page/editor/src/main/kotlin/page/editor/TabBook.kt` — 탭 묶음과 활성 인덱스\n\n이뮤터블 자료구조. 탭마다 본문 / 저장된 본문 / 캐럿 / 히스토리를 따로 들고 있어 탭 간 상태가 섞이지 않는다\n\n> English: [tab_book_en.md](https://monkshark.github.io/page-ide/#modules/editor/tab_book_en.md)\n\n---\n\n## `OpenTab`\n\n```kotlin\ndata class OpenTab(\n    val path: Path,\n    val text: String,\n    val savedText: String = text,\n    val caret: Int = 0,\n    val history: EditHistory = EditHistory(),\n) {\n    val dirty: Boolean get() = text != savedText\n}\n```\n\n| 필드 | 의미 |\n|---|---|\n| `path` | 파일 경로 (탭 식별자 역할) |\n| `text` | 현재 본문 |\n| `savedText` | 마지막 저장 시점의 본문 |\n| `caret` | 마지막 캐럿 위치 (탭 전환 시 복원) |\n| `history` | 이 탭만의 undo/redo 스택 |\n\n`dirty` 는 현재 본문 ≠ 저장 본문 일 때 `true`. `Ctrl+W` 누를 때 다이얼로그 띄울지 결정하는 핵심\n\n---\n\n## `TabBook`\n\n```kotlin\ndata class TabBook(\n    val tabs: List<OpenTab> = emptyList(),\n    val activeIndex: Int = -1,\n)\n```\n\n전체 탭 리스트와 활성 인덱스. `activeIndex == -1` 이면 활성 탭 없음 (탭이 0 개)\n\n---\n\n## `openOrFocus`\n\n```kotlin\nfun openOrFocus(path: Path, text: String): TabBook\n```\n\n같은 경로의 탭이 이미 있으면 활성화만, 없으면 새 탭 추가하고 마지막을 활성화. 같은 파일을 두 번 열어도 탭이 늘어나지 않게\n\n---\n\n## `close` / `closeActive`\n\n```kotlin\nfun close(index: Int): TabBook\nfun closeActive(): TabBook\n```\n\n탭 제거 후 `activeIndex` 보정\n\n| 닫는 위치 | 새 활성 인덱스 |\n|---|---|\n| `index < activeIndex` | `activeIndex - 1` |\n| `index == activeIndex` | `index.coerceAtMost(lastIndex)` (다음 탭 또는 마지막) |\n| `index > activeIndex` | 그대로 |\n\n마지막 탭을 닫으면 `TabBook()` (빈 상태) 반환\n\n---\n\n## `updateActive`\n\n```kotlin\nfun updateActive(text: String, caret: Int): TabBook\n```\n\n활성 탭의 `text` / `caret` 갱신. 같은 값이면 자기 자신 반환 (불필요한 리컴포지션 회피)\n\n---\n\n## `pushHistoryOnActive` / `undoOnActive` / `redoOnActive`\n\n```kotlin\nfun pushHistoryOnActive(prev: EditSnapshot): TabBook\nfun undoOnActive(current: EditSnapshot): Pair<TabBook, EditSnapshot>?\nfun redoOnActive(current: EditSnapshot): Pair<TabBook, EditSnapshot>?\n```\n\n`EditHistory` 호출을 활성 탭에만 적용하고 결과를 다시 끼워넣는 래퍼. undo/redo 가 성공하면 `(새 TabBook, 복원할 스냅샷)` 반환\n\n---\n\n## `markActiveSaved`\n\n```kotlin\nfun markActiveSaved(): TabBook\n```\n\n`savedText = text` 로 갱신해 `dirty` 를 `false` 로 만든다. `Ctrl+S` 후 호출\n\n---\n\n## `move`\n\n```kotlin\nfun move(from: Int, to: Int): TabBook\n```\n\n탭 재배치 (드래그 앤 드롭). `activeIndex` 도 따라 보정\n\n| 이동 케이스 | 새 활성 인덱스 |\n|---|---|\n| 활성 탭이 옮겨지는 경우 | `to` |\n| 옮긴 범위 안에 활성 탭이 끼임 | 한 칸 밀려남 |\n| 그 외 | 그대로 |\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.Main` `book: TabBook` | 윈도우 상태 |\n| `page.app.TabBar` | `book.tabs` / `activeIndex` 로 탭 칩 렌더 |\n| `Ctrl+O` / `Ctrl+W` / `Ctrl+S` 핸들러 | `openOrFocus` / `closeActive` / `markActiveSaved` |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/editor/tab_book_en.md":"# TabBook / OpenTab\r\n\r\n> 한국어: [tab_book.md](https://monkshark.github.io/page-ide/#modules/editor/tab_book.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/TabBook.kt` — Tab collection + active index\r\n\r\nImmutable data structure. Each tab carries its own text / saved text / caret / history, so per-tab state never mixes.\r\n\r\n---\r\n\r\n## `OpenTab`\r\n\r\n```kotlin\r\ndata class OpenTab(\r\n    val path: Path,\r\n    val text: String,\r\n    val savedText: String = text,\r\n    val caret: Int = 0,\r\n    val history: EditHistory = EditHistory(),\r\n) {\r\n    val dirty: Boolean get() = text != savedText\r\n}\r\n```\r\n\r\n| Field | Meaning |\r\n|---|---|\r\n| `path` | File path (also the tab identity) |\r\n| `text` | Current body |\r\n| `savedText` | Body as of the last save |\r\n| `caret` | Last caret position (restored on tab switch) |\r\n| `history` | undo/redo stack scoped to this tab |\r\n\r\n`dirty` is `true` when current body ≠ saved body. The signal that drives the unsaved-changes dialog on `Ctrl+W`.\r\n\r\n---\r\n\r\n## `TabBook`\r\n\r\n```kotlin\r\ndata class TabBook(\r\n    val tabs: List<OpenTab> = emptyList(),\r\n    val activeIndex: Int = -1,\r\n)\r\n```\r\n\r\nTab list + active index. `activeIndex == -1` means no active tab (zero tabs).\r\n\r\n---\r\n\r\n## `openOrFocus`\r\n\r\n```kotlin\r\nfun openOrFocus(path: Path, text: String): TabBook\r\n```\r\n\r\nIf a tab with the same path already exists, just activates it; otherwise appends a new tab and activates the last. Prevents duplicate tabs for the same file.\r\n\r\n---\r\n\r\n## `close` / `closeActive`\r\n\r\n```kotlin\r\nfun close(index: Int): TabBook\r\nfun closeActive(): TabBook\r\n```\r\n\r\nRemoves the tab and adjusts `activeIndex`.\r\n\r\n| Close position | New active index |\r\n|---|---|\r\n| `index < activeIndex` | `activeIndex - 1` |\r\n| `index == activeIndex` | `index.coerceAtMost(lastIndex)` (next tab or last) |\r\n| `index > activeIndex` | Unchanged |\r\n\r\nClosing the last tab returns an empty `TabBook()`.\r\n\r\n---\r\n\r\n## `updateActive`\r\n\r\n```kotlin\r\nfun updateActive(text: String, caret: Int): TabBook\r\n```\r\n\r\nUpdates `text` / `caret` on the active tab. Returns itself when nothing changed (avoids needless recomposition).\r\n\r\n---\r\n\r\n## `pushHistoryOnActive` / `undoOnActive` / `redoOnActive`\r\n\r\n```kotlin\r\nfun pushHistoryOnActive(prev: EditSnapshot): TabBook\r\nfun undoOnActive(current: EditSnapshot): Pair<TabBook, EditSnapshot>?\r\nfun redoOnActive(current: EditSnapshot): Pair<TabBook, EditSnapshot>?\r\n```\r\n\r\nWrappers that apply `EditHistory` operations to the active tab and re-stitch the result. On success, undo/redo returns `(new TabBook, snapshot to restore)`.\r\n\r\n---\r\n\r\n## `markActiveSaved`\r\n\r\n```kotlin\r\nfun markActiveSaved(): TabBook\r\n```\r\n\r\nSets `savedText = text` on the active tab → flips `dirty` to `false`. Called after `Ctrl+S`.\r\n\r\n---\r\n\r\n## `move`\r\n\r\n```kotlin\r\nfun move(from: Int, to: Int): TabBook\r\n```\r\n\r\nDrag-reorder. Adjusts `activeIndex` accordingly.\r\n\r\n| Move case | New active index |\r\n|---|---|\r\n| The active tab itself was moved | `to` |\r\n| Active tab is inside the swept range | Shifted by one |\r\n| Otherwise | Unchanged |\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.Main` `book: TabBook` | Window state |\r\n| `page.app.TabBar` | Renders chips from `book.tabs` / `activeIndex` |\r\n| `Ctrl+O` / `Ctrl+W` / `Ctrl+S` handlers | `openOrFocus` / `closeActive` / `markActiveSaved` |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/text_buffer.md":"# TextBuffer / LineCol\n\n> `page/editor/src/main/kotlin/page/editor/TextBuffer.kt` — `StringBuilder` 래퍼 + 라인/컬럼 좌표\n\n`offset` ↔ `(line, col)` 변환과 라인 단위 접근을 제공. 현재 `EditorPanel` 의 라인 번호 거터·상태바·현재 줄 하이라이트가 같은 인덱스를 본다\n\n> English: [text_buffer_en.md](https://monkshark.github.io/page-ide/#modules/editor/text_buffer_en.md)\n\n---\n\n## `LineCol`\n\n```kotlin\ndata class LineCol(val line: Int, val col: Int)\n```\n\n행/열 좌표. 둘 다 0-기반 (`(0, 0)` = 첫 줄 첫 글자)\n\n---\n\n## 생성\n\n```kotlin\nclass TextBuffer(initial: String = \"\")\n```\n\n`StringBuilder` 를 내부에 보유. 빈 버퍼 (`length = 0`) 도 `lineCount = 1` (빈 한 줄)\n\n---\n\n## 메서드\n\n| 메서드 | 동작 |\n|---|---|\n| `length` / `lineCount` / `text()` | 길이, 줄 수, 전체 문자열 스냅샷 |\n| `lineAt(index)` | 해당 줄의 텍스트 (개행 미포함). 범위 밖이면 `IllegalArgumentException` |\n| `insert(offset, text)` | 위치에 삽입 |\n| `delete(start, end)` | 범위 삭제 (`end` 는 exclusive) |\n| `insertAt(line, col, text)` | 라인/컬럼 좌표로 삽입 (내부에서 `offsetOf` 변환) |\n| `deleteAt(startLine, startCol, endLine, endCol)` | 라인/컬럼 좌표로 삭제 |\n| `offsetOf(line, col)` | 좌표 → offset |\n| `lineColOf(offset)` | offset → 좌표 |\n\n모든 변경 메서드는 `require` 로 경계 검사 — 잘못된 인자는 즉시 예외, 호출자 버그를 빨리 잡자\n\n---\n\n## 라인 좌표 계산\n\n```kotlin\nprivate fun lineStartOffset(line: Int): Int\nprivate fun lineEndOffset(line: Int): Int\n```\n\n`\\n` 을 매번 처음부터 카운트. 큰 파일에선 O(N) 비용이라 호출 빈도가 높으면 라인 인덱스 캐시가 필요 — 현재는 `EditorPanel` 이 `remember(value.text)` 로 한 번만 만들고 공유하므로 충분\n\n---\n\n## 비목표\n\n- 증분 갱신 / rope / piece table — `BasicTextField` 가 `String` 을 그대로 다뤄 호환성 우선\n- 멀티 캐럿 / 멀티 셀렉션 좌표 — 현재 `TextEdit` 한 쌍의 selection 만 다룸\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.EditorPanel` | `remember(value.text) { TextBuffer(...) }` 로 라인 인덱스 한 번만 만들고 공유 |\n| `LineNumberGutter` | `lineCount` 로 거터 줄 수 |\n| `EditorStatusBar` | `lineColOf(caret)` 로 현재 행/열 표시 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/editor/text_buffer_en.md":"# TextBuffer / LineCol\r\n\r\n> 한국어: [text_buffer.md](https://monkshark.github.io/page-ide/#modules/editor/text_buffer.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/TextBuffer.kt` — `StringBuilder` wrapper + line/column coordinates\r\n\r\nProvides `offset` ↔ `(line, col)` conversion and line-level access. Today, the line-number gutter, status bar, and current-line highlight in `EditorPanel` all read from the same index.\r\n\r\n---\r\n\r\n## `LineCol`\r\n\r\n```kotlin\r\ndata class LineCol(val line: Int, val col: Int)\r\n```\r\n\r\nLine/column coordinate. Both 0-indexed (`(0, 0)` = first char of the first line).\r\n\r\n---\r\n\r\n## Construction\r\n\r\n```kotlin\r\nclass TextBuffer(initial: String = \"\")\r\n```\r\n\r\nWraps a `StringBuilder`. An empty buffer (`length = 0`) still has `lineCount = 1` (one empty line).\r\n\r\n---\r\n\r\n## Methods\r\n\r\n| Method | Behavior |\r\n|---|---|\r\n| `length` / `lineCount` / `text()` | Length, line count, full string snapshot |\r\n| `lineAt(index)` | Text of the line (excluding newline). Out-of-range → `IllegalArgumentException` |\r\n| `insert(offset, text)` | Insert at offset |\r\n| `delete(start, end)` | Delete range (`end` exclusive) |\r\n| `insertAt(line, col, text)` | Line/col-coordinate insert (internally converts via `offsetOf`) |\r\n| `deleteAt(startLine, startCol, endLine, endCol)` | Line/col-coordinate delete |\r\n| `offsetOf(line, col)` | Coord → offset |\r\n| `lineColOf(offset)` | Offset → coord |\r\n\r\nEvery mutating method has `require` bounds checks — bad arguments throw immediately so caller bugs surface fast.\r\n\r\n---\r\n\r\n## Line offset computation\r\n\r\n```kotlin\r\nprivate fun lineStartOffset(line: Int): Int\r\nprivate fun lineEndOffset(line: Int): Int\r\n```\r\n\r\nCounts `\\n` from the start each time. O(N) on large files, so a cached line index would be needed under heavy use — today `EditorPanel`'s `remember(value.text)` builds it once per text snapshot, which is enough.\r\n\r\n---\r\n\r\n## Non-goals\r\n\r\n- Incremental update / rope / piece table — keeps direct compatibility with `BasicTextField`'s `String`\r\n- Multi-caret / multi-selection coordinates — current `TextEdit` carries a single selection pair\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.EditorPanel` | `remember(value.text) { TextBuffer(...) }` builds the line index once and shares it |\r\n| `LineNumberGutter` | `lineCount` for the gutter row count |\r\n| `EditorStatusBar` | `lineColOf(caret)` for the row/col indicator |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/word_boundary.md":"# WordBoundary\n\n> `page/editor/src/main/kotlin/page/editor/WordBoundary.kt` — 워드 단위 캐럿 이동 / 삭제 / 더블·트리플 클릭 선택 범위\n\n`Ctrl+←/→` (이동), `Ctrl+Shift+←/→` (선택), `Ctrl+Backspace/Delete` (삭제), 더블/트리플 클릭 (단어/줄 선택) 의 경계 계산. VS Code 식 분류 — 단어 (영숫자 + `_`) / 구두점 / 가로 공백 / 개행\n\n> English: [word_boundary_en.md](https://monkshark.github.io/page-ide/#modules/editor/word_boundary_en.md)\n\n---\n\n## `nextBoundary`\n\n```kotlin\nfun nextBoundary(text: String, offset: Int): Int\n```\n\n`offset` 에서 오른쪽으로 다음 워드 경계까지의 위치 반환\n\n| 상황 | 동작 |\n|---|---|\n| 가로 공백 (` `, `\\t`) | 먼저 모두 건너뛴다 |\n| 그다음 글자가 `\\n` | 캐럿이 `\\n` 바로 위면 한 칸 (개행 한 번에 통과). 공백을 건너온 결과면 `\\n` 직전에 멈춤 |\n| 그다음 글자가 단어/구두점 | 같은 클래스가 이어지는 동안 진행 |\n\n---\n\n## `prevBoundary`\n\n```kotlin\nfun prevBoundary(text: String, offset: Int): Int\n```\n\n대칭. 가로 공백을 먼저 뒤로 건너뛰고, 그다음 클래스를 한 덩어리 묶는다\n\n---\n\n## `deleteWordBackward` / `deleteWordForward`\n\n```kotlin\nfun deleteWordBackward(edit: TextEdit): TextEdit?\nfun deleteWordForward(edit: TextEdit): TextEdit?\n```\n\n단일 캐럿 (`selectionStart == selectionEnd`) 일 때만 동작. 선택 영역이 있으면 `null` → 호출자가 기본 Backspace/Delete 동작 (선택 삭제) 으로 폴백\n\n| 입력 | 결과 |\n|---|---|\n| `hello world|` + `Ctrl+Backspace` | `hello |` |\n| `|hello world` + `Ctrl+Delete` | `| world` |\n\n`Ctrl+Backspace` 가 트레일링 공백까지 한꺼번에 먹는 건 의도 — VS Code/IntelliJ 와 같은 동작\n\n---\n\n## `wordRangeAt` / `lineRangeAt`\n\n```kotlin\nfun wordRangeAt(text: String, offset: Int): IntRange\nfun lineRangeAt(text: String, offset: Int): IntRange\n```\n\n`offset` 위치를 포함하는 단어/줄 range. 더블 클릭 → 단어 선택, 트리플 클릭 → 줄 선택에 사용\n\n| 함수 | 동작 |\n|---|---|\n| `wordRangeAt` | WORD 런 또는 PUNCT 런 한 덩어리. 공백 / 개행 위에서는 `IntRange.EMPTY` (선택 변경 없음) |\n| `lineRangeAt` | 같은 줄의 시작 ~ 끝 (개행 직전까지). 빈 줄이면 빈 range |\n\n`IntRange` 는 `start until end` 스타일이라 호출자는 `TextRange(r.first, r.last + 1)` 로 변환\n\n---\n\n## `CharClass`\n\n```kotlin\nprivate enum class CharClass { WORD, PUNCT }\n```\n\n내부 분류. 가로 공백과 개행은 별도 단계로 처리하므로 enum 에 포함 안 함\n\n| 클래스 | 글자 |\n|---|---|\n| `WORD` | `Char.isLetterOrDigit()` 또는 `_` (camelCase 식별자가 한 덩어리로 잡히게) |\n| `PUNCT` | 그 외 |\n\n---\n\n## 사용처\n\n| 위치 | 키 / 입력 |\n|---|---|\n| `page.app.EditorPanel` `handleWordShortcut` | `Ctrl+←/→`, `Ctrl+Shift+←/→`, `Ctrl+Backspace`, `Ctrl+Delete` |\n| `page.app.EditorPanel` 마우스 핸들러 | 더블 클릭 (`wordRangeAt`), 트리플 클릭 (`lineRangeAt`) |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/editor/word_boundary_en.md":"# WordBoundary\r\n\r\n> 한국어: [word_boundary.md](https://monkshark.github.io/page-ide/#modules/editor/word_boundary.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/WordBoundary.kt` — Word-wise caret motion / deletion / double·triple-click selection ranges\r\n\r\nBoundary math for `Ctrl+←/→` (move), `Ctrl+Shift+←/→` (select), `Ctrl+Backspace/Delete` (word delete), and double / triple click (select word / line). VS Code-style classes — word (alnum + `_`) / punctuation / horizontal space / newline.\r\n\r\n---\r\n\r\n## `nextBoundary`\r\n\r\n```kotlin\r\nfun nextBoundary(text: String, offset: Int): Int\r\n```\r\n\r\nReturns the next word boundary to the right of `offset`.\r\n\r\n| Case | Behavior |\r\n|---|---|\r\n| Horizontal space (` `, `\\t`) | Skipped first |\r\n| Next char is `\\n` | If the caret was directly on it, advances one (jumps the newline). If reached after skipping spaces, stops just before |\r\n| Next char is word/punct | Consumes the run of the same class |\r\n\r\n---\r\n\r\n## `prevBoundary`\r\n\r\n```kotlin\r\nfun prevBoundary(text: String, offset: Int): Int\r\n```\r\n\r\nMirror image. Skips trailing horizontal space backward, then groups one class run.\r\n\r\n---\r\n\r\n## `deleteWordBackward` / `deleteWordForward`\r\n\r\n```kotlin\r\nfun deleteWordBackward(edit: TextEdit): TextEdit?\r\nfun deleteWordForward(edit: TextEdit): TextEdit?\r\n```\r\n\r\nOnly act on a single caret (`selectionStart == selectionEnd`). With a selection they return `null` so the caller falls back to default Backspace/Delete (delete selection).\r\n\r\n| Input | Result |\r\n|---|---|\r\n| `hello world|` + `Ctrl+Backspace` | `hello |` |\r\n| `|hello world` + `Ctrl+Delete` | `| world` |\r\n\r\n`Ctrl+Backspace` swallowing trailing spaces is intentional — matches VS Code / IntelliJ.\r\n\r\n---\r\n\r\n## `wordRangeAt` / `lineRangeAt`\r\n\r\n```kotlin\r\nfun wordRangeAt(text: String, offset: Int): IntRange\r\nfun lineRangeAt(text: String, offset: Int): IntRange\r\n```\r\n\r\nRange of the word / line covering `offset`. Used by double-click (word select) and triple-click (line select).\r\n\r\n| Function | Behavior |\r\n|---|---|\r\n| `wordRangeAt` | The WORD run or PUNCT run covering `offset`. On whitespace / newline returns `IntRange.EMPTY` (caller leaves selection alone) |\r\n| `lineRangeAt` | Start to end of the line containing `offset` (excludes the trailing `\\n`). Empty line returns an empty range |\r\n\r\nRanges are `start until end` style; callers convert with `TextRange(r.first, r.last + 1)`.\r\n\r\n---\r\n\r\n## `CharClass`\r\n\r\n```kotlin\r\nprivate enum class CharClass { WORD, PUNCT }\r\n```\r\n\r\nInternal classification. Horizontal space and newline are handled separately, so they're not enum members.\r\n\r\n| Class | Chars |\r\n|---|---|\r\n| `WORD` | `Char.isLetterOrDigit()` or `_` (so a camelCase identifier sticks together) |\r\n| `PUNCT` | Everything else |\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Keys / Input |\r\n|---|---|\r\n| `page.app.EditorPanel` `handleWordShortcut` | `Ctrl+←/→`, `Ctrl+Shift+←/→`, `Ctrl+Backspace`, `Ctrl+Delete` |\r\n| `page.app.EditorPanel` mouse handler | Double click (`wordRangeAt`), triple click (`lineRangeAt`) |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/ui/editor_fonts.md":"# EditorFontFamily\n\n> `page/ui/src/main/kotlin/page/ui/EditorFonts.kt` — 에디터 본문 폰트 (D2Coding fallback Monospace)\n\n리소스에 `D2Coding.ttf` 가 있으면 쓰고, 없으면 `FontFamily.Monospace`. 폰트가 빠져도 빌드는 깨지지 않음\n\n> English: [editor_fonts_en.md](https://monkshark.github.io/page-ide/#modules/ui/editor_fonts_en.md)\n\n---\n\n## 정의\n\n```kotlin\nprivate const val PRIMARY_FONT_RESOURCE = \"fonts/D2Coding.ttf\"\n\nval EditorFontFamily: FontFamily = run {\n    val cl = Thread.currentThread().contextClassLoader\n        ?: object {}.javaClass.classLoader\n    if (cl?.getResource(PRIMARY_FONT_RESOURCE) != null) {\n        FontFamily(Font(resource = PRIMARY_FONT_RESOURCE))\n    } else {\n        FontFamily.Monospace\n    }\n}\n```\n\n`run { ... }` 으로 톱레벨 `val` 에 한 번만 평가. 클래스로더 조회는 부팅 시 단 한 번\n\n| 조건 | 결과 |\n|---|---|\n| `fonts/D2Coding.ttf` 가 클래스패스에 있음 | D2Coding 사용 |\n| 리소스 없음 | `FontFamily.Monospace` (JDK 기본 모노스페이스) |\n\n`Thread.currentThread().contextClassLoader` 가 `null` 인 환경 (일부 IDE 테스트 러너) 대비로 `object {}.javaClass.classLoader` 폴백. 이 한 줄이 없으면 NPE 로 앱이 시작 못 함\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.EditorPanel` | `BasicTextField` 의 `textStyle.fontFamily` |\n| `page.app.LineNumberGutter` | 라인 번호 텍스트 — 본문과 같은 폰트로 줄 높이가 정확히 맞아야 거터가 흔들리지 않음 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/ui/editor_fonts_en.md":"# EditorFontFamily\r\n\r\n> 한국어: [editor_fonts.md](https://monkshark.github.io/page-ide/#modules/ui/editor_fonts.md)\r\n\r\n> `page/ui/src/main/kotlin/page/ui/EditorFonts.kt` — Editor body font (D2Coding with Monospace fallback)\r\n\r\nUses `D2Coding.ttf` from resources if present, falls back to `FontFamily.Monospace`. A missing font does not break the build.\r\n\r\n---\r\n\r\n## Definition\r\n\r\n```kotlin\r\nprivate const val PRIMARY_FONT_RESOURCE = \"fonts/D2Coding.ttf\"\r\n\r\nval EditorFontFamily: FontFamily = run {\r\n    val cl = Thread.currentThread().contextClassLoader\r\n        ?: object {}.javaClass.classLoader\r\n    if (cl?.getResource(PRIMARY_FONT_RESOURCE) != null) {\r\n        FontFamily(Font(resource = PRIMARY_FONT_RESOURCE))\r\n    } else {\r\n        FontFamily.Monospace\r\n    }\r\n}\r\n```\r\n\r\nThe `run { ... }` evaluates once into a top-level `val`. Classloader lookup happens once at boot.\r\n\r\n| Condition | Result |\r\n|---|---|\r\n| `fonts/D2Coding.ttf` is on the classpath | D2Coding |\r\n| Resource missing | `FontFamily.Monospace` (JDK default mono) |\r\n\r\nThe `object {}.javaClass.classLoader` fallback covers environments where `Thread.currentThread().contextClassLoader` is `null` (some IDE test runners). Without it the app NPEs at startup.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.EditorPanel` | `textStyle.fontFamily` for `BasicTextField` |\r\n| `page.app.LineNumberGutter` | Line-number text — must match the body font for line heights to align |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/ui/glass_theme.md":"# GlassTheme\n\n> `page/ui/src/main/kotlin/page/ui/GlassTheme.kt` — Material3 다크 컬러 스킴 + 래퍼 Composable\n\nPAGE 의 다크 팔레트. 메인 윈도우와 모든 다이얼로그가 이 함수로 콘텐츠를 감싸야 같은 색이 적용된다\n\n> English: [glass_theme_en.md](https://monkshark.github.io/page-ide/#modules/ui/glass_theme_en.md)\n\n---\n\n## 컬러 스킴\n\n```kotlin\nprivate val GlassDark = darkColorScheme(\n    primary = Color(0xFF8AB4FF),\n    onPrimary = Color(0xFF0A1126),\n    secondary = Color(0xFFB8C5E0),\n    background = Color(0xFF0D1117),\n    onBackground = Color(0xFFE6EDF3),\n    surface = Color(0xFF161B22),\n    onSurface = Color(0xFFE6EDF3),\n    surfaceVariant = Color(0xFF1C2128),\n    onSurfaceVariant = Color(0xFF8B949E),\n    outline = Color(0xFF30363D),\n)\n```\n\n| 토큰 | Hex | 용도 |\n|---|---|---|\n| `primary` | `#8AB4FF` | 캐럿, 활성 매치, 토글 칩 |\n| `onPrimary` | `#0A1126` | primary 위 텍스트 |\n| `secondary` | `#B8C5E0` | 보조 텍스트 |\n| `background` | `#0D1117` | 에디터 캔버스 |\n| `onBackground` | `#E6EDF3` | 본문 텍스트 |\n| `surface` | `#161B22` | 타이틀바, 탭바, 상태바, 검색바 |\n| `onSurface` | `#E6EDF3` | surface 위 텍스트 |\n| `surfaceVariant` | `#1C2128` | 사이드바 (파일 트리) |\n| `onSurfaceVariant` | `#8B949E` | 보조 라벨, 라인 번호 거터 |\n| `outline` | `#30363D` | 리사이즈 핸들 가이드 |\n\nGitHub Dark 톤. 본문 가독성과 신택스 색이 같이 살아있는 명도\n\n---\n\n## `GlassTheme`\n\n```kotlin\n@Composable\nfun GlassTheme(content: @Composable () -> Unit) {\n    MaterialTheme(colorScheme = GlassDark, content = content)\n}\n```\n\n`MaterialTheme` 래핑 한 줄. `colorScheme` 만 덮어쓰고 `Typography` / `Shapes` 는 Material3 기본값. 폰트는 `EditorFontFamily` 가 별도 처리\n\n`Window` 와 `DialogWindow` (`UnsavedChangesDialog`) 양쪽이 이 함수로 감싸야 한다. 누락된 윈도우는 Material3 기본 다크 (회색톤) 로 보임\n\n---\n\n## 향후\n\n| 토큰 | 용도 |\n|---|---|\n| `GlassLight` | 라이트 컬러 스킴 |\n| `Theme(content)` | 다크/라이트 자동 분기 래퍼 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/ui/glass_theme_en.md":"# GlassTheme\r\n\r\n> 한국어: [glass_theme.md](https://monkshark.github.io/page-ide/#modules/ui/glass_theme.md)\r\n\r\n> `page/ui/src/main/kotlin/page/ui/GlassTheme.kt` — Material3 dark color scheme + wrapper Composable\r\n\r\nPAGE's dark palette. The main window and every dialog must wrap their content with this function to get the same colors.\r\n\r\n---\r\n\r\n## Color scheme\r\n\r\n```kotlin\r\nprivate val GlassDark = darkColorScheme(\r\n    primary = Color(0xFF8AB4FF),\r\n    onPrimary = Color(0xFF0A1126),\r\n    secondary = Color(0xFFB8C5E0),\r\n    background = Color(0xFF0D1117),\r\n    onBackground = Color(0xFFE6EDF3),\r\n    surface = Color(0xFF161B22),\r\n    onSurface = Color(0xFFE6EDF3),\r\n    surfaceVariant = Color(0xFF1C2128),\r\n    onSurfaceVariant = Color(0xFF8B949E),\r\n    outline = Color(0xFF30363D),\r\n)\r\n```\r\n\r\n| Token | Hex | Purpose |\r\n|---|---|---|\r\n| `primary` | `#8AB4FF` | Caret, active match, toggle chips |\r\n| `onPrimary` | `#0A1126` | Text on primary |\r\n| `secondary` | `#B8C5E0` | Secondary text |\r\n| `background` | `#0D1117` | Editor canvas |\r\n| `onBackground` | `#E6EDF3` | Body text |\r\n| `surface` | `#161B22` | Title bar, tab bar, status bar, search bar |\r\n| `onSurface` | `#E6EDF3` | Text on surface |\r\n| `surfaceVariant` | `#1C2128` | Sidebar (file tree) |\r\n| `onSurfaceVariant` | `#8B949E` | Secondary labels, line-number gutter |\r\n| `outline` | `#30363D` | Resize-handle guide |\r\n\r\nGitHub Dark tones. Body readability and token colors both stay legible at this brightness.\r\n\r\n---\r\n\r\n## `GlassTheme`\r\n\r\n```kotlin\r\n@Composable\r\nfun GlassTheme(content: @Composable () -> Unit) {\r\n    MaterialTheme(colorScheme = GlassDark, content = content)\r\n}\r\n```\r\n\r\nA one-line `MaterialTheme` wrap. Only `colorScheme` is overridden; `Typography` and `Shapes` keep Material3 defaults. Fonts are handled separately by `EditorFontFamily`.\r\n\r\nBoth `Window` and `DialogWindow` (`UnsavedChangesDialog`) must wrap their content with this. A window that omits it falls back to Material3's default dark (grayer) palette.\r\n\r\n---\r\n\r\n## Planned\r\n\r\n| Token | Purpose |\r\n|---|---|\r\n| `GlassLight` | Light color scheme |\r\n| `Theme(content)` | Dark/light auto-dispatch wrapper |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/ui/syntax_colors.md":"# SyntaxPalette / GlassDarkSyntax\n\n> `page/ui/src/main/kotlin/page/ui/SyntaxColors.kt` — 신택스 토큰 색상 번들\n\n`page:editor` 의 `TokenKind` 와 1:1 로 매핑. 팔레트와 렉서가 분리돼 있어 다른 테마는 인스턴스만 갈아끼우면 끝\n\n> English: [syntax_colors_en.md](https://monkshark.github.io/page-ide/#modules/ui/syntax_colors_en.md)\n\n---\n\n## `SyntaxPalette`\n\n```kotlin\ndata class SyntaxPalette(\n    val keyword: Color,\n    val string: Color,\n    val number: Color,\n    val comment: Color,\n    val annotation: Color,\n    val type: Color,\n)\n```\n\n`data class` — 동등성/`copy` 자동. `PUNCT` 는 의도적으로 빠져 있음 (괄호·세미콜론·콤마는 너무 자주 나와 색을 입히면 본문이 시끄럽다 → `onBackground` 그대로)\n\n---\n\n## `GlassDarkSyntax`\n\n```kotlin\nval GlassDarkSyntax = SyntaxPalette(\n    keyword = Color(0xFFFF7B72),\n    string = Color(0xFFA5D6FF),\n    number = Color(0xFF79C0FF),\n    comment = Color(0xFF8B949E),\n    annotation = Color(0xFFD2A8FF),\n    type = Color(0xFFFFA657),\n)\n```\n\n| 토큰 | Hex | 예시 |\n|---|---|---|\n| keyword | `#FF7B72` | `class`, `fun`, `val`, `if`, `return` |\n| string | `#A5D6FF` | `\"hello\"`, `'a'`, `\"\"\"multi\"\"\"` |\n| number | `#79C0FF` | `42`, `3.14f`, `0xFF`, `1e10` |\n| comment | `#8B949E` | `// line`, `/* block */` |\n| annotation | `#D2A8FF` | `@Composable`, `@Override` |\n| type | `#FFA657` | `String`, `MutableList` (대문자 시작 식별자) |\n\nGitHub Dark 와 같은 색감\n\n---\n\n## 사용처\n\n| 위치 | 용도 |\n|---|---|\n| `page.app.EditorPanel` 의 `CombinedHighlightTransformation` | `Token.kind` → `palette[kind]` 매핑으로 `AnnotatedString` 의 `SpanStyle` 생성 |\n\n---\n\n## 향후\n\n| 토큰 | 용도 |\n|---|---|\n| `GlassLightSyntax` | 라이트 테마 |\n| 사용자 커스텀 팔레트 | 설정 화면 컬러 피커 |\n\n---\n\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\n","modules/ui/syntax_colors_en.md":"# SyntaxPalette / GlassDarkSyntax\r\n\r\n> 한국어: [syntax_colors.md](https://monkshark.github.io/page-ide/#modules/ui/syntax_colors.md)\r\n\r\n> `page/ui/src/main/kotlin/page/ui/SyntaxColors.kt` — Syntax token color bundle\r\n\r\nMaps 1:1 to `TokenKind` in `page:editor`. Palette and lexer are decoupled — swap the instance to re-color.\r\n\r\n---\r\n\r\n## `SyntaxPalette`\r\n\r\n```kotlin\r\ndata class SyntaxPalette(\r\n    val keyword: Color,\r\n    val string: Color,\r\n    val number: Color,\r\n    val comment: Color,\r\n    val annotation: Color,\r\n    val type: Color,\r\n)\r\n```\r\n\r\n`data class` — equality/`copy` for free. `PUNCT` is intentionally absent (parens, semicolons, commas are too frequent — coloring them adds noise → keep `onBackground`).\r\n\r\n---\r\n\r\n## `GlassDarkSyntax`\r\n\r\n```kotlin\r\nval GlassDarkSyntax = SyntaxPalette(\r\n    keyword = Color(0xFFFF7B72),\r\n    string = Color(0xFFA5D6FF),\r\n    number = Color(0xFF79C0FF),\r\n    comment = Color(0xFF8B949E),\r\n    annotation = Color(0xFFD2A8FF),\r\n    type = Color(0xFFFFA657),\r\n)\r\n```\r\n\r\n| Token | Hex | Examples |\r\n|---|---|---|\r\n| keyword | `#FF7B72` | `class`, `fun`, `val`, `if`, `return` |\r\n| string | `#A5D6FF` | `\"hello\"`, `'a'`, `\"\"\"multi\"\"\"` |\r\n| number | `#79C0FF` | `42`, `3.14f`, `0xFF`, `1e10` |\r\n| comment | `#8B949E` | `// line`, `/* block */` |\r\n| annotation | `#D2A8FF` | `@Composable`, `@Override` |\r\n| type | `#FFA657` | `String`, `MutableList` (capitalized identifiers) |\r\n\r\nGitHub Dark tones.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `CombinedHighlightTransformation` in `page.app.EditorPanel` | Maps `Token.kind` → `palette[kind]` to build `SpanStyle`s on the `AnnotatedString` |\r\n\r\n---\r\n\r\n## Planned\r\n\r\n| Token | Purpose |\r\n|---|---|\r\n| `GlassLightSyntax` | Light theme |\r\n| User-custom palette | Settings color picker |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","README_en.md":"# PAGE IDE Docs\n\n> 한국어: [README_kr.md](https://monkshark.github.io/page-ide/#README_kr.md)\n\n> Multi-language desktop IDE — Pair · Atlas · Glass · Echo\n\nPublic documentation entry point for PAGE IDE. This page only serves as a table of contents. Each item below links to the actual content.\n\nBuild the viewer with `node build_viewer.js` to produce `index.html`, which opens in a browser with no server required.\n\n---\n\n## Table of contents\n\n### Guides\n- [PAGE overview](https://monkshark.github.io/page-ide/#guides/overview_en.md) — The four core values (Pair · Atlas · Glass · Echo) and what we will not build\n- [Architecture](https://monkshark.github.io/page-ide/#guides/architecture_en.md) — Module structure, dependency direction, and stack choices\n\n### core module\n- [PageIdentity](https://monkshark.github.io/page-ide/#modules/core/page_identity_en.md) — Single home for app name / acronym / tagline\n\n### editor module\n- [TextBuffer](https://monkshark.github.io/page-ide/#modules/editor/text_buffer_en.md) — `StringBuilder` wrapper + line/column coordinates\n- [TabBook](https://monkshark.github.io/page-ide/#modules/editor/tab_book_en.md) — Tab collection + active index\n- [EditHistory](https://monkshark.github.io/page-ide/#modules/editor/edit_history_en.md) — Undo/redo stack\n- [FileDocument](https://monkshark.github.io/page-ide/#modules/editor/file_document_en.md) — Body / saved body / dirty bundle\n- [FileKind](https://monkshark.github.io/page-ide/#modules/editor/file_kind_en.md) — Text / image / SVG classification\n- [FileTree](https://monkshark.github.io/page-ide/#modules/editor/file_tree_en.md) — Sidebar tree node builder\n- [SearchState](https://monkshark.github.io/page-ide/#modules/editor/search_state_en.md) — Query + matches + active index\n- [Replace](https://monkshark.github.io/page-ide/#modules/editor/replace_en.md) — Replace match ranges\n- [AutoClose](https://monkshark.github.io/page-ide/#modules/editor/auto_close_en.md) — Bracket / quote auto-pairing\n- [BracketMatch](https://monkshark.github.io/page-ide/#modules/editor/bracket_match_en.md) — Find the matching bracket\n- [Indent](https://monkshark.github.io/page-ide/#modules/editor/indent_en.md) — Tab / Enter auto-indent\n- [LineMove](https://monkshark.github.io/page-ide/#modules/editor/line_move_en.md) — Line move / duplicate\n- [WordBoundary](https://monkshark.github.io/page-ide/#modules/editor/word_boundary_en.md) — Word-wise motion / deletion boundaries\n- [FoldRegions](https://monkshark.github.io/page-ide/#modules/editor/fold_regions_en.md) — Code-fold region detection + offset mapping\n- [FuzzyMatcher](https://monkshark.github.io/page-ide/#modules/editor/fuzzy_matcher_en.md) — Subsequence fuzzy match + score\n- [QuickOpen](https://monkshark.github.io/page-ide/#modules/editor/quick_open_en.md) — Quick Open result ranking\n- [ProjectFileIndex](https://monkshark.github.io/page-ide/#modules/editor/project_file_index_en.md) — Flattening walker over the project root\n- [MarkdownFence](https://monkshark.github.io/page-ide/#modules/editor/markdown_fence_en.md) — Inside-code-fence detection\n- [SyntaxLexer](https://monkshark.github.io/page-ide/#modules/editor/syntax_lexer_en.md) — Lexer interface\n- [SyntaxLexers](https://monkshark.github.io/page-ide/#modules/editor/syntax_lexers_en.md) — Extension → lexer dispatch\n- [JvmLexer](https://monkshark.github.io/page-ide/#modules/editor/jvm_lexer_en.md) — Shared Java/Kotlin scanner\n- [KotlinLexer](https://monkshark.github.io/page-ide/#modules/editor/kotlin_lexer_en.md) — Kotlin keyword set\n- [JavaLexer](https://monkshark.github.io/page-ide/#modules/editor/java_lexer_en.md) — Java keyword set\n- [JsonLexer](https://monkshark.github.io/page-ide/#modules/editor/json_lexer_en.md) — JSON tokenizer\n\n### ui module\n- [GlassTheme](https://monkshark.github.io/page-ide/#modules/ui/glass_theme_en.md) — Glass design tokens / `MaterialTheme` application\n- [EditorFonts](https://monkshark.github.io/page-ide/#modules/ui/editor_fonts_en.md) — Body font family\n- [SyntaxColors](https://monkshark.github.io/page-ide/#modules/ui/syntax_colors_en.md) — Syntax palette\n\n### app module\n- [Main](https://monkshark.github.io/page-ide/#modules/app/main_en.md) — `application` entry point + window state\n- [EditorPanel](https://monkshark.github.io/page-ide/#modules/app/editor_panel_en.md) — Body + gutter + highlights\n- [TabBar](https://monkshark.github.io/page-ide/#modules/app/tab_bar_en.md) — Tab strip + drag-reorder\n- [SearchBar](https://monkshark.github.io/page-ide/#modules/app/search_bar_en.md) — Find/replace strip\n- [FileTreePanel](https://monkshark.github.io/page-ide/#modules/app/file_tree_panel_en.md) — Left sidebar\n- [LineNumberGutter](https://monkshark.github.io/page-ide/#modules/app/line_number_gutter_en.md) — Line-number gutter\n- [PreviewPanel](https://monkshark.github.io/page-ide/#modules/app/preview_panel_en.md) — Image / SVG preview\n- [UnsavedChangesDialog](https://monkshark.github.io/page-ide/#modules/app/unsaved_changes_dialog_en.md) — Save-confirmation modal\n- [QuickOpenDialog](https://monkshark.github.io/page-ide/#modules/app/quick_open_dialog_en.md) — `Ctrl+P` Quick Open dialog\n- [PendingClose](https://monkshark.github.io/page-ide/#modules/app/pending_close_en.md) — Close-request identifier\n- [FileDialogs](https://monkshark.github.io/page-ide/#modules/app/file_dialogs_en.md) — `JFileChooser` wrappers\n\n### atlas module\n- [Atlas](https://monkshark.github.io/page-ide/#modules/atlas/main_en.md) — code graph (import · call · module dependencies)\n\n> `pair`, `echo`, `language`, `runtime`, `git`, `workspace` modules will be added in their respective milestones.\n\n### Features\n> Pair / Atlas / Glass / Echo feature docs will be added at the close of each milestone.\n\n---\n\n## External links\n\n- GitHub: <https://github.com/monkshark/page-ide>\n- Devlog series (Korean): <https://monkshark.github.io/categories/page-개발기/>\n","README_kr.md":"# PAGE IDE Docs\r\n\r\n> English: [README_en.md](https://monkshark.github.io/page-ide/#README_en.md)\r\n\r\n> 다언어 데스크톱 IDE — Pair · Atlas · Glass · Echo\r\n\r\nPAGE IDE의 공개 문서 진입점. 이 페이지는 목차 역할만 한다. 실제 내용은 각 항목을 따라간다.\r\n\r\n뷰어는 `node build_viewer.js`로 `index.html`을 빌드한 뒤, 별도 서버 없이 브라우저에서 바로 열 수 있다.\r\n\r\n---\r\n\r\n## 목차\r\n\r\n### 가이드\r\n- [PAGE 개요](https://monkshark.github.io/page-ide/#guides/overview.md) — 핵심 가치 네 가지 (Pair · Atlas · Glass · Echo)와 만들지 않을 것\r\n- [아키텍처](https://monkshark.github.io/page-ide/#guides/architecture.md) — 모듈 구조와 의존 방향, 기술 스택 결정\r\n\r\n### core 모듈\r\n- [PageIdentity](https://monkshark.github.io/page-ide/#modules/core/page_identity.md) — 앱 이름/약자/태그라인 한곳 모음\r\n\r\n### editor 모듈\r\n- [TextBuffer](https://monkshark.github.io/page-ide/#modules/editor/text_buffer.md) — `StringBuilder` 래퍼 + 라인/컬럼 좌표\r\n- [TabBook](https://monkshark.github.io/page-ide/#modules/editor/tab_book.md) — 탭 묶음과 활성 인덱스\r\n- [EditHistory](https://monkshark.github.io/page-ide/#modules/editor/edit_history.md) — undo/redo 스택\r\n- [FileDocument](https://monkshark.github.io/page-ide/#modules/editor/file_document.md) — 본문/저장본/dirty 한 묶음\r\n- [FileKind](https://monkshark.github.io/page-ide/#modules/editor/file_kind.md) — 텍스트/이미지/SVG 분류\r\n- [FileTree](https://monkshark.github.io/page-ide/#modules/editor/file_tree.md) — 사이드바 트리 노드 빌더\r\n- [SearchState](https://monkshark.github.io/page-ide/#modules/editor/search_state.md) — 검색어 + 매치 + active 인덱스\r\n- [Replace](https://monkshark.github.io/page-ide/#modules/editor/replace.md) — 검색 매치 치환\r\n- [AutoClose](https://monkshark.github.io/page-ide/#modules/editor/auto_close.md) — 자동 짝괄호/따옴표\r\n- [BracketMatch](https://monkshark.github.io/page-ide/#modules/editor/bracket_match.md) — 매칭 괄호 위치 찾기\r\n- [Indent](https://monkshark.github.io/page-ide/#modules/editor/indent.md) — Tab/Enter 자동 들여쓰기\r\n- [LineMove](https://monkshark.github.io/page-ide/#modules/editor/line_move.md) — 줄 이동/복제\r\n- [WordBoundary](https://monkshark.github.io/page-ide/#modules/editor/word_boundary.md) — 워드 단위 이동/삭제 경계\r\n- [FoldRegions](https://monkshark.github.io/page-ide/#modules/editor/fold_regions.md) — 코드 폴딩 영역 + 오프셋 매핑\r\n- [FuzzyMatcher](https://monkshark.github.io/page-ide/#modules/editor/fuzzy_matcher.md) — 서브시퀀스 퍼지 매칭 + 점수\r\n- [QuickOpen](https://monkshark.github.io/page-ide/#modules/editor/quick_open.md) — 빠른 열기 결과 랭킹\r\n- [ProjectFileIndex](https://monkshark.github.io/page-ide/#modules/editor/project_file_index.md) — 프로젝트 루트 평탄화 워커\r\n- [MarkdownFence](https://monkshark.github.io/page-ide/#modules/editor/markdown_fence.md) — 코드 펜스 안 판정\r\n- [SyntaxLexer](https://monkshark.github.io/page-ide/#modules/editor/syntax_lexer.md) — 어휘 분석기 인터페이스\r\n- [SyntaxLexers](https://monkshark.github.io/page-ide/#modules/editor/syntax_lexers.md) — 확장자 → 렉서 라우팅\r\n- [JvmLexer](https://monkshark.github.io/page-ide/#modules/editor/jvm_lexer.md) — Java/Kotlin 공통 스캐너\r\n- [KotlinLexer](https://monkshark.github.io/page-ide/#modules/editor/kotlin_lexer.md) — Kotlin 키워드 셋\r\n- [JavaLexer](https://monkshark.github.io/page-ide/#modules/editor/java_lexer.md) — Java 키워드 셋\r\n- [JsonLexer](https://monkshark.github.io/page-ide/#modules/editor/json_lexer.md) — JSON 토크나이저\r\n\r\n### ui 모듈\r\n- [GlassTheme](https://monkshark.github.io/page-ide/#modules/ui/glass_theme.md) — Glass 디자인 토큰 / `MaterialTheme` 적용\r\n- [EditorFonts](https://monkshark.github.io/page-ide/#modules/ui/editor_fonts.md) — 본문 폰트 패밀리\r\n- [SyntaxColors](https://monkshark.github.io/page-ide/#modules/ui/syntax_colors.md) — 신택스 팔레트\r\n\r\n### app 모듈\r\n- [Main](https://monkshark.github.io/page-ide/#modules/app/main.md) — `application` 진입점 + 윈도우 상태\r\n- [EditorPanel](https://monkshark.github.io/page-ide/#modules/app/editor_panel.md) — 본문 + 거터 + 하이라이트\r\n- [TabBar](https://monkshark.github.io/page-ide/#modules/app/tab_bar.md) — 상단 탭 줄 + 드래그\r\n- [SearchBar](https://monkshark.github.io/page-ide/#modules/app/search_bar.md) — 검색/치환 바\r\n- [FileTreePanel](https://monkshark.github.io/page-ide/#modules/app/file_tree_panel.md) — 좌측 사이드바\r\n- [LineNumberGutter](https://monkshark.github.io/page-ide/#modules/app/line_number_gutter.md) — 라인 번호 거터\r\n- [PreviewPanel](https://monkshark.github.io/page-ide/#modules/app/preview_panel.md) — 이미지/SVG 미리보기\r\n- [UnsavedChangesDialog](https://monkshark.github.io/page-ide/#modules/app/unsaved_changes_dialog.md) — 저장 확인 다이얼로그\r\n- [QuickOpenDialog](https://monkshark.github.io/page-ide/#modules/app/quick_open_dialog.md) — `Ctrl+P` 빠른 열기 다이얼로그\r\n- [PendingClose](https://monkshark.github.io/page-ide/#modules/app/pending_close.md) — 닫기 요청 식별\r\n- [FileDialogs](https://monkshark.github.io/page-ide/#modules/app/file_dialogs.md) — `JFileChooser` 래퍼\r\n\r\n### atlas 모듈\r\n- [Atlas](https://monkshark.github.io/page-ide/#modules/atlas/main.md) — 코드 그래프 (import · 호출 · 모듈 의존)\r\n\r\n> `pair`, `echo`, `language`, `runtime`, `git`, `workspace` 모듈은 단계별로 추가된다.\r\n\r\n### 기능\r\n> Pair / Atlas / Glass / Echo 기능 문서는 각 단계가 끝날 때 추가된다.\r\n\r\n---\r\n\r\n## 외부 링크\r\n\r\n- GitHub: <https://github.com/monkshark/page-ide>\r\n- 개발기 시리즈: <https://monkshark.github.io/categories/page-개발기/>\r\n"};

      PATH_INDEX[it.pathKo] = { group:g, item:it, lang:'ko' };

        PATH_INDEX[it.pathEn] = { group:g, item:it, lang:'en' };
        PAIR[it.pathKo] = it.pathEn;
        PAIR[it.pathEn] = it.pathKo;
      }
    });
  });

  function pathForItem(item, lang){
    if(lang === 'en' && item.pathEn) return item.pathEn;
    return item.pathKo;
  }
  function nameForItem(item, lang){
    return (lang === 'en' && item.nameEn) ? item.nameEn : item.nameKo;
  }
  function titleForGroup(g, lang){
    return (lang === 'en' && g.titleEn) ? g.titleEn : g.titleKo;
  }

  var navList = document.getElementById('navList');
  var allItems = [];

  function renderNav(lang){
    navList.innerHTML = '';
    allItems = [];
    var lastSection = null;
    FILES.forEach(function(g){
      if(g.section && g.section !== lastSection){
        var sEl = document.createElement('div');
        sEl.className = 'nav-section';
        sEl.textContent = g.section;
        navList.appendChild(sEl);
      }
      lastSection = g.section || null;
      var collapsible = !!g.section;
      var gEl = document.createElement('div');
      gEl.className = collapsible ? 'nav-group collapsible collapsed' : 'nav-group';
      var titleEl = document.createElement('div');
      titleEl.className = collapsible ? 'nav-group-title module' : 'nav-group-title';
      var titleText = document.createElement('span');
      titleText.textContent = titleForGroup(g, lang);
      titleEl.appendChild(titleText);
      if(collapsible){
        var chev = document.createElement('span');
        chev.className = 'nav-chevron';
        chev.innerHTML = '<svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        titleEl.appendChild(chev);
        titleEl.onclick = function(){ gEl.classList.toggle('collapsed'); };
      }
      gEl.appendChild(titleEl);
      var itemsEl = document.createElement('div');
      itemsEl.className = 'nav-group-items';
      g.items.forEach(function(it){
        var a = document.createElement('a');
        a.className = 'nav-item';
        a.textContent = nameForItem(it, lang);
        a.dataset.path = pathForItem(it, lang);
        a.onclick = function(){ loadFile(a.dataset.path); };
        itemsEl.appendChild(a);
        allItems.push({el:a, item:it, group:g});
      });
      gEl.appendChild(itemsEl);
      navList.appendChild(gEl);
    });
  }

  function applyLang(lang, opts){
    opts = opts || {};
    setLang(lang);
    document.documentElement.lang = lang;
    document.getElementById('langKo').classList.toggle('active', lang === 'ko');
    document.getElementById('langEn').classList.toggle('active', lang === 'en');
    document.getElementById('search').placeholder = (lang === 'en') ? 'Search... (Ctrl+K)' : '검색... (Ctrl+K)';
    document.getElementById('sidebarTitle').textContent = (lang === 'en') ? 'PAGE IDE Docs' : 'PAGE IDE Docs';
    renderNav(lang);

    if(!opts.skipContentSwap){
      var cur = currentPath();
      if(cur){
        var info = PATH_INDEX[cur];
        if(info){
          var newPath = pathForItem(info.item, lang);
          if(newPath !== cur){
            loadFile(newPath, { replaceHistory:true });
            return;
          }
        }
      }
    }
    var cur2 = currentPath();
    highlightActive(cur2);
    applySearchFilter();
  }

  function highlightActive(p){
    allItems.forEach(function(i){
      var on = i.el.dataset.path === p;
      i.el.classList.toggle('active', on);
      if(on){ var grp = i.el.closest('.nav-group'); if(grp) grp.classList.remove('collapsed'); }
    });
  }

  function applySearchFilter(){
    var q = (document.getElementById('search').value || '').toLowerCase().trim();
    allItems.forEach(function(i){
      var hay = (i.item.nameKo + ' ' + (i.item.nameEn||'') + ' ' + i.item.pathKo + ' ' + (i.item.pathEn||'')).toLowerCase();
      i.el.style.display = (!q || hay.indexOf(q) !== -1) ? '' : 'none';
    });
    navList.querySelectorAll('.nav-group').forEach(function(g){
      var vis = Array.from(g.querySelectorAll('.nav-item')).some(function(i){ return i.style.display !== 'none'; });
      g.style.display = vis ? '' : 'none';
      if(q) g.classList.remove('collapsed');
    });
  }
  document.getElementById('search').addEventListener('input', applySearchFilter);

  var history = [];
  var historyIndex = -1;
  var navigating = false;

  function currentPath(){
    return historyIndex >= 0 ? history[historyIndex] : null;
  }

  var SVGNS = 'http://www.w3.org/2000/svg';
  function svg(tag, attrs){
    var e = document.createElementNS(SVGNS, tag);
    if(attrs) for(var k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }
  function renderAtlasWidget(el){
    el.innerHTML = '';
    var data = ATLAS_DATA;
    if(!data || !data.nodes || !data.nodes.length){
      el.textContent = getLang() === 'ko' ? 'Atlas 그래프를 사용할 수 없습니다.' : 'Atlas graph unavailable.';
      return;
    }
    var nodes = data.nodes.slice();
    var edges = (data.edges || []).slice();
    var byId = {};
    nodes.forEach(function(n){ byId[n.id] = n; });
    var out = {}, adj = {};
    nodes.forEach(function(n){ out[n.id] = []; adj[n.id] = {}; });
    edges.forEach(function(e){
      if(!(e.from in out) || !(e.to in byId)) return;
      out[e.from].push(e.to);
      adj[e.from][e.to] = true; adj[e.to][e.from] = true;
    });
    var rankOf = {};
    function rank(id, seen){
      if(id in rankOf) return rankOf[id];
      seen = seen || {};
      if(seen[id]) return 0;
      seen[id] = true;
      var r = 0;
      out[id].forEach(function(c){ r = Math.max(r, 1 + rank(c, seen)); });
      rankOf[id] = r;
      return r;
    }
    nodes.forEach(function(n){ rank(n.id); });
    var maxRank = 0;
    nodes.forEach(function(n){ maxRank = Math.max(maxRank, rankOf[n.id]); });
    var rows = {};
    nodes.forEach(function(n){ (rows[rankOf[n.id]] = rows[rankOf[n.id]] || []).push(n); });
    Object.keys(rows).forEach(function(r){ rows[r].sort(function(a,b){ return a.id < b.id ? -1 : 1; }); });

    var W = 760, H = 460, vpad = 40, hpad = 30;
    var rowGap = maxRank > 0 ? (H - 2 * vpad) / maxRank : 0;
    var pos = {};
    Object.keys(rows).forEach(function(r){
      var list = rows[r];
      var y = vpad + (maxRank - Number(r)) * rowGap;
      list.forEach(function(n, i){
        var x = hpad + (W - 2 * hpad) * (i + 1) / (list.length + 1);
        pos[n.id] = { x: x, y: y };
      });
    });

    var root = svg('svg', { 'class': 'atlas-graph', viewBox: '0 0 ' + W + ' ' + H, preserveAspectRatio: 'xMidYMid meet' });
    var vp = svg('g', {});
    root.appendChild(vp);
    var nodeH = 26;
    var edgeEls = [];
    edges.forEach(function(e){
      var a = pos[e.from], b = pos[e.to];
      if(!a || !b) return;
      var ln = svg('line', { 'class': 'atlas-edge', x1: a.x, y1: a.y + nodeH / 2, x2: b.x, y2: b.y - nodeH / 2 });
      ln.dataset.from = e.from; ln.dataset.to = e.to;
      vp.appendChild(ln);
      edgeEls.push(ln);
    });
    var nodeEls = [];
    nodes.forEach(function(n){
      var p = pos[n.id];
      var w = Math.max(48, n.label.length * 8 + 22);
      var g = svg('g', { 'class': 'atlas-node' });
      g.dataset.id = n.id;
      g.appendChild(svg('rect', { x: p.x - w / 2, y: p.y - nodeH / 2, width: w, height: nodeH, rx: 7 }));
      var t = svg('text', { x: p.x, y: p.y + 4, 'text-anchor': 'middle' });
      t.textContent = n.label;
      g.appendChild(t);
      g.addEventListener('mouseenter', function(){ hover(n.id); });
      g.addEventListener('mouseleave', clear);
      vp.appendChild(g);
      nodeEls.push(g);
    });
    function hover(id){
      nodeEls.forEach(function(g){
        var on = g.dataset.id === id || adj[id][g.dataset.id];
        g.classList.toggle('hot', g.dataset.id === id);
        g.classList.toggle('dim', !on);
      });
      edgeEls.forEach(function(ln){
        var inc = ln.dataset.from === id || ln.dataset.to === id;
        ln.classList.toggle('hot', inc);
        ln.classList.toggle('dim', !inc);
      });
    }
    function clear(){
      nodeEls.forEach(function(g){ g.classList.remove('hot', 'dim'); });
      edgeEls.forEach(function(ln){ ln.classList.remove('hot', 'dim'); });
    }

    var scale = 1, tx = 0, ty = 0;
    function apply(){ vp.setAttribute('transform', 'translate(' + tx + ' ' + ty + ') scale(' + scale + ')'); }
    root.addEventListener('wheel', function(ev){
      ev.preventDefault();
      var f = ev.deltaY < 0 ? 1.1 : 1 / 1.1;
      var ns = Math.min(3, Math.max(0.5, scale * f));
      var r = root.getBoundingClientRect();
      var mx = (ev.clientX - r.left) / r.width * W;
      var my = (ev.clientY - r.top) / r.height * H;
      tx = mx - (mx - tx) * (ns / scale);
      ty = my - (my - ty) * (ns / scale);
      scale = ns; apply();
    });
    var drag = null;
    root.addEventListener('mousedown', function(ev){ if(ev.target === root || ev.target === vp) drag = { x: ev.clientX, y: ev.clientY, tx: tx, ty: ty }; });
    window.addEventListener('mousemove', function(ev){
      if(!drag) return;
      var r = root.getBoundingClientRect();
      tx = drag.tx + (ev.clientX - drag.x) / r.width * W;
      ty = drag.ty + (ev.clientY - drag.y) / r.height * H;
      apply();
    });
    window.addEventListener('mouseup', function(){ drag = null; });

    var cap = document.createElement('div');
    cap.className = 'atlas-caption';
    cap.textContent = nodes.length + (getLang() === 'ko' ? ' 모듈 · ' : ' modules · ') + edges.length + (getLang() === 'ko' ? ' 의존 · 노드에 마우스를 올려보세요' : ' dependencies · hover a node');
    el.appendChild(root);
    el.appendChild(cap);
  }

  function loadFile(p, opts){
    opts = opts || {};
    var text = MD_DATA[p];
    var inner = document.getElementById('contentInner');
    if(!text){
      inner.innerHTML = '<div class="welcome"><h2>문서를 찾을 수 없습니다</h2><p>' + p + '</p></div>';
      return;
    }

    highlightActive(p);

    if(!opts.fromPopState && !opts.replaceHistory){
      history = history.slice(0, historyIndex + 1);
      history.push(p);
      historyIndex = history.length - 1;
    } else if(opts.replaceHistory){
      if(historyIndex < 0){ history.push(p); historyIndex = 0; }
      else history[historyIndex] = p;
    }

    var html = marked.parse(text);
    var dir = p.indexOf('/') !== -1 ? p.substring(0, p.lastIndexOf('/')) : '';
    var fileName = p.split('/').pop();

    var canBack = historyIndex > 0;
    var canFwd = historyIndex < history.length - 1;
    var lang = getLang();
    var backLabel = (lang === 'en') ? 'Back' : '뒤로';
    var fwdLabel = (lang === 'en') ? 'Forward' : '앞으로';
    var rootPath = (lang === 'en' && MD_DATA['README_en.md']) ? 'README_en.md' : 'README_kr.md';

    var navHtml = '<div class="breadcrumb"><span class="nav-btns">'
      + '<button class="nav-btn" onclick="window._goBack()" ' + (canBack ? '' : 'disabled') + ' title="' + backLabel + '">&#8592;</button>'
      + '<button class="nav-btn" onclick="window._goForward()" ' + (canFwd ? '' : 'disabled') + ' title="' + fwdLabel + '">&#8594;</button>'
      + '</span>'
      + '<a href="#" onclick="window._loadFile(\'' + rootPath + '\');return false">docs</a> / '
      + (dir ? dir + ' / ' : '')
      + '<strong>' + fileName + '</strong></div>';

    inner.innerHTML = navHtml + '<div class="md">' + html + '</div>';

    inner.querySelectorAll('.md h1, .md h2, .md h3, .md h4, .md h5, .md h6').forEach(function(h){
      if(!h.id) h.id = slugify(h.textContent);
    });

    inner.querySelectorAll('.md a[href]').forEach(function(a){
      var href = a.getAttribute('href');
      if(!href || href.indexOf('http') === 0) return;
      var hashOnly = href.charAt(0) === '#';
      if(hashOnly){
        a.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          var id = decodeURIComponent(href.substring(1));
          var target = document.getElementById(id);
          if(target){ target.scrollIntoView({behavior:'smooth',block:'start'}); }
        });
        return;
      }
      var hashTarget = '';
      var hashIdx = href.indexOf('#');
      if(hashIdx !== -1){ hashTarget = decodeURIComponent(href.substring(hashIdx + 1)); href = href.substring(0, hashIdx); }
      if(!href.endsWith('.md')) return;

      if(href.indexOf('./') === 0) href = href.substring(2);

      var resolved;
      if(href.indexOf('../') === 0){
        var parts = dir ? dir.split('/') : [];
        var h = href;
        while(h.indexOf('../') === 0){ parts.pop(); h = h.substring(3); }
        resolved = (parts.length ? parts.join('/') + '/' : '') + h;
      } else if(href.indexOf('/') === 0){
        resolved = href.substring(1);
      } else {
        resolved = dir ? dir + '/' + href : href;
      }
      if(MD_DATA[resolved]){
        a.onclick = function(e){ e.preventDefault(); loadFile(resolved, hashTarget ? {scrollTo: hashTarget} : undefined); };
      } else {
        a.onclick = function(e){ e.preventDefault(); console.warn('Doc not found in viewer:', resolved); };
      }
    });

    try {
      if(globalThis.mermaid){
        var nodes = inner.querySelectorAll('pre.mermaid');
        nodes.forEach(function(n){ if(!n.dataset.mermaidSrc) n.dataset.mermaidSrc = n.textContent; });
        if(nodes.length) mermaid.run({nodes:nodes});
      }
    } catch(e){ console.warn('Mermaid run failed:', e); }

    try {
      inner.querySelectorAll('.page-widget[data-widget="atlas"]').forEach(renderAtlasWidget);
    } catch(e){ console.warn('Atlas widget failed:', e); }

    inner.querySelectorAll('.md img[src]').forEach(function(img){
      var src = img.getAttribute('src');
      if(!src) return;
      if(/^(https?:)?\/\//.test(src) || src.indexOf('data:') === 0) return;
      if(src.indexOf('./') === 0) src = src.substring(2);
      var baseParts = ['docs'];
      if(dir) baseParts = baseParts.concat(dir.split('/'));
      var s = src;
      if(s.indexOf('/') === 0){
        baseParts = ['docs'];
        s = s.substring(1);
      } else {
        while(s.indexOf('../') === 0){ baseParts.pop(); s = s.substring(3); }
      }
      var resolved = baseParts.concat(s ? [s] : []).join('/');
      if(resolved.indexOf('docs/') === 0){
        img.setAttribute('src', resolved.substring(5));
      } else {
        img.setAttribute('src', 'https://raw.githubusercontent.com/monkshark/page-ide/main/' + resolved);
      }
    });

    inner.querySelectorAll('.md pre').forEach(function(pre){
      if(pre.classList.contains('mermaid')) return;
      var code = pre.querySelector('code');
      if(!code) return;
      var lang = '';
      (code.className || '').split(/\s+/).forEach(function(c){
        if(c.indexOf('language-') === 0) lang = c.substring(9);
      });
      if(lang){
        var badge = document.createElement('span');
        badge.className = 'code-lang';
        badge.textContent = lang;
        pre.appendChild(badge);
      }
      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.type = 'button';
      btn.textContent = 'Copy';
      btn.onclick = function(){
        var text = code.textContent || '';
        var done = function(){
          btn.textContent = 'Copied';
          btn.classList.add('ok');
          setTimeout(function(){ btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 1200);
        };
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(text).then(done).catch(function(){});
        } else {
          var ta = document.createElement('textarea');
          ta.value = text; document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); done(); } catch(e){}
          document.body.removeChild(ta);
        }
      };
      pre.appendChild(btn);
    });

    var scrollTarget = opts.scrollTo || null;
    if(scrollTarget){
      var el = inner.querySelector('#' + CSS.escape(scrollTarget));
      if(!el){
        var headings = inner.querySelectorAll('.md h1, .md h2, .md h3, .md h4, .md h5, .md h6');
        for(var i = 0; i < headings.length; i++){
          if(headings[i].id && headings[i].id.indexOf(scrollTarget) === 0){
            el = headings[i];
            break;
          }
        }
      }
      if(el){
        el.scrollIntoView({behavior:'auto', block:'start'});
      } else {
        document.getElementById('content').scrollTop = 0;
      }
    } else {
      document.getElementById('content').scrollTop = 0;
    }
    closeSidebar();
    if(!opts.fromPopState){
      var hashPart = '#' + p + (scrollTarget ? '#' + scrollTarget : '');
      window.history.pushState({path:p, scrollTo: scrollTarget}, '', hashPart);
    }
  }

  window._goBack = function(){
    if(historyIndex > 0){
      historyIndex--;
      var p = history[historyIndex];
      loadFile(p, {fromPopState:true});
      window.history.pushState({path:p}, '', '#' + p);
    }
  };
  window._goForward = function(){
    if(historyIndex < history.length - 1){
      historyIndex++;
      var p = history[historyIndex];
      loadFile(p, {fromPopState:true});
      window.history.pushState({path:p}, '', '#' + p);
    }
  };
  window._loadFile = function(p){ loadFile(p); };

  function parseHash(raw){
    if(!raw) return {path:null, scrollTo:null};
    var s = raw.charAt(0) === '#' ? raw.slice(1) : raw;
    if(!s) return {path:null, scrollTo:null};
    var mdIdx = s.indexOf('.md');
    if(mdIdx !== -1){
      var path = s.substring(0, mdIdx + 3);
      var rest = s.substring(mdIdx + 3);
      var scrollTo = (rest.charAt(0) === '#') ? decodeURIComponent(rest.substring(1)) : null;
      return {path: path, scrollTo: scrollTo};
    }
    return {path: s, scrollTo: null};
  }

  window.addEventListener('popstate', function(e){
    if(navigating) return;
    var stateP = e.state && e.state.path;
    var stateScroll = e.state && e.state.scrollTo;
    var p, scrollTo;
    if(stateP){ p = stateP; scrollTo = stateScroll || null; }
    else {
      var parsed = parseHash(location.hash);
      p = parsed.path || initialDefaultPath();
      scrollTo = parsed.scrollTo;
    }
    if(MD_DATA[p]){
      navigating = true;
      var idx = history.lastIndexOf(p);
      if(idx !== -1) historyIndex = idx;
      loadFile(p, {fromPopState:true, scrollTo: scrollTo});
      navigating = false;
    }
  });

  document.addEventListener('keydown', function(e){
    if((e.ctrlKey || e.metaKey) && e.key === 'k'){ e.preventDefault(); document.getElementById('search').focus(); }
    if(e.altKey && e.key === 'ArrowLeft'){ e.preventDefault(); window._goBack(); }
    if(e.altKey && e.key === 'ArrowRight'){ e.preventDefault(); window._goForward(); }
  });

  document.getElementById('langKo').addEventListener('click', function(){ if(getLang()!=='ko') applyLang('ko'); });
  document.getElementById('langEn').addEventListener('click', function(){ if(getLang()!=='en') applyLang('en'); });

  var THEME_KEY = 'docsViewerTheme';
  function getTheme(){ return localStorage.getItem(THEME_KEY) === 'light' ? 'light' : 'dark'; }
  function setThemeStored(t){ localStorage.setItem(THEME_KEY, t === 'light' ? 'light' : 'dark'); }
  function swapHljsStylesheet(theme){
    var link = document.getElementById('hljsTheme');
    if(link) link.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-' + (theme === 'light' ? 'light' : 'dark') + '.min.css';
  }
  function reInitMermaidAndRerender(theme){
    if(!globalThis.mermaid) return;
    try {
      mermaid.initialize({startOnLoad:false, theme: theme === 'light' ? 'default' : 'dark', securityLevel:'loose'});
    } catch(e){ console.warn('Mermaid re-init failed:', e); }
    var inner = document.getElementById('contentInner');
    if(!inner) return;
    var nodes = inner.querySelectorAll('pre.mermaid');
    nodes.forEach(function(n){
      if(n.dataset.mermaidSrc){
        n.removeAttribute('data-processed');
        n.innerHTML = n.dataset.mermaidSrc;
      }
    });
    try {
      if(nodes.length) mermaid.run({nodes: nodes});
    } catch(e){ console.warn('Mermaid re-run failed:', e); }
  }
  function applyTheme(theme, opts){
    opts = opts || {};
    theme = (theme === 'light') ? 'light' : 'dark';
    setThemeStored(theme);
    document.documentElement.setAttribute('data-theme', theme);
    swapHljsStylesheet(theme);
    if(!opts.skipMermaid) reInitMermaidAndRerender(theme);
  }
  document.getElementById('themeToggle').addEventListener('click', function(){
    applyTheme(getTheme() === 'light' ? 'dark' : 'light');
  });

  function initialDefaultPath(){
    return (getLang() === 'en' && MD_DATA['README_en.md']) ? 'README_en.md' : 'README_kr.md';
  }

  var initialLang = getLang();
  applyLang(initialLang, {skipContentSwap:true});

  var parsedInit = parseHash(location.hash);
  if(parsedInit.path && MD_DATA[parsedInit.path]){
    var info = PATH_INDEX[parsedInit.path];
    if(info && info.lang !== initialLang){
      setLang(info.lang);
      document.getElementById('langKo').classList.toggle('active', info.lang === 'ko');
      document.getElementById('langEn').classList.toggle('active', info.lang === 'en');
      document.getElementById('search').placeholder = (info.lang === 'en') ? 'Search... (Ctrl+K)' : '검색... (Ctrl+K)';
      document.getElementById('sidebarTitle').textContent = 'PAGE IDE Docs';
      renderNav(info.lang);
    }
    loadFile(parsedInit.path, parsedInit.scrollTo ? {scrollTo: parsedInit.scrollTo} : undefined);
  } else {
    loadFile(initialDefaultPath());
  }
})();
</script>
