java_lexer_en.md":"# JavaLexer\r\n\r\n> 한국어: [java_lexer.md](https://monkshark.github.io/page-ide/#modules/editor/java_lexer.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/JavaLexer.kt` — Java syntax lexer (delegate)\r\n\r\nA thin delegate that passes the Java keyword set and the triple-quote (Text Block) flag to `JvmLexer`. The tokenizer itself lives in `JvmLexer`.\r\n\r\n---\r\n\r\n## Definition\r\n\r\n```kotlin\r\nobject JavaLexer : SyntaxLexer by JavaLexerImpl\r\n\r\nprivate object JavaLexerImpl : JvmLexer(\r\n    keywords = JAVA_KEYWORDS,\r\n    supportTripleQuoted = true,\r\n)\r\n```\r\n\r\n`SyntaxLexer by JavaLexerImpl` — Kotlin interface delegation. `JavaLexer.tokenize(...)` forwards to `JavaLexerImpl.tokenize(...)`.\r\n\r\n`JavaLexerImpl` is `private` because there's never a reason to instantiate it directly — the only entry point is `object JavaLexer`.\r\n\r\n---\r\n\r\n## `JAVA_KEYWORDS`\r\n\r\nAbout 60 entries — JLS (Java Language Specification) reserved words plus contextual keywords.\r\n\r\n```kotlin\r\n\"abstract\", \"assert\", \"boolean\", \"break\", \"byte\", \"case\", \"catch\", \"char\",\r\n\"class\", \"const\", \"continue\", \"default\", \"do\", \"double\", \"else\", \"enum\",\r\n\"extends\", \"false\", \"final\", \"finally\", \"float\", \"for\", \"goto\", \"if\",\r\n\"implements\", \"import\", \"instanceof\", \"int\", \"interface\", \"long\", \"native\",\r\n\"new\", \"non-sealed\", \"null\", \"package\", \"permits\", \"private\", \"protected\",\r\n\"public\", \"record\", \"return\", \"sealed\", \"short\", \"static\", \"strictfp\",\r\n\"super\", \"switch\", \"synchronized\", \"this\", \"throw\", \"throws\", \"transient\",\r\n\"true\", \"try\", \"var\", \"void\", \"volatile\", \"while\", \"yield\",\r\n```\r\n\r\nIncludes newer keywords like `record`, `sealed`, `non-sealed`, `permits`, `var`, `yield` (Java 17 baseline).\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `SyntaxLexers.forPath(path)` | `.java` extension dispatch |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/json_lexer.md":"# JsonLexer\r\n\r\n> `page/editor/src/main/kotlin/page/editor/JsonLexer.kt` — JSON 신택스 렉서 (독립)\r\n\r\nJSON 은 키워드 / 식별자 / 어노테이션이 없어 `JvmLexer` 를 공유할 만한 공통점이 적다 → 독립 구현\r\n\r\n> English: [json_lexer_en.md](https://monkshark.github.io/page-ide/#modules/editor/json_lexer_en.md)\r\n\r\n---\r\n\r\n## `tokenize`\r\n\r\n```kotlin\r\noverride fun tokenize(text: String): List<Token>\r\n```\r\n\r\n한 글자씩 스캔하며 다음 종류만 토큰으로 만든다\r\n\r\n| 토큰 | 인식 규칙 |\r\n|---|---|\r\n| `STRING` | `\"` 시작, `\\` 이스케이프 한 글자 스킵, `\"` 종료. 줄바꿈 만나면 종료 (잘못된 JSON 도 그래도 칠해야 보기 편함) |\r\n| `NUMBER` | 선택적 `-`, 정수, 선택적 `.소수`, 선택적 `e/E[+−]지수` |\r\n| `KEYWORD` | `true`, `false`, `null` (정확히 이 셋만) |\r\n\r\n`,`, `:`, `{`, `}`, `[`, `]` 같은 punctuation 은 일부러 토큰화 안 함 → `PUNCT` 색이 없으므로 본문 톤 그대로\r\n\r\n---\r\n\r\n## 비목표\r\n\r\n- 스키마 검증 — 잘못된 JSON 도 그대로 그려준다 (편집 중에는 항상 invalid 상태일 수 있음)\r\n- JSON5 / JSONC — `//`, `/* */`, trailing comma 같은 확장은 미지원. 필요해지면 별도 렉서\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `SyntaxLexers.forPath(path)` | `.json` 확장자 분기 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/json_lexer_en.md":"# JsonLexer\r\n\r\n> 한국어: [json_lexer.md](https://monkshark.github.io/page-ide/#modules/editor/json_lexer.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/JsonLexer.kt` — JSON syntax lexer (standalone)\r\n\r\nJSON has no keywords / identifiers / annotations, so it shares too little with `JvmLexer` to reuse it — implemented standalone.\r\n\r\n---\r\n\r\n## `tokenize`\r\n\r\n```kotlin\r\noverride fun tokenize(text: String): List<Token>\r\n```\r\n\r\nScans one char at a time and emits only these tokens:\r\n\r\n| Token | Rule |\r\n|---|---|\r\n| `STRING` | `\"` start, `\\` skips one escape char, `\"` end. Stops at newline (broken JSON should still color cleanly) |\r\n| `NUMBER` | Optional `-`, integer, optional `.fraction`, optional `e/E[+−]exponent` |\r\n| `KEYWORD` | `true`, `false`, `null` (exactly these three) |\r\n\r\nPunctuation (`,`, `:`, `{`, `}`, `[`, `]`) is intentionally untokenized — `PUNCT` has no color, so it stays the body tone.\r\n\r\n---\r\n\r\n## Non-goals\r\n\r\n- Schema validation — invalid JSON is rendered too (mid-edit it's almost always invalid)\r\n- JSON5 / JSONC — no support for `//`, `/* */`, trailing commas. Would need a separate lexer\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `SyntaxLexers.forPath(path)` | `.json` extension dispatch |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/jvm_lexer.md":"# JvmLexer\r\n\r\n> `page/editor/src/main/kotlin/page/editor/JvmLexer.kt` — Kotlin / Java 공용 토큰화 베이스\r\n\r\n`internal abstract class`. `KotlinLexer` 와 `JavaLexer` 가 키워드 셋과 트리플 따옴표 옵션만 다르고 토큰화 규칙은 동일해서 공통 부모로 추출\r\n\r\n> English: [jvm_lexer_en.md](https://monkshark.github.io/page-ide/#modules/editor/jvm_lexer_en.md)\r\n\r\n---\r\n\r\n## 생성자\r\n\r\n```kotlin\r\ninternal abstract class JvmLexer(\r\n    private val keywords: Set<String>,\r\n    private val supportTripleQuoted: Boolean,\r\n) : SyntaxLexer\r\n```\r\n\r\n| 파라미터 | 설명 |\r\n|---|---|\r\n| `keywords` | 해당 언어의 예약어 셋 (식별자가 이 셋에 포함되면 `KEYWORD`) |\r\n| `supportTripleQuoted` | `\"\"\"...\"\"\"` 인식 활성화 (Kotlin Raw String, Java Text Block) |\r\n\r\n---\r\n\r\n## `tokenize`\r\n\r\n```kotlin\r\noverride fun tokenize(text: String): List<Token>\r\n```\r\n\r\n한 글자씩 보면서 우선순위 분기로 토큰을 잘라낸다\r\n\r\n| 패턴 | 토큰 | 비고 |\r\n|---|---|---|\r\n| `//...` 줄 끝까지 | `COMMENT` | |\r\n| `/* ... */` | `COMMENT` | 닫힘 없으면 텍스트 끝까지 |\r\n| `\"\"\"...\"\"\"` | `STRING` | `supportTripleQuoted = true` 일 때만 |\r\n| `\"...\"` | `STRING` | `\\` 이스케이프, 줄바꿈 만나면 종료 |\r\n| `'...'` | `STRING` | 동일 규칙 |\r\n| `@식별자` | `ANNOTATION` | `@Override`, `@Composable` |\r\n| 숫자 | `NUMBER` | `0x...` 16 진, `1_000_000` 언더스코어, `1.5e10`, 접미사 `f F d D L l u` |\r\n| 식별자 | `KEYWORD` / `TYPE` | 키워드 셋이면 `KEYWORD`, 대문자 시작 + 길이 ≥ 2 면 `TYPE` |\r\n| 그 외 | (토큰 없음) | 본문 톤 그대로 |\r\n\r\n---\r\n\r\n## 식별자 규칙\r\n\r\n```kotlin\r\nprivate fun isIdentStart(c: Char) = c == '_' || c.isLetter()\r\nprivate fun isIdentPart(c: Char) = c == '_' || c.isLetterOrDigit()\r\nprivate fun startsWithUpperCase(s: String) = s.isNotEmpty() && s[0].isUpperCase() && s.length > 1\r\n```\r\n\r\n`startsWithUpperCase` 의 `length > 1` 가드는 한 글자 대문자 변수 (`T`, `K`) 가 의도치 않게 타입 색을 받지 않게 — 제네릭 타입 파라미터처럼 보이지만 실제로는 본문 색이 더 자연스러움\r\n\r\n---\r\n\r\n## 비목표\r\n\r\n- 의미 분석 — 식별자 → 타입 매칭은 단순 대문자 시작 = 타입 규칙. `String` 변수 이름이 `Foo` 면 타입으로 칠해진다 (오인식이지만 비용이 낮음)\r\n- 매크로 / 어노테이션 인자 파싱 — `@Composable` 자체만 토큰화, `(arg = 1)` 부분은 건너뜀\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `KotlinLexer` | `keywords = KOTLIN_KEYWORDS`, `supportTripleQuoted = true` |\r\n| `JavaLexer` | `keywords = JAVA_KEYWORDS`, `supportTripleQuoted = true` |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/jvm_lexer_en.md":"# JvmLexer\r\n\r\n> 한국어: [jvm_lexer.md](https://monkshark.github.io/page-ide/#modules/editor/jvm_lexer.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/JvmLexer.kt` — Shared tokenizer base for Kotlin / Java\r\n\r\n`internal abstract class`. Kotlin and Java differ only in keyword set and the triple-quote flag, so the common tokenizer was lifted into a parent.\r\n\r\n---\r\n\r\n## Constructor\r\n\r\n```kotlin\r\ninternal abstract class JvmLexer(\r\n    private val keywords: Set<String>,\r\n    private val supportTripleQuoted: Boolean,\r\n) : SyntaxLexer\r\n```\r\n\r\n| Parameter | Description |\r\n|---|---|\r\n| `keywords` | Reserved words for the language (identifiers in this set become `KEYWORD`) |\r\n| `supportTripleQuoted` | Enables `\"\"\"...\"\"\"` recognition (Kotlin raw string, Java text block) |\r\n\r\n---\r\n\r\n## `tokenize`\r\n\r\n```kotlin\r\noverride fun tokenize(text: String): List<Token>\r\n```\r\n\r\nWalks one char at a time, emitting tokens in priority order.\r\n\r\n| Pattern | Token | Note |\r\n|---|---|---|\r\n| `//...` to end of line | `COMMENT` | |\r\n| `/* ... */` | `COMMENT` | Runs to EOF if unclosed |\r\n| `\"\"\"...\"\"\"` | `STRING` | Only when `supportTripleQuoted = true` |\r\n| `\"...\"` | `STRING` | `\\` escapes, ends at newline |\r\n| `'...'` | `STRING` | Same rule |\r\n| `@identifier` | `ANNOTATION` | `@Override`, `@Composable` |\r\n| Numbers | `NUMBER` | `0x...` hex, `1_000_000` underscores, `1.5e10`, suffix `f F d D L l u` |\r\n| Identifiers | `KEYWORD` / `TYPE` | In keyword set → `KEYWORD`; capitalized start, length ≥ 2 → `TYPE` |\r\n| Other | (no token) | Body tone preserved |\r\n\r\n---\r\n\r\n## Identifier rules\r\n\r\n```kotlin\r\nprivate fun isIdentStart(c: Char) = c == '_' || c.isLetter()\r\nprivate fun isIdentPart(c: Char) = c == '_' || c.isLetterOrDigit()\r\nprivate fun startsWithUpperCase(s: String) = s.isNotEmpty() && s[0].isUpperCase() && s.length > 1\r\n```\r\n\r\nThe `length > 1` guard in `startsWithUpperCase` keeps single-letter uppercase identifiers (`T`, `K`) from being colored as types — they look like generic type parameters, but body color reads more naturally.\r\n\r\n---\r\n\r\n## Non-goals\r\n\r\n- Semantic analysis — type matching is a simple capitalized start = type rule. A variable named `Foo` gets type-colored (a misclass, but cheap)\r\n- Macro / annotation-arg parsing — `@Composable` itself is tokenized, but `(arg = 1)` is skipped\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `KotlinLexer` | `keywords = KOTLIN_KEYWORDS`, `supportTripleQuoted = true` |\r\n| `JavaLexer` | `keywords = JAVA_KEYWORDS`, `supportTripleQuoted = true` |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/kotlin_lexer.md":"# KotlinLexer\r\n\r\n> `page/editor/src/main/kotlin/page/editor/KotlinLexer.kt` — Kotlin 신택스 렉서 (위임)\r\n\r\n`JvmLexer` 에 Kotlin 키워드 셋만 넘기는 박막 위임. `JavaLexer` 와 같은 구조\r\n\r\n> English: [kotlin_lexer_en.md](https://monkshark.github.io/page-ide/#modules/editor/kotlin_lexer_en.md)\r\n\r\n---\r\n\r\n## 정의\r\n\r\n```kotlin\r\nobject KotlinLexer : SyntaxLexer by KotlinLexerImpl\r\n\r\nprivate object KotlinLexerImpl : JvmLexer(\r\n    keywords = KOTLIN_KEYWORDS,\r\n    supportTripleQuoted = true,\r\n)\r\n```\r\n\r\n`SyntaxLexer by KotlinLexerImpl` — 인터페이스 위임. 외부에서는 `object KotlinLexer` 만 보인다\r\n\r\n---\r\n\r\n## `KOTLIN_KEYWORDS`\r\n\r\nKotlin 의 hard keywords + soft keywords + modifier keywords 75 여 개\r\n\r\n```kotlin\r\n\"abstract\", \"actual\", \"annotation\", \"as\", \"break\", \"by\", \"catch\",\r\n\"class\", \"companion\", \"const\", \"constructor\", \"continue\", \"crossinline\",\r\n\"data\", \"delegate\", \"do\", \"dynamic\", \"else\", \"enum\", \"expect\", \"external\",\r\n\"false\", \"field\", \"file\", \"final\", \"finally\", \"for\", \"fun\", \"get\", \"if\",\r\n\"import\", \"in\", \"infix\", \"init\", \"inline\", \"inner\", \"interface\", \"internal\",\r\n\"is\", \"it\", \"lateinit\", \"noinline\", \"null\", \"object\", \"open\", \"operator\",\r\n\"out\", \"override\", \"package\", \"param\", \"private\", \"property\", \"protected\",\r\n\"public\", \"receiver\", \"reified\", \"return\", \"sealed\", \"set\", \"setparam\",\r\n\"super\", \"suspend\", \"tailrec\", \"this\", \"throw\", \"true\", \"try\", \"typealias\",\r\n\"typeof\", \"val\", \"var\", \"vararg\", \"when\", \"where\", \"while\",\r\n```\r\n\r\n`it` 도 키워드로 포함 — 람다 안에서 자주 등장하는 암묵적 파라미터라 색을 입혀두면 가독성에 도움. `delegate`, `field`, `file` 같은 modifier-only 키워드도 포함\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `SyntaxLexers.forPath(path)` | `.kt`, `.kts` 확장자 분기 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/kotlin_lexer_en.md":"# KotlinLexer\r\n\r\n> 한국어: [kotlin_lexer.md](https://monkshark.github.io/page-ide/#modules/editor/kotlin_lexer.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/KotlinLexer.kt` — Kotlin syntax lexer (delegate)\r\n\r\nA thin delegate that passes the Kotlin keyword set to `JvmLexer`. Same shape as `JavaLexer`.\r\n\r\n---\r\n\r\n## Definition\r\n\r\n```kotlin\r\nobject KotlinLexer : SyntaxLexer by KotlinLexerImpl\r\n\r\nprivate object KotlinLexerImpl : JvmLexer(\r\n    keywords = KOTLIN_KEYWORDS,\r\n    supportTripleQuoted = true,\r\n)\r\n```\r\n\r\n`SyntaxLexer by KotlinLexerImpl` — interface delegation. Only `object KotlinLexer` is exposed.\r\n\r\n---\r\n\r\n## `KOTLIN_KEYWORDS`\r\n\r\nAbout 75 entries — Kotlin's hard keywords + soft keywords + modifier keywords.\r\n\r\n```kotlin\r\n\"abstract\", \"actual\", \"annotation\", \"as\", \"break\", \"by\", \"catch\",\r\n\"class\", \"companion\", \"const\", \"constructor\", \"continue\", \"crossinline\",\r\n\"data\", \"delegate\", \"do\", \"dynamic\", \"else\", \"enum\", \"expect\", \"external\",\r\n\"false\", \"field\", \"file\", \"final\", \"finally\", \"for\", \"fun\", \"get\", \"if\",\r\n\"import\", \"in\", \"infix\", \"init\", \"inline\", \"inner\", \"interface\", \"internal\",\r\n\"is\", \"it\", \"lateinit\", \"noinline\", \"null\", \"object\", \"open\", \"operator\",\r\n\"out\", \"override\", \"package\", \"param\", \"private\", \"property\", \"protected\",\r\n\"public\", \"receiver\", \"reified\", \"return\", \"sealed\", \"set\", \"setparam\",\r\n\"super\", \"suspend\", \"tailrec\", \"this\", \"throw\", \"true\", \"try\", \"typealias\",\r\n\"typeof\", \"val\", \"var\", \"vararg\", \"when\", \"where\", \"while\",\r\n```\r\n\r\n`it` is included — it's the implicit lambda parameter that shows up everywhere, and coloring it helps scanability. Modifier-only keywords like `delegate`, `field`, `file` are included too.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `SyntaxLexers.forPath(path)` | `.kt`, `.kts` extension dispatch |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/line_move.md":"# LineMove\r\n\r\n> `page/editor/src/main/kotlin/page/editor/LineMove.kt` — 라인 이동 / 복제\r\n\r\nAlt+↑ / Alt+↓ 와 (향후) Shift+Alt+↑·↓ 의 핵심 로직. 선택 범위 전체를 하나의 블록 으로 다루어 위/아래 라인과 자리를 바꾼다\r\n\r\n> English: [line_move_en.md](https://monkshark.github.io/page-ide/#modules/editor/line_move_en.md)\r\n\r\n---\r\n\r\n## `moveUp` / `moveDown`\r\n\r\n```kotlin\r\nfun moveUp(edit: TextEdit): TextEdit?\r\nfun moveDown(edit: TextEdit): TextEdit?\r\n```\r\n\r\n선택된 줄 블록 전체와 직전/직후 한 줄을 통째로 swap. 선택 범위는 같이 따라간다 (드래그 중인 코드를 그대로 옮기는 느낌)\r\n\r\n| 경계 케이스 | 반환 |\r\n|---|---|\r\n| `moveUp` 인데 첫 줄이 이미 0 행 | `null` (호출자가 무시) |\r\n| `moveDown` 인데 마지막 줄이 EOF | `null` |\r\n\r\n---\r\n\r\n## `duplicateUp` / `duplicateDown`\r\n\r\n```kotlin\r\nfun duplicateUp(edit: TextEdit): TextEdit\r\nfun duplicateDown(edit: TextEdit): TextEdit\r\n```\r\n\r\n선택된 줄 블록을 위/아래로 복제\r\n\r\n| 함수 | 동작 |\r\n|---|---|\r\n| `duplicateUp` | 사본을 위 에 두고, 캐럿/선택은 아래쪽 (원본) 에 머무름 |\r\n| `duplicateDown` | 사본을 아래 에 두고, 캐럿/선택은 아래쪽 (사본) 으로 이동 |\r\n\r\n블록 길이를 알기 위해 `lastEnd - firstStart + 1` (줄바꿈 한 글자 포함) 을 더해 캐럿을 보정\r\n\r\n---\r\n\r\n## 라인 경계\r\n\r\n```kotlin\r\nprivate fun lineStart(text: String, offset: Int): Int\r\nprivate fun lineEnd(text: String, offset: Int): Int\r\n```\r\n\r\n`\\n` 만 보고 라인 경계를 잡는다. CRLF 환경에서도 `\\r` 은 라인 끝의 일부로 같이 swap 됨 (별도 처리 안 함)\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.EditorPanel` `onPreviewKeyEvent` | Alt+Up → `moveUp`, Alt+Down → `moveDown` |\r\n\r\n향후 Shift+Alt+Up / Down 단축키로 `duplicateUp` / `duplicateDown` 와이어링 예정\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/line_move_en.md":"# LineMove\r\n\r\n> 한국어: [line_move.md](https://monkshark.github.io/page-ide/#modules/editor/line_move.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/LineMove.kt` — Line move / duplicate\r\n\r\nCore logic for Alt+↑ / Alt+↓ (and future Shift+Alt+↑·↓). Treats the entire selection as one block and swaps it with the line above/below.\r\n\r\n---\r\n\r\n## `moveUp` / `moveDown`\r\n\r\n```kotlin\r\nfun moveUp(edit: TextEdit): TextEdit?\r\nfun moveDown(edit: TextEdit): TextEdit?\r\n```\r\n\r\nSwaps the selected line block with the line directly above/below. The selection follows along (feels like dragging code with you).\r\n\r\n| Boundary case | Return |\r\n|---|---|\r\n| `moveUp` and the first line is already row 0 | `null` (caller ignores) |\r\n| `moveDown` and the last line is EOF | `null` |\r\n\r\n---\r\n\r\n## `duplicateUp` / `duplicateDown`\r\n\r\n```kotlin\r\nfun duplicateUp(edit: TextEdit): TextEdit\r\nfun duplicateDown(edit: TextEdit): TextEdit\r\n```\r\n\r\nDuplicates the selected block above or below.\r\n\r\n| Function | Behavior |\r\n|---|---|\r\n| `duplicateUp` | Copy goes above, caret/selection stays on the original (now below) |\r\n| `duplicateDown` | Copy goes below, caret/selection moves to the copy (now below) |\r\n\r\nUses `lastEnd - firstStart + 1` (block length including the trailing newline) as the caret offset.\r\n\r\n---\r\n\r\n## Line boundaries\r\n\r\n```kotlin\r\nprivate fun lineStart(text: String, offset: Int): Int\r\nprivate fun lineEnd(text: String, offset: Int): Int\r\n```\r\n\r\nBoundaries are determined by `\\n` only. On CRLF inputs, `\\r` rides along as part of the line end (no special handling).\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.EditorPanel` `onPreviewKeyEvent` | Alt+Up → `moveUp`, Alt+Down → `moveDown` |\r\n\r\nShift+Alt+Up / Down → `duplicateUp` / `duplicateDown` wiring is planned.\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/markdown_fence.md":"# MarkdownFence\r\n\r\n> `page/editor/src/main/kotlin/page/editor/MarkdownFence.kt` — 캐럿이 코드 펜스 안에 있는지 판별\r\n\r\nMarkdown 의 ```` ``` ```` / `~~~` 코드 펜스 안에서는 `AutoClose` / `Indent` 같은 자동 동작을 멈춰야 깔끔하다. 그 판별을 위한 단일 함수\r\n\r\n> English: [markdown_fence_en.md](https://monkshark.github.io/page-ide/#modules/editor/markdown_fence_en.md)\r\n\r\n---\r\n\r\n## `isInsideFence`\r\n\r\n```kotlin\r\nfun isInsideFence(text: String, caret: Int): Boolean\r\n```\r\n\r\n텍스트 처음부터 한 줄씩 진행하며 펜스 상태를 추적. 캐럿이 위치한 줄에 도달했을 때의 상태를 반환\r\n\r\n| 케이스 | 반환 |\r\n|---|---|\r\n| 펜스 밖에서 캐럿 만남 | `false` |\r\n| 펜스 안에서 캐럿 만남 (열기/닫기 라인 자체는 제외) | `true` |\r\n| 펜스가 닫히지 않은 채 EOF | `inFence` 의 마지막 값 |\r\n\r\n펜스 경계 라인 (열기 / 닫기 글자가 있는 줄) 에 캐럿이 있으면 `false` — 마크다운 의미상 그 라인은 펜스 바깥 으로 친다\r\n\r\n---\r\n\r\n## `parseFenceLine`\r\n\r\n```kotlin\r\nprivate fun parseFenceLine(text: String, lineStart: Int, lineEnd: Int): Pair<Char, Int>?\r\n```\r\n\r\nCommonMark 펜스 규칙을 따른다\r\n\r\n| 규칙 | 값 |\r\n|---|---|\r\n| 선행 공백 | 최대 3 칸 |\r\n| 펜스 글자 | `` ` `` 또는 `~` |\r\n| 펜스 길이 | 3 개 이상 연속 |\r\n\r\n여는 펜스의 글자 종류 와 길이 를 기억해 두고, 닫는 펜스는 같은 글자 + 같거나 더 긴 길이여야 인정\r\n\r\n---\r\n\r\n## 비목표\r\n\r\n- 인라인 코드 (\\`...\\`) 판별 — 한 줄 안의 백틱 블록은 처리 안 함\r\n- 들여쓰기 코드 블록 (4 칸 이상 들여쓰기) — 펜스만 인식\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.EditorPanel` (`.md` 파일) | `AutoClose` / `Indent` 자동 동작 비활성화 가드 |\r\n\r\n> 현재 직접 호출 지점은 향후 `EditorPanel` 에서 추가 예정 — 모듈 자체는 준비 완료\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/markdown_fence_en.md":"# MarkdownFence\r\n\r\n> 한국어: [markdown_fence.md](https://monkshark.github.io/page-ide/#modules/editor/markdown_fence.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/MarkdownFence.kt` — Detects whether the caret is inside a code fence\r\n\r\nInside Markdown ```` ``` ```` / `~~~` fences, behaviors like `AutoClose` / `Indent` should be disabled — typing prose-style code samples gets messy otherwise. This file provides the single detection function.\r\n\r\n---\r\n\r\n## `isInsideFence`\r\n\r\n```kotlin\r\nfun isInsideFence(text: String, caret: Int): Boolean\r\n```\r\n\r\nWalks line by line from the start, tracking fence state. Returns the state on the line containing the caret.\r\n\r\n| Case | Return |\r\n|---|---|\r\n| Caret reached while outside a fence | `false` |\r\n| Caret reached while inside a fence (excluding the open/close lines themselves) | `true` |\r\n| Reached EOF still inside a fence | The last `inFence` value |\r\n\r\nIf the caret lands on a fence boundary line (the line with the opening/closing chars), the result is `false` — Markdown semantics treat that line as outside the fence.\r\n\r\n---\r\n\r\n## `parseFenceLine`\r\n\r\n```kotlin\r\nprivate fun parseFenceLine(text: String, lineStart: Int, lineEnd: Int): Pair<Char, Int>?\r\n```\r\n\r\nFollows CommonMark's fence rules.\r\n\r\n| Rule | Value |\r\n|---|---|\r\n| Leading spaces | Up to 3 |\r\n| Fence char | `` ` `` or `~` |\r\n| Fence length | 3 or more in a row |\r\n\r\nRemembers the opening fence's char and length; a closer must match the char and be at least as long.\r\n\r\n---\r\n\r\n## Non-goals\r\n\r\n- Inline code (\\`...\\`) — single-line backtick spans not handled\r\n- Indented code blocks (4+ space indent) — only fenced blocks are recognized\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.EditorPanel` (in `.md` files) | Guard to disable `AutoClose` / `Indent` |\r\n\r\n> The actual callsite in `EditorPanel` is planned — the module itself is ready.\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/project_file_index.md":"# ProjectFileIndex\r\n\r\n> `page/editor/src/main/kotlin/page/editor/ProjectFileIndex.kt` — 프로젝트 루트 평탄화 워커\r\n\r\n`Ctrl+P` 가 열릴 때 `rootDir` 아래의 파일을 한 번에 훑어 플랫 리스트로 반환. 무거운 디렉터리는 스킵해서 5000 개 한계 안에서 끝낸다\r\n\r\n> English: [project_file_index_en.md](https://monkshark.github.io/page-ide/#modules/editor/project_file_index_en.md)\r\n\r\n---\r\n\r\n## `walk`\r\n\r\n```kotlin\r\nfun walk(root: Path, limit: Int = 5000): List<IndexedFile>\r\n```\r\n\r\nDFS 로 진행 (`ArrayDeque` 스택). 디렉터리는 SKIP 셋과 hidden (`.` 시작) 검사를 통과한 것만 들어가고, 파일은 `IndexedFile(path, root.relativize(child))` 로 모은다. 마지막에 `relative` 소문자 기준으로 정렬\r\n\r\n| 스킵 디렉터리 |\r\n|---|\r\n| `.git`, `.idea`, `.gradle`, `.kotlin`, `.vscode` |\r\n| `build`, `out`, `node_modules`, `target`, `dist`, `.cache`, `bin` |\r\n\r\n`limit` 은 디폴트 5000. 그 이상은 잘리는데, 빠른 열기는 사람 눈으로 훑는 도구이지 풀 검색 도구가 아니라 그게 합리적\r\n\r\n---\r\n\r\n## `IndexedFile`\r\n\r\n```kotlin\r\ndata class IndexedFile(val path: Path, val relative: String)\r\n```\r\n\r\n`path` 는 절대 (열 때 그대로 `openInTab` 으로 넘김), `relative` 는 항상 `/` 정규화 (Windows 의 `\\` 도 `/` 로 치환). 매처는 `relative` 만 본다\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 역할 |\r\n|---|---|\r\n| `page.app.Main.openQuickOpen` | `Ctrl+P` 누르는 순간 한 번 호출, 결과를 `quickOpenIndex` 스테이트에 캐싱 |\r\n\r\n다이얼로그가 닫힌 동안엔 인덱스를 들고 있지 않는다 — 다음에 열 때 다시 워크. 파일이 자주 추가/삭제되어도 매번 새로 잡으니 stale 안 됨\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/project_file_index_en.md":"# ProjectFileIndex\r\n\r\n> 한국어: [project_file_index.md](https://monkshark.github.io/page-ide/#modules/editor/project_file_index.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/ProjectFileIndex.kt` — Flattening walker over the project root\r\n\r\nWhen `Ctrl+P` opens, this scans every file under `rootDir` and returns a flat list. Heavy directories are skipped, and the walk stops at a 5000-entry limit.\r\n\r\n---\r\n\r\n## `walk`\r\n\r\n```kotlin\r\nfun walk(root: Path, limit: Int = 5000): List<IndexedFile>\r\n```\r\n\r\nDFS via an `ArrayDeque` stack. Directories pass the SKIP check and a hidden-name filter (`.`-prefixed); files become `IndexedFile(path, root.relativize(child))`. The final list is sorted by lowercase `relative`.\r\n\r\n| Skipped |\r\n|---|\r\n| `.git`, `.idea`, `.gradle`, `.kotlin`, `.vscode` |\r\n| `build`, `out`, `node_modules`, `target`, `dist`, `.cache`, `bin` |\r\n\r\n`limit` defaults to 5000. Anything past that is dropped, which is fine — Quick Open is a human-eye picker, not a full-text search.\r\n\r\n---\r\n\r\n## `IndexedFile`\r\n\r\n```kotlin\r\ndata class IndexedFile(val path: Path, val relative: String)\r\n```\r\n\r\n`path` stays absolute (handed to `openInTab` as-is). `relative` is always `/`-normalized (Windows `\\` is rewritten). Only `relative` is fed to the matcher.\r\n\r\n---\r\n\r\n## Used by\r\n\r\n| Location | Role |\r\n|---|---|\r\n| `page.app.Main.openQuickOpen` | Called once when `Ctrl+P` fires; result cached into `quickOpenIndex` state |\r\n\r\nThe index isn't kept around while the dialog is closed — the next open re-walks. So adds/deletes don't go stale.\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/quick_open.md":"# QuickOpen\r\n\r\n> `page/editor/src/main/kotlin/page/editor/QuickOpen.kt` — 빠른 열기 결과 랭킹\r\n\r\n`FuzzyMatcher` 단일 매칭을 파일 리스트 위에서 돌려서 결과 정렬 + 자르기. 다이얼로그는 이게 돌려준 `QuickOpenResult` 만 받아서 그린다\r\n\r\n> English: [quick_open_en.md](https://monkshark.github.io/page-ide/#modules/editor/quick_open_en.md)\r\n\r\n---\r\n\r\n## `rank`\r\n\r\n```kotlin\r\nfun rank(query: String, files: List<IndexedFile>): List<QuickOpenResult>\r\n```\r\n\r\n| 상황 | 동작 |\r\n|---|---|\r\n| `query` 가 비거나 공백만 | 입력 순서대로 앞 50 개 (점수 0, 인덱스 빈 배열) |\r\n| 파일 이름에도 경로에도 매치 안 됨 | 결과에서 제외 |\r\n| 매치 1개 이상 | 점수 합산 → 내림차순 정렬 → 50 개로 자름 |\r\n\r\n이름 매치 (파일명만) 가 가장 큰 가중치 (`+200`), 경로 매치는 보조 (`/4` 로 약화). 그래서 `editor` 라고 치면 `editor/` 폴더 내 모든 파일이 아니라 `Editor.kt` 류가 위로 올라온다\r\n\r\n---\r\n\r\n## `QuickOpenResult`\r\n\r\n```kotlin\r\ndata class QuickOpenResult(\r\n    val file: IndexedFile,\r\n    val nameIndices: IntArray,\r\n    val pathIndices: IntArray,\r\n    val score: Int,\r\n)\r\n```\r\n\r\n| 필드 | 용도 |\r\n|---|---|\r\n| `file` | 선택했을 때 열어야 할 대상 |\r\n| `nameIndices` | 파일명 영역에서 어떤 글자를 강조할지 |\r\n| `pathIndices` | 경로 영역 강조 (현재 UI 에선 미사용 — 부모 경로는 흐릿하게만 표시) |\r\n| `score` | 정렬 키 |\r\n\r\n`equals`/`hashCode` 는 `IntArray` 안의 값까지 비교하도록 직접 작성\r\n\r\n---\r\n\r\n## `nameOf` / `nameOffset`\r\n\r\n```kotlin\r\nfun nameOf(relative: String): String\r\nfun nameOffset(relative: String): Int\r\n```\r\n\r\n`a/b/Foo.kt` → `Foo.kt` / `4`. 마지막 `/` 만 본다 — 이미 `walk` 에서 `\\` 를 `/` 로 정규화해 두었으므로 plat-dep 없음\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 역할 |\r\n|---|---|\r\n| `page.app.QuickOpenDialog` | `query` 가 바뀔 때마다 `rank(query, files)` 재계산 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/quick_open_en.md":"# QuickOpen\r\n\r\n> 한국어: [quick_open.md](https://monkshark.github.io/page-ide/#modules/editor/quick_open.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/QuickOpen.kt` — Quick Open result ranking\r\n\r\nRuns `FuzzyMatcher` over the file list, sums per-file scores, sorts, and trims. The dialog only consumes the resulting `QuickOpenResult` list — it never matches strings itself.\r\n\r\n---\r\n\r\n## `rank`\r\n\r\n```kotlin\r\nfun rank(query: String, files: List<IndexedFile>): List<QuickOpenResult>\r\n```\r\n\r\n| Case | Behavior |\r\n|---|---|\r\n| `query` empty or whitespace | First 50 files in input order (score 0, empty indices) |\r\n| Matches neither name nor path | Excluded |\r\n| Matches at least one | Sum score → sort desc → cap at 50 |\r\n\r\nFilename matches dominate (`+200` bonus); path matches are scaled down (`/4`). So typing `editor` ranks `Editor.kt` above arbitrary files inside an `editor/` folder.\r\n\r\n---\r\n\r\n## `QuickOpenResult`\r\n\r\n```kotlin\r\ndata class QuickOpenResult(\r\n    val file: IndexedFile,\r\n    val nameIndices: IntArray,\r\n    val pathIndices: IntArray,\r\n    val score: Int,\r\n)\r\n```\r\n\r\n| Field | Purpose |\r\n|---|---|\r\n| `file` | What to open on selection |\r\n| `nameIndices` | Which glyphs in the filename to highlight |\r\n| `pathIndices` | Path-area highlights (currently unused — parent path is rendered dim) |\r\n| `score` | Sort key |\r\n\r\n`equals`/`hashCode` are overridden to do deep comparisons on the `IntArray` fields.\r\n\r\n---\r\n\r\n## `nameOf` / `nameOffset`\r\n\r\n```kotlin\r\nfun nameOf(relative: String): String\r\nfun nameOffset(relative: String): Int\r\n```\r\n\r\n`a/b/Foo.kt` → `Foo.kt` / `4`. Splits on the last `/` only — the walker normalizes `\\` to `/`, so this stays platform-independent.\r\n\r\n---\r\n\r\n## Used by\r\n\r\n| Location | Role |\r\n|---|---|\r\n| `page.app.QuickOpenDialog` | Recomputes `rank(query, files)` whenever the query changes |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/replace.md":"# Replace\r\n\r\n> `page/editor/src/main/kotlin/page/editor/Replace.kt` — 검색 매치 치환\r\n\r\n`SearchState.matches` 가 만들어 놓은 매치 범위들을 받아 텍스트를 치환한다. 매치를 찾는 일은 `SearchState`, 치환만 이 파일\r\n\r\n> English: [replace_en.md](https://monkshark.github.io/page-ide/#modules/editor/replace_en.md)\r\n\r\n---\r\n\r\n## `Result`\r\n\r\n```kotlin\r\ndata class Result(val text: String, val caret: Int, val replacedCount: Int)\r\n```\r\n\r\n치환 결과 묶음\r\n\r\n| 필드 | 의미 |\r\n|---|---|\r\n| `text` | 치환된 새 텍스트 |\r\n| `caret` | 치환 후 캐럿 위치 |\r\n| `replacedCount` | 실제로 치환된 매치 개수 (0 도 가능) |\r\n\r\n---\r\n\r\n## `applyCurrent`\r\n\r\n```kotlin\r\nfun applyCurrent(text: String, range: IntRange, replacement: String): Result\r\n```\r\n\r\n매치 한 개 (`range`) 를 `replacement` 로 치환. 캐럿은 치환된 글자 끝 (`start + replacement.length`) — 다음 매치로 넘어가기 좋은 위치\r\n\r\n`replacedCount` 는 항상 `1`\r\n\r\n---\r\n\r\n## `applyAll`\r\n\r\n```kotlin\r\nfun applyAll(text: String, matches: List<IntRange>, replacement: String): Result\r\n```\r\n\r\n매치 리스트 전체를 한 번에 치환. `StringBuilder` 로 매치 사이의 원본 조각을 그대로 이어붙여 단일 패스로 새 문자열을 만든다\r\n\r\n`matches` 가 비어 있으면 원본 텍스트와 `replacedCount = 0` 반환. 캐럿은 `0` 으로 리셋 — 전부 치환 후 캐럿 위치는 의미가 모호해서 일단 단순화\r\n\r\n`matches` 는 서로 겹치지 않고 오름차순 이라는 전제 — `SearchState.findAll` 이 이 조건을 만족시킨다\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.SearchBar` \"바꾸기\" | `applyCurrent(text, search.active, replace)` |\r\n| `page.app.SearchBar` \"전부 바꾸기\" | `applyAll(text, search.matches, replace)` |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/replace_en.md":"# Replace\r\n\r\n> 한국어: [replace.md](https://monkshark.github.io/page-ide/#modules/editor/replace.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/Replace.kt` — Search match replacement\r\n\r\nTakes match ranges produced by `SearchState.matches` and replaces them in the text. Finding matches lives in `SearchState`; replacement only is here.\r\n\r\n---\r\n\r\n## `Result`\r\n\r\n```kotlin\r\ndata class Result(val text: String, val caret: Int, val replacedCount: Int)\r\n```\r\n\r\nReplacement result.\r\n\r\n| Field | Meaning |\r\n|---|---|\r\n| `text` | New text after replacement |\r\n| `caret` | Caret position after replacement |\r\n| `replacedCount` | Actual number of replaced matches (0 is possible) |\r\n\r\n---\r\n\r\n## `applyCurrent`\r\n\r\n```kotlin\r\nfun applyCurrent(text: String, range: IntRange, replacement: String): Result\r\n```\r\n\r\nReplaces a single match (`range`) with `replacement`. The caret lands at the end of the replacement (`start + replacement.length`) — a natural spot to step to the next match.\r\n\r\n`replacedCount` is always `1`.\r\n\r\n---\r\n\r\n## `applyAll`\r\n\r\n```kotlin\r\nfun applyAll(text: String, matches: List<IntRange>, replacement: String): Result\r\n```\r\n\r\nReplaces every match in one pass. Uses `StringBuilder` to splice the unchanged segments between matches, producing the new text in a single pass.\r\n\r\nIf `matches` is empty, returns the original text with `replacedCount = 0`. The caret is reset to `0` — after a replace all, the caret position is ambiguous, so this keeps it simple.\r\n\r\nAssumes `matches` is non-overlapping and ascending — `SearchState.findAll` already guarantees that.\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.SearchBar` \"Replace\" | `applyCurrent(text, search.active, replace)` |\r\n| `page.app.SearchBar` \"Replace All\" | `applyAll(text, search.matches, replace)` |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/search_state.md":"# SearchState\r\n\r\n> `page/editor/src/main/kotlin/page/editor/SearchState.kt` — 검색 / 치환 상태\r\n\r\n검색바의 모든 상태가 들어있는 이뮤터블 데이터 클래스. `null` 이면 검색바 닫힘, 인스턴스가 있으면 열림\r\n\r\n> English: [search_state_en.md](https://monkshark.github.io/page-ide/#modules/editor/search_state_en.md)\r\n\r\n---\r\n\r\n## 필드\r\n\r\n```kotlin\r\ndata class SearchState(\r\n    val query: String = \"\",\r\n    val replace: String = \"\",\r\n    val replaceVisible: Boolean = false,\r\n    val caseSensitive: Boolean = false,\r\n    val matches: List<IntRange> = emptyList(),\r\n    val activeMatchIndex: Int = -1,\r\n)\r\n```\r\n\r\n| 필드 | 의미 |\r\n|---|---|\r\n| `query` | 검색어 |\r\n| `replace` | 치환 텍스트 |\r\n| `replaceVisible` | `true` 면 치환 입력칸과 버튼이 두 번째 줄에 표시 |\r\n| `caseSensitive` | 대소문자 구분 토글 (`Aa` 칩) |\r\n| `matches` | 본문에서 찾은 매치 범위 리스트 |\r\n| `activeMatchIndex` | 현재 강조된 매치의 인덱스 (`matches.getOrNull` 으로 사용) |\r\n\r\n---\r\n\r\n## 파생 프로퍼티\r\n\r\n```kotlin\r\nval isActive: Boolean get() = query.isNotEmpty()\r\nval active: IntRange? get() = matches.getOrNull(activeMatchIndex)\r\n```\r\n\r\n`isActive` 는 질의가 들어있는 상태 (검색바가 열려 있어도 빈 검색어일 수 있음). `active` 는 활성 매치의 범위 — 없으면 `null`\r\n\r\n---\r\n\r\n## 변환 메서드 (with*)\r\n\r\n| 메서드 | 동작 |\r\n|---|---|\r\n| `withQuery(text, query)` | 검색어 변경 → 새로 매치 찾고 활성 인덱스 0 으로 |\r\n| `withReplace(value)` | 치환 텍스트만 갱신 |\r\n| `withReplaceVisible(value)` | 치환 줄 표시/숨김 |\r\n| `withCaseSensitive(text, value)` | 토글 후 동일 검색어로 다시 찾기 |\r\n| `retarget(text)` | 본문이 바뀌었을 때 매치 다시 찾고, 직전 활성 위치에 가장 가까운 매치를 새 활성으로 |\r\n\r\n`retarget` 가 핵심 — 사용자가 치환하거나 본문을 편집한 뒤에도 현재 보던 매치 근처 에 머무르게 하는 사용감을 만든다\r\n\r\n---\r\n\r\n## 이동 메서드\r\n\r\n```kotlin\r\nfun next(): SearchState\r\nfun prev(): SearchState\r\n```\r\n\r\n`activeMatchIndex` 만 순환 (마지막 → 0, 0 → 마지막). 매치가 없으면 자기 자신 반환\r\n\r\n---\r\n\r\n## `findAll` (private)\r\n\r\n```kotlin\r\nprivate fun findAll(text: String, query: String, caseSensitive: Boolean): List<IntRange>\r\n```\r\n\r\n`String.regionMatches` 로 한 번씩 비교하며 겹치지 않는 매치만 수집 — 매치를 찾으면 인덱스를 `query.length` 만큼 건너뛴다 (예: `aaa` 에서 `aa` 검색 → `[0..1]` 한 개. `[0..1]`, `[1..2]` 가 아님)\r\n\r\n대소문자는 `ignoreCase = !caseSensitive` 로 한 줄 처리. 정규식 미사용\r\n\r\n---\r\n\r\n## 비목표\r\n\r\n- 정규식 검색 — 향후 추가 예정 (별도 토글)\r\n- 단어 단위 (whole word) 검색 — 향후 토글\r\n- 다중 라인 / 멀티커서 검색 — 미지원\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.Main` `search: SearchState?` | 윈도우 상태 |\r\n| `page.app.SearchBar` | 모든 입력은 `SearchState` 변환으로 |\r\n| `CombinedHighlightTransformation` | `matches` 와 `activeMatchIndex` 로 매치 / 활성 매치 배경 색 입힘 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/search_state_en.md":"# SearchState\r\n\r\n> 한국어: [search_state.md](https://monkshark.github.io/page-ide/#modules/editor/search_state.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/SearchState.kt` — Search / replace state\r\n\r\nImmutable data class holding the entire search-bar state. `null` means the bar is closed; an instance means open.\r\n\r\n---\r\n\r\n## Fields\r\n\r\n```kotlin\r\ndata class SearchState(\r\n    val query: String = \"\",\r\n    val replace: String = \"\",\r\n    val replaceVisible: Boolean = false,\r\n    val caseSensitive: Boolean = false,\r\n    val matches: List<IntRange> = emptyList(),\r\n    val activeMatchIndex: Int = -1,\r\n)\r\n```\r\n\r\n| Field | Meaning |\r\n|---|---|\r\n| `query` | Search query |\r\n| `replace` | Replace text |\r\n| `replaceVisible` | When `true`, the second row (replace input + buttons) is shown |\r\n| `caseSensitive` | Case-sensitivity toggle (the `Aa` chip) |\r\n| `matches` | Match ranges found in the body |\r\n| `activeMatchIndex` | Index of the currently highlighted match (used via `matches.getOrNull`) |\r\n\r\n---\r\n\r\n## Derived properties\r\n\r\n```kotlin\r\nval isActive: Boolean get() = query.isNotEmpty()\r\nval active: IntRange? get() = matches.getOrNull(activeMatchIndex)\r\n```\r\n\r\n`isActive` means a query is present (the bar can be open with an empty query). `active` is the range of the active match, or `null`.\r\n\r\n---\r\n\r\n## Transform methods (with*)\r\n\r\n| Method | Behavior |\r\n|---|---|\r\n| `withQuery(text, query)` | Updates the query → re-finds matches → resets active index to 0 |\r\n| `withReplace(value)` | Updates only the replace text |\r\n| `withReplaceVisible(value)` | Shows/hides the replace row |\r\n| `withCaseSensitive(text, value)` | Toggles, then re-runs the search with the same query |\r\n| `retarget(text)` | When body changes, re-finds matches and picks the nearest match to the previous active position as the new active |\r\n\r\n`retarget` is the load-bearing one — it preserves the position the user was looking at across edits and replacements.\r\n\r\n---\r\n\r\n## Cursor movement\r\n\r\n```kotlin\r\nfun next(): SearchState\r\nfun prev(): SearchState\r\n```\r\n\r\nCycles `activeMatchIndex` (last → 0, 0 → last). With no matches, returns itself.\r\n\r\n---\r\n\r\n## `findAll` (private)\r\n\r\n```kotlin\r\nprivate fun findAll(text: String, query: String, caseSensitive: Boolean): List<IntRange>\r\n```\r\n\r\nUses `String.regionMatches` to scan; collects non-overlapping matches by skipping forward by `query.length` after a hit (so searching `aa` in `aaa` yields one match `[0..1]`, not both `[0..1]`, `[1..2]`).\r\n\r\nCase folding is handled in one line via `ignoreCase = !caseSensitive`. No regex.\r\n\r\n---\r\n\r\n## Non-goals\r\n\r\n- Regex search — planned (separate toggle)\r\n- Whole-word search — planned (toggle)\r\n- Multi-line / multi-cursor search — not supported\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.Main` `search: SearchState?` | Window state |\r\n| `page.app.SearchBar` | Every input goes through a `SearchState` transform |\r\n| `CombinedHighlightTransformation` | Uses `matches` + `activeMatchIndex` to apply match / active-match backgrounds |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/syntax_lexer.md":"# SyntaxLexer / Token / TokenKind\r\n\r\n> `page/editor/src/main/kotlin/page/editor/SyntaxLexer.kt` — 신택스 렉서 인터페이스\r\n\r\n언어별 렉서가 따라야 할 계약. 토큰 종류는 `TokenKind` enum 6 종으로 한정 (`PUNCT` 포함 7 종이지만 실제 색은 6 종만)\r\n\r\n> English: [syntax_lexer_en.md](https://monkshark.github.io/page-ide/#modules/editor/syntax_lexer_en.md)\r\n\r\n---\r\n\r\n## `TokenKind`\r\n\r\n```kotlin\r\nenum class TokenKind {\r\n    KEYWORD,\r\n    STRING,\r\n    NUMBER,\r\n    COMMENT,\r\n    ANNOTATION,\r\n    TYPE,\r\n    PUNCT,\r\n}\r\n```\r\n\r\n`SyntaxPalette` 의 6 색과 1:1 매핑. `PUNCT` 는 의도적으로 색이 비어 있어 본문 톤 그대로 보임 — 자세한 이유는 `SyntaxColors` 참고\r\n\r\n---\r\n\r\n## `Token`\r\n\r\n```kotlin\r\ndata class Token(val kind: TokenKind, val range: IntRange) {\r\n    val start: Int get() = range.first\r\n    val endExclusive: Int get() = range.last + 1\r\n}\r\n```\r\n\r\n토큰 한 개 = 종류 + 텍스트 범위. `endExclusive` 는 `AnnotatedString.Builder.addStyle(start, end)` 의 exclusive end 와 맞추기 위한 편의 프로퍼티\r\n\r\n---\r\n\r\n## `SyntaxLexer`\r\n\r\n```kotlin\r\ninterface SyntaxLexer {\r\n    fun tokenize(text: String): List<Token>\r\n}\r\n```\r\n\r\n파일 한 번 읽고 토큰 리스트 한 번 만드는 단순 계약. 증분 토큰화 / 부분 갱신 같은 최적화는 미지원 — `EditorPanel` 이 `remember(value.text)` 로 캐싱\r\n\r\n---\r\n\r\n## 구현체\r\n\r\n| 구현 | 대상 |\r\n|---|---|\r\n| `KotlinLexer` | `.kt`, `.kts` |\r\n| `JavaLexer` | `.java` |\r\n| `JsonLexer` | `.json` |\r\n\r\n분기 진입점은 `SyntaxLexers.forPath(path)` — 미지원 확장자는 `null` 반환 → 토큰 색 없음 (본문 톤만)\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.EditorPanel` `CombinedHighlightTransformation` | `lexer.tokenize(text)` 결과를 `palette[kind]` 색과 함께 `AnnotatedString` 으로 변환 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/syntax_lexers.md":"# SyntaxLexers\r\n\r\n> `page/editor/src/main/kotlin/page/editor/SyntaxLexers.kt` — 확장자 기반 렉서 분기\r\n\r\n`Path` 를 받아 적절한 `SyntaxLexer` 를 골라준다. 미지원 확장자는 `null` 반환 — 호출자는 본문 톤 그대로 그리기\r\n\r\n> English: [syntax_lexers_en.md](https://monkshark.github.io/page-ide/#modules/editor/syntax_lexers_en.md)\r\n\r\n---\r\n\r\n## `forPath`\r\n\r\n```kotlin\r\nfun forPath(path: Path): SyntaxLexer?\r\n```\r\n\r\n확장자를 소문자로 정규화한 뒤 매칭\r\n\r\n| 확장자 | 렉서 |\r\n|---|---|\r\n| `.kt`, `.kts` | `KotlinLexer` |\r\n| `.java` | `JavaLexer` |\r\n| `.json` | `JsonLexer` |\r\n| 그 외 / 확장자 없음 | `null` |\r\n\r\n`when` 문 한 블록만 늘리면 새 언어 추가 가능 — 새 렉서 구현 → `forPath` 분기 한 줄 추가가 끝\r\n\r\n---\r\n\r\n## 향후 추가\r\n\r\n| 확장자 | 렉서 (예정) |\r\n|---|---|\r\n| `.py` | `PythonLexer` |\r\n| `.md` | `MarkdownLexer` (`MarkdownFence` 와 별개로 본문 토큰화) |\r\n| `.xml`, `.html` | `XmlLexer` |\r\n| `.css`, `.scss` | `CssLexer` |\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.Main` (탭 활성화 시) | 활성 탭의 파일 경로로 렉서를 골라 `EditorPanel` 에 전달 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/syntax_lexers_en.md":"# SyntaxLexers\r\n\r\n> 한국어: [syntax_lexers.md](https://monkshark.github.io/page-ide/#modules/editor/syntax_lexers.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/SyntaxLexers.kt` — Extension-based lexer dispatch\r\n\r\nTakes a `Path` and returns the matching `SyntaxLexer`. Unsupported extensions return `null` — the caller renders body-tone only.\r\n\r\n---\r\n\r\n## `forPath`\r\n\r\n```kotlin\r\nfun forPath(path: Path): SyntaxLexer?\r\n```\r\n\r\nLowercases the extension before matching.\r\n\r\n| Extension | Lexer |\r\n|---|---|\r\n| `.kt`, `.kts` | `KotlinLexer` |\r\n| `.java` | `JavaLexer` |\r\n| `.json` | `JsonLexer` |\r\n| Anything else / no extension | `null` |\r\n\r\nAdding a new language is a one-line addition to the `when` — implement the lexer and add a branch.\r\n\r\n---\r\n\r\n## Planned\r\n\r\n| Extension | Lexer (planned) |\r\n|---|---|\r\n| `.py` | `PythonLexer` |\r\n| `.md` | `MarkdownLexer` (separate from `MarkdownFence`, for body tokenization) |\r\n| `.xml`, `.html` | `XmlLexer` |\r\n| `.css`, `.scss` | `CssLexer` |\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.Main` (on tab activation) | Picks a lexer from the active tab's path and passes it to `EditorPanel` |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/syntax_lexer_en.md":"# SyntaxLexer / Token / TokenKind\r\n\r\n> 한국어: [syntax_lexer.md](https://monkshark.github.io/page-ide/#modules/editor/syntax_lexer.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/SyntaxLexer.kt` — Syntax-lexer interface\r\n\r\nThe contract every language lexer follows. `TokenKind` keeps the kinds limited to seven (six color, one transparent).\r\n\r\n---\r\n\r\n## `TokenKind`\r\n\r\n```kotlin\r\nenum class TokenKind {\r\n    KEYWORD,\r\n    STRING,\r\n    NUMBER,\r\n    COMMENT,\r\n    ANNOTATION,\r\n    TYPE,\r\n    PUNCT,\r\n}\r\n```\r\n\r\nMaps 1:1 to the six colors in `SyntaxPalette`. `PUNCT` is intentionally uncolored, preserving the body tone — see `SyntaxColors` for the why.\r\n\r\n---\r\n\r\n## `Token`\r\n\r\n```kotlin\r\ndata class Token(val kind: TokenKind, val range: IntRange) {\r\n    val start: Int get() = range.first\r\n    val endExclusive: Int get() = range.last + 1\r\n}\r\n```\r\n\r\nOne token = kind + text range. `endExclusive` is a convenience for `AnnotatedString.Builder.addStyle(start, end)`'s exclusive end.\r\n\r\n---\r\n\r\n## `SyntaxLexer`\r\n\r\n```kotlin\r\ninterface SyntaxLexer {\r\n    fun tokenize(text: String): List<Token>\r\n}\r\n```\r\n\r\nA simple contract: read the file once, return a token list once. No incremental tokenization or partial update optimization — `EditorPanel` caches the result via `remember(value.text)`.\r\n\r\n---\r\n\r\n## Implementations\r\n\r\n| Implementation | Target |\r\n|---|---|\r\n| `KotlinLexer` | `.kt`, `.kts` |\r\n| `JavaLexer` | `.java` |\r\n| `JsonLexer` | `.json` |\r\n\r\nThe dispatch entry point is `SyntaxLexers.forPath(path)` — unsupported extensions return `null` (body tone only, no token colors).\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `CombinedHighlightTransformation` in `page.app.EditorPanel` | Feeds `lexer.tokenize(text)` into an `AnnotatedString` with `palette[kind]` colors |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/tab_book.md":"# TabBook / OpenTab\r\n\r\n> `page/editor/src/main/kotlin/page/editor/TabBook.kt` — 탭 묶음과 활성 인덱스\r\n\r\n이뮤터블 자료구조. 탭마다 본문 / 저장된 본문 / 캐럿 / 히스토리를 따로 들고 있어 탭 간 상태가 섞이지 않는다\r\n\r\n> English: [tab_book_en.md](https://monkshark.github.io/page-ide/#modules/editor/tab_book_en.md)\r\n\r\n---\r\n\r\n## `OpenTab`\r\n\r\n```kotlin\r\ndata class OpenTab(\r\n    val path: Path,\r\n    val text: String,\r\n    val savedText: String = text,\r\n    val caret: Int = 0,\r\n    val history: EditHistory = EditHistory(),\r\n) {\r\n    val dirty: Boolean get() = text != savedText\r\n}\r\n```\r\n\r\n| 필드 | 의미 |\r\n|---|---|\r\n| `path` | 파일 경로 (탭 식별자 역할) |\r\n| `text` | 현재 본문 |\r\n| `savedText` | 마지막 저장 시점의 본문 |\r\n| `caret` | 마지막 캐럿 위치 (탭 전환 시 복원) |\r\n| `history` | 이 탭만의 undo/redo 스택 |\r\n\r\n`dirty` 는 현재 본문 ≠ 저장 본문 일 때 `true`. `Ctrl+W` 누를 때 다이얼로그 띄울지 결정하는 핵심\r\n\r\n---\r\n\r\n## `TabBook`\r\n\r\n```kotlin\r\ndata class TabBook(\r\n    val tabs: List<OpenTab> = emptyList(),\r\n    val activeIndex: Int = -1,\r\n)\r\n```\r\n\r\n전체 탭 리스트와 활성 인덱스. `activeIndex == -1` 이면 활성 탭 없음 (탭이 0 개)\r\n\r\n---\r\n\r\n## `openOrFocus`\r\n\r\n```kotlin\r\nfun openOrFocus(path: Path, text: String): TabBook\r\n```\r\n\r\n같은 경로의 탭이 이미 있으면 활성화만, 없으면 새 탭 추가하고 마지막을 활성화. 같은 파일을 두 번 열어도 탭이 늘어나지 않게\r\n\r\n---\r\n\r\n## `close` / `closeActive`\r\n\r\n```kotlin\r\nfun close(index: Int): TabBook\r\nfun closeActive(): TabBook\r\n```\r\n\r\n탭 제거 후 `activeIndex` 보정\r\n\r\n| 닫는 위치 | 새 활성 인덱스 |\r\n|---|---|\r\n| `index < activeIndex` | `activeIndex - 1` |\r\n| `index == activeIndex` | `index.coerceAtMost(lastIndex)` (다음 탭 또는 마지막) |\r\n| `index > activeIndex` | 그대로 |\r\n\r\n마지막 탭을 닫으면 `TabBook()` (빈 상태) 반환\r\n\r\n---\r\n\r\n## `updateActive`\r\n\r\n```kotlin\r\nfun updateActive(text: String, caret: Int): TabBook\r\n```\r\n\r\n활성 탭의 `text` / `caret` 갱신. 같은 값이면 자기 자신 반환 (불필요한 리컴포지션 회피)\r\n\r\n---\r\n\r\n## `pushHistoryOnActive` / `undoOnActive` / `redoOnActive`\r\n\r\n```kotlin\r\nfun pushHistoryOnActive(prev: EditSnapshot): TabBook\r\nfun undoOnActive(current: EditSnapshot): Pair<TabBook, EditSnapshot>?\r\nfun redoOnActive(current: EditSnapshot): Pair<TabBook, EditSnapshot>?\r\n```\r\n\r\n`EditHistory` 호출을 활성 탭에만 적용하고 결과를 다시 끼워넣는 래퍼. undo/redo 가 성공하면 `(새 TabBook, 복원할 스냅샷)` 반환\r\n\r\n---\r\n\r\n## `markActiveSaved`\r\n\r\n```kotlin\r\nfun markActiveSaved(): TabBook\r\n```\r\n\r\n`savedText = text` 로 갱신해 `dirty` 를 `false` 로 만든다. `Ctrl+S` 후 호출\r\n\r\n---\r\n\r\n## `move`\r\n\r\n```kotlin\r\nfun move(from: Int, to: Int): TabBook\r\n```\r\n\r\n탭 재배치 (드래그 앤 드롭). `activeIndex` 도 따라 보정\r\n\r\n| 이동 케이스 | 새 활성 인덱스 |\r\n|---|---|\r\n| 활성 탭이 옮겨지는 경우 | `to` |\r\n| 옮긴 범위 안에 활성 탭이 끼임 | 한 칸 밀려남 |\r\n| 그 외 | 그대로 |\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.Main` `book: TabBook` | 윈도우 상태 |\r\n| `page.app.TabBar` | `book.tabs` / `activeIndex` 로 탭 칩 렌더 |\r\n| `Ctrl+O` / `Ctrl+W` / `Ctrl+S` 핸들러 | `openOrFocus` / `closeActive` / `markActiveSaved` |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/tab_book_en.md":"# TabBook / OpenTab\r\n\r\n> 한국어: [tab_book.md](https://monkshark.github.io/page-ide/#modules/editor/tab_book.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/TabBook.kt` — Tab collection + active index\r\n\r\nImmutable data structure. Each tab carries its own text / saved text / caret / history, so per-tab state never mixes.\r\n\r\n---\r\n\r\n## `OpenTab`\r\n\r\n```kotlin\r\ndata class OpenTab(\r\n    val path: Path,\r\n    val text: String,\r\n    val savedText: String = text,\r\n    val caret: Int = 0,\r\n    val history: EditHistory = EditHistory(),\r\n) {\r\n    val dirty: Boolean get() = text != savedText\r\n}\r\n```\r\n\r\n| Field | Meaning |\r\n|---|---|\r\n| `path` | File path (also the tab identity) |\r\n| `text` | Current body |\r\n| `savedText` | Body as of the last save |\r\n| `caret` | Last caret position (restored on tab switch) |\r\n| `history` | undo/redo stack scoped to this tab |\r\n\r\n`dirty` is `true` when current body ≠ saved body. The signal that drives the unsaved-changes dialog on `Ctrl+W`.\r\n\r\n---\r\n\r\n## `TabBook`\r\n\r\n```kotlin\r\ndata class TabBook(\r\n    val tabs: List<OpenTab> = emptyList(),\r\n    val activeIndex: Int = -1,\r\n)\r\n```\r\n\r\nTab list + active index. `activeIndex == -1` means no active tab (zero tabs).\r\n\r\n---\r\n\r\n## `openOrFocus`\r\n\r\n```kotlin\r\nfun openOrFocus(path: Path, text: String): TabBook\r\n```\r\n\r\nIf a tab with the same path already exists, just activates it; otherwise appends a new tab and activates the last. Prevents duplicate tabs for the same file.\r\n\r\n---\r\n\r\n## `close` / `closeActive`\r\n\r\n```kotlin\r\nfun close(index: Int): TabBook\r\nfun closeActive(): TabBook\r\n```\r\n\r\nRemoves the tab and adjusts `activeIndex`.\r\n\r\n| Close position | New active index |\r\n|---|---|\r\n| `index < activeIndex` | `activeIndex - 1` |\r\n| `index == activeIndex` | `index.coerceAtMost(lastIndex)` (next tab or last) |\r\n| `index > activeIndex` | Unchanged |\r\n\r\nClosing the last tab returns an empty `TabBook()`.\r\n\r\n---\r\n\r\n## `updateActive`\r\n\r\n```kotlin\r\nfun updateActive(text: String, caret: Int): TabBook\r\n```\r\n\r\nUpdates `text` / `caret` on the active tab. Returns itself when nothing changed (avoids needless recomposition).\r\n\r\n---\r\n\r\n## `pushHistoryOnActive` / `undoOnActive` / `redoOnActive`\r\n\r\n```kotlin\r\nfun pushHistoryOnActive(prev: EditSnapshot): TabBook\r\nfun undoOnActive(current: EditSnapshot): Pair<TabBook, EditSnapshot>?\r\nfun redoOnActive(current: EditSnapshot): Pair<TabBook, EditSnapshot>?\r\n```\r\n\r\nWrappers that apply `EditHistory` operations to the active tab and re-stitch the result. On success, undo/redo returns `(new TabBook, snapshot to restore)`.\r\n\r\n---\r\n\r\n## `markActiveSaved`\r\n\r\n```kotlin\r\nfun markActiveSaved(): TabBook\r\n```\r\n\r\nSets `savedText = text` on the active tab → flips `dirty` to `false`. Called after `Ctrl+S`.\r\n\r\n---\r\n\r\n## `move`\r\n\r\n```kotlin\r\nfun move(from: Int, to: Int): TabBook\r\n```\r\n\r\nDrag-reorder. Adjusts `activeIndex` accordingly.\r\n\r\n| Move case | New active index |\r\n|---|---|\r\n| The active tab itself was moved | `to` |\r\n| Active tab is inside the swept range | Shifted by one |\r\n| Otherwise | Unchanged |\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.Main` `book: TabBook` | Window state |\r\n| `page.app.TabBar` | Renders chips from `book.tabs` / `activeIndex` |\r\n| `Ctrl+O` / `Ctrl+W` / `Ctrl+S` handlers | `openOrFocus` / `closeActive` / `markActiveSaved` |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/text_buffer.md":"# TextBuffer / LineCol\r\n\r\n> `page/editor/src/main/kotlin/page/editor/TextBuffer.kt` — `StringBuilder` 래퍼 + 라인/컬럼 좌표\r\n\r\n`offset` ↔ `(line, col)` 변환과 라인 단위 접근을 제공. 현재 `EditorPanel` 의 라인 번호 거터·상태바·현재 줄 하이라이트가 같은 인덱스를 본다\r\n\r\n> English: [text_buffer_en.md](https://monkshark.github.io/page-ide/#modules/editor/text_buffer_en.md)\r\n\r\n---\r\n\r\n## `LineCol`\r\n\r\n```kotlin\r\ndata class LineCol(val line: Int, val col: Int)\r\n```\r\n\r\n행/열 좌표. 둘 다 0-기반 (`(0, 0)` = 첫 줄 첫 글자)\r\n\r\n---\r\n\r\n## 생성\r\n\r\n```kotlin\r\nclass TextBuffer(initial: String = \"\")\r\n```\r\n\r\n`StringBuilder` 를 내부에 보유. 빈 버퍼 (`length = 0`) 도 `lineCount = 1` (빈 한 줄)\r\n\r\n---\r\n\r\n## 메서드\r\n\r\n| 메서드 | 동작 |\r\n|---|---|\r\n| `length` / `lineCount` / `text()` | 길이, 줄 수, 전체 문자열 스냅샷 |\r\n| `lineAt(index)` | 해당 줄의 텍스트 (개행 미포함). 범위 밖이면 `IllegalArgumentException` |\r\n| `insert(offset, text)` | 위치에 삽입 |\r\n| `delete(start, end)` | 범위 삭제 (`end` 는 exclusive) |\r\n| `insertAt(line, col, text)` | 라인/컬럼 좌표로 삽입 (내부에서 `offsetOf` 변환) |\r\n| `deleteAt(startLine, startCol, endLine, endCol)` | 라인/컬럼 좌표로 삭제 |\r\n| `offsetOf(line, col)` | 좌표 → offset |\r\n| `lineColOf(offset)` | offset → 좌표 |\r\n\r\n모든 변경 메서드는 `require` 로 경계 검사 — 잘못된 인자는 즉시 예외, 호출자 버그를 빨리 잡자\r\n\r\n---\r\n\r\n## 라인 좌표 계산\r\n\r\n```kotlin\r\nprivate fun lineStartOffset(line: Int): Int\r\nprivate fun lineEndOffset(line: Int): Int\r\n```\r\n\r\n`\\n` 을 매번 처음부터 카운트. 큰 파일에선 O(N) 비용이라 호출 빈도가 높으면 라인 인덱스 캐시가 필요 — 현재는 `EditorPanel` 이 `remember(value.text)` 로 한 번만 만들고 공유하므로 충분\r\n\r\n---\r\n\r\n## 비목표\r\n\r\n- 증분 갱신 / rope / piece table — `BasicTextField` 가 `String` 을 그대로 다뤄 호환성 우선\r\n- 멀티 캐럿 / 멀티 셀렉션 좌표 — 현재 `TextEdit` 한 쌍의 selection 만 다룸\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 용도 |\r\n|---|---|\r\n| `page.app.EditorPanel` | `remember(value.text) { TextBuffer(...) }` 로 라인 인덱스 한 번만 만들고 공유 |\r\n| `LineNumberGutter` | `lineCount` 로 거터 줄 수 |\r\n| `EditorStatusBar` | `lineColOf(caret)` 로 현재 행/열 표시 |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/text_buffer_en.md":"# TextBuffer / LineCol\r\n\r\n> 한국어: [text_buffer.md](https://monkshark.github.io/page-ide/#modules/editor/text_buffer.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/TextBuffer.kt` — `StringBuilder` wrapper + line/column coordinates\r\n\r\nProvides `offset` ↔ `(line, col)` conversion and line-level access. Today, the line-number gutter, status bar, and current-line highlight in `EditorPanel` all read from the same index.\r\n\r\n---\r\n\r\n## `LineCol`\r\n\r\n```kotlin\r\ndata class LineCol(val line: Int, val col: Int)\r\n```\r\n\r\nLine/column coordinate. Both 0-indexed (`(0, 0)` = first char of the first line).\r\n\r\n---\r\n\r\n## Construction\r\n\r\n```kotlin\r\nclass TextBuffer(initial: String = \"\")\r\n```\r\n\r\nWraps a `StringBuilder`. An empty buffer (`length = 0`) still has `lineCount = 1` (one empty line).\r\n\r\n---\r\n\r\n## Methods\r\n\r\n| Method | Behavior |\r\n|---|---|\r\n| `length` / `lineCount` / `text()` | Length, line count, full string snapshot |\r\n| `lineAt(index)` | Text of the line (excluding newline). Out-of-range → `IllegalArgumentException` |\r\n| `insert(offset, text)` | Insert at offset |\r\n| `delete(start, end)` | Delete range (`end` exclusive) |\r\n| `insertAt(line, col, text)` | Line/col-coordinate insert (internally converts via `offsetOf`) |\r\n| `deleteAt(startLine, startCol, endLine, endCol)` | Line/col-coordinate delete |\r\n| `offsetOf(line, col)` | Coord → offset |\r\n| `lineColOf(offset)` | Offset → coord |\r\n\r\nEvery mutating method has `require` bounds checks — bad arguments throw immediately so caller bugs surface fast.\r\n\r\n---\r\n\r\n## Line offset computation\r\n\r\n```kotlin\r\nprivate fun lineStartOffset(line: Int): Int\r\nprivate fun lineEndOffset(line: Int): Int\r\n```\r\n\r\nCounts `\\n` from the start each time. O(N) on large files, so a cached line index would be needed under heavy use — today `EditorPanel`'s `remember(value.text)` builds it once per text snapshot, which is enough.\r\n\r\n---\r\n\r\n## Non-goals\r\n\r\n- Incremental update / rope / piece table — keeps direct compatibility with `BasicTextField`'s `String`\r\n- Multi-caret / multi-selection coordinates — current `TextEdit` carries a single selection pair\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Purpose |\r\n|---|---|\r\n| `page.app.EditorPanel` | `remember(value.text) { TextBuffer(...) }` builds the line index once and shares it |\r\n| `LineNumberGutter` | `lineCount` for the gutter row count |\r\n| `EditorStatusBar` | `lineColOf(caret)` for the row/col indicator |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/editor/word_boundary.md":"# WordBoundary\r\n\r\n> `page/editor/src/main/kotlin/page/editor/WordBoundary.kt` — 워드 단위 캐럿 이동 / 삭제 / 더블·트리플 클릭 선택 범위\r\n\r\n`Ctrl+←/→` (이동), `Ctrl+Shift+←/→` (선택), `Ctrl+Backspace/Delete` (삭제), 더블/트리플 클릭 (단어/줄 선택) 의 경계 계산. VS Code 식 분류 — 단어 (영숫자 + `_`) / 구두점 / 가로 공백 / 개행\r\n\r\n> English: [word_boundary_en.md](https://monkshark.github.io/page-ide/#modules/editor/word_boundary_en.md)\r\n\r\n---\r\n\r\n## `nextBoundary`\r\n\r\n```kotlin\r\nfun nextBoundary(text: String, offset: Int): Int\r\n```\r\n\r\n`offset` 에서 오른쪽으로 다음 워드 경계까지의 위치 반환\r\n\r\n| 상황 | 동작 |\r\n|---|---|\r\n| 가로 공백 (` `, `\\t`) | 먼저 모두 건너뛴다 |\r\n| 그다음 글자가 `\\n` | 캐럿이 `\\n` 바로 위면 한 칸 (개행 한 번에 통과). 공백을 건너온 결과면 `\\n` 직전에 멈춤 |\r\n| 그다음 글자가 단어/구두점 | 같은 클래스가 이어지는 동안 진행 |\r\n\r\n---\r\n\r\n## `prevBoundary`\r\n\r\n```kotlin\r\nfun prevBoundary(text: String, offset: Int): Int\r\n```\r\n\r\n대칭. 가로 공백을 먼저 뒤로 건너뛰고, 그다음 클래스를 한 덩어리 묶는다\r\n\r\n---\r\n\r\n## `deleteWordBackward` / `deleteWordForward`\r\n\r\n```kotlin\r\nfun deleteWordBackward(edit: TextEdit): TextEdit?\r\nfun deleteWordForward(edit: TextEdit): TextEdit?\r\n```\r\n\r\n단일 캐럿 (`selectionStart == selectionEnd`) 일 때만 동작. 선택 영역이 있으면 `null` → 호출자가 기본 Backspace/Delete 동작 (선택 삭제) 으로 폴백\r\n\r\n| 입력 | 결과 |\r\n|---|---|\r\n| `hello world|` + `Ctrl+Backspace` | `hello |` |\r\n| `|hello world` + `Ctrl+Delete` | `| world` |\r\n\r\n`Ctrl+Backspace` 가 트레일링 공백까지 한꺼번에 먹는 건 의도 — VS Code/IntelliJ 와 같은 동작\r\n\r\n---\r\n\r\n## `wordRangeAt` / `lineRangeAt`\r\n\r\n```kotlin\r\nfun wordRangeAt(text: String, offset: Int): IntRange\r\nfun lineRangeAt(text: String, offset: Int): IntRange\r\n```\r\n\r\n`offset` 위치를 포함하는 단어/줄 range. 더블 클릭 → 단어 선택, 트리플 클릭 → 줄 선택에 사용\r\n\r\n| 함수 | 동작 |\r\n|---|---|\r\n| `wordRangeAt` | WORD 런 또는 PUNCT 런 한 덩어리. 공백 / 개행 위에서는 `IntRange.EMPTY` (선택 변경 없음) |\r\n| `lineRangeAt` | 같은 줄의 시작 ~ 끝 (개행 직전까지). 빈 줄이면 빈 range |\r\n\r\n`IntRange` 는 `start until end` 스타일이라 호출자는 `TextRange(r.first, r.last + 1)` 로 변환\r\n\r\n---\r\n\r\n## `CharClass`\r\n\r\n```kotlin\r\nprivate enum class CharClass { WORD, PUNCT }\r\n```\r\n\r\n내부 분류. 가로 공백과 개행은 별도 단계로 처리하므로 enum 에 포함 안 함\r\n\r\n| 클래스 | 글자 |\r\n|---|---|\r\n| `WORD` | `Char.isLetterOrDigit()` 또는 `_` (camelCase 식별자가 한 덩어리로 잡히게) |\r\n| `PUNCT` | 그 외 |\r\n\r\n---\r\n\r\n## 사용처\r\n\r\n| 위치 | 키 / 입력 |\r\n|---|---|\r\n| `page.app.EditorPanel` `handleWordShortcut` | `Ctrl+←/→`, `Ctrl+Shift+←/→`, `Ctrl+Backspace`, `Ctrl+Delete` |\r\n| `page.app.EditorPanel` 마우스 핸들러 | 더블 클릭 (`wordRangeAt`), 트리플 클릭 (`lineRangeAt`) |\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/editor/word_boundary_en.md":"# WordBoundary\r\n\r\n> 한국어: [word_boundary.md](https://monkshark.github.io/page-ide/#modules/editor/word_boundary.md)\r\n\r\n> `page/editor/src/main/kotlin/page/editor/WordBoundary.kt` — Word-wise caret motion / deletion / double·triple-click selection ranges\r\n\r\nBoundary math for `Ctrl+←/→` (move), `Ctrl+Shift+←/→` (select), `Ctrl+Backspace/Delete` (word delete), and double / triple click (select word / line). VS Code-style classes — word (alnum + `_`) / punctuation / horizontal space / newline.\r\n\r\n---\r\n\r\n## `nextBoundary`\r\n\r\n```kotlin\r\nfun nextBoundary(text: String, offset: Int): Int\r\n```\r\n\r\nReturns the next word boundary to the right of `offset`.\r\n\r\n| Case | Behavior |\r\n|---|---|\r\n| Horizontal space (` `, `\\t`) | Skipped first |\r\n| Next char is `\\n` | If the caret was directly on it, advances one (jumps the newline). If reached after skipping spaces, stops just before |\r\n| Next char is word/punct | Consumes the run of the same class |\r\n\r\n---\r\n\r\n## `prevBoundary`\r\n\r\n```kotlin\r\nfun prevBoundary(text: String, offset: Int): Int\r\n```\r\n\r\nMirror image. Skips trailing horizontal space backward, then groups one class run.\r\n\r\n---\r\n\r\n## `deleteWordBackward` / `deleteWordForward`\r\n\r\n```kotlin\r\nfun deleteWordBackward(edit: TextEdit): TextEdit?\r\nfun deleteWordForward(edit: TextEdit): TextEdit?\r\n```\r\n\r\nOnly act on a single caret (`selectionStart == selectionEnd`). With a selection they return `null` so the caller falls back to default Backspace/Delete (delete selection).\r\n\r\n| Input | Result |\r\n|---|---|\r\n| `hello world|` + `Ctrl+Backspace` | `hello |` |\r\n| `|hello world` + `Ctrl+Delete` | `| world` |\r\n\r\n`Ctrl+Backspace` swallowing trailing spaces is intentional — matches VS Code / IntelliJ.\r\n\r\n---\r\n\r\n## `wordRangeAt` / `lineRangeAt`\r\n\r\n```kotlin\r\nfun wordRangeAt(text: String, offset: Int): IntRange\r\nfun lineRangeAt(text: String, offset: Int): IntRange\r\n```\r\n\r\nRange of the word / line covering `offset`. Used by double-click (word select) and triple-click (line select).\r\n\r\n| Function | Behavior |\r\n|---|---|\r\n| `wordRangeAt` | The WORD run or PUNCT run covering `offset`. On whitespace / newline returns `IntRange.EMPTY` (caller leaves selection alone) |\r\n| `lineRangeAt` | Start to end of the line containing `offset` (excludes the trailing `\\n`). Empty line returns an empty range |\r\n\r\nRanges are `start until end` style; callers convert with `TextRange(r.first, r.last + 1)`.\r\n\r\n---\r\n\r\n## `CharClass`\r\n\r\n```kotlin\r\nprivate enum class CharClass { WORD, PUNCT }\r\n```\r\n\r\nInternal classification. Horizontal space and newline are handled separately, so they're not enum members.\r\n\r\n| Class | Chars |\r\n|---|---|\r\n| `WORD` | `Char.isLetterOrDigit()` or `_` (so a camelCase identifier sticks together) |\r\n| `PUNCT` | Everything else |\r\n\r\n---\r\n\r\n## Usage\r\n\r\n| Location | Keys / Input |\r\n|---|---|\r\n| `page.app.EditorPanel` `handleWordShortcut` | `Ctrl+←/→`, `Ctrl+Shift+←/→`, `Ctrl+Backspace`, `Ctrl+Delete` |\r\n| `page.app.EditorPanel` mouse handler | Double click (`wordRangeAt`), triple click (`lineRangeAt`) |\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/git/main.md":"# Git\r\n\r\n> `page:git` — 워크스페이스의 VCS 상태. `git status`를 읽어 파일별 변경 종류를 제공\r\n\r\n에디터 트리와 Atlas 그래프는 \"이 파일이 커밋 대비 바뀌었나\"를 표시해야 한다. 그 판정의 단일 출처가 이 모듈이다. Git 저장소에 `git status`를 돌려 파일별 변경 종류를 뽑고, 결과를 짧게 캐시해 여러 화면이 같은 스냅샷을 공유한다.\r\n\r\n> English: [main_en.md](https://monkshark.github.io/page-ide/#modules/git/main_en.md)\r\n\r\n---\r\n\r\n## 구성\r\n\r\n모듈은 인터페이스 하나와 구현 하나로 얇다.\r\n\r\n```mermaid\r\nflowchart LR\r\n    repo[\"git 저장소\"] --> gsp[\"GitStatusProvider<br/>git status 실행·캐시\"]\r\n    gsp --> ui[\"파일 트리 · Atlas VcsOverlay\"]\r\n```\r\n\r\n| 요소 | 역할 |\r\n|---|---|\r\n| `VcsStatusProvider` | 상태 조회 인터페이스 (`statuses()` · `refresh()`) |\r\n| `GitStatusKind` | 변경 종류 enum (MODIFIED · ADDED · DELETED · RENAMED · UNTRACKED) |\r\n| `GitStatusProvider` | `git status`를 실행하고 결과를 TTL 캐시로 보관하는 구현 |\r\n| `parseGitStatus` | porcelain 출력을 파일 경로 → 종류 맵으로 파싱 |\r\n\r\n---\r\n\r\n## 상태 조회\r\n\r\n`VcsStatusProvider`는 상태의 소비자와 공급자를 가른다.\r\n\r\n```kotlin\r\ninterface VcsStatusProvider {\r\n    fun statuses(): Map<Path, GitStatusKind>\r\n    fun refresh()\r\n}\r\n```\r\n\r\n`statuses()`는 워크스페이스 루트 기준의 절대 경로를 키로, 변경 종류를 값으로 돌려준다. 트리 행이나 그래프 노드는 자기 경로를 이 맵에서 찾아 배지를 그린다.\r\n\r\n---\r\n\r\n## GitStatusProvider — 실행과 캐시\r\n\r\n구현체는 `git status --porcelain=v1 -z`를 서브프로세스로 돌린다. JGit 같은 라이브러리 대신 시스템 `git` 실행 파일을 직접 부르므로, 사용자가 쓰는 것과 같은 Git 설정·자격 증명·ignore 규칙을 그대로 따른다.\r\n\r\n같은 상태를 화면 여러 곳이 동시에 물어보므로, 결과는 기본 30초(`ttlMs`) TTL 캐시에 담긴다. 캐시가 살아 있으면 `statuses()`는 프로세스를 다시 띄우지 않고 바로 돌려준다. 파일을 저장하거나 스테이지가 바뀌어 즉시 갱신이 필요하면 `refresh()`로 캐시를 비운다.\r\n\r\n생성자는 `clock`과 `runGit`을 파라미터로 받아, 테스트에서 실제 프로세스 실행 없이 출력 문자열과 시간을 주입할 수 있다.\r\n\r\n---\r\n\r\n## parseGitStatus — porcelain 파싱\r\n\r\n`-z` 플래그로 받은 출력은 NUL로 구분되고 각 항목이 두 글자 상태 코드로 시작한다. `parseGitStatus(output, root)`가 이를 순회하며 코드를 `GitStatusKind`로 매핑하고, 경로를 루트 기준 절대 경로로 정규화한다. 이름이 바뀐 항목(`R`)은 원본과 대상 두 경로가 함께 오므로 그 형식도 처리한다.\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/git/main_en.md":"# Git\r\n\r\n> `page:git` — the workspace VCS status. Reads `git status` to report per-file change kinds\r\n\r\nThe editor tree and the Atlas graph both need to show whether a file has changed against the last commit. This module is the single source for that decision. It runs `git status` over a Git repository, extracts a per-file change kind, and caches the result briefly so several views share one snapshot.\r\n\r\n> 한국어: [main.md](https://monkshark.github.io/page-ide/#modules/git/main.md)\r\n\r\n---\r\n\r\n## Structure\r\n\r\nThe module is thin: one interface, one implementation.\r\n\r\n```mermaid\r\nflowchart LR\r\n    repo[\"git repository\"] --> gsp[\"GitStatusProvider<br/>run git status · cache\"]\r\n    gsp --> ui[\"file tree · Atlas VcsOverlay\"]\r\n```\r\n\r\n| Element | Role |\r\n|---|---|\r\n| `VcsStatusProvider` | Query interface (`statuses()` · `refresh()`) |\r\n| `GitStatusKind` | Change-kind enum (MODIFIED · ADDED · DELETED · RENAMED · UNTRACKED) |\r\n| `GitStatusProvider` | Implementation that runs `git status` and keeps the result in a TTL cache |\r\n| `parseGitStatus` | Parses porcelain output into a path → kind map |\r\n\r\n---\r\n\r\n## Querying status\r\n\r\n`VcsStatusProvider` separates the consumer of status from its producer.\r\n\r\n```kotlin\r\ninterface VcsStatusProvider {\r\n    fun statuses(): Map<Path, GitStatusKind>\r\n    fun refresh()\r\n}\r\n```\r\n\r\n`statuses()` returns a map keyed by absolute path (relative to the workspace root) with the change kind as the value. A tree row or a graph node looks up its own path in this map to draw a badge.\r\n\r\n---\r\n\r\n## GitStatusProvider — running and caching\r\n\r\nThe implementation runs `git status --porcelain=v1 -z` as a subprocess. Rather than a library like JGit, it calls the system `git` executable directly, so it honors exactly the same Git config, credentials, and ignore rules the user already uses.\r\n\r\nBecause many views ask for the same status at once, the result is held in a TTL cache (30 seconds by default, `ttlMs`). While the cache is warm, `statuses()` returns immediately without re-spawning the process. When an edit is saved or the stage changes and a fresh read is needed, `refresh()` clears the cache.\r\n\r\nThe constructor takes `clock` and `runGit` as parameters, so tests can inject an output string and a time source without launching a real process.\r\n\r\n---\r\n\r\n## parseGitStatus — parsing porcelain\r\n\r\nOutput from the `-z` flag is NUL-delimited, with each entry beginning with a two-character status code. `parseGitStatus(output, root)` walks these entries, maps each code to a `GitStatusKind`, and normalizes the path to an absolute path under the root. Renamed entries (`R`) arrive with both an origin and a target path, so that form is handled too.\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/language/main.md":"# Language\r\n\r\n> `page:language` — 언어 지능 오케스트레이션. 파일을 서버에 잇고, 문서 동기화·완성·진단의 생명주기를 관리\r\n\r\n[`page:lsp`](https://monkshark.github.io/page-ide/#modules/lsp/main.md)가 서버와 말하는 프로토콜 층이라면, 이 모듈은 그 위에서 IDE가 실제로 쓰는 오케스트레이션 층이다. 열린 파일을 알맞은 서버로 라우팅하고, 문서 변경을 debounce로 밀어 넣고, 완성 결과를 캐시하고, 서버가 못 주는 결과는 텍스트 스캔으로 메운다.\r\n\r\n> English: [main_en.md](https://monkshark.github.io/page-ide/#modules/language/main_en.md)\r\n\r\n---\r\n\r\n## 구성\r\n\r\n```mermaid\r\nflowchart TB\r\n    file[\"열린 파일\"] --> router[\"LspRouter<br/>파일→백엔드 라우팅\"]\r\n    router --> controller[\"LspController<br/>서버별 생명주기·요청·캐시\"]\r\n    controller --> lsp[\"page:lsp 클라이언트\"]\r\n    controller --> scan[\"LspTextScan<br/>렉서 기반 텍스트 스캔\"]\r\n    controller --> diag[\"LspDiagnosticsSupport<br/>진단 정규화·배칭\"]\r\n```\r\n\r\n| 요소 | 역할 |\r\n|---|---|\r\n| `LspRouter` | 파일 확장자로 백엔드를 골라 백엔드별 컨트롤러를 lazy 생성·공유 |\r\n| `LspController` | 한 언어 서버의 생명주기와 모든 요청, 캐시, capability를 관리 |\r\n| `LspServerCapabilities` | 서버 capability에서 지원 기능을 감지 |\r\n| `LspDiagnosticsSupport` | 진단 URI 정규화·배칭·lsp4j 변환 |\r\n| `LspTextScan` | 로컬 참조·이름 변경용 렉서 텍스트 스캔 |\r\n\r\n---\r\n\r\n## LspRouter — 파일에서 서버로\r\n\r\n`LspRouter(workspaceRoot, parentScope)`는 열린 파일을 알맞은 백엔드로 잇는다. `LspBackends.forFile`로 파일의 백엔드를 판정하고, 백엔드 id마다 `LspController`를 하나씩 `getOrPut`으로 만들어 재사용한다. Kotlin 파일 열 때 뜬 KLS 컨트롤러는 다음 Kotlin 파일에도 그대로 쓰인다.\r\n\r\nCompose에서는 `rememberLspRouter(workspaceRoot)`로 라우터를 워크스페이스 수명에 묶는다. 파일 이름 변경은 `notifyFilesRenamed`로 서버에 알리고, 전체 재시작·종료도 라우터가 관장한다. 여러 서버의 진단은 `allDiagnosticsByUri`로 합쳐 에디터가 한곳에서 읽는다.\r\n\r\n---\r\n\r\n## LspController — 서버별 오케스트레이션\r\n\r\n`LspController(workspaceRoot, scope)`가 이 모듈의 핵심이다. 한 언어 서버의 상태(`IDLE` · `STARTING` · `READY` · `MISSING` · `FAILED`)를 들고, 서버가 뜨는 동안 진행 상황과 타임아웃을 추적한다.\r\n\r\n문서 동기화는 `didOpen` · `didChange` · `didSave` · `didClose`로 흐른다. 타건마다 서버를 때리지 않도록 `didChange`는 250ms debounce로 묶는다. 그 위에 IDE 기능 전부가 요청으로 올라간다.\r\n\r\n| 기능 | 보강 |\r\n|---|---|\r\n| 완성(completion) | 결과 캐시 + 접두어 연장 재사용, 키워드·import 후보 병합, 접두어 정렬 |\r\n| 정의·참조 | 서버 결과 + 로컬 심볼은 텍스트 스캔으로 보완 |\r\n| 심볼·콜 계층 | 문서 심볼, prepare/incoming/outgoing 호출 |\r\n| 코드 액션 | 서버 액션 + `PageQuickFixes` 합성 |\r\n| 인레이 힌트·시그니처 | 힌트 캐시, 시그니처 도움말 |\r\n| 이름 변경 | `prepareRename` + 서버 미지원 시 텍스트 스캔 폴백 |\r\n\r\n서버가 어떤 기능을 지원하는지는 `LspServerCapabilities`가 초기화 응답에서 감지해 플래그로 들고, 미지원 기능은 요청조차 보내지 않는다. Java처럼 컴파일러 정책을 요구하는 서버에는 `java.project.updateSettings` 같은 설정을 실어 보낸다.\r\n\r\n---\r\n\r\n## 텍스트 스캔과 진단 정규화\r\n\r\n서버가 로컬 변수·비공개 심볼의 참조를 다 주지 못하는 경우가 있다. `LspTextScan`은 에디터 렉서로 소스를 훑어 워드 경계를 맞추고, 문자열·주석 구간을 제외하고, 감싸는 함수 범위를 찾아 로컬 참조와 이름 변경 범위를 보완한다.\r\n\r\n`LspDiagnosticsSupport`는 진단을 IDE가 쓰기 좋게 정규화한다. Windows에서 드라이브 문자 대소문자가 어긋나 진단이 엉뚱한 URI에 붙는 문제를 `canonicalUri`로 바로잡고, 쏟아지는 진단을 배치로 묶어 흘린다.\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/language/main_en.md":"# Language\r\n\r\n> `page:language` — language-intelligence orchestration. Routes files to servers and manages the lifecycle of document sync, completion, and diagnostics\r\n\r\nIf [`page:lsp`](https://monkshark.github.io/page-ide/#modules/lsp/main_en.md) is the protocol layer that talks to servers, this module is the orchestration layer the IDE actually uses on top of it. It routes open files to the right server, pushes document changes through with debouncing, caches completion results, and fills gaps the server cannot answer with text scanning.\r\n\r\n> 한국어: [main.md](https://monkshark.github.io/page-ide/#modules/language/main.md)\r\n\r\n---\r\n\r\n## Structure\r\n\r\n```mermaid\r\nflowchart TB\r\n    file[\"open file\"] --> router[\"LspRouter<br/>file→backend routing\"]\r\n    router --> controller[\"LspController<br/>per-server lifecycle · requests · cache\"]\r\n    controller --> lsp[\"page:lsp client\"]\r\n    controller --> scan[\"LspTextScan<br/>lexer-based text scan\"]\r\n    controller --> diag[\"LspDiagnosticsSupport<br/>diagnostic normalize · batch\"]\r\n```\r\n\r\n| Element | Role |\r\n|---|---|\r\n| `LspRouter` | Picks a backend by file extension and lazily creates/shares a per-backend controller |\r\n| `LspController` | Manages one language server's lifecycle, all requests, caches, and capabilities |\r\n| `LspServerCapabilities` | Detects supported features from server capabilities |\r\n| `LspDiagnosticsSupport` | Normalizes diagnostic URIs, batches them, converts lsp4j |\r\n| `LspTextScan` | Lexer-based text scan for local references and rename |\r\n\r\n---\r\n\r\n## LspRouter — from file to server\r\n\r\n`LspRouter(workspaceRoot, parentScope)` binds an open file to the right backend. It decides the file's backend via `LspBackends.forFile` and creates one `LspController` per backend id with `getOrPut`, reusing it. The KLS controller spawned when opening a Kotlin file is reused for the next Kotlin file.\r\n\r\nIn Compose, `rememberLspRouter(workspaceRoot)` ties the router to the workspace lifetime. File renames are announced to the server via `notifyFilesRenamed`, and full restart and shutdown are also governed by the router. Diagnostics from multiple servers are merged into `allDiagnosticsByUri` so the editor reads them from one place.\r\n\r\n---\r\n\r\n## LspController — per-server orchestration\r\n\r\n`LspController(workspaceRoot, scope)` is the heart of this module. It holds one language server's state (`IDLE` · `STARTING` · `READY` · `MISSING` · `FAILED`) and tracks progress and timeouts while the server comes up.\r\n\r\nDocument sync flows through `didOpen` · `didChange` · `didSave` · `didClose`. To avoid hitting the server on every keystroke, `didChange` is coalesced with a 250 ms debounce. On top of that, every IDE feature rides as a request.\r\n\r\n| Feature | Augmentation |\r\n|---|---|\r\n| Completion | Result cache + prefix-extend reuse, keyword/import candidate merge, prefix sort |\r\n| Definition · references | Server result + local symbols filled in by text scan |\r\n| Symbols · call hierarchy | Document symbols, prepare/incoming/outgoing calls |\r\n| Code actions | Server actions + `PageQuickFixes` synthesis |\r\n| Inlay hints · signature | Hint cache, signature help |\r\n| Rename | `prepareRename` + text-scan fallback when unsupported |\r\n\r\nWhich features a server supports is detected from the initialize response by `LspServerCapabilities` and held as flags; unsupported features are never even requested. Servers that require a compiler policy, like Java, are sent settings such as `java.project.updateSettings`.\r\n\r\n---\r\n\r\n## Text scan and diagnostic normalization\r\n\r\nSometimes a server cannot report every reference to a local variable or private symbol. `LspTextScan` walks the source with the editor lexer, aligning word boundaries, excluding string and comment ranges, and finding the enclosing function range to fill in local references and rename ranges.\r\n\r\n`LspDiagnosticsSupport` normalizes diagnostics into a form the IDE can use. It fixes, via `canonicalUri`, the case where a mismatched Windows drive-letter case attaches diagnostics to the wrong URI, and it batches bursts of diagnostics before flushing them.\r\n\r\n---\r\n\r\n- [Back to index](https://monkshark.github.io/page-ide/#README_en.md)\r\n","modules/lsp/main.md":"# LSP\r\n\r\n> `page:lsp` — Language Server Protocol 클라이언트 층. 서버를 띄우고, 프로토콜로 말하고, 언어별 백엔드를 등록\r\n\r\n코드 완성·정의 이동·진단은 언어마다 다른 서버가 만든다. 이 모듈은 그 서버들과 LSP로 대화하는 클라이언트 층이다. 서버 프로세스를 띄우는 전송, 초기화와 요청을 처리하는 클라이언트, 언어를 서버에 잇는 백엔드, 그리고 완성·호버·정의 같은 기능별 요청 빌더로 나뉜다.\r\n\r\n상위 IDE 오케스트레이션(컨트롤러 생명주기·라우팅·캐시)은 [`page:language`](https://monkshark.github.io/page-ide/#modules/language/main.md)가 이 층 위에 얹는다.\r\n\r\n> English: [main_en.md](https://monkshark.github.io/page-ide/#modules/lsp/main_en.md)\r\n\r\n---\r\n\r\n## 구성\r\n\r\n```mermaid\r\nflowchart TB\r\n    reg[\"LspBackends · LanguageRegistry<br/>언어→서버 등록\"] --> backend[\"LanguageBackend<br/>실행 파일 해석·spawn\"]\r\n    backend --> client[\"LspClient<br/>초기화·capability·리스너\"]\r\n    client --> transport[\"LspTransport<br/>프로세스 stdio\"]\r\n    client --> features[\"기능별 요청<br/>Completion · Hover · …\"]\r\n```\r\n\r\n| 층 | 역할 |\r\n|---|---|\r\n| 등록 | `LanguageBackend`/`LspBackends`, `LanguageRegistry`/`LanguageDefinition` — 어떤 확장자를 어떤 서버가 맡는지 |\r\n| 클라이언트 | `LspClient` — lsp4j `LanguageClient` 구현, 초기화·capability·서버 알림 수신 |\r\n| 전송 | `LspTransport`(`StreamTransport`·`ProcessTransport`) — 서버 프로세스의 stdin/stdout |\r\n| 기능 | `Completion`·`Hover`·`Definition`·`References`·`Rename`·`SignatureHelp`·`Symbols`·`CallHierarchy`·`InlayHints`·`CodeActions`·`Diagnostic` 등 요청 빌더 |\r\n| 보강 | `CompletionProfile`·`CompletionAugmentor`·`PageQuickFixes` — 서버 응답에 키워드·import·퀵픽스를 더함 |\r\n\r\n---\r\n\r\n## 백엔드 등록\r\n\r\n`LanguageBackend`는 한 언어를 서버에 잇는 인터페이스다.\r\n\r\n```kotlin\r\ninterface LanguageBackend {\r\n    val id: String\r\n    val displayName: String\r\n    fun supports(extension: String?): Boolean\r\n    fun resolveExecutable(env: Map<String, String>): Resolution\r\n    fun spawn(executable: Path, workspaceRoot: Path?, ...): LspClient\r\n}\r\n```\r\n\r\n`resolveExecutable`은 서버 실행 파일을 찾아 `Found`/`NotFound`를 돌려주고, `spawn`은 그 실행 파일로 프로세스를 띄워 연결된 `LspClient`를 만든다. `LspBackends`는 등록된 백엔드를 모아 파일 경로로 알맞은 백엔드를 고른다(`forFile`). 라우팅을 가로챌 필요가 있으면 `routingInterceptor`로 확장자 기본 규칙보다 먼저 판정을 끼워 넣는다.\r\n\r\n언어의 정적 메타데이터(확장자, 서버 바이너리 이름, OS별 설치 안내, 실행 인자)는 `LanguageRegistry`가 리소스의 `languages.json`을 읽어 `LanguageDefinition` 목록으로 제공한다. 코드가 아니라 데이터로 언어를 늘릴 수 있게 한 지점이다.\r\n\r\n---\r\n\r\n## LspClient — 클라이언트와 초기화\r\n\r\n`LspClient`는 lsp4j `LanguageClient`를 구현한다. `start()`는 런처를 만들어 서버 프록시를 얻고, `initialize`로 클라이언트 capability를 알린다. 완성 스니펫·resolve, 코드 액션 리터럴·resolve, 콜 계층, 진단 태그(`Unnecessary`·`Deprecated`), `applyEdit`, 작업 진행률(work-done progress)까지 선언해 서버 기능을 최대한 끌어 쓴다.\r\n\r\n서버가 보내는 비동기 알림은 리스너로 흘린다. `onDiagnostics`·`onLogMessage`·`onShowMessage`·`onProgress`·`onApplyEdit`로 구독한다. 상태는 `LspState`로 관리하고, 종료는 정상 `shutdown()`과 강제 `forceClose()` 두 갈래다. JDT-LS의 비표준 알림(`language/status` 등)도 조용히 받아 넘긴다.\r\n\r\n---\r\n\r\n## LspTransport — 프로세스 stdio\r\n\r\n`ProcessTransport`는 서버 프로세스의 stdin/stdout을 클라이언트에 잇고, stderr는 데몬 스레드로 퍼 올려 로그로 흘린다. 종료 시 프로세스 트리를 정리하는데, Windows에서는 `taskkill /F /T`로 자식까지 강제 종료하고, 그 외 OS에서는 자손 프로세스를 destroy한다. 서버가 좀비로 남지 않게 하는 지점이다.\r\n\r\n---\r\n\r\n## 기능별 요청과 보강\r\n\r\n완성·호버·정의·참조·이름 변경·시그니처 도움말·심볼·콜 계층·인레이 힌트·코드 액션·진단은 각각 파일로 나뉘어 lsp4j 요청을 만들고 응답을 IDE가 쓰기 좋은 형태로 옮긴다.\r\n\r\n서버 응답만으로 부족한 부분은 이 층에서 보강한다. `CompletionProfile`은 언어별 키워드 셋과 auto-import 지원 여부를 담고, `CompletionAugmentor`는 완성 목록에 키워드와 (워크스페이스 심볼로 찾은) import 후보를 끼워 넣는다. `PageQuickFixes`는 서버가 주지 않는 퀵픽스를 합성한다. `CompletionFrecency`는 자주·최근 고른 항목을 위로 올린다.\r\n\r\n---\r\n\r\n- [목차로 돌아가기](https://monkshark.github.io/page-ide/#README_kr.md)\r\n","modules/lsp/main_en.md":"# LSP\r\n\r\n> `page:lsp` — the Language Server Protocol client layer. Spawns servers, speaks the protocol, and registers per-language backends\r\n\r\nCompletion, go-to-definition, and diagnostics are produced by a different server for each language. This module is the client layer that talks to those servers over LSP. It divides into the transport that spawns the server process, the client that handles initialization and requests, the backend that binds a language to a server, and per-feature request builders for completion, hover, definition, and the rest.\r\n\r\nThe higher-level IDE orchestration (controller lifecycle, routing, caching) sits on top of this layer in [`page:language`](https://monkshark.github.io/page-ide/#modules/language/main_en.md).\r\n\r\n> 한국어: [main.md](https://monkshark.github.io/page-ide/#modules/lsp/main.md)\r\n\r\n---\r\n\r\n## Structure\r\n\r\n```mermaid\r\nflowchart TB\r\n    reg[\"LspBackends · LanguageRegistry<br/>language→server registry\"] --> backend[\"LanguageBackend<br/>resolve executable · spawn\"]\r\n    backend --> client[\"LspClient<br/>init · capabilities · listeners\"]\r\n    client --> transport[\"LspTransport<br/>process stdio\"]\r\n    client --> features[\"per-feature requests<br/>Completion · Hover · …\"]\r\n```\r\n\r\n| Layer | Role |\r\n|---|---|\r\n| Registry | `LanguageBackend`/`LspBackends`, `LanguageRegistry`/`LanguageDefinition` — which extension is served by which server |\r\n| Client | `LspClient` — lsp4j `LanguageClient` implementation: init, capabilities, receiving server notifications |\r\n| Transport | `LspTransport` (`StreamTransport` · `ProcessTransport`) — the server process's stdin/stdout |\r\n| Features | `Completion` · `Hover` · `Definition` · `References` · `Rename` · `SignatureHelp` · `Symbols` · `CallHierarchy` · `InlayHints` · `CodeActions` · `Diagnostic` request builders |\r\n| Augmentation | `CompletionProfile` · `CompletionAugmentor` · `PageQuickFixes` — add keywords, imports, and quick fixes to server responses |\r\n\r\n---\r\n\r\n## Registering backends\r\n\r\n`LanguageBackend` is the interface that binds one language to a server.\r\n\r\n```kotlin\r\ninterface LanguageBackend {\r\n    val id: String\r\n    val displayName: String\r\n    fun supports(extension: String?): Boolean\r\n    fun resolveExecutable(env: Map<String, String>): Resolution\r\n    fun spawn(executable: Path, workspaceRoot: Path?, ...): LspClient\r\n}\r\n```\r\n\r\n`resolveExecutable` locates the server executable and returns `Found`/`NotFound`; `spawn` launches a process from that executable and produces a connected `LspClient`. `LspBackends` collects re
