<!DOCTYPE html>
<html lang="en">
<head>

<title>Docs — PAGE IDE</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>

<style>
:root{--bg:#0d1117;--sidebar-bg:#161b22;--card-bg:#1c2128;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;--accent-dim:#1f6feb33;--pre-bg:#1e2228;--inline-code:#e6d9a2;--code-text:#abb2bf;--badge-bg:#282c34;--copy-bg:#2d333b;--mermaid-bg:#ffffff;--shadow:rgba(0,0,0,.4);color-scheme:dark}
html[data-theme="light"]{--bg:#ffffff;--sidebar-bg:#f6f8fa;--card-bg:#eaeef2;--border:#d0d7de;--text:#1f2328;--muted:#59636e;--accent:#0969da;--accent-dim:#0969da1a;--pre-bg:#f6f8fa;--inline-code:#953800;--code-text:#1f2328;--badge-bg:#eaeef2;--copy-bg:#ffffff;--mermaid-bg:#fafbfc;--shadow:rgba(0,0,0,.15);color-scheme:light}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
.sidebar{width:280px;min-width:280px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sidebar-header h1{font-size:15px;font-weight:600}
.lang-toggle{display:inline-flex;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.lang-btn{background:transparent;border:none;color:var(--muted);font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer;transition:background .15s,color .15s}
.lang-btn.active{background:var(--accent-dim);color:var(--accent)}
.lang-btn:not(.active):hover{color:var(--text)}
.search-box{width:100%;padding:7px 10px;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--muted)}
.nav-list{flex:1;overflow-y:auto;padding:8px 0}
.nav-group{padding:0 8px;margin-bottom:4px}
.nav-section{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text);padding:14px 16px 6px;margin-top:8px;border-top:1px solid var(--accent-dim)}
.nav-group-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:8px 8px 4px;display:flex;align-items:center;gap:7px;user-select:none;border-radius:6px}
.nav-group-title.module{color:var(--text);font-weight:700;font-size:12.5px;letter-spacing:.3px;cursor:pointer;transition:background .15s}
.nav-group-title.module:hover{background:var(--accent-dim)}
.nav-group-title.module::before{content:"";width:3px;height:13px;border-radius:2px;background:var(--accent);flex:none}
.nav-chevron{margin-left:auto;display:inline-flex;align-items:center;color:var(--muted);opacity:.65;transition:transform .25s ease,opacity .15s;transform:rotate(90deg)}
.nav-chevron svg{display:block}
.nav-group-title.module:hover .nav-chevron{opacity:1}
.nav-group.collapsed .nav-chevron{transform:rotate(0deg)}
.nav-group-items{overflow:hidden;max-height:1600px;opacity:1;transform:translateY(0);transition:max-height .28s ease,opacity .22s ease,transform .28s ease}
.nav-group.collapsed .nav-group-items{max-height:0;opacity:0;transform:translateY(-6px)}
.nav-item{display:block;padding:6px 12px;font-size:13px;color:var(--muted);text-decoration:none;border-radius:6px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .15s}
.nav-item:hover{background:var(--accent-dim);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:500}
.content{flex:1;overflow-y:auto;padding:40px;scroll-behavior:smooth;display:flex;justify-content:center;gap:36px;align-items:flex-start}
.content-inner{flex:1 1 auto;min-width:0;max-width:860px;padding-bottom:40vh}
.toc{width:200px;flex:none;position:sticky;top:40px;align-self:flex-start;max-height:calc(100vh - 80px);overflow-y:auto;padding-left:14px;border-left:1px solid var(--border)}
.toc-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:8px}
.toc a{display:block;color:var(--muted);text-decoration:none;font-size:12.5px;line-height:1.45;padding:4px 0 4px 12px;margin-left:-14px;border-left:2px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .12s,border-color .12s}
.toc a.lvl3{padding-left:24px;font-size:12px}
.toc a:hover{color:var(--text)}
.toc a.active{color:var(--accent);border-left-color:var(--accent)}
@media(max-width:1100px){.toc{display:none}}
.welcome{text-align:center;padding:120px 20px;color:var(--muted)}
.welcome h2{font-size:20px;margin-bottom:8px;color:var(--text)}
.welcome p{font-size:14px}
.md h1{font-size:28px;font-weight:600;margin:0 0 16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.md h2{font-size:22px;font-weight:600;margin:28px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.md h3{font-size:17px;font-weight:600;margin:24px 0 8px}
.md h4{font-size:15px;font-weight:600;margin:20px 0 6px}
.md p{font-size:14px;line-height:1.7;margin:0 0 12px}
.md a{color:var(--accent);text-decoration:none}
.md a:hover{text-decoration:underline}
.md ul,.md ol{padding-left:24px;margin:0 0 12px}
.md li{font-size:14px;line-height:1.7;margin:2px 0}
.md code{background:var(--card-bg);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'JetBrains Mono','Fira Code',Consolas,monospace;color:var(--inline-code)}
.md pre{background:var(--pre-bg);border:1px solid var(--border);border-radius:8px;margin:0 0 16px;overflow:hidden;position:relative}
.md pre code{background:none;padding:16px;font-size:13px;line-height:1.55;display:block;overflow-x:auto;font-family:'JetBrains Mono','Fira Code',Consolas,monospace;color:var(--code-text)}
.md pre code.hljs{background:none;padding:16px}
.md pre .code-lang{position:absolute;top:0;right:44px;font-size:11px;color:var(--muted);background:var(--badge-bg);padding:2px 8px;border-radius:0 0 4px 4px;font-family:'JetBrains Mono',monospace;text-transform:lowercase;letter-spacing:.3px;user-select:none;pointer-events:none}
.md pre .copy-btn{position:absolute;top:6px;right:6px;background:var(--copy-bg);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;opacity:0;transition:opacity .15s,background .15s,color .15s;font-family:inherit}
.md pre:hover .copy-btn{opacity:1}
.md pre .copy-btn:hover{background:var(--accent-dim);color:var(--text);border-color:var(--accent)}
.md pre .copy-btn.ok{color:#2ea043;border-color:#2ea043}
.md pre.mermaid{background:var(--mermaid-bg);text-align:center;padding:16px;border-color:var(--border)}
.md pre.mermaid svg{max-width:100%;height:auto}
.md .page-widget{margin:18px 0}
.atlas-graph{width:100%;height:460px;display:block;border:1px solid var(--border);border-radius:14px;background:var(--card-bg);cursor:grab;touch-action:none}
.atlas-graph:active{cursor:grabbing}
.atlas-edge{stroke:var(--muted);stroke-width:1.4;opacity:.45;transition:opacity .15s,stroke .15s,stroke-width .15s}
.atlas-edge.hot{stroke:var(--accent);opacity:.95;stroke-width:2}
.atlas-edge.dim{opacity:.06}
.atlas-node{cursor:pointer}
.atlas-node rect{fill:var(--pre-bg);stroke:var(--border);stroke-width:1.4;transition:stroke .15s,fill .15s}
.atlas-node text{fill:var(--text);font:600 12px system-ui,sans-serif}
.atlas-node.hot rect{stroke:var(--accent);fill:var(--accent-dim)}
.atlas-node.dim{opacity:.3}
.atlas-caption{color:var(--muted);font-size:12px;margin-top:8px;text-align:center}
.md blockquote{border-left:3px solid var(--accent);padding:4px 16px;margin:0 0 12px;color:var(--muted)}
.md table{width:100%;border-collapse:collapse;margin:0 0 16px;font-size:13px}
.md th,.md td{padding:8px 12px;border:1px solid var(--border);text-align:left}
.md th{background:var(--card-bg);font-weight:600}
.md hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.md img{max-width:100%;border-radius:8px}
.md details{margin:0 0 12px}
.md summary{cursor:pointer;font-weight:600;font-size:14px;padding:6px 0}
.md details[open] summary{margin-bottom:8px}
.breadcrumb{font-size:12px;color:var(--muted);margin-bottom:20px}
.breadcrumb a{color:var(--accent);text-decoration:none}
.breadcrumb a:hover{text-decoration:underline}
.nav-btns{display:inline-flex;gap:4px;margin-right:10px;vertical-align:middle}
.nav-btn{background:var(--card-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);width:28px;height:28px;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .15s}
.nav-btn:hover:not(:disabled){background:var(--accent-dim);border-color:var(--accent)}
.nav-btn:disabled{opacity:.3;cursor:default}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:98}
.overlay.show{display:block}
.menu-toggle{display:none;position:fixed;bottom:20px;right:20px;width:48px;height:48px;background:var(--accent);border:none;border-radius:50%;color:#fff;font-size:22px;cursor:pointer;z-index:100;box-shadow:0 4px 12px var(--shadow)}
.theme-toggle{background:var(--card-bg);border:1px solid var(--border);border-radius:6px;width:30px;height:26px;padding:0;cursor:pointer;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;margin-right:6px;transition:background .15s,color .15s,border-color .15s}
.theme-toggle:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
.theme-toggle svg{width:15px;height:15px;display:block}
.theme-toggle .icon-sun{display:none}
.theme-toggle .icon-moon{display:block}
html[data-theme="light"] .theme-toggle .icon-sun{display:block}
html[data-theme="light"] .theme-toggle .icon-moon{display:none}
@media(max-width:768px){.sidebar{position:fixed;left:-300px;top:0;bottom:0;z-index:99;transition:left .25s ease}.sidebar.open{left:0}.overlay.show{display:block}.menu-toggle{display:block}.content{padding:20px 14px}.md h1{font-size:22px}.md h2{font-size:18px}.md h3{font-size:15px}.md pre{padding:10px 12px;font-size:12px}.md table{font-size:12px;display:block;overflow-x:auto}.md th,.md td{padding:6px 8px;white-space:nowrap}}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--muted)}
.md h1,.md h2,.md h3,.md h4{position:relative}
.heading-anchor{position:absolute;left:-18px;top:.12em;font-size:.82em;font-weight:400;color:var(--muted);opacity:0;text-decoration:none;transition:opacity .12s,color .12s}
.md h1:hover>.heading-anchor,.md h2:hover>.heading-anchor,.md h3:hover>.heading-anchor,.md h4:hover>.heading-anchor{opacity:.5}
.heading-anchor:hover{opacity:1 !important;color:var(--accent)}
.src-link{float:right;font-size:12px;color:var(--muted);text-decoration:none}
.src-link:hover{color:var(--accent);text-decoration:underline}
.nav-item[data-hit="1"]::after{content:"\00b6";margin-left:6px;color:var(--accent);opacity:.6;font-size:11px}
@media(max-width:768px){.heading-anchor{display:none}}
</style>
<script>
(function(){
  try {
    var t = localStorage.getItem('docsViewerTheme');
    if(t !== 'light' && t !== 'dark') t = 'dark';
    document.documentElement.setAttribute('data-theme', t);
    var link = document.getElementById('hljsTheme');
    if(link) link.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-' + (t === 'light' ? 'light' : 'dark') + '.min.css';
  } catch(e){}
})();
</script>

<body>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-header-row">
      <h1 id="sidebarTitle">PAGE IDE Docs</h1>
      <div style="display:inline-flex;align-items:center">
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme" title="Toggle theme">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.9" y1="4.9" x2="6.9" y2="6.9"/><line x1="17.1" y1="17.1" x2="19.1" y2="19.1"/><line x1="4.9" y1="19.1" x2="6.9" y2="17.1"/><line x1="17.1" y1="6.9" x2="19.1" y2="4.9"/></svg>

<script>
/*__MD_DATA__*/

var FILES = /*__NAV_DATA__*/[];
var ATLAS_DATA = /*__ATLAS_DATA__*/null;

(function(){
  try {
    if(globalThis.markedHighlight && globalThis.hljs){
      marked.use(globalThis.markedHighlight.markedHighlight({
        langPrefix:'hljs language-',
        highlight:function(code,lang){
          try{
            if(lang === 'mermaid') return code;
            if(lang && hljs.getLanguage(lang)) return hljs.highlight(code,{language:lang}).value;
            return hljs.highlightAuto(code).value;
          }catch(e){return code;}
        }
      }));
    }
  }catch(e){ console.warn('Highlight init skipped:', e); }
  marked.use({breaks:false,gfm:true});
  function slugify(text){
    return text.toLowerCase()
      .replace(/<[^>]*>/g,'')
      .replace(/[^\w㄰-㆏가-힯一-鿿 -]/g,'')
      .replace(/ /g,'-')
      .replace(/-+$/,'');
  }
  marked.use({renderer:{code:function(code, lang){
    var raw, language;
    if(typeof code === 'object' && code !== null){
      raw = code.text || '';
      language = (code.lang || '').trim();
    } else {
      raw = code || '';
      language = (lang || '').trim();
    }
    if(language === 'mermaid'){
      var esc = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return '<pre class="mermaid">' + esc + '</pre>';
    }
    if(language === 'page-widget'){
      var name = raw.trim().split(/\r?\n/)[0].trim().replace(/[^a-z0-9_-]/gi,'');
      return '<div class="page-widget" data-widget="' + name + '"></div>';
    }
    return false;
  }}});
  try {
    if(globalThis.mermaid){
      var storedTheme = (localStorage.getItem('docsViewerTheme') === 'light') ? 'default' : 'dark';
      mermaid.initialize({startOnLoad:false, theme: storedTheme, securityLevel:'loose'});
    }
  } catch(e){ console.warn('Mermaid init skipped:', e); }

  var LANG_KEY = 'docsViewerLang';
  function getLang(){ return localStorage.getItem(LANG_KEY) === 'ko' ? 'ko' : 'en'; }
  function setLang(l){ localStorage.setItem(LANG_KEY, l === 'en' ? 'en' : 'ko'); }

  var PATH_INDEX = {};
  var PAIR = {};
  FILES.forEach(function(g){
    g.items.forEach(function(it){
      PATH_INDEX[it.pathKo] = { group:g, item:it, lang:'ko' };
      if(it.pathEn){
        PATH_INDEX[it.pathEn] = { group:g, item:it, lang:'en' };
        PAIR[it.pathKo] = it.pathEn;
        PAIR[it.pathEn] = it.pathKo;
      }
    });
  });

  var CONTENT_INDEX = {};
  Object.keys(MD_DATA).forEach(function(p){ CONTENT_INDEX[p] = (MD_DATA[p] || '').toLowerCase(); });

  function pathForItem(item, lang){
    if(lang === 'en' && item.pathEn) return item.pathEn;
    return item.pathKo;
  }
  function nameForItem(item, lang){
    return (lang === 'en' && item.nameEn) ? item.nameEn : item.nameKo;
  }
  function titleForGroup(g, lang){
    return (lang === 'en' && g.titleEn) ? g.titleEn : g.titleKo;
  }

  var navList = document.getElementById('navList');
  var allItems = [];

  function renderNav(lang){
    navList.innerHTML = '';
    allItems = [];
    var lastSection = null;
    FILES.forEach(function(g){
      if(g.section && g.section !== lastSection){
        var sEl = document.createElement('div');
        sEl.className = 'nav-section';
        sEl.textContent = g.section;
        navList.appendChild(sEl);
      }
      lastSection = g.section || null;
      var collapsible = !!g.section;
      var gEl = document.createElement('div');
      gEl.className = collapsible ? 'nav-group collapsible collapsed' : 'nav-group';
      var titleEl = document.createElement('div');
      titleEl.className = collapsible ? 'nav-group-title module' : 'nav-group-title';
      var titleText = document.createElement('span');
      titleText.textContent = titleForGroup(g, lang);
      titleEl.appendChild(titleText);
      if(collapsible){
        var chev = document.createElement('span');
        chev.className = 'nav-chevron';
        chev.innerHTML = '<svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        titleEl.appendChild(chev);
        titleEl.onclick = function(){ gEl.classList.toggle('collapsed'); };
      }
      gEl.appendChild(titleEl);
      var itemsEl = document.createElement('div');
      itemsEl.className = 'nav-group-items';
      g.items.forEach(function(it){
        var a = document.createElement('a');
        a.className = 'nav-item';
        a.textContent = nameForItem(it, lang);
        a.dataset.path = pathForItem(it, lang);
        a.onclick = function(){ loadFile(a.dataset.path); };
        itemsEl.appendChild(a);
        allItems.push({el:a, item:it, group:g});
      });
      gEl.appendChild(itemsEl);
      navList.appendChild(gEl);
    });
  }

  function applyLang(lang, opts){
    opts = opts || {};
    setLang(lang);
    document.documentElement.lang = lang;
    document.getElementById('langKo').classList.toggle('active', lang === 'ko');
    document.getElementById('langEn').classList.toggle('active', lang === 'en');
    document.getElementById('search').placeholder = (lang === 'en') ? 'Search... (Ctrl+K)' : '검색... (Ctrl+K)';
    renderNav(lang);

    if(!opts.skipContentSwap){
      var cur = currentPath();
      if(cur){
        var info = PATH_INDEX[cur];
        if(info){
          var newPath = pathForItem(info.item, lang);
          if(newPath !== cur){
            loadFile(newPath, { replaceHistory:true });
            return;
          }
        }
      }
    }
    var cur2 = currentPath();
    highlightActive(cur2);
    applySearchFilter();
  }

  function highlightActive(p){
    allItems.forEach(function(i){
      var on = i.el.dataset.path === p;
      i.el.classList.toggle('active', on);
      if(on){ var grp = i.el.closest('.nav-group'); if(grp) grp.classList.remove('collapsed'); }
    });
  }

  function applySearchFilter(){
    var q = (document.getElementById('search').value || '').toLowerCase().trim();
    var lang = getLang();
    allItems.forEach(function(i){
      var hay = (i.item.nameKo + ' ' + (i.item.nameEn||'') + ' ' + i.item.pathKo + ' ' + (i.item.pathEn||'')).toLowerCase();
      var nameHit = !q || hay.indexOf(q) !== -1;
      var bodyHit = false;
      if(q && !nameHit){
        var body = CONTENT_INDEX[pathForItem(i.item, lang)];
        if(body && body.indexOf(q) !== -1) bodyHit = true;
      }
      i.el.style.display = (nameHit || bodyHit) ? '' : 'none';
      if(bodyHit) i.el.dataset.hit = '1'; else i.el.removeAttribute('data-hit');
    });
    navList.querySelectorAll('.nav-group').forEach(function(g){
      var vis = Array.from(g.querySelectorAll('.nav-item')).some(function(i){ return i.style.display !== 'none'; });
      g.style.display = vis ? '' : 'none';
      if(q) g.classList.remove('collapsed');
    });
  }
  document.getElementById('search').addEventListener('input', applySearchFilter);
  document.getElementById('search').addEventListener('keydown', function(e){
    if(e.key !== 'Enter') return;
    for(var i = 0; i < allItems.length; i++){
      if(allItems[i].el.style.display !== 'none'){
        loadFile(allItems[i].el.dataset.path);
        this.blur();
        break;
      }
    }
  });

  var history = [];
  var historyIndex = -1;
  var navigating = false;

  function currentPath(){
    return historyIndex >= 0 ? history[historyIndex] : null;
  }

  var SVGNS = 'http://www.w3.org/2000/svg';
  function svg(tag, attrs){
    var e = document.createElementNS(SVGNS, tag);
    if(attrs) for(var k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }
  function renderAtlasWidget(el){
    el.innerHTML = '';
    var data = ATLAS_DATA;
    if(!data || !data.nodes || !data.nodes.length){
      el.textContent = getLang() === 'ko' ? 'Atlas 그래프를 사용할 수 없습니다.' : 'Atlas graph unavailable.';
      return;
    }
    var nodes = data.nodes.slice();
    var edges = (data.edges || []).slice();
    var byId = {};
    nodes.forEach(function(n){ byId[n.id] = n; });
    var out = {}, adj = {};
    nodes.forEach(function(n){ out[n.id] = []; adj[n.id] = {}; });
    edges.forEach(function(e){
      if(!(e.from in out) || !(e.to in byId)) return;
      out[e.from].push(e.to);
      adj[e.from][e.to] = true; adj[e.to][e.from] = true;
    });
    var rankOf = {};
    function rank(id, seen){
      if(id in rankOf) return rankOf[id];
      seen = seen || {};
      if(seen[id]) return 0;
      seen[id] = true;
      var r = 0;
      out[id].forEach(function(c){ r = Math.max(r, 1 + rank(c, seen)); });
      rankOf[id] = r;
      return r;
    }
    nodes.forEach(function(n){ rank(n.id); });
    var maxRank = 0;
    nodes.forEach(function(n){ maxRank = Math.max(maxRank, rankOf[n.id]); });
    var rows = {};
    nodes.forEach(function(n){ (rows[rankOf[n.id]] = rows[rankOf[n.id]] || []).push(n); });
    Object.keys(rows).forEach(function(r){ rows[r].sort(function(a,b){ return a.id < b.id ? -1 : 1; }); });

    var W = 760, H = 460, vpad = 40, hpad = 30;
    var rowGap = maxRank > 0 ? (H - 2 * vpad) / maxRank : 0;
    var pos = {};
    Object.keys(rows).forEach(function(r){
      var list = rows[r];
      var y = vpad + (maxRank - Number(r)) * rowGap;
      list.forEach(function(n, i){
        var x = hpad + (W - 2 * hpad) * (i + 1) / (list.length + 1);
        pos[n.id] = { x: x, y: y };
      });
    });

    var root = svg('svg', { 'class': 'atlas-graph', viewBox: '0 0 ' + W + ' ' + H, preserveAspectRatio: 'xMidYMid meet' });
    var vp = svg('g', {});
    root.appendChild(vp);
    var nodeH = 26;
    var edgeEls = [];
    edges.forEach(function(e){
      var a = pos[e.from], b = pos[e.to];
      if(!a || !b) return;
      var ln = svg('line', { 'class': 'atlas-edge', x1: a.x, y1: a.y + nodeH / 2, x2: b.x, y2: b.y - nodeH / 2 });
      ln.dataset.from = e.from; ln.dataset.to = e.to;
      vp.appendChild(ln);
      edgeEls.push(ln);
    });
    var nodeEls = [];
    nodes.forEach(function(n){
      var p = pos[n.id];
      var w = Math.max(48, n.label.length * 8 + 22);
      var g = svg('g', { 'class': 'atlas-node' });
      g.dataset.id = n.id;
      g.appendChild(svg('rect', { x: p.x - w / 2, y: p.y - nodeH / 2, width: w, height: nodeH, rx: 7 }));
      var t = svg('text', { x: p.x, y: p.y + 4, 'text-anchor': 'middle' });
      t.textContent = n.label;
      g.appendChild(t);
      g.addEventListener('mouseenter', function(){ hover(n.id); });
      g.addEventListener('mouseleave', clear);
      vp.appendChild(g);
      nodeEls.push(g);
    });
    function hover(id){
      nodeEls.forEach(function(g){
        var on = g.dataset.id === id || adj[id][g.dataset.id];
        g.classList.toggle('hot', g.dataset.id === id);
        g.classList.toggle('dim', !on);
      });
      edgeEls.forEach(function(ln){
        var inc = ln.dataset.from === id || ln.dataset.to === id;
        ln.classList.toggle('hot', inc);
        ln.classList.toggle('dim', !inc);
      });
    }
    function clear(){
      nodeEls.forEach(function(g){ g.classList.remove('hot', 'dim'); });
      edgeEls.forEach(function(ln){ ln.classList.remove('hot', 'dim'); });
    }

    var scale = 1, tx = 0, ty = 0;
    function apply(){ vp.setAttribute('transform', 'translate(' + tx + ' ' + ty + ') scale(' + scale + ')'); }
    root.addEventListener('wheel', function(ev){
      ev.preventDefault();
      var f = ev.deltaY < 0 ? 1.1 : 1 / 1.1;
      var ns = Math.min(3, Math.max(0.5, scale * f));
      var r = root.getBoundingClientRect();
      var mx = (ev.clientX - r.left) / r.width * W;
      var my = (ev.clientY - r.top) / r.height * H;
      tx = mx - (mx - tx) * (ns / scale);
      ty = my - (my - ty) * (ns / scale);
      scale = ns; apply();
    });
    var drag = null;
    root.addEventListener('mousedown', function(ev){ if(ev.target === root || ev.target === vp) drag = { x: ev.clientX, y: ev.clientY, tx: tx, ty: ty }; });
    window.addEventListener('mousemove', function(ev){
      if(!drag) return;
      var r = root.getBoundingClientRect();
      tx = drag.tx + (ev.clientX - drag.x) / r.width * W;
      ty = drag.ty + (ev.clientY - drag.y) / r.height * H;
      apply();
    });
    window.addEventListener('mouseup', function(){ drag = null; });

    var cap = document.createElement('div');
    cap.className = 'atlas-caption';
    cap.textContent = nodes.length + (getLang() === 'ko' ? ' 모듈 · ' : ' modules · ') + edges.length + (getLang() === 'ko' ? ' 의존 · 노드에 마우스를 올려보세요' : ' dependencies · hover a node');
    el.appendChild(root);
    el.appendChild(cap);
  }

  function copyText(text, onDone){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(onDone || function(){}).catch(function(){});
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); if(onDone) onDone(); } catch(e){}
      document.body.removeChild(ta);
    }
  }

  var tocHeads = [], tocLinks = [];
  function buildTocFor(inner, p){
    var toc = document.getElementById('toc');
    if(!toc){
      toc = document.createElement('nav'); toc.id = 'toc'; toc.className = 'toc';
      document.getElementById('content').appendChild(toc);
    }
    toc.innerHTML = '';
    tocHeads = []; tocLinks = [];
    var heads = Array.prototype.slice.call(inner.querySelectorAll('.md h2, .md h3'));
    if(heads.length < 2){ toc.style.display = 'none'; return; }
    toc.style.display = '';
    var label = document.createElement('div');
    label.className = 'toc-label';
    label.textContent = getLang() === 'en' ? 'On this page' : '이 페이지';
    toc.appendChild(label);
    heads.forEach(function(h){
      if(!h.id) h.id = slugify(h.textContent);
      var a = document.createElement('a');
      a.textContent = h.textContent;
      a.className = h.tagName === 'H3' ? 'lvl3' : 'lvl2';
      a.href = '#' + p + '#' + h.id;
      a.addEventListener('click', function(e){
        e.preventDefault();
        h.scrollIntoView({behavior:'smooth', block:'start'});
        window.history.pushState({path:p, scrollTo:h.id}, '', '#' + p + '#' + h.id);
      });
      toc.appendChild(a);
      tocHeads.push(h); tocLinks.push(a);
    });
    syncTocActive();
  }
  function syncTocActive(){
    if(!tocHeads.length) return;
    var scroller = document.getElementById('content');
    var stop = scroller.getBoundingClientRect().top;
    var active = 0;
    for(var i = 0; i < tocHeads.length; i++){
      if(tocHeads[i].getBoundingClientRect().top - stop <= 100) active = i; else break;
    }
    tocLinks.forEach(function(a, idx){ a.classList.toggle('active', idx === active); });
  }
  document.getElementById('content').addEventListener('scroll', syncTocActive, {passive:true});

  function addHeadingAnchors(inner, p){
    inner.querySelectorAll('.md h1, .md h2, .md h3, .md h4').forEach(function(h){
      if(!h.id || h.querySelector('.heading-anchor')) return;
      var a = document.createElement('a');
      a.className = 'heading-anchor';
      a.href = '#' + p + '#' + h.id;
      a.textContent = '#';
      a.title = getLang() === 'en' ? 'Copy link to this section' : '이 섹션 링크 복사';
      a.addEventListener('click', function(e){
        e.preventDefault();
        copyText(location.origin + location.pathname + '#' + p + '#' + h.id);
        window.history.pushState({path:p, scrollTo:h.id}, '', '#' + p + '#' + h.id);
        h.scrollIntoView({behavior:'smooth', block:'start'});
      });
      h.appendChild(a);
    });
  }

  function loadFile(p, opts){
    opts = opts || {};
    var text = MD_DATA[p];
    var inner = document.getElementById('contentInner');
    if(!text){
      inner.innerHTML = '<div class="welcome"><h2>문서를 찾을 수 없습니다</h2><p>' + p + '</p></div>';
      return;
    }

    highlightActive(p);

    if(!opts.fromPopState && !opts.replaceHistory){
      history = history.slice(0, historyIndex + 1);
      history.push(p);
      historyIndex = history.length - 1;
    } else if(opts.replaceHistory){
      if(historyIndex < 0){ history.push(p); historyIndex = 0; }
      else history[historyIndex] = p;
    }

    var html = marked.parse(text);
    var dir = p.indexOf('/') !== -1 ? p.substring(0, p.lastIndexOf('/')) : '';
    var fileName = p.split('/').pop();

    var canBack = historyIndex > 0;
    var canFwd = historyIndex < history.length - 1;
    var lang = getLang();
    var backLabel = (lang === 'en') ? 'Back' : '뒤로';
    var fwdLabel = (lang === 'en') ? 'Forward' : '앞으로';
    var rootPath = (lang === 'en' && MD_DATA['README_en.md']) ? 'README_en.md' : 'README_kr.md';

    var navHtml = '<div class="breadcrumb"><span class="nav-btns">'
      + '<button class="nav-btn" onclick="window._goBack()" ' + (canBack ? '' : 'disabled') + ' title="' + backLabel + '">&#8592;</button>'
      + '<button class="nav-btn" onclick="window._goForward()" ' + (canFwd ? '' : 'disabled') + ' title="' + fwdLabel + '">&#8594;</button>'
      + '</span>'
      + '<a href="#" onclick="window._loadFile(\'' + rootPath + '\');return false">docs</a> / '
      + (dir ? dir + ' / ' : '')
      + '<strong>' + fileName + '</strong>'
      + '<a class="src-link" href="https://github.com/monkshark/page-ide/blob/main/docs/' + p + '" target="_blank" rel="noopener">' + (lang === 'en' ? 'Edit on GitHub' : 'GitHub에서 편집') + '</a>'
      + '</div>';

    inner.innerHTML = navHtml + '<div class="md">' + html + '</div>';

    inner.querySelectorAll('.md h1, .md h2, .md h3, .md h4, .md h5, .md h6').forEach(function(h){
      if(!h.id) h.id = slugify(h.textContent);
    });

    buildTocFor(inner, p);
    addHeadingAnchors(inner, p);

    inner.querySelectorAll('.md a[href]').forEach(function(a){
      var href = a.getAttribute('href');
      if(!href || href.indexOf('http') === 0) return;
      var hashOnly = href.charAt(0) === '#';
      if(hashOnly){
        a.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          var id = decodeURIComponent(href.substring(1));
          var target = document.getElementById(id);
          if(target){ target.scrollIntoView({behavior:'smooth',block:'start'}); }
        });
        return;
      }
      var hashTarget = '';
      var hashIdx = href.indexOf('#');
      if(hashIdx !== -1){ hashTarget = decodeURIComponent(href.substring(hashIdx + 1)); href = href.substring(0, hashIdx); }
      if(!href.endsWith('.md')) return;

      if(href.indexOf('./') === 0) href = href.substring(2);

      var resolved;
      if(href.indexOf('../') === 0){
        var parts = dir ? dir.split('/') : [];
        var h = href;
        while(h.indexOf('../') === 0){ parts.pop(); h = h.substring(3); }
        resolved = (parts.length ? parts.join('/') + '/' : '') + h;
      } else if(href.indexOf('/') === 0){
        resolved = href.substring(1);
      } else {
        resolved = dir ? dir + '/' + href : href;
      }
      if(MD_DATA[resolved]){
        a.onclick = function(e){ e.preventDefault(); loadFile(resolved, hashTarget ? {scrollTo: hashTarget} : undefined); };
      } else {
        a.onclick = function(e){ e.preventDefault(); console.warn('Doc not found in viewer:', resolved); };
      }
    });

    try {
      if(globalThis.mermaid){
        var nodes = inner.querySelectorAll('pre.mermaid');
        nodes.forEach(function(n){ if(!n.dataset.mermaidSrc) n.dataset.mermaidSrc = n.textContent; });
        if(nodes.length) mermaid.run({nodes:nodes});
      }
    } catch(e){ console.warn('Mermaid run failed:', e); }

    try {
      inner.querySelectorAll('.page-widget[data-widget="atlas"]').forEach(renderAtlasWidget);
    } catch(e){ console.warn('Atlas widget failed:', e); }

    inner.querySelectorAll('.md img[src]').forEach(function(img){
      var src = img.getAttribute('src');
      if(!src) return;
      if(/^(https?:)?\/\//.test(src) || src.indexOf('data:') === 0) return;
      if(src.indexOf('./') === 0) src = src.substring(2);
      var baseParts = ['docs'];
      if(dir) baseParts = baseParts.concat(dir.split('/'));
      var s = src;
      if(s.indexOf('/') === 0){
        baseParts = ['docs'];
        s = s.substring(1);
      } else {
        while(s.indexOf('../') === 0){ baseParts.pop(); s = s.substring(3); }
      }
      var resolved = baseParts.concat(s ? [s] : []).join('/');
      if(resolved.indexOf('docs/') === 0){
        img.setAttribute('src', resolved.substring(5));
      } else {
        img.setAttribute('src', 'https://raw.githubusercontent.com/monkshark/page-ide/main/' + resolved);
      }
    });

    inner.querySelectorAll('.md pre').forEach(function(pre){
      if(pre.classList.contains('mermaid')) return;
      var code = pre.querySelector('code');
      if(!code) return;
      var lang = '';
      (code.className || '').split(/\s+/).forEach(function(c){
        if(c.indexOf('language-') === 0) lang = c.substring(9);
      });
      if(lang){
        var badge = document.createElement('span');
        badge.className = 'code-lang';
        badge.textContent = lang;
        pre.appendChild(badge);
      }
      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.type = 'button';
      btn.textContent = 'Copy';
      btn.onclick = function(){
        var text = code.textContent || '';
        var done = function(){
          btn.textContent = 'Copied';
          btn.classList.add('ok');
          setTimeout(function(){ btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 1200);
        };
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(text).then(done).catch(function(){});
        } else {
          var ta = document.createElement('textarea');
          ta.value = text; document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); done(); } catch(e){}
          document.body.removeChild(ta);
        }
      };
      pre.appendChild(btn);
    });

    var scrollTarget = opts.scrollTo || null;
    if(scrollTarget){
      var el = inner.querySelector('#' + CSS.escape(scrollTarget));
      if(!el){
        var headings = inner.querySelectorAll('.md h1, .md h2, .md h3, .md h4, .md h5, .md h6');
        for(var i = 0; i < headings.length; i++){
          if(headings[i].id && headings[i].id.indexOf(scrollTarget) === 0){
            el = headings[i];
            break;
          }
        }
      }
      if(el){
        el.scrollIntoView({behavior:'auto', block:'start'});
      } else {
        document.getElementById('content').scrollTop = 0;
      }
    } else {
      document.getElementById('content').scrollTop = 0;
    }
    closeSidebar();
    if(!opts.fromPopState){
      var hashPart = '#' + p + (scrollTarget ? '#' + scrollTarget : '');
      window.history.pushState({path:p, scrollTo: scrollTarget}, '', hashPart);
    }
  }

  window._goBack = function(){
    if(historyIndex > 0){
      historyIndex--;
      var p = history[historyIndex];
      loadFile(p, {fromPopState:true});
      window.history.pushState({path:p}, '', '#' + p);
    }
  };
  window._goForward = function(){
    if(historyIndex < history.length - 1){
      historyIndex++;
      var p = history[historyIndex];
      loadFile(p, {fromPopState:true});
      window.history.pushState({path:p}, '', '#' + p);
    }
  };
  window._loadFile = function(p){ loadFile(p); };

  function parseHash(raw){
    if(!raw) return {path:null, scrollTo:null};
    var s = raw.charAt(0) === '#' ? raw.slice(1) : raw;
    if(!s) return {path:null, scrollTo:null};
    var mdIdx = s.indexOf('.md');
    if(mdIdx !== -1){
      var path = s.substring(0, mdIdx + 3);
      var rest = s.substring(mdIdx + 3);
      var scrollTo = (rest.charAt(0) === '#') ? decodeURIComponent(rest.substring(1)) : null;
      return {path: path, scrollTo: scrollTo};
    }
    return {path: s, scrollTo: null};
  }

  window.addEventListener('popstate', function(e){
    if(navigating) return;
    var stateP = e.state && e.state.path;
    var stateScroll = e.state && e.state.scrollTo;
    var p, scrollTo;
    if(stateP){ p = stateP; scrollTo = stateScroll || null; }
    else {
      var parsed = parseHash(location.hash);
      p = parsed.path || initialDefaultPath();
      scrollTo = parsed.scrollTo;
    }
    if(MD_DATA[p]){
      navigating = true;
      var idx = history.lastIndexOf(p);
      if(idx !== -1) historyIndex = idx;
      loadFile(p, {fromPopState:true, scrollTo: scrollTo});
      navigating = false;
    }
  });

  document.addEventListener('keydown', function(e){
    if((e.ctrlKey || e.metaKey) && e.key === 'k'){ e.preventDefault(); document.getElementById('search').focus(); }
    if(e.altKey && e.key === 'ArrowLeft'){ e.preventDefault(); window._goBack(); }
    if(e.altKey && e.key === 'ArrowRight'){ e.preventDefault(); window._goForward(); }
  });

  document.getElementById('langKo').addEventListener('click', function(){ if(getLang()!=='ko') applyLang('ko'); });
  document.getElementById('langEn').addEventListener('click', function(){ if(getLang()!=='en') applyLang('en'); });

  var THEME_KEY = 'docsViewerTheme';
  function getTheme(){ return localStorage.getItem(THEME_KEY) === 'light' ? 'light' : 'dark'; }
  function setThemeStored(t){ localStorage.setItem(THEME_KEY, t === 'light' ? 'light' : 'dark'); }
  function swapHljsStylesheet(theme){
    var link = document.getElementById('hljsTheme');
    if(link) link.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-' + (theme === 'light' ? 'light' : 'dark') + '.min.css';
  }
  function reInitMermaidAndRerender(theme){
    if(!globalThis.mermaid) return;
    try {
      mermaid.initialize({startOnLoad:false, theme: theme === 'light' ? 'default' : 'dark', securityLevel:'loose'});
    } catch(e){ console.warn('Mermaid re-init failed:', e); }
    var inner = document.getElementById('contentInner');
    if(!inner) return;
    var nodes = inner.querySelectorAll('pre.mermaid');
    nodes.forEach(function(n){
      if(n.dataset.mermaidSrc){
        n.removeAttribute('data-processed');
        n.innerHTML = n.dataset.mermaidSrc;
      }
    });
    try {
      if(nodes.length) mermaid.run({nodes: nodes});
    } catch(e){ console.warn('Mermaid re-run failed:', e); }
  }
  function applyTheme(theme, opts){
    opts = opts || {};
    theme = (theme === 'light') ? 'light' : 'dark';
    setThemeStored(theme);
    document.documentElement.setAttribute('data-theme', theme);
    swapHljsStylesheet(theme);
    if(!opts.skipMermaid) reInitMermaidAndRerender(theme);
  }
  document.getElementById('themeToggle').addEventListener('click', function(){
    applyTheme(getTheme() === 'light' ? 'dark' : 'light');
  });

  function initialDefaultPath(){
    return (getLang() === 'en' && MD_DATA['README_en.md']) ? 'README_en.md' : 'README_kr.md';
  }

  var initialLang = getLang();
  applyLang(initialLang, {skipContentSwap:true});

  var parsedInit = parseHash(location.hash);
  if(parsedInit.path && MD_DATA[parsedInit.path]){
    var info = PATH_INDEX[parsedInit.path];
    if(info && info.lang !== initialLang){
      setLang(info.lang);
      document.getElementById('langKo').classList.toggle('active', info.lang === 'ko');
      document.getElementById('langEn').classList.toggle('active', info.lang === 'en');
      document.getElementById('search').placeholder = (info.lang === 'en') ? 'Search... (Ctrl+K)' : '검색... (Ctrl+K)';
      renderNav(info.lang);
    }
    loadFile(parsedInit.path, parsedInit.scrollTo ? {scrollTo: parsedInit.scrollTo} : undefined);
  } else {
    loadFile(initialDefaultPath());
  }
})();
</script>
