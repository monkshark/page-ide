name: Update PAGE asset manifests

on:
  schedule:
    - cron: '45 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate asset manifests
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = 'monkshark';
            const repo = 'page-ide-assets';
            const targets = [
              { id: 'scala-metals-bundle', tag: 'metals-bundle' },
              { id: 'java-jdtls-bundle', tag: 'jdtls-bundle' },
              { id: 'dart-sdk-bundle', tag: 'dart-bundle' },
              { id: 'dart-flutter-bundle', tag: 'flutter-bundle' },
              { id: 'ruby-solargraph-bundle', tag: 'ruby-bundle' },
            ];

            async function fetchAssets(tag) {
              try {
                const release = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
                return release.data.assets.map(a => a.name).filter(Boolean);
              } catch (err) {
                if (err.status === 404) {
                  core.warning(`release tag ${tag} not found on ${owner}/${repo} — manifest will list no assets`);
                  return [];
                }
                throw err;
              }
            }

            const failed = [];
            for (const target of targets) {
              try {
                const assets = await fetchAssets(target.tag);
                const manifest = {
                  updatedAt: new Date().toISOString(),
                  tag: target.tag,
                  assets,
                };
                const body = JSON.stringify(manifest, null, 2) + '\n';
                const file = path.join('docs', 'lsp', `${target.id}.json`);
                fs.mkdirSync(path.dirname(file), { recursive: true });
                fs.writeFileSync(file, body);
                core.info(`wrote ${file} (${assets.length} assets for ${target.tag})`);
              } catch (err) {
                failed.push(`${target.tag}: ${err.message}`);
                core.warning(`failed ${target.tag}: ${err.message}`);
              }
            }
            if (failed.length === targets.length) {
              core.setFailed('all asset fetches failed:\n' + failed.join('\n'));
            }

      - name: Generate Adoptium JDK version manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/jdk
          majors=(8 11 17 21 25)
          versions='[]'
          for m in "${majors[@]}"; do
            next=$((m + 1))
            url="https://api.adoptium.net/v3/info/release_versions?release_type=ga&page_size=10&heap_size=normal&image_type=jdk&jvm_impl=hotspot&vendor=eclipse&version=%5B${m}%2C${next}%29&sort_order=DESC"
            resp=$(curl -sSfL --max-time 15 "$url" 2>/dev/null || echo '{"versions":[]}')
            chunk=$(echo "$resp" | jq -c '[.versions[]? | {major: .major, semver: .semver, openjdk_version: .openjdk_version}]')
            versions=$(echo "$versions" | jq --argjson c "$chunk" '. + $c')
            echo "  major=$m → $(echo "$chunk" | jq 'length') versions"
          done
          now=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n --arg t "$now" --argjson v "$versions" '{updatedAt: $t, versions: $v}' > docs/jdk/versions.json
          echo "wrote docs/jdk/versions.json ($(echo "$versions" | jq 'length') total)"

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MANIFEST_BOT_PAT }}
          branch: chore/asset-manifest-refresh
          delete-branch: true
          commit-message: "docs: page-ide-assets 자산 + Adoptium JDK 매니페스트 자동 갱신"
          title: "docs: page-ide-assets 자산 + Adoptium JDK 매니페스트 자동 갱신"
          body: |
            monkshark/page-ide-assets 번들 자산 + Adoptium JDK 버전을 정적 매니페스트로 갱신.
            - `docs/lsp/*-bundle.json` — metals/jdtls/dart/flutter/ruby 번들 자산명
            - `docs/jdk/versions.json` — Adoptium Temurin LTS major별 GA 버전 (8/11/17/21/25)

            매일 PAGE asset manifest GitHub Action 이 자동 생성/갱신합니다.
          labels: |
            automation
            lsp

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash --delete-branch "${{ steps.cpr.outputs.pull-request-number }}"
